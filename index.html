      + '<div class="card"><div class="card-title-row"><span class="card-title">本周节奏</span>'
      + '<button class="link-btn" id="log-hours">+ 记录时长</button></div>'
      + '<div id="wk-chart">' + Charts.bar(barData, { height: 130, unit: 'h', hiColor: '#000' }) + '</div>'
      + '<div class="muted-sm">今日 ' + Store.todayHours() + 'h · 本周累计 ' + U.round1(U.sum(hours)) + 'h / 目标 ' + (s.settings.weeklyTargetHours || 50) + 'h</div>'
      + '</div>';

    bind(el, next);
  }

  function bind(el, next) {
    // NOW 卡动作
    const doneBtn = el.querySelector('#now-done');
    if (doneBtn && next) doneBtn.onclick = () => toggleTask(next.id, true);
    const focBtn = el.querySelector('#now-focus');
    if (focBtn && next) focBtn.onclick = () => { App.go('focus'); };
    const addBtn = el.querySelector('#now-add');
    if (addBtn) addBtn.onclick = () => App.go('tasks');

    // 序列就地勾选
    el.querySelectorAll('.seq-row input[type=checkbox]').forEach(cb => {
      cb.onchange = () => {
        const id = cb.closest('.seq-row').getAttribute('data-id');
        toggleTask(id, cb.checked);
      };
    });

    // 快捷入口
    el.querySelectorAll('[data-go]').forEach(b => b.onclick = () => App.go(b.getAttribute('data-go')));
    el.querySelector('#go-sched').onclick = () => App.go('scheduler');

    // 记时长
    el.querySelector('#log-hours').onclick = () => {
      Modal.open({
        title: '记录学习时长',
        html: '<div class="seg-row" id="hr-segs">'
          + [0.5, 1, 1.5, 2, 3].map(h => '<button class="seg" data-h="' + h + '">+' + h + 'h</button>').join('')
          + '</div><div class="muted-sm">点击即累加到今天（当前 ' + Store.todayHours() + 'h）</div>',
        actions: [{ label: '完成', kind: 'btn-primary' }]
      });
      document.querySelectorAll('#hr-segs .seg').forEach(b => b.onclick = () => {
        Store.addHours(+b.getAttribute('data-h'));
        Toast.success('+' + b.getAttribute('data-h') + 'h，今日共 ' + Store.todayHours() + 'h');
        renderStatusOnly();
      });
    };
  }

  function renderStatusOnly() { App.refresh(); }

  function toggleTask(id, done) {
    let subject = null, count = 0;
    Store.update(s => {
      const t = s.tasks.find(x => x.id === id);
      if (!t) return;
      t.done = done; subject = t.subject;
      const k = U.dkey();
      s.completions[k] = s.completions[k] || [];
      const i = s.completions[k].indexOf(id);
      if (done && i < 0) s.completions[k].push(id);
      if (!done && i >= 0) s.completions[k].splice(i, 1);
      count = s.completions[k].length;
    });
    if (done) {
      // 连击反馈
      Toast.show(['✓ 打卡', '✓ 拿下', '✓ 干净利落', '✓ 继续推进'][count % 4] + '（今日第' + count + '个）', 'success', 1800);
      confettiBurst();
      if (subject === 'math' && Store.mistakeCountToday('sign') > 0) {
        Modal.open({
          title: '⚠️ 数学防呆提醒',
          html: '<p>今日已记 <b>' + Store.mistakeCountToday('sign') + '</b> 次符号错误。下一题前默念：</p>'
            + '<ol style="padding-left:18px;line-height:1.9"><li>符号前置</li><li>分式三步法</li><li>草稿分区</li></ol>',
          actions: [{ label: '收到', kind: 'btn-primary' }]
        });
      }
    }
    App.refresh();
  }

  // 轻量庆祝动效（纯CSS，无库）
  function confettiBurst() {
    const c = document.createElement('div');
    c.className = 'burst';
    for (let i = 0; i < 10; i++) {
      const p = document.createElement('i');
      p.style.setProperty('--a', (i * 36) + 'deg');
      p.style.setProperty('--d', (34 + (i % 3) * 14) + 'px');
      c.appendChild(p);
    }
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 700);
  }

  window.DashboardModule = { render };
})();


/* ===== js/modules/tasks.js ===== */
/* ============================================================
 * tasks.js — 任务中心：添加/打卡/就地编辑/删除 + 防呆提醒区
 * 业务规则：
 *  1. 数学任务勾选完成且今日符号错误>0 → 防呆弹窗
 *  2. 政治任务超过2个 → 警告
 *  3. 任务文本含硬件关键词 → 禁止添加 + 红线警告
 * ============================================================ */
(function () {
  'use strict';
  let filter = 'all';

  function hitHardware(text) {
    return DB.HARDWARE_KEYWORDS.find(k => text.indexOf(k) >= 0);
  }

  function render(el) {
    const s = Store.get();
    const tabs = [['all', '全部'], ['math', '数学'], ['ctrl', '自控'], ['eng', '英语'], ['pol', '政治']];

    let tabsHtml = '';
    tabs.forEach(t => {
      const n = t[0] === 'all' ? s.tasks.length : s.tasks.filter(x => x.subject === t[0]).length;
      tabsHtml += '<button class="tab' + (filter === t[0] ? ' tab-on' : '') + '" data-f="' + t[0] + '">' + t[1] + ' <span class="tab-n">' + n + '</span></button>';
    });

    const list = s.tasks.filter(t => filter === 'all' || t.subject === filter)
      .sort((a, b) => (a.done - b.done) || (a.createdAt < b.createdAt ? -1 : 1));

    let rows = '';
    if (list.length === 0) {
      rows = '<div class="empty">暂无任务，在下方添加一条吧</div>';
    } else {
      list.forEach(t => {
        const subj = DB.SUBJECTS[t.subject] || { short: '?', color: '#999' };
        rows += '<div class="task' + (t.done ? ' task-done' : '') + '" data-id="' + t.id + '">'
          + '<label class="task-check"><input type="checkbox"' + (t.done ? ' checked' : '') + ' data-act="toggle"><span class="box"></span></label>'
          + '<span class="task-tag" style="background:' + subj.color + '">' + subj.short + '</span>'
          + '<span class="task-text" data-act="edit" title="点击编辑">' + U.esc(t.text) + '</span>'
          + '<button class="task-x" data-act="del" aria-label="删除">×</button>'
          + '</div>';
      });
    }

    el.innerHTML =
      '<div class="card"><div class="card-title">任务中心</div>'
      + '<div class="tab-row">' + tabsHtml + '</div>'
      + '<div class="task-list">' + rows + '</div>'
      + '<div class="add-row">'
      +   '<select id="add-subj" class="input input-sel">'
      +     '<option value="math">数学一</option><option value="ctrl">自控</option>'
      +     '<option value="eng">英语一</option><option value="pol">政治</option>'
      +   '</select>'
      +   '<input id="add-text" class="input" placeholder="添加任务，回车确认（硬件关键词将被拦截）">'
      +   '<button id="add-btn" class="btn btn-primary">添加</button>'
      + '</div></div>'

      // 防呆提醒区（固定在列表下方，PRD 4.2-4）
      + '<div class="warn-box">'
      + '<div class="warn-title">⚠️ 防呆提醒</div>'
      + '<div class="warn-body">数学任务执行前请确认：<br>'
      + '1. 符号前置，负号立即提到最前面<br>'
      + '2. 分式合并三步法（分母→分子→计算）<br>'
      + '3. 草稿分区：左侧乱草，右侧正稿</div>'
      + '</div>';

    bind(el);
  }

  function addTask(el) {
    const subj = el.querySelector('#add-subj').value;
    const input = el.querySelector('#add-text');
    const text = input.value.trim();
    if (!text) { Toast.warn('任务内容不能为空'); return; }

    // 业务规则3：硬件冲动拦截
    const hit = hitHardware(text);
    if (hit) {
      Toast.danger('🚫 红线拦截：检测到「' + hit + '」。初试前绝对禁止硬件项目！');
      Modal.open({
        title: '🚫 红线警告',
        html: '<p>你试图添加包含 <b>「' + U.esc(hit) + '」</b> 的任务。</p>'
          + '<p>这触犯了绝对禁令第1条：<b>初试前绝对禁止硬件项目</b>。</p>'
          + '<p class="muted-sm">你的STM32履历已经够用。现在每一小时硬件时间，都是在从数学一的130分里偷分。任务已被拒绝。</p>',
        actions: [{ label: '我明白，回去学数学', kind: 'btn-primary' }]
      });
      return;
    }

    // 业务规则2：政治时间监控
    if (subj === 'pol') {
      const polCount = Store.get().tasks.filter(t => t.subject === 'pol' && !t.done).length;
      if (polCount >= 2) {
        Toast.warn('⚠️ 政治任务已超标，请优先保证数学/专业课。');
      }
    }

    Store.update(s => {
      s.tasks.push({ id: U.uid(), subject: subj, text, done: false, createdAt: new Date().toISOString() });
    });
    Toast.success('已添加');
    App.refresh();
  }

  function bind(el) {
    el.querySelectorAll('.tab').forEach(b => b.onclick = () => { filter = b.getAttribute('data-f'); render(el); });
    el.querySelector('#add-btn').onclick = () => addTask(el);
    el.querySelector('#add-text').addEventListener('keydown', e => { if (e.key === 'Enter') addTask(el); });

    el.querySelectorAll('.task').forEach(row => {
      const id = row.getAttribute('data-id');
      row.querySelector('[data-act="toggle"]').onchange = e => toggleTask(id, e.target.checked);
      row.querySelector('[data-act="del"]').onclick = () => {
        Modal.confirm('删除任务', '<p>确认删除该任务？此操作不可恢复。</p>', '删除', () => {
          Store.update(s => { s.tasks = s.tasks.filter(t => t.id !== id); });
          App.refresh();
        }, true);
      };
      // 就地编辑
      const textEl = row.querySelector('[data-act="edit"]');
      textEl.onclick = () => {
        if (row.classList.contains('editing')) return;
        const task = Store.get().tasks.find(t => t.id === id);
        if (!task) return;
        row.classList.add('editing');
        const inp = document.createElement('input');
        inp.className = 'input task-edit-input';
        inp.value = task.text;
        textEl.replaceWith(inp);
        inp.focus(); inp.select();
        const commit = save => {
          if (save) {
            const v = inp.value.trim();
            const hit = v && hitHardware(v);
            if (hit) { Toast.danger('🚫 红线拦截：文本包含「' + hit + '」，修改被拒绝'); }
            else if (v) Store.update(s => { const t = s.tasks.find(x => x.id === id); if (t) t.text = v; });
          }
          App.refresh();
        };
        inp.onkeydown = e => {
          if (e.key === 'Enter') commit(true);
          else if (e.key === 'Escape') commit(false);
        };
        inp.onblur = () => commit(true);
      };
    });
  }

  function toggleTask(id, done) {
    let subject = null;
    Store.update(s => {
      const t = s.tasks.find(x => x.id === id);
      if (!t) return;
      t.done = done;
      subject = t.subject;
      const k = U.dkey();
      s.completions[k] = s.completions[k] || [];
      const i = s.completions[k].indexOf(id);
      if (done && i < 0) s.completions[k].push(id);
      if (!done && i >= 0) s.completions[k].splice(i, 1);
    });

    if (done) {
      Toast.success('✓ 打卡完成');
      // 业务规则1：数学防呆触发（今日符号错误>0才弹）
      if (subject === 'math' && Store.mistakeCountToday('sign') > 0) {
        Modal.open({
          title: '⚠️ 数学防呆提醒',
          html: '<p>检测到今日已记录 <b>' + Store.mistakeCountToday('sign') + '</b> 次符号错误。下一题开始前请默念：</p>'
            + '<ol style="padding-left:18px;line-height:1.9"><li>符号前置，负号立即提到最前面</li>'
            + '<li>分式合并三步法（分母→分子→计算）</li>'
            + '<li>草稿分区：左侧乱草，右侧正稿</li></ol>',
          actions: [{ label: '收到，继续', kind: 'btn-primary' }]
        });
      }
    }
    App.refresh();
  }

  window.TasksModule = { render };
})();


/* ===== js/modules/scheduler.js ===== */
/* ============================================================
 * scheduler.js — 智能任务调度引擎
 * 规则（蓝图v2.0硬编码）：
 *  · 数学正确率<70% → 数学任务权重+30%
 *  · 现控连续3天未打卡 → 知识冷却预警，优先排现控
 *  · 符号错误本周>3次 → 每日强制插入符号专项5题
 *  · 政治超红线 → 自动削减政治任务
 * 输出：每日唯一最优任务序列（generate() 供 Dashboard NOW 卡复用）
 * ============================================================ */
(function () {
  'use strict';

  function ctx() {
    const acc = Store.currentMathAccuracy();
    return {
      acc,
      mathBoost: (acc != null && acc < 70) ? 1.3 : 1,
      signWeek: Store.mistakeCountWeek('sign'),
      ctrlIdle: !Store.subjectDoneInDays('ctrl', 3),
      polCap: 2
    };
  }

  // 生成今日最优序列：返回 {sequence:[{id?,subject,text,reason,weight,done,forced}], reasons[]}
  function generate() {
    const s = Store.get();
    const c = ctx();
    const reasons = [];
    const forced = [];

    // 1) 强制项：符号专项
    if (c.signWeek > 3) {
      forced.push({ id: '__sign', subject: 'math', text: '【符号专项】5题（本周符号错误 ' + c.signWeek + ' 次，强制插入）', reason: '符号错误本周 ' + c.signWeek + ' 次 > 3次 → 强制插入符号专项', weight: 99, forced: true, done: false });
      reasons.push('符号错误本周 ' + c.signWeek + ' 次 > 3次 → 强制插入符号专项');
    }
    // 2) 强制项：现控冷却
    if (c.ctrlIdle) {
      forced.push({ id: '__cool', subject: 'ctrl', text: '【知识冷却补救】现控：复习状态转移矩阵 → 重做极点配置例4-2', reason: '现控连续3天未打卡 → 触发知识冷却，优先排现控', weight: 98, forced: true, done: false });
      reasons.push('现控连续3天未打卡 → 触发知识冷却，优先排现控');
    }
    if (c.mathBoost > 1) reasons.push('数学正确率 ' + c.acc + '% < 70% → 数学权重 +30%');

    // 3) 加权排序既有未完成任务
    const weight = t => {
      let w = 1;
      if (t.subject === 'math') w *= c.mathBoost;
      if (t.subject === 'ctrl' && c.ctrlIdle) w *= 1.5;
      if (t.subject === 'pol') w *= 0.6;
      return w + (Math.random() * 0.01);
    };
    const doneIds = s.completions[U.dkey()] || [];
    const pending = s.tasks.map(t => ({
      id: t.id, subject: t.subject, text: t.text,
      done: t.done || doneIds.indexOf(t.id) >= 0,
      forced: false, weight: Math.round(weight(t) * 100) / 100,
      reason: ''
    }));
    // 未完成在前，按权重降序；已完成沉底
    const sorted = pending.sort((a, b) => (a.done - b.done) || (b.weight - a.weight));

    let polN = 0, polCut = false;
    const picked = [];
    sorted.forEach(t => {
      if (t.done) { picked.push(t); return; }
      if (t.subject === 'pol') {
        if (polN >= c.polCap) { polCut = true; return; }
        polN++;
      }
      picked.push(t);
    });
    if (polCut) reasons.push('政治超过时间红线 → 已自动削减未排政治任务');

    return { sequence: forced.concat(picked).slice(0, 9), reasons, ctx: c };
  }

  function render(el) {
    const gen = generate();
    const s = Store.get();

    let rows = '';
    if (!gen.sequence.length) rows = '<div class="empty">任务池为空。先去「任务」页添加今天的任务，排程引擎才能工作。</div>';
    gen.sequence.forEach(item => {
      const meta = DB.SUBJECTS[item.subject];
      rows += '<div class="seq-row' + (item.forced ? ' seq-forced' : '') + (item.done ? ' seq-is-done' : '') + '" data-id="' + item.id + '">'
        + '<label class="task-check"><input type="checkbox"' + (item.done ? ' checked' : '') + (item.forced ? ' disabled' : '') + '><span class="box"></span></label>'
        + '<span class="seq-text">' + U.esc(item.text) + '</span>'
        + '<span class="seq-badge" style="color:' + meta.color + '">' + (item.forced ? '🔒' : item.weight) + '</span>'
        + '</div>';
    });

    el.innerHTML =
      '<div class="card"><div class="card-title">🧠 智能任务调度引擎</div>'
      + '<div class="muted-sm">不是静态列表，是基于 正确率/连续打卡/易错类型/政治红线 动态计算出的<b>今日唯一最优序列</b>。</div>'
      + '<div class="ctx-grid">'
      + '<div class="ctx-item">数学正确率<b>' + (gen.ctx.acc != null ? gen.ctx.acc + '%' : '未录入') + '</b></div>'
      + '<div class="ctx-item">数学权重<b>×' + gen.ctx.mathBoost + '</b></div>'
      + '<div class="ctx-item">符号错误(周)<b>' + gen.ctx.signWeek + ' 次</b></div>'
      + '<div class="ctx-item">现控冷却<b>' + (gen.ctx.ctrlIdle ? '⚠️ 是' : '否') + '</b></div>'
      + '</div>'
      + (gen.reasons.length ? '<div class="reason-box">⚙️ 调度决策：<br>' + gen.reasons.map(r => '· ' + r).join('<br>') + '</div>' : '<div class="reason-box">⚙️ 今日无特殊调度干预，按常规权重排序。</div>')
      + '</div>'

      + '<div class="card"><div class="card-title">今日最优序列（' + gen.sequence.filter(x => !x.done).length + ' 项待办）</div>' + rows
      + '<div class="muted-sm" style="margin-top:8px">🔒 = 系统强制项，不可跳过；数字 = 动态权重。勾选直接打卡。</div></div>'

      + '<div class="card"><div class="card-title">调度规则（硬编码）</div><ul class="rule-list">'
      + '<li>数学正确率 &lt; 70% → 数学任务权重 +30%</li>'
      + '<li>现控连续3天未打卡 → 触发知识冷却，强制优先</li>'
      + '<li>符号错误本周 &gt; 3次 → 每日强制插入符号专项5题</li>'
      + '<li>政治任务当日超2个 → 超出部分自动削减</li>'
      + '</ul></div>';

    bind(el);
  }

  function bind(el) {
    el.querySelectorAll('.seq-row input[type=checkbox]').forEach(cb => {
      cb.onchange = () => {
        const id = cb.closest('.seq-row').getAttribute('data-id');
        if (id.indexOf('__') === 0) return; // 强制项不走任务存储
        let subject = null;
        Store.update(s => {
          const t = s.tasks.find(x => x.id === id);
          if (!t) return;
          t.done = cb.checked; subject = t.subject;
          const k = U.dkey();
          s.completions[k] = s.completions[k] || [];
          const i = s.completions[k].indexOf(id);
          if (cb.checked && i < 0) s.completions[k].push(id);
          if (!cb.checked && i >= 0) s.completions[k].splice(i, 1);
        });
        if (cb.checked) {
          Toast.success('✓ 打卡完成');
          if (subject === 'math' && Store.mistakeCountToday('sign') > 0) {
            Modal.open({
              title: '⚠️ 数学防呆提醒',
              html: '<p>今日已记 <b>' + Store.mistakeCountToday('sign') + '</b> 次符号错误。下一题前默念：符号前置 / 分式三步法 / 草稿分区。</p>',
              actions: [{ label: '收到', kind: 'btn-primary' }]
            });
          }
        }
        App.refresh();
      };
    });
  }

  window.SchedulerModule = { render, generate };
})();


/* ===== js/modules/progress.js ===== */
/* ============================================================
 * progress.js — 进度追踪：四科进度卡片 + 里程碑时间线
 * 特殊预警：现控<40%黄警 / 政治红色警告（PRD 4.3）
 * ============================================================ */
(function () {
  'use strict';

  function subjCard(key) {
    const meta = DB.SUBJECTS[key];
    const p = Store.get().progress[key];
    const now = new Date();
    const month = now.getMonth() + 1;

    let warn = '';
    if (key === 'ctrl' && (p.modules['现代控制'] || 0) < 40) {
      warn = '<div class="alert alert-warn">⚠️ 8月底前需独立完成极点配置，否则触发备选切换</div>';
    }
    if (key === 'pol' && month < 9) {
      warn = '<div class="alert alert-danger">⏰ 9月前每天≤45分钟，禁止挤占数学/专业课时间</div>';
    }

    let moduleChips = '';
    meta.modules.forEach(m => {
      const v = (p.modules && p.modules[m]) || 0;
      moduleChips += '<span class="tag tag-mod" data-subj="' + key + '" data-mod="' + U.esc(m) + '" title="点击更新进度">' + U.esc(m) + ' ' + v + '%</span>';
    });

    return '<div class="card prog-card">'
      + '<div class="prog-head"><span class="prog-name" style="color:' + meta.color + '">' + meta.name + '</span>'
      + '<span class="prog-target">目标 ' + meta.target + ' 分</span></div>'
      + '<div class="prog-bar-row">' + Charts.progressBar(p.percent, meta.color) + '<span class="prog-pct" data-subj="' + key + '" title="点击更新总进度">' + p.percent + '%</span></div>'
      + '<div class="muted-sm">当前阶段：' + U.esc(p.stage) + ' <button class="link-btn" data-stage="' + key + '">修改</button></div>'
      + '<div class="tag-row">' + moduleChips + '</div>'
      + warn
      + '</div>';
  }

  function milestoneNode(m) {
    const done = Store.get().milestones[m.id];
    return '<div class="ms-node' + (done ? ' ms-done' : '') + '" data-id="' + m.id + '">'
      + '<div class="ms-dot"></div>'
      + '<div class="ms-body"><div class="ms-date">' + m.date + (done ? ' <span class="ms-badge">已完成</span>' : ' <span class="ms-badge ms-badge-doing">' + (new Date() <= new Date('2026-' + m.deadline + 'T23:59:59') ? '进行中' : '逾期') + '</span>') + '</div>'
      + '<div class="ms-title">' + U.esc(m.title) + '</div></div>'
      + '<label class="ms-check"><input type="checkbox"' + (done ? ' checked' : '') + '><span class="box"></span></label>'
      + '</div>';
  }

  function render(el) {
    el.innerHTML =
      '<div class="grid-2">'
      + subjCard('math') + subjCard('ctrl') + subjCard('eng') + subjCard('pol')
      + '</div>'
      + '<div class="card"><div class="card-title">里程碑时间线</div>'
      + '<div class="ms-line">' + DB.MILESTONES.map(milestoneNode).join('') + '</div>'
      + '<div class="muted-sm" style="margin-top:8px">勾选里程碑将触发系统通知；10月底节点未达成时，系统将在11月1日推送院校决策建议。</div>'
      + '</div>';

    bind(el);
  }

  function bind(el) {
    // 总进度点击更新
    el.querySelectorAll('.prog-pct').forEach(sp => {
      sp.onclick = () => {
        const key = sp.getAttribute('data-subj');
        const cur = Store.get().progress[key].percent;
        Modal.open({
          title: '更新 ' + DB.SUBJECTS[key].name + ' 总进度',
          html: '<input id="pct-input" class="input" type="number" min="0" max="100" value="' + cur + '">',
          actions: [{ label: '取消' }, {
            label: '保存', kind: 'btn-primary', onClick: close => {
              const v = U.clamp(parseInt(document.getElementById('pct-input').value, 10) || 0, 0, 100);
              Store.update(s => { s.progress[key].percent = v; });
              close(); App.refresh(); Toast.success('进度已更新为 ' + v + '%');
            }
          }]
        });
        setTimeout(() => document.getElementById('pct-input').focus(), 50);
      };
    });
    // 阶段修改
    el.querySelectorAll('[data-stage]').forEach(b => {
      b.onclick = () => {
        const key = b.getAttribute('data-stage');
        const cur = Store.get().progress[key].stage;
        Modal.open({
          title: '修改当前阶段',
          html: '<input id="stage-input" class="input" value="' + U.esc(cur) + '">',
          actions: [{ label: '取消' }, {
            label: '保存', kind: 'btn-primary', onClick: close => {
              const v = document.getElementById('stage-input').value.trim() || cur;
              Store.update(s => { s.progress[key].stage = v; });
              close(); App.refresh();
            }
          }]
        });
        setTimeout(() => document.getElementById('stage-input').focus(), 50);
      };
    });
    // 子模块进度点击更新
    el.querySelectorAll('.tag-mod').forEach(tag => {
      tag.onclick = () => {
        const key = tag.getAttribute('data-subj');
        const mod = tag.getAttribute('data-mod');
        const cur = (Store.get().progress[key].modules || {})[mod] || 0;
        Modal.open({
          title: '更新「' + mod + '」进度',
          html: '<input id="mod-input" class="input" type="number" min="0" max="100" value="' + cur + '">',
          actions: [{ label: '取消' }, {
            label: '保存', kind: 'btn-primary', onClick: close => {
              const v = U.clamp(parseInt(document.getElementById('mod-input').value, 10) || 0, 0, 100);
              Store.update(s => {
                s.progress[key].modules = s.progress[key].modules || {};
                s.progress[key].modules[mod] = v;
              });
              close(); App.refresh(); Toast.success(mod + ' → ' + v + '%');
            }
          }]
        });
        setTimeout(() => document.getElementById('mod-input').focus(), 50);
      };
    });
    // 里程碑勾选 → 系统通知
    el.querySelectorAll('.ms-node input[type=checkbox]').forEach(cb => {
      cb.onchange = () => {
        const id = cb.closest('.ms-node').getAttribute('data-id');
        const m = DB.MILESTONES.find(x => x.id === id);
        Store.update(s => { s.milestones[id] = cb.checked; });
        if (cb.checked && window.Notify) Notify.send('里程碑达成', '🏁 里程碑达成：' + m.title);
        App.refresh();
      };
    });
  }

  window.ProgressModule = { render };
})();


/* ===== js/modules/review.js ===== */
/* ============================================================
 * review.js — 复盘中心：日/周/月复盘 + 数据洞察 + 月里程碑检查
 * 周复盘报告按 PRD 4.4 模板自动生成
 * ============================================================ */
(function () {
  'use strict';

  // 生成本周复盘数据
  function weekData() {
    const s = Store.get();
    const wk = Store.weekKey();
    const hours = Store.weekHours();
    const totalHours = U.round1(U.sum(hours));
    const target = s.settings.weeklyTargetHours || 50;
    const w = s.weeklyStats[wk] || {};
    const top2 = Store.weekTopMistakes().map(t => ({ name: (DB.MISTAKE_TYPES[t.key] || {}).name || t.key, count: t.count }));
    const weekMistakes = s.mistakes.filter(m => U.inThisWeek((m.createdAt || '').slice(0, 10))).length;
    return { wk, hours, totalHours, target, accuracy: w.mathAccuracy, prevAccuracy: w.prevAccuracy, top2, weekMistakes, mental: w.mentalState, special: w.specialEvent };
  }

  function reportText(d) {
    const gap = U.round1(d.target - d.totalHours);
    const accDiff = (d.accuracy != null && d.prevAccuracy != null) ? U.round1(d.accuracy - d.prevAccuracy) : null;
    const topStr = d.top2.length ? d.top2.map(t => t.name + '（' + t.count + '次）').join('、') : '本周未记录错题';
    const mentalMap = { normal: '正常', anxious: '焦虑', tired: '疲劳', impulsive: '冲动', panic: '恐慌' };
    let tips = [];
    const signN = Store.mistakeCountWeek('sign');
    if (signN >= 3) tips.push('数学：增加「符号专项」5题/天（本周符号错误已达 ' + signN + ' 次）');
    if (d.accuracy != null && d.accuracy < 70) tips.push('数学：正确率低于70%，智能排程已自动提高数学权重');
    if (d.top2.some(t => t.name === '分式漏分母')) tips.push('数学：分式合并强制执行三步法，每题书面验证');
    if (gap > 0) tips.push('时长：本周缺口 ' + gap + 'h，建议周末补足或下调下周目标');
    if (!Store.subjectDoneInDays('ctrl', 3)) tips.push('现控：近3天未打卡，下周优先排现控任务');
    if (tips.length === 0) tips.push('节奏健康，保持当前计划，注意防呆流程不走样');
    return '📊 本周战报（' + U.keyLabel(U.weekKeys()[0]) + ' ~ ' + U.keyLabel(U.weekKeys()[6]) + '）\n'
      + '├── 有效学习时长：' + d.totalHours + 'h / 目标 ' + d.target + 'h（' + (gap > 0 ? '缺口 ' + gap + 'h' : '已达标') + '）\n'
      + '├── 数学平均正确率：' + (d.accuracy != null ? d.accuracy + '%' : '未录入') + (accDiff != null ? '（较上周 ' + (accDiff >= 0 ? '+' : '') + accDiff + '%）' : '') + '\n'
      + '├── 主要错误类型：' + topStr + '\n'
      + '├── 心理状态：' + (mentalMap[d.mental] || '未记录') + (d.special ? '（' + d.special + '）' : '') + '\n'
      + '└── 下周调整建议：\n' + tips.map(t => '    • ' + t).join('\n');
  }

  function render(el) {
    const d = weekData();
    const s = Store.get();
    const wk = Store.weekKey();

    // 日复盘快捷（今日）
    const todayH = Store.todayHours();
    const todayMistakes = s.mistakes.filter(m => (m.createdAt || '').slice(0, 10) === U.dkey()).length;

    // 历史周报列表
    const weeks = Object.keys(s.weeklyStats).sort().reverse().filter(k => s.weeklyStats[k] && s.weeklyStats[k].mathAccuracy != null);
    let history = '';
    weeks.slice(0, 6).forEach(k => {
      const w = s.weeklyStats[k];
      history += '<div class="his-row"><span>' + k + '</span><span class="muted-sm">' + (w.totalHours || 0) + 'h · 正确率 ' + (w.mathAccuracy != null ? w.mathAccuracy + '%' : '-') + '</span></div>';
    });

    el.innerHTML =
      // 今日速览
      '<div class="card"><div class="card-title">今日速览</div>'
      + '<div class="stat-row">'
      + '<div class="stat"><div class="stat-num">' + todayH + '</div><div class="stat-label">今日时长(h)</div></div>'
      + '<div class="stat"><div class="stat-num">' + todayMistakes + '</div><div class="stat-label">今日错题</div></div>'
      + '<div class="stat"><div class="stat-num">' + d.weekMistakes + '</div><div class="stat-label">本周错题</div></div>'
      + '<div class="stat"><div class="stat-num">' + d.totalHours + '</div><div class="stat-label">本周时长(h)</div></div>'
      + '</div>'
      + '<button class="btn btn-ghost btn-block" id="go-mental">🧘 去做今日心理状态记录（1分钟）</button>'
      + '</div>'

      // 周复盘表单
      + '<div class="card"><div class="card-title">周复盘数据录入（' + wk + '）</div>'
      + '<div class="form-grid">'
      + '<label class="fld"><span>本周数学平均正确率（%）</span><input id="rv-acc" class="input" type="number" min="0" max="100" value="' + (d.accuracy != null ? d.accuracy : '') + '" placeholder="如 75"></label>'
      + '<label class="fld"><span>上周正确率（%，用于对比）</span><input id="rv-prev" class="input" type="number" min="0" max="100" value="' + (d.prevAccuracy != null ? d.prevAccuracy : '') + '"></label>'
      + '<label class="fld"><span>本周目标时长（h）</span><input id="rv-target" class="input" type="number" min="0" max="120" value="' + d.target + '"></label>'
      + '<label class="fld"><span>心理状态</span><select id="rv-mental" class="input input-sel">'
      +   ['normal|正常', 'anxious|焦虑', 'tired|疲劳', 'impulsive|冲动', 'panic|恐慌'].map(o => { const p = o.split('|'); return '<option value="' + p[0] + '"' + (d.mental === p[0] ? ' selected' : '') + '>' + p[1] + '</option>'; }).join('')
      + '</select></label>'
      + '<label class="fld fld-full"><span>特殊事件（如：周三出现硬件冲动，已劝阻）</span><input id="rv-special" class="input" value="' + U.esc(d.special || '') + '"></label>'
      + '</div>'
      + '<button class="btn btn-primary" id="rv-save">保存并生成周报</button>'
      + '</div>'

      // 周报预览
      + '<div class="card"><div class="card-title">本周战报 <button class="link-btn" id="rv-copy">复制文本</button></div>'
      + '<pre class="report" id="rv-report"></pre>'
      + '<div class="btn-row">'
      + '<button class="btn btn-ghost" id="rv-ai">🤖 发送给 AI 深度复盘</button>'
      + '<button class="btn btn-ghost" id="rv-export">导出本周JSON</button>'
      + '</div></div>'

      // 月里程碑检查
      + '<div class="card"><div class="card-title">月里程碑检查</div>'
      + DB.MILESTONES.map(m => {
        const done = Store.get().milestones[m.id];
        return '<label class="check-row"><input type="checkbox" data-ms="' + m.id + '"' + (done ? ' checked' : '') + '><span class="box"></span><span>' + m.date + ' — ' + U.esc(m.title) + '</span></label>';
      }).join('')
      + '</div>'

      // 历史
      + (history ? '<div class="card"><div class="card-title">历史周报</div>' + history + '</div>' : '');

    document.getElementById('rv-report').textContent = reportText(d);
    bind(el);
  }

  function bind(el) {
    el.querySelector('#go-mental').onclick = () => App.go('mental');
    el.querySelector('#rv-save').onclick = () => {
      const acc = parseFloat(el.querySelector('#rv-acc').value);
      Store.update(s => {
        const wk = Store.weekKey();
        s.weeklyStats[wk] = s.weeklyStats[wk] || {};
        const w = s.weeklyStats[wk];
        if (!isNaN(acc)) w.mathAccuracy = acc;
        const prev = parseFloat(el.querySelector('#rv-prev').value);
        if (!isNaN(prev)) w.prevAccuracy = prev;
        const tgt = parseFloat(el.querySelector('#rv-target').value);
        if (!isNaN(tgt)) { w.targetHours = tgt; s.settings.weeklyTargetHours = tgt; }
        w.mentalState = el.querySelector('#rv-mental').value;
        w.specialEvent = el.querySelector('#rv-special').value.trim();
        w.totalHours = U.round1(U.sum(Store.weekHours()));
        w.mainErrorTypes = Store.weekTopMistakes().map(t => t.key);
      });
      Toast.success('周报已保存');
      render(el);
    };
    el.querySelector('#rv-copy').onclick = () => {
      const txt = document.getElementById('rv-report').textContent;
      if (navigator.clipboard) navigator.clipboard.writeText(txt).then(() => Toast.success('已复制'));
      else Toast.warn('复制失败，请手动选择文本');
    };
    el.querySelector('#rv-ai').onclick = () => {
      const txt = document.getElementById('rv-report').textContent;
      if (window.AI) AI.reviewWeekly(txt);
    };
    el.querySelector('#rv-export').onclick = () => {
      const s = Store.get();
      const data = { week: Store.weekKey(), stats: s.weeklyStats[Store.weekKey()], mistakes: s.mistakes.filter(m => U.inThisWeek((m.createdAt || '').slice(0, 10))), hours: Store.weekHours() };
      U.download('kaoyan_week_' + Store.weekKey() + '.json', JSON.stringify(data, null, 2));
      Toast.success('已导出');
    };
    el.querySelectorAll('[data-ms]').forEach(cb => {
      cb.onchange = () => {
        const id = cb.getAttribute('data-ms');
        const m = DB.MILESTONES.find(x => x.id === id);
        Store.update(s => { s.milestones[id] = cb.checked; });
        if (cb.checked && window.Notify) Notify.send('里程碑达成', '🏁 里程碑达成：' + m.title);
        Toast.success('已更新');
      };
    });
  }

  window.ReviewModule = { render, reportText, weekData };
})();


/* ===== js/modules/mistakes.js ===== */
/* ============================================================
 * mistakes.js — 错题画像：类型分布环形图 / 记录新错题 / 列表 / 重练
 * ============================================================ */
(function () {
  'use strict';

  function render(el) {
    const s = Store.get();

    // 分布图数据
    const counts = U.countBy(s.mistakes, m => m.type);
    const pie = Object.keys(DB.MISTAKE_TYPES).map(k => ({
      label: DB.MISTAKE_TYPES[k].name, value: counts[k] || 0, color: DB.MISTAKE_TYPES[k].color
    }));

    // 错题列表（时间倒序，最多50条）
    const list = U.clone(s.mistakes).sort((a, b) => (a.createdAt < b.createdAt ? 1 : -1)).slice(0, 50);
    let rows = '';
    if (list.length === 0) rows = '<div class="empty">还没有错题记录。错题不可怕，重复错才可怕。</div>';
    list.forEach(m => {
      const t = DB.MISTAKE_TYPES[m.type] || DB.MISTAKE_TYPES.other;
      rows += '<div class="mis-row" style="border-left-color:' + t.color + '">'
        + '<div class="mis-head"><span class="tag" style="background:' + t.color + '">' + t.name + '</span>'
        + '<span class="mis-subj">' + ((DB.SUBJECTS[m.subject] || {}).name || m.subject) + '</span>'
        + '<span class="mis-date">' + U.esc(m.date || '') + '</span></div>'
        + '<div class="mis-desc">' + U.esc(m.desc) + '</div>'
        + '<div class="mis-actions"><button class="btn btn-sm btn-ghost mis-variant" data-id="' + m.id + '">🔄 重练变式题</button></div>'
        + '</div>';
    });

    // 重练队列
    const drills = s.mistakeDrills.filter(d => d.status === 'pending');
    let drillHtml = '';
    if (drills.length) {
      drillHtml = drills.map(d =>
        '<div class="drill-row" data-id="' + d.id + '"><span>🎯 ' + U.esc(d.title) + (d.penaltyOf ? ' <span class="tag tag-red">罚练</span>' : '') + '</span>'
        + '<button class="btn btn-sm btn-primary" data-done="' + d.id + '">完成</button></div>'
      ).join('');
    } else {
      drillHtml = '<div class="empty">重练队列为空。记录错题后可一键生成重练任务。</div>';
    }

    el.innerHTML =
      '<div class="card"><div class="card-title-row"><span class="card-title">错题类型分布（全部 ' + s.mistakes.length + ' 条）</span>'
      + '<button class="link-btn" id="ms-export">导出错题JSON</button></div>'
      + Charts.donut(pie, { height: 200 })
      + '</div>'

      + '<div class="card"><div class="card-title">记录新错题</div>'
      + '<div class="form-grid">'
      + '<label class="fld"><span>科目</span><select id="ms-subj" class="input input-sel">'
      +   '<option value="math">数学一</option><option value="ctrl">自控</option><option value="eng">英语一</option></select></label>'
      + '<label class="fld"><span>错误类型</span><select id="ms-type" class="input input-sel">'
      +   Object.keys(DB.MISTAKE_TYPES).map(k => '<option value="' + k + '">' + DB.MISTAKE_TYPES[k].name + '</option>').join('') + '</select></label>'
      + '<label class="fld fld-full"><span>题目描述</span><input id="ms-desc" class="input" placeholder="如：定积分换元法负号处理"></label>'
      + '</div>'
      + '<button class="btn btn-primary" id="ms-add">提交</button>'
      + '</div>'

      + '<div class="card"><div class="card-title-row"><span class="card-title">错题重练</span><span>'
      + '<button class="link-btn" id="ms-gen">生成本周Top重练5题</button>'
      + (drills.length ? ' <button class="link-btn" id="ms-to-tasks" style="color:var(--danger)">一键转入任务中心 →</button>' : '')
      + '</span></div>'
      + drillHtml
      + '</div>'

      + '<div class="card"><div class="card-title">错题列表（最近50条）</div>' + rows + '</div>';

    bind(el);
  }

  function bind(el) {
    // 导出错题
    el.querySelector('#ms-export').onclick = () => {
      const s = Store.get();
      const data = {
        exportedAt: new Date().toISOString(),
        total: s.mistakes.length,
        typeCount: U.countBy(s.mistakes, m => m.type),
        mistakes: s.mistakes
      };
      U.download('mistakes_' + U.dkey() + '.json', JSON.stringify(data, null, 2));
      Toast.success('已导出 ' + s.mistakes.length + ' 条错题');
    };
    el.querySelector('#ms-add').onclick = () => {
      const desc = el.querySelector('#ms-desc').value.trim();
      if (!desc) { Toast.warn('请填写题目描述'); return; }
      const type = el.querySelector('#ms-type').value;
      Store.update(s => {
        s.mistakes.push({
          id: U.uid(), subject: el.querySelector('#ms-subj').value, type, desc,
          date: U.shortDate(), createdAt: new Date().toISOString()
        });
      });
      Toast.success('已记录。同类错误再犯时，系统会加重干预。');
      // 符号错误即时提醒
      if (type === 'sign') Toast.warn('⚠️ 今日符号错误已达 ' + Store.mistakeCountToday('sign') + ' 次，下次数学打卡将触发防呆提醒');
      App.refresh();
    };

    el.querySelector('#ms-gen').onclick = () => {
      const top = Store.weekTopMistakes();
      if (!top.length) { Toast.warn('本周暂无错题记录'); return; }
      Store.update(s => {
        top.slice(0, 2).forEach(t => {
          const name = (DB.MISTAKE_TYPES[t.key] || {}).name || t.key;
          for (let i = 1; i <= (t.key === top[0].key ? 3 : 2); i++) {
            s.mistakeDrills.push({
              id: U.uid(), source: 'mistake', refId: t.key,
              title: '【' + name + '专项】自行从题库选1道同类题（第' + i + '题）',
              subject: 'math', status: 'pending', createdAt: new Date().toISOString()
            });
          }
        });
      });
      Toast.success('已生成5道重练任务');
      App.refresh();
    };

    // 闭环：重练完成 → 自动累加为数学任务打卡记录
    el.querySelectorAll('[data-done]').forEach(b => {
      b.onclick = () => {
        const id = b.getAttribute('data-done');
        Store.update(s => { const d = s.mistakeDrills.find(x => x.id === id); if (d) d.status = 'done'; });
        Toast.success('重练完成 +1');
        App.refresh();
      };
    });

    // 错题变式复现：跳到AI测验生成同源变式题
    el.querySelectorAll('.mis-variant').forEach(b => {
      b.onclick = () => {
        const id = b.getAttribute('data-id');
        const m = Store.get().mistakes.find(x => x.id === id);
        if (!m) return;
        if (window.QuizModule && QuizModule.startVariant) {
          App.go('quiz');
          // 等quiz模块渲染后启动变式
          setTimeout(() => QuizModule.startVariant(m), 50);
        } else {
          Toast.warn('AI测验模块未就绪');
        }
      };
    });

    // 闭环：一键把全部待重练转成任务中心正式任务（打卡才算数）
    const genBtn = el.querySelector('#ms-to-tasks');
    if (genBtn) genBtn.onclick = () => {
      const drills = Store.get().mistakeDrills.filter(d => d.status === 'pending');
      if (!drills.length) { Toast.warn('重练队列已空'); return; }
      Store.update(s => {
        s.mistakeDrills.filter(d => d.status === 'pending').forEach(d => {

          d.status = 'done';
        });
      });
      Toast.success('已转入任务中心，去打卡吧');
      App.go('tasks');
    };

  window.MistakesModule = { render };
})();

/* ===== js/modules/heatmap.js ===== */
/* ============================================================
 * heatmap.js — 考点热力图 + 130分能力分层训练
 * 绿=掌握 黄=薄弱 红=危险；点击格子录入掌握度并可生成针对任务
 * 分层规则：必拿层正确率<90% → 提示先补必拿层（弱锁定）
 * ============================================================ */
(function () {
  'use strict';
  let subjTab = 'math';

  function tierStats(list, heat) {
    const byTier = { 1: [], 2: [], 3: [] };
    list.forEach(t => byTier[t.tier].push(t));
    const out = {};
    [1, 2, 3].forEach(tier => {
      const items = byTier[tier];
      const scored = items.filter(t => heat[t.id] && heat[t.id].score != null);
      out[tier] = {
        total: items.length,
        mastered: items.filter(t => heat[t.id] && heat[t.id].level === 2).length,
        avg: scored.length ? Math.round(U.avg(scored.map(t => heat[t.id].score))) : null
      };
    });
    return out;
  }

  function cell(t, heat, tierLocked) {
    const h = heat[t.id] || {};
    const lv = h.level || 0;
    const cls = lv === 2 ? 'hm-green' : lv === 1 ? 'hm-yellow' : 'hm-red';
    const scoreTxt = h.score != null ? h.score + '%' : '未测';
    return '<button class="hm-cell ' + cls + (tierLocked ? ' hm-locked' : '') + '" data-id="' + t.id + '" title="' + U.esc(t.group + ' · ' + t.name) + '：' + scoreTxt + '">'
      + '<span class="hm-name">' + U.esc(t.name) + '</span>'
      + '<span class="hm-score">' + scoreTxt + '</span>'
      + '</button>';
  }

  function render(el) {
    const s = Store.get();
    const heat = s.heat;
    const list = DB.TOPICS[subjTab];
    const ts = tierStats(list, heat);
    // 必拿层弱锁定：必拿层平均<90 → 拔高/冲刺层提示先补基础
    const tier1Weak = ts[1].avg != null && ts[1].avg < 90;
    const tier1Untested = ts[1].avg == null;

    let tierCards = '';
    [1, 2, 3].forEach(tier => {
      const meta = DB.TIERS[tier];
      const st = ts[tier];
      tierCards += '<div class="tier-card" style="border-top-color:' + meta.color + '">'
        + '<div class="tier-head">' + meta.icon + ' ' + meta.name + ' <span class="muted-sm">' + meta.range + '</span></div>'
        + '<div class="tier-nums">' + st.mastered + '/' + st.total + ' 掌握' + (st.avg != null ? ' · 平均 ' + st.avg + '%' : ' · 未测评') + '</div>'
        + '<div class="muted-sm">' + meta.rule + '</div>'
        + '</div>';
    });

    let groups = '';
    const groupNames = [];
    list.forEach(t => { if (groupNames.indexOf(t.group) < 0) groupNames.push(t.group); });
    groupNames.forEach(g => {
      const items = list.filter(t => t.group === g);
      groups += '<div class="hm-group"><div class="hm-group-name">' + U.esc(g) + '</div><div class="hm-grid">'
        + items.map(t => cell(t, heat, false)).join('') + '</div></div>';
    });

    el.innerHTML =
      '<div class="card"><div class="card-title">🎯 考点热力图与真题切片追踪</div>'
      + '<div class="tab-row">'
      + '<button class="tab' + (subjTab === 'math' ? ' tab-on' : '') + '" data-t="math">数学一（19考点）</button>'
      + '<button class="tab' + (subjTab === 'ctrl' ? ' tab-on' : '') + '" data-t="ctrl">自控（11考点）</button>'
      + '</div>'
      + '<div class="legend"><span class="lg lg-green"></span>掌握(≥80%) <span class="lg lg-yellow"></span>薄弱(50-79%) <span class="lg lg-red"></span>危险(&lt;50%或未测) <span class="muted-sm">点击格子录入/更新掌握度</span></div>'
      + '</div>'

      + '<div class="tier-row">' + tierCards + '</div>'
      + (tier1Weak ? '<div class="alert alert-danger">🔒 必拿层平均 ' + ts[1].avg + '% < 90%：按规则应暂停拔高/冲刺层新题，先把必拿层补到零失误。错一题罚5道同类题。</div>' : '')
      + (tier1Untested ? '<div class="alert alert-warn">必拿层尚未测评：建议先用步骤审查器做3道必拿层题目，录入掌握度后再解锁拔高层。</div>' : '')

      + '<div class="card">' + groups + '</div>'

      + '<div class="card"><div class="card-title">层级跃迁报告（本周）</div><div class="muted-sm" id="hm-week"></div></div>';

    // 周跃迁统计
    const weekAgo = Date.now() - 7 * U.DAY_MS;
    const updated = Object.keys(heat).filter(id => heat[id].updatedAt && new Date(heat[id].updatedAt).getTime() > weekAgo);
    document.getElementById('hm-week').textContent = updated.length
      ? '本周更新了 ' + updated.length + ' 个考点的掌握度：' + updated.map(id => { const t = (DB.TOPICS.math.concat(DB.TOPICS.ctrl)).find(x => x.id === id); return t ? t.name : id; }).join('、')
      : '本周尚未更新任何考点。做题后记得回来点格子。';

    bind(el);
  }

  function bind(el) {
    el.querySelectorAll('[data-t]').forEach(b => b.onclick = () => { subjTab = b.getAttribute('data-t'); render(el); });

    el.querySelectorAll('.hm-cell').forEach(c => {
      c.onclick = () => {
        const id = c.getAttribute('data-id');
        const topic = (DB.TOPICS.math.concat(DB.TOPICS.ctrl)).find(t => t.id === id);
        const heat = Store.get().heat;
        const h = heat[id] || {};
        const meta = DB.TIERS[topic.tier];
        Modal.open({
          title: topic.group + ' · ' + topic.name + '（' + meta.icon + meta.name + '）',
          html:
            '<div class="form-grid">'
            + '<label class="fld"><span>自测正确率（%，近10题）</span><input id="hm-in-score" class="input" type="number" min="0" max="100" value="' + (h.score != null ? h.score : '') + '"></label>'
            + '<label class="fld"><span>掌握状态</span><select id="hm-in-level" class="input input-sel">'
            + '<option value="0"' + (h.level === 0 ? ' selected' : '') + '>🔴 危险</option>'
            + '<option value="1"' + (h.level === 1 ? ' selected' : '') + '>🟡 薄弱</option>'
            + '<option value="2"' + (h.level === 2 ? ' selected' : '') + '>🟢 掌握</option>'
            + '</select></label></div>'
            + '<div class="muted-sm">保存正确率后系统将自动判定状态：≥80绿 / 50-79黄 / &lt;50红</div>',
          actions: [
            { label: '取消' },
            {
              label: '生成针对训练任务', kind: 'btn-ghost', onClick: close => {
                Store.update(s => {
                  s.mistakeDrills.push({ id: U.uid(), source: 'topic', refId: id, title: '【' + topic.name + '】针对训练3题（热力图生成）', subject: subjTab === 'math' ? 'math' : 'ctrl', status: 'pending', createdAt: new Date().toISOString() });
                });
                close(); Toast.success('已加入错题重练队列'); App.refresh();
              }
            },
            {
              label: '保存', kind: 'btn-primary', onClick: close => {
                const score = parseFloat(document.getElementById('hm-in-score').value);
                const level = parseInt(document.getElementById('hm-in-level').value, 10);
                Store.update(s => {
                  const autoLevel = !isNaN(score) ? (score >= 80 ? 2 : score >= 50 ? 1 : 0) : level;
                  s.heat[id] = { level: autoLevel, score: isNaN(score) ? null : score, updatedAt: new Date().toISOString() };
                  // 必拿层惩罚规则：必拿层考点录入<90 → 生成罚练
                  if (topic.tier === 1 && !isNaN(score) && score < 90) {
                    for (let i = 0; i < 5; i++) {
                      s.mistakeDrills.push({ id: U.uid(), source: 'topic', refId: id, title: '【罚练】' + topic.name + ' 同类题 ' + (i + 1) + '/5', subject: subjTab === 'math' ? 'math' : 'ctrl', status: 'pending', penaltyOf: id, createdAt: new Date().toISOString() });
                    }
                    Toast.warn('必拿层正确率<90%：按规则罚5道同类题，已加入重练队列');
                  }
                });
                close(); App.refresh();
              }
            }
          ]
        });
        setTimeout(() => { const i = document.getElementById('hm-in-score'); if (i) i.focus(); }, 50);
      };
    });
  }

  window.HeatmapModule = { render };
})();


/* ===== js/modules/quiz.js ===== */

 * quiz.js — AI 智能出题与自动判卷（高度智能化）
 * 工作流（全程无需手动标记"测没测"）：

(function () {

  const LOCAL_BANK = {

      { lv: 3, gen: () => { const a = U.randInt(2, 5); return { stem: '计算 ∫(从0到π) x·sin(' + a + 'x) dx（需分部积分，注意符号）', type: 'solve', answer: '含三角求值', solution: '分部：u=x, dv=sin(' + a + 'x)dx → -x·cos(' + a + 'x)/' + a + ' + ∫cos(' + a + 'x)/' + a + ' dx，逐项代入上下限', trap: '分部积分两次符号交替，最易出错' }; } }

      { lv: 3, gen: () => { return { stem: '求极限：当 x→0 时，[ln(1+x) - x] / x² = ?', type: 'choice', options: ['A. 0', 'B. -1/2', 'C. 1/2', 'D. -1'], answer: 'B', solution: 'ln(1+x) 泰勒展开 x - x²/2 + ...，减去x得 -x²/2，除以x² → -1/2', trap: '展开到二阶，符号为负' }; } },
      { lv: 4, gen: () => { return { stem: '求极限：当 x→0 时，[(e^x - 1 - x) / (x·sin(x))] = ?', type: 'choice', options: ['A. 0', 'B. 1/2', 'C. 1', 'D. 2'], answer: 'B', solution: 'e^x = 1+x+x²/2+...，分子≈x²/2；分母 x·sinx≈x²，比值 1/2', trap: '分子分母都需展开到同阶，sinx≈x' }; } }

    'm-eigen': [

      { lv: 3, gen: () => { const a = U.randInt(2, 4); return { stem: '设 A 为 3 阶矩阵，特征值为 1, ' + a + ', ' + (a + 1) + '，则 A 的迹 tr(A) 与 |A| 分别为？', type: 'choice', options: ['A. ' + (1 + a + a + 1) + ' 和 ' + (a * (a + 1)), 'B. ' + (a * (a + 1)) + ' 和 ' + (1 + a + a + 1), 'C. ' + (a + a) + ' 和 ' + a, 'D. ' + a + ' 和 ' + (a * a)], answer: 'A', solution: '迹=特征值之和=1+' + a + '+' + (a + 1) + '=' + (2 + 2 * a) + '；行列式=之积=1×' + a + '×' + (a + 1) + '=' + (a * (a + 1)), trap: '迹与行列式别记反' }; } }
    ],
    'm-ode': [
      { lv: 2, gen: () => { const a = U.randInt(1, 3); return { stem: "求微分方程 y' + " + a + 'y = e^x 的积分因子 μ(x)', type: 'choice', options: ['A. e^(' + a + 'x)', 'B. e^(-' + a + 'x)', 'C. e^x', 'D. ' + a + 'e^x'], answer: 'A', solution: 'μ = e^(∫' + a + 'dx) = e^(' + a + 'x)', trap: '⚠️积分因子指数符号必须反向检查：P(x)=' + a + '，指数为正' }; } }

    ],
    'c-ctrb': [
      { lv: 2, gen: () => { return { stem: 'n 阶线性定常系统完全能控的充要条件是能控性矩阵 [B AB ... Aⁿ⁻¹B] 的秩为（ ）', type: 'choice', options: ['A. n', 'B. n-1', 'C. 1', 'D. 0'], answer: 'A', solution: '秩判据：rank(Qc) = n', trap: '能控用Qc，能观用Qo=[C;CA;...]，矩阵别写错' }; } }
    ],
    'c-tf': [
      { lv: 2, gen: () => { const a = U.randInt(1, 5); return { stem: '单位反馈系统开环传递函数 G(s) = ' + a + '/[s(s+1)]，闭环特征方程为？', type: 'solve', answer: 's² + s + ' + a + ' = 0', solution: '1+G(s)=0 → s(s+1)+' + a + '=0 → s²+s+' + a + '=0', trap: '分式合并三步法：先写分母s(s+1)，再加分子' + a }; } }
    ]
  };

  function fallbackLocal(topic) {
    return {
      stem: '【自测】' + topic.group + ' · ' + topic.name + '：请写出该考点的核心定义/公式，并举一个典型应用。',
      type: 'solve', answer: '（概念复述题，对照课本自评）',
      solution: '对照 ' + (topic.id[0] === 'm' ? '高数/线代/概率' : '胡寿松') + ' 教材核对要点完整性。',
      trap: '概念混淆是你画像里的高频错误'
    };
  }

  // ==================== 状态 ====================
  let phase = 'pick';
  let topicId = null;
  let quiz = null;
  let judge = null;
  let difficulty = 'auto';   // auto|easy|medium|real|hard —— auto按掌握度推荐
  let variantOf = null;      // 错题变式复现：{topicName, errorType, originDesc}

  const DIFFS = {
    easy: { name: '简单', icon: '🟢', prompt: '单一考点、直接套公式、计算量小的基础题，确保零失误拿分' },
    medium: { name: '中等', icon: '🟡', prompt: '常规考研题型、一两个知识点结合、需要标准步骤的中等题' },
    real: { name: '真题难度', icon: '🟠', prompt: '完全对标考研真题风格的综合题，多知识点交叉、有陷阱、计算量适中偏大' },

  };

  // 按掌握度自动推荐难度
  function autoDifficulty(tid) {
    const h = Store.get().heat[tid] || {};
    const s = h.score;
    if (s == null) return 'easy';
    if (s < 50) return 'easy';
    if (s < 75) return 'medium';
    if (s < 90) return 'real';
    return 'hard';
  }

  function allTopics() { return DB.TOPICS.math.concat(DB.TOPICS.ctrl); }

  // ==================== 出题 ====================
  function makeQuiz() {
    const topic = allTopics().find(t => t.id === topicId);
    phase = 'quizzing'; judge = null; quiz = null;
