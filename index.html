  // 编辑我的信息某一项
  function editMyStat(mode, el) {
    const s = Store.get();
    const doModal = (title, cur, onSave, type) => {
      Modal.open({
        title, html: '<input id="ms-in" class="input" type="' + (type || 'number') + '" value="' + cur + '">',
        actions: [{ label: '取消' }, {
          label: '保存', kind: 'btn-primary', onClick: close => {
            const v = document.getElementById('ms-in').value;
            onSave(v); close(); App.refresh(); Toast.success('已修正');
          }
        }]
      });
      setTimeout(() => { const i = document.getElementById('ms-in'); if (i) { i.focus(); i.select(); } }, 50);
    };
    if (mode.indexOf('pct:') === 0) {
      const key = mode.slice(4);
      doModal('修正' + DB.SUBJECTS[key].name + '进度(%)', s.progress[key].percent, v => {
        Store.update(x => { x.progress[key].percent = U.clamp(parseInt(v, 10) || 0, 0, 100); });
      });
    } else if (mode === 'acc') {
      const wk = Store.weekKey();
      const cur = (s.weeklyStats[wk] || {}).mathAccuracy;
      doModal('修正本周数学正确率(%)', cur != null ? cur : 70, v => {
        Store.update(x => { x.weeklyStats[wk] = x.weeklyStats[wk] || {}; x.weeklyStats[wk].mathAccuracy = U.clamp(parseInt(v, 10) || 0, 0, 100); });
      });
    } else if (mode === 'xk') {
      doModal('修正' + DB.SUBJECTS.ctrl.short + '掌握度(1-10)', s.decision.inputs.xiankongScore || 5, v => {
        Store.update(x => { x.decision.inputs.xiankongScore = U.clamp(parseInt(v, 10) || 5, 1, 10); });
      });
    } else if (mode === 'target') {
      doModal('修正周目标时长(h)', s.settings.weeklyTargetHours || 50, v => {
        Store.update(x => { x.settings.weeklyTargetHours = U.clamp(parseInt(v, 10) || 50, 10, 100); });
      });
    } else if (mode === 'school') {
      var _curProf2 = (Store.get().settings.examConfig && Store.get().settings.examConfig.profName) || '自控原理';
      var _recSch = DB.recommendSchools(_curProf2, 8);
      var _curTarget = Store.get().settings.targetSchool || '';
      var _isCustomSch = _curTarget && _curTarget !== 'undecided' && !_recSch.some(function(sc){ return sc.id === _curTarget; });
      var _schHtml = _recSch.map(function (sc) {
        return '<button class="seg ms-sch' + ((Store.get().settings.targetSchool === sc.id) ? ' seg-on' : '') + '" data-v="' + sc.id + '">' + U.esc(sc.name) + '</button>';
      }).join('');
      // 始终保留"未定"
      _schHtml += '<button class="seg ms-sch' + ((Store.get().settings.targetSchool === 'undecided') ? ' seg-on' : '') + '" data-v="undecided">未确定</button>';
      Modal.open({
        title: '修正目标院校（基于「' + U.esc(_curProf2) + '」推荐）',
        html: (_recSch.length > 0
          ? '<div class="muted-sm">本地匹配到 ' + _recSch.length + ' 所相关院校：</div>'
          : '<div class="alert alert-warn">本地暂无「' + U.esc(_curProf2) + '」数据，显示全部院校供选择。</div>')
          + '<div class="seg-row" style="max-height:200px;overflow-y:auto;flex-wrap:wrap">' + _schHtml + '</div>'
          + '<div style="margin-top:8px;display:flex;align-items:center;gap:6px">'
          + '<input id="ms-school-custom" class="input" style="flex:1;min-width:140px" placeholder="或输入其他院校名称…"' + (_isCustomSch ? ' value="' + U.esc(_curTarget) + '"' : '') + '>'
          + '<button class="btn btn-primary" id="ms-school-save" style="font-size:12px;padding:4px 10px">设为目标</button>'
          + '</div>',
        actions: [{ label: '取消' }]
      });
      document.querySelectorAll('.ms-sch').forEach(b => b.onclick = () => {
        Store.update(x => { x.settings.targetSchool = b.getAttribute('data-v'); });
        Modal.close(); App.refresh(); Toast.success('已修正');
      });
      // 自定义院校输入（弹窗内）
      var _msCustomIn = document.getElementById('ms-school-custom');
      var _msCustomBtn = document.getElementById('ms-school-save');
      if (_msCustomBtn) _msCustomBtn.onclick = () => {
        var _v = (_msCustomIn.value || '').trim();
        if (!_v) { Toast.warn('请输入院校名称'); return; }
        Store.update(x => { x.settings.targetSchool = _v; });
        Modal.close(); App.refresh(); Toast.success('目标已设为「' + _v + '」');
      };
      if (_msCustomIn) _msCustomIn.onkeydown = (e) => { if (e.key === 'Enter') { e.preventDefault(); if (_msCustomBtn) _msCustomBtn.click(); } };
    }
  }

  function bind(el) {
    // 专业课：切换并适配
    const profSwitchBtn = el.querySelector('#st-prof-switch');
    if (profSwitchBtn) profSwitchBtn.onclick = () => {
      const v = (el.querySelector('#st-prof').value || '').trim();
      if (!v) { Toast.warn('请输入专业课名称'); return; }
      const cur = (Store.get().settings.examConfig && Store.get().settings.examConfig.profName) || '';
      if (v === cur) { Toast.show('专业课未变化（如需重新生成，点「AI 重建」）', 'info', 4000); return; }
      Modal.confirm('切换专业课',
        '<p>将切换到「<b>' + U.esc(v) + '</b>」。系统会重新加载/生成该专业的考点、概念图谱与预警规则；'
        + '专业课模块进度将按新章节重置（其它数据保留）。</p><p class="muted-sm">继续？</p>',
        '确认切换', () => {
          Onboarding.switchMajor(v); // 内部会 syncSubjects + App.refresh
        }, false);
    };
    // 专业课：AI 重建
    const profRegenBtn = el.querySelector('#st-prof-regen');
    if (profRegenBtn) profRegenBtn.onclick = () => {
      const v = (el.querySelector('#st-prof').value || '').trim()
        || (Store.get().settings.examConfig && Store.get().settings.examConfig.profName) || '';
      Onboarding.regenMajorAI(v);
    };

    // 教练画像：保存
    const cpSave = el.querySelector('#cp-save');
    if (cpSave) cpSave.onclick = () => {
      Store.update(s => {
        s.settings.coachProfile = s.settings.coachProfile || {};
        s.settings.coachProfile.mathWeak = el.querySelector('#cp-mathweak').value.trim() || '数学计算易错';
        s.settings.coachProfile.distractions = el.querySelector('#cp-dist').value.trim() || '分心/畏难';
        s.settings.coachProfile.redlineNote = el.querySelector('#cp-note').value.trim() || '“二战”是违禁词';
        s.settings.redline = s.settings.redline || {};
        s.settings.redline.keywords = el.querySelector('#cp-kw').value.trim();
      });
      Toast.success('教练画像已保存'); App.refresh();
    };
    // 教练画像：AI 按专业课生成
    const cpAi = el.querySelector('#cp-ai');
    if (cpAi) cpAi.onclick = () => {
      if (!AI.configured()) { Toast.warn('请先保存 AI 配置'); return; }
      const major = (Store.get().settings.examConfig && Store.get().settings.examConfig.profName) || '专业课';
      const sys = '你是考研教练画像设计师。根据考生的专业课，生成该考生的「数学致命弱点描述」「分心源画像」「红线备注（违禁词）」。只输出 JSON，不要多余文字、不要 markdown：{"mathWeak":"...","distractions":"...","redlineNote":"..."}';
      const usr = '考生专业课：' + major + '\n请生成贴合该专业的教练画像：数学弱点要具体到该专业常见计算坑；分心源要现实；红线备注点明绝对不能说的丧气话。';
      Modal.open({ title: '🤖 生成教练画像…', wide: true, dismissable: false, html: '<div class="muted-sm">正在按「' + U.esc(major) + '」生成画像…</div><pre class="report" id="cp-out">思考中…</pre>', actions: [{ label: '关闭', kind: 'btn-ghost' }] });
      const out = document.getElementById('cp-out');
      AI.chatStream(sys, usr, function (txt) { if (out) out.textContent = txt; }).then(function (full) {
        const m = full.match(/\{[\s\S]*\}/); if (!m) { if (out) out.textContent = full + '\n（未能解析为结构化结果）'; Toast.warn('生成未结构化'); return; }
        const j = JSON.parse(m[0]);
        if (el.querySelector('#cp-mathweak')) el.querySelector('#cp-mathweak').value = j.mathWeak || '';
        if (el.querySelector('#cp-dist')) el.querySelector('#cp-dist').value = j.distractions || '';
        if (el.querySelector('#cp-note')) el.querySelector('#cp-note').value = j.redlineNote || '';
        Store.update(s => {
          s.settings.coachProfile = s.settings.coachProfile || {};
          s.settings.coachProfile.mathWeak = j.mathWeak || '数学计算易错';
          s.settings.coachProfile.distractions = j.distractions || '分心/畏难';
          s.settings.coachProfile.redlineNote = j.redlineNote || '“二战”是违禁词';
        });
        Modal.close(); Toast.success('已按专业课生成并保存画像'); App.refresh();
      }).catch(function (e) { if (out) out.textContent = '生成失败：' + e.message; });
    };
    // 调度：AI 开关
    const scUse = el.querySelector('#sc-useai');
    if (scUse) scUse.onchange = () => {
      Store.update(s => { s.settings.scheduler = s.settings.scheduler || {}; s.settings.scheduler.useAI = scUse.checked; });
      Toast.success(scUse.checked ? '已启用 AI 动态编排' : '已切回规则引擎（兜底）');
    };
    // 调度与目标分：保存
    const scSave = el.querySelector('#sc-save');
    if (scSave) scSave.onclick = () => {
      const num = (id, d) => { const v = parseInt(el.querySelector(id).value, 10); return isNaN(v) ? d : v; };
      Store.update(s => {
        s.settings.scheduler = s.settings.scheduler || {};
        s.settings.scheduler.mathAccThreshold = num('#sc-acc', 70);
        s.settings.scheduler.idleDays = num('#sc-idle', 3);
        s.settings.scheduler.signWeekThreshold = num('#sc-sign', 3);
        s.settings.scheduler.signForceCount = num('#sc-signn', 5);
        s.settings.scheduler.polCap = num('#sc-pol', 2);
        s.settings.targetScores = s.settings.targetScores || {};
        s.settings.targetScores.math = num('#ts-math', 130);
        s.settings.targetScores.prof = num('#ts-prof', 135);
        s.settings.targetScores.eng = num('#ts-eng', 70);
        s.settings.targetScores.pol = num('#ts-pol', 65);
      });
      Toast.success('调度与目标分已保存');
    };

    // AI 择校推荐（基于当前专业 + 考生进度 + 数学能力）
    const aiSchBtn = el.querySelector('#st-ai-school');
    if (aiSchBtn) aiSchBtn.onclick = () => {
      if (!AI.configured()) { Toast.warn('请先保存 AI 配置', 4000); return; }
      var _p2 = (Store.get().settings.examConfig && Store.get().settings.examConfig.profName) || '自控原理';
      var _acc = Store.currentMathAccuracy();
      var _xkPct = Store.profAdvancedPercent();
      var _mood = Store.get().mental.length ? Store.get().mental[Store.get().mental.length - 1].mood : null;
      var prompt =
        '你是一名考研择校顾问。用户的专业课是「' + _p2 + '」，请根据以下信息推荐 6 所目标院校（分冲刺/稳妥/保底各 2 所）。\n'
        + '\n考生当前状态：\n'
        + '- 数学正确率：' + (_acc != null ? _acc + '%' : '未录入') + '\n'
        + '- 专业课进度：' + _xkPct + '%\n'
        + '- 最近心情：' + (_mood != null ? _mood + '/10' : '未记录') + '\n'
        + '- 目标：一志愿上岸，拒绝二战\n'
        + '\n返回严格 JSON（不要 markdown 代码块），格式：\n'
        + '{\n'
        + '  "schools": [\n'
        + '    {"name":"校名","tier":"985/211/双非","role":"冲刺|稳妥|保底",\n'
        + '     "exam":"初试科目及参考分数线","line":"复试线/录取线","ratio":"报录比",\n'
        + '     "pros":["优势1","优势2"],"cons":["劣势1"],"reason":"推荐理由"}\n'
        + '  ]\n'
        + '}\n'
        + '\n要求：院校必须真实存在且开设「' + _p2 + '」相关专业；分数线基于近年大致水平（标注"仅供参考"）；只输出 JSON。';

      Modal.open({
        title: '🤖 AI 正在为「' + U.esc(_p2) + '」择校推荐…',
        wide: true, dismissable: false,
        html: '<div class="muted-sm">⏳ 正在分析你的进度与匹配度，请稍候…</div>'
          + '<div id="aisch-think-wrap" style="display:none;margin-top:10px">'
          + '<div class="card-title-sm" style="opacity:.7">💭 思考过程</div>'
          + '<pre class="report" id="aisch-think" style="max-height:140px;overflow:auto;opacity:.72;font-size:12px;white-space:pre-wrap"></pre></div>'
          + '<div id="aisch-content-wrap" style="display:none;margin-top:10px">'
          + '<div class="card-title-sm">📋 推荐结果</div>'
          + '<div id="aisch-result" style="max-height:300px;overflow:auto;font-size:13px"></div></div>',
        actions: [{ label: '关闭', kind: 'btn-ghost', id: 'aisc-close-btn' }]
      });

      AI.chatStream(prompt, '请按上述要求生成院校推荐 JSON', function (text, reasoning) {
        var tw = document.getElementById('aisch-think');
        var cw = document.getElementById('aisch-content-wrap');
        var cr = document.getElementById('aisch-result');
        if (reasoning && tw) { tw.style.display = ''; tw.textContent = reasoning; tw.scrollTop = tw.scrollHeight; }
        if (text && cw) { cw.style.display = ''; cr.textContent = text; cr.scrollTop = cr.scrollHeight; }
      }).then(function (fullText) {
        // 尝试解析 JSON 并渲染为结构化卡片
        var jsonStr = fullText;
        var jm = jsonStr.match(/```(?:json)?\s*([\s\S]*?)```/);
        if (jm) jsonStr = jm[1];
        try {
          var data = JSON.parse(jsonStr);
          var cards = '';
          (data.schools || []).forEach(function (sc) {
            var roleColor = sc.role === '冲刺' ? '#cf1322' : sc.role === '稳妥' ? '#d48806' : '#237804';
            cards += '<div style="border:1px solid #e8e8e8;border-radius:8px;padding:12px;margin-bottom:10px">'
              + '<div style="display:flex;justify-content:space-between;align-items:center">'
              + '<b>' + U.esc(sc.name) + '</b>'
              + '<span style="background:' + roleColor + ';color:#fff;padding:2px 8px;border-radius:4px;font-size:11px">' + U.esc(sc.role || '') + '</span>'
              + '</div>'
              + '<div style="font-size:11px;color:#8c8c8c;margin-top:4px">' + U.esc(sc.tier || '') + ' | ' + U.esc(sc.ratio || '') + '</div>'
              + '<div style="margin-top:6px;font-size:12px"><b>初试：</b>' + U.esc(sc.exam || '-') + '</div>'
              + '<div><b>线：</b>' + U.esc(sc.line || '-') + '</div>'
              + ((sc.pros && sc.pros.length) ? '<div style="margin-top:4px;color:#237804;font-size:11px">✓ ' + sc.pros.map(function(p){return U.esc(p)}).join(' / ') + '</div>' : '')
              + ((sc.cons && sc.cons.length) ? '<div style="color:#cf1322;font-size:11px">⚠ ' + sc.cons.map(function(c){return U.esc(c)}).join(' / ') + '</div>' : '')
              + (sc.reason ? '<div style="margin-top:4px;background:#f5f5f5;padding:6px;border-radius:4px;font-size:11px">' + U.esc(sc.reason) + '</div>' : '')
              + '</div>';
          });
          var resultEl = document.getElementById('aisch-result');
          if (resultEl) resultEl.innerHTML = cards;
        } catch (e) {
          // 解析失败，保留原始文本
          var resultEl = document.getElementById('aisch-result');
          if (resultEl) resultEl.innerHTML = '<pre style="white-space:pre-wrap">' + U.esc(fullText) + '</pre>';
        }
      }).catch(function (err) {
        var msg = err && err.message ? err.message : String(err || '未知错误');
        Modal.open({ title: 'AI 推荐失败', html: '<p>请求失败：' + U.esc(msg) + '</p><p class="muted-sm">请检查 API 配置（地址/密钥/模型名）后重试。</p>', actions: [{ label: '知道了' }] });
      });
    };

    // 我的信息：点值编辑
    el.querySelectorAll('.mystat[data-edit]:not([disabled])').forEach(b => b.onclick = () => {
      const mode = b.getAttribute('data-edit');
      editMyStat(mode, el);
    });

    el.querySelectorAll('[data-school]').forEach(b => b.onclick = () => {
      Store.update(s => { s.settings.targetSchool = b.getAttribute('data-school'); });
      Toast.success('目标已更新'); render(el);
    });

    // 自定义院校输入
    var customSchInput = el.querySelector('#st-school-custom');
    var customSchSave = el.querySelector('#st-school-custom-save');
    if (customSchSave) customSchSave.onclick = () => {
      var v = (customSchInput.value || '').trim();
      if (!v) { Toast.warn('请输入院校名称'); return; }
      Store.update(s => { s.settings.targetSchool = v; });
      Toast.success('目标已设为「' + v + '」'); render(el);
    };
    if (customSchInput) customSchInput.onkeydown = (e) => {
      if (e.key === 'Enter') { e.preventDefault(); if (customSchSave) customSchSave.click(); }
    };

    el.querySelector('#st-target-save').onclick = () => {
      const v = U.clamp(+el.querySelector('#st-target').value || 50, 10, 100);
      Store.update(s => { s.settings.weeklyTargetHours = v; });
      Toast.success('周目标已设为 ' + v + 'h');
    };

    el.querySelector('#st-export').onclick = () => {
      U.download('kaoyan2026_backup_' + U.dkey() + '.json', Store.exportJSON());
      Store.update(s => { s.meta.lastBackupReminder = U.dkey(); });
      Toast.success('备份已导出，请妥善保存');
    };

    el.querySelector('#st-import').onclick = () => el.querySelector('#st-file').click();
    el.querySelector('#st-file').onchange = e => {
      const f = e.target.files[0];
      if (!f) return;
      const rd = new FileReader();
      rd.onload = () => {
        try {
          const data = JSON.parse(rd.result);
          if (!data.tasks || !data.settings) throw new Error('文件结构不符');
          Modal.confirm('导入确认', '<p>将用备份覆盖当前全部数据（当前数据建议先导出）。继续？</p>', '覆盖导入', () => {
            Store.replace(data);
            Toast.success('导入成功');
            App.refresh();
          }, true);
        } catch (err) { Toast.danger('导入失败：' + err.message); }
      };
      rd.readAsText(f);
      e.target.value = '';
    };

    el.querySelector('#st-summary').onclick = () => {
      const txt = AI.weeklySummary();
      if (navigator.clipboard) navigator.clipboard.writeText(txt).then(() => Toast.success('周摘要已复制，可粘贴给任何AI'));
      else Toast.show(txt, 'info', 8000);
    };

    // AI 配置
    const presetSel = el.querySelector('#ai-preset');
    presetSel.onchange = () => {
      AI.applyPreset(presetSel.value);
      const p = DB.AI_PRESETS[presetSel.value];
      el.querySelector('#ai-endpoint').value = p.endpoint;
      el.querySelector('#ai-model').value = p.model;
      el.querySelector('#ai-hint').textContent = p.hint;
    };
    el.querySelector('#ai-save').onclick = () => {
      Store.update(s => {
        s.ai.key = el.querySelector('#ai-key').value.trim();
        s.ai.endpoint = el.querySelector('#ai-endpoint').value.trim();
        s.ai.model = el.querySelector('#ai-model').value.trim();
        s.ai.stream = el.querySelector('#ai-stream').checked;
        s.ai.thinkingMode = el.querySelector('#ai-thinking').checked;
        if (s.ai.thinkingMode === true || s.ai.thinkingMode === false) s.ai._thinkingModeSetByUser = true;
      });
      Toast.success('AI 配置已保存' + (AI.configured() ? '，可直接使用AI复盘' : ''));
    };
    el.querySelector('#ai-test').onclick = () => {
      el.querySelector('#ai-save').onclick();
      if (!AI.configured()) { Toast.warn('请先完整填写配置'); return; }
      Toast.show('正在测试连通…', 'info');
      AI.test().then(t => Toast.success('连通正常：' + t)).catch(e => Toast.danger('测试失败：' + e.message));
    };

    el.querySelector('#st-reset').onclick = () => {
      Modal.open({
        title: '⚠️ 最终确认',
        html: '<p><b>此操作非常危险，可能导致不可逆的数据丢失！</b></p><p>将清空：全部任务、错题、时长、心理状态、考点掌握度、AI配置。</p><p>强烈建议先「导出JSON备份」。</p>',
        actions: [
          { label: '取消' },
          { label: '我已备份，确认清空', kind: 'btn-danger', onClick: close => { Store.resetAll(); close(); Toast.success('已重置'); App.refresh(); } }
        ]
      });
    };
  }

  window.SettingsModule = { render };
})();


/* ===== js/modules/onboarding.js ===== */
/* ============================================================
 * onboarding.js — 首次使用引导（5步）
 * 考试配置 → 各科进度 → 本周时间 → 目标院校 → 防呆教学
 * ============================================================ */
(function () {
  'use strict';
  let step = 0;
  const collected = {
    examConfig: { mathType: 'shuyi', engType: 'yingyi', profName: '自控原理' },
    progress: {}, hours: { workday: 4, weekend: 8 }, school: 'undecided'
  };

  const STEPS_TOTAL = 5; // 0-4

  function show() {
    step = 0; collected.progress = {};
    collected.examConfig = { mathType: 'shuyi', engType: 'yingyi', profName: '自控原理' };
    renderStep();
  }

  function shell(inner, foot) {
    const dots = [];
    for (var i = 0; i < STEPS_TOTAL; i++) {
      dots.push('<span class="ob-dot' + (i <= step ? ' ob-on' : '') + '">' + (i + 1) + '</span>');
    }
    Modal.open({
      title: '🎖 26考研全能作战系统 · 初始化',
      wide: true, dismissable: false,
      html: '<div class="ob-steps">' + dots.join('') + '</div>' + inner,
      actions: foot
    });
  }

  // 获取当前选中的科目名（用于后续步骤显示）
  function activeSubjects() {
    return DB.getActiveSubjects(collected.examConfig);
  }

  function renderStep() {
    var subs, fields, weekly;

    if (step === 0) {
      // ========== 考试配置 ==========
      const left = U.daysTo('2026-12-26');
      shell(
        '<h3 class="ob-h">考试配置</h3>'
        + '<p>距离2026考研初试还有 <b class="ob-big">' + left + '</b> 天。</p>'
        + '<p>选择你的考试科目，系统将据此调整内容与进度追踪。</p>'

        // 数学类型
        + '<div style="margin-top:16px"><label class="fld" style="margin-bottom:6px"><span><b>数学</b></span></label>'
        + '<div class="seg-row" id="ob-math-type">'
        + '<button class="seg' + (collected.examConfig.mathType === 'shuyi' ? ' seg-on' : '') + '" data-v="shuyi">数一</button>'
        + '<button class="seg' + (collected.examConfig.mathType === 'shuer' ? ' seg-on' : '') + '" data-v="shuer">数二</button>'
        + '<button class="seg' + (collected.examConfig.mathType === 'shusan' ? ' seg-on' : '') + '" data-v="shusan">数三</button>'
        + '</div>'
        + '<div class="muted-sm">'
        + (collected.examConfig.mathType === 'shuyi' ? '高数+线代+概率，范围最广' : '')
        + (collected.examConfig.mathType === 'shuer' ? '高数+线代，无概率论' : '')
        + (collected.examConfig.mathType === 'shusan' ? '高数+线代+概率，偏经济应用' : '')
        + '</div></div>'

        // 英语类型
        + '<div style="margin-top:14px"><label class="fld" style="margin-bottom:6px"><span><b>英语</b></span></label>'
        + '<div class="seg-row" id="ob-eng-type">'
        + '<button class="seg' + (collected.examConfig.engType === 'yingyi' ? ' seg-on' : '') + '" data-v="yingyi">英一</button>'
        + '<button class="seg' + (collected.examConfig.engType === 'yinger' ? ' seg-on' : '') + '" data-v="yinger">英二</button>'
        + '</div>'
        + '<div class="muted-sm">'
        + (collected.examConfig.engType === 'yingyi' ? '难度较高，翻译为英译中段落' : '难度适中，翻译为段落英译中')
        + '</div></div>'

        // 专业课
        + '<div style="margin-top:14px"><label class="fld" style="margin-bottom:6px"><span><b>专业课</b></span></label>'
        + '<input id="ob-prof-name" class="input" value="' + U.esc(collected.examConfig.profName) + '" placeholder="输入专业课名称，如：自控原理">'
        + '<div class="muted-sm">可自由填写，后续可在设置中修改</div></div>',
        [{
          label: '下一步 →', kind: 'btn-primary', onClick: function () {
            var profInput = document.getElementById('ob-prof-name');
            collected.examConfig.profName = (profInput ? profInput.value.trim() : '') || '自控原理';
            step = 1; renderStep();
          }
        }]
      );
      // 绑定数学类型点击
      bindSegRow('ob-math-type', function (v) { collected.examConfig.mathType = v; renderStep(); });
      // 绑定英语类型点击
      bindSegRow('ob-eng-type', function (v) { collected.examConfig.engType = v; renderStep(); });
    }

    else if (step === 1) {
      // ========== 各科目当前进度 ==========
      subs = activeSubjects();
      fields = [
        ['math', subs.math.name, subs.math.modules.join('/') + ' 各到第几章？（文字描述）'],
        ['ctrl', subs.ctrl.name, '当前进度如何？'],
        ['eng', subs.eng.name, '真题做到哪一年？单词几轮？'],
        ['pol', subs.pol.name, '马原开始了吗？']
      ];
      shell(
        '<h3 class="ob-h">各科目当前进度</h3>'
        + fields.map(function (f) {
          return '<label class="fld" style="margin-bottom:10px"><span><b>' + f[1] + '</b> — ' + f[2] + '</span>'
            + '<input class="input ob-prog" data-k="' + f[0] + '" placeholder="如：高数到第6章，线代未开始"></label>';
        }).join('')
        + '<div class="muted-sm">顺便录入各科总进度百分比（粗略即可）：</div>'
        + ['math', 'ctrl', 'eng', 'pol'].map(function (k) {
          return '<label class="fld fld-inline"><span>' + subs[k].short + '</span><input class="input ob-pct" data-k="' + k + '" type="number" min="0" max="100" value="10"> %</label>';
        }).join(''),
        [
          { label: '← 上一步', onClick: function () { step = 0; renderStep(); } },
          {
            label: '下一步 →', kind: 'btn-primary', onClick: function () {
              document.querySelectorAll('.ob-prog').forEach(function (i) { collected.progress[i.getAttribute('data-k')] = i.value.trim(); });
              document.querySelectorAll('.ob-pct').forEach(function (i) { collected.progress[i.getAttribute('data-k') + '_pct'] = U.clamp(+i.value || 0, 0, 100); });
              step = 2; renderStep();
            }
          }
        ]
      );
    }

    else if (step === 2) {
      // ========== 本周可用时间 ==========
      shell(
        '<h3 class="ob-h">本周可用时间</h3>'
        + '<label class="fld" style="margin-bottom:10px"><span>工作日每天可学几小时？</span>'
        + '<input id="ob-wd" class="input" type="number" min="1" max="16" value="4"></label>'
        + '<label class="fld"><span>周末每天可学几小时？</span>'
        + '<input id="ob-we" class="input" type="number" min="1" max="16" value="8"></label>'
        + '<div class="muted-sm">系统将按 5×工作日 + 2×周末 计算每周目标时长。</div>',
        [
          { label: '← 上一步', onClick: function () { step = 1; renderStep(); } },
          {
            label: '下一步 →', kind: 'btn-primary', onClick: function () {
              collected.hours.workday = U.clamp(+document.getElementById('ob-wd').value || 4, 1, 16);
              collected.hours.weekend = U.clamp(+document.getElementById('ob-we').value || 8, 1, 16);
              step = 3; renderStep();
            }
          }
        ]
      );
    }

    else if (step === 3) {
      // ========== 目标院校（自填 + 基于专业课的推荐） ==========
      var profName = collected.examConfig.profName || '';
      var recSchools = profName ? DB.recommendSchools(profName, 8) : [];
      var recHtml = '';
      if (recSchools.length > 0) {
        recHtml = '<div class="card-title-sm" style="margin-top:14px">🎯 基于「' + U.esc(profName) + '」的推荐院校（点击填入）：</div>'
          + '<div style="max-height:240px;overflow-y:auto">';
        recSchools.forEach(function (s) {
          recHtml += '<div class="sch-row rec-school" data-name="' + U.esc(s.name) + '" data-school="' + U.esc(s.id) + '">'
            + '<div class="sch-name">' + U.esc(s.name) + ' <span style="font-size:11px;color:var(--text-muted)">' + U.esc(s.tier || '') + '</span></div>'
            + '<div class="sch-info">' + U.esc(s.exam) + ' | ' + U.esc(s.line) + '</div></div>';
        });
        recHtml += '</div>';
      }
      shell(
        '<h3 class="ob-h">目标院校</h3>'
        + '<p>输入你心仪的院校名称。不确定也没关系——<b>10月底系统会用数学模拟分替你做决策</b>。</p>'
        + '<label class="fld" style="margin-bottom:6px"><span>院校名称（可多填，用"、"分隔）：</span></label>'
        + '<input id="ob-school-input" class="input" value="' + U.esc(collected.school === 'undecided' ? '' : collected.school) + '" placeholder="如：河北工业大学、上海大学">'
        + '<div class="muted-sm">可直接输入，或从下方推荐中选择</div>'
        + recHtml,
        [
          { label: '← 上一步', onClick: function () { step = 2; renderStep(); } },
          {
            label: '下一步 →', kind: 'btn-primary', onClick: function () {
              var input = document.getElementById('ob-school-input');
              collected.school = (input ? input.value.trim() : '') || 'undecided';
              step = 4; renderStep();
            }
          }
        ]
      );
      // 点击推荐院校填入输入框
      if (recSchools.length > 0) {
        document.querySelectorAll('.rec-school').forEach(function (el) {
          el.onclick = function () {
            var name = el.getAttribute('data-name');
            var input = document.getElementById('ob-school-input');
            if (!input) return;
            var current = input.value.trim();
            if (current && current.indexOf(name) < 0) {
              input.value = current + '、' + name;
            } else if (!current) {
              input.value = name;
            }
            input.focus();
          };
        });
      }
    }

    else if (step === 4) {
      // ========== 最后一课：防呆检查 ==========
      weekly = collected.hours.workday * 5 + collected.hours.weekend * 2;
      shell(
        '<h3 class="ob-h">最后一课：防呆检查清单</h3>'
        + '<p>你的致命弱点不是不会，而是<b>' + U.esc((DB.coachProfile && DB.coachProfile().mathWeak) || '符号、分式、积分因子') + '</b>。所以每次做数学题前，必须在「红线禁令」页逐项勾选：</p>'
        + '<div class="warn-box"><div class="warn-body">'
        + DB.redlineChecklist().map(function (c, i) { return (i + 1) + '. ' + c; }).join('<br>')
        + '</div></div>'
        + '<p class="muted-sm">每周目标时长已定为 <b>' + weekly + 'h</b>（可在设置中调整）。初始任务模板与4个里程碑已生成。</p>',
        [{
          label: '✓ 完成初始化，进入系统', kind: 'btn-primary', onClick: function (c) {
            Store.update(function (s) {
              // 保存考试配置
              s.settings.examConfig = collected.examConfig;
              // 保存各科进度
              ['math', 'ctrl', 'eng', 'pol'].forEach(function (k) {
                s.progress[k].percent = collected.progress[k + '_pct'] || 0;
                if (collected.progress[k]) s.progress[k].stage = collected.progress[k];
              });
              // 如果选了数二，删除概率论进度模块
              if (collected.examConfig.mathType === 'shuer') {
                delete s.progress.math.modules['概率'];
              }
              s.settings.weeklyTargetHours = weekly;
              s.settings.targetSchool = collected.school;
              s.settings.onboarded = true;
            });
            c();
            // 加载 / AI 生成专业课知识体系，再进入系统
            finalizeMajor(collected.examConfig.profName || '自控原理');
          }
        }]
      );
    }
  }

  // ========== 专业课知识体系加载 / AI 生成 ==========
  function finalizeMajor(profName) {
    profName = profName || '自控原理';
    var inRegistry = DB.MAJOR_REGISTRY && DB.MAJOR_REGISTRY[profName];
    var cache = (Store.get().majorData || {});
    var inCache = cache[profName];

    // 已知专业（注册表内置）或已缓存过 → 直接同步即可
    if (inRegistry || inCache) {
      DB.syncSubjects();
      Toast.success('初始化完成。一志愿上岸，开工。');
      App.refresh();
      return;
    }

    // 未知专业：优先用 AI 动态生成整套考点体系 / 概念图谱
    if (typeof AI !== 'undefined' && AI.configured()) {
      genMajorWithAI(profName);
    } else {
      // 无 AI：按通用模式初始化，提示配置 AI 以获得专业适配
      DB.syncSubjects();
      Toast.warn('已按通用模式初始化。到「设置」配置 AI Key 后，系统可自动生成「' + profName + '」的考点体系与概念图谱。', 7000);
      App.refresh();
    }
  }

  // 弹出流式进度弹窗，调用 AI 生成专业数据
  function genMajorWithAI(profName) {
    Modal.open({
      title: '🤖 正在为「' + profName + '」生成专业课知识体系…',
      wide: true, dismissable: false,
      html: '<div class="muted-sm" id="gm-status">⏳ 正在连接模型，请稍候（约需 10-30 秒）…</div>'
        + '<div id="gm-think-wrap" style="display:none;margin-top:10px">'
        + '<div class="card-title-sm" style="opacity:.7">💭 思考过程</div>'
        + '<pre class="report" id="gm-think" style="max-height:160px;overflow:auto;opacity:.72;font-size:12px;white-space:pre-wrap"></pre></div>'
        + '<div id="gm-content-wrap" style="display:none;margin-top:10px">'
        + '<div class="card-title-sm">📝 生成内容</div>'
        + '<pre class="report" id="gm-content" style="max-height:220px;overflow:auto;font-size:12px;white-space:pre-wrap"></pre></div>',
      actions: []
    });

    DB.generateMajorAI(profName, function (text) {
      var st = document.getElementById('gm-status');
      var cw = document.getElementById('gm-content-wrap');
      var ce = document.getElementById('gm-content');
      if (st) st.textContent = '✍️ 模型正在生成考点与概念图谱…';
      if (cw) cw.style.display = '';
      if (ce) { ce.textContent = text || ''; ce.scrollTop = ce.scrollHeight; }
    }).then(function (data) {
      if (Modal.close) Modal.close();
      DB.syncSubjects();
      if (data) {
        Toast.success('已为「' + profName + '」生成专属考点体系，初始化完成！');
      } else {
        Toast.warn('AI 生成未成功（返回内容无法解析），已按通用模式初始化。可稍后在设置中重试。', 7000);
      }
      App.refresh();
    }).catch(function (err) {
      if (Modal.close) Modal.close();
      DB.syncSubjects();
      var reason = (err && err.message) || '未知网络错误';
      // 精简用户可见的错误信息
      var userMsg = reason;
      if (/HTTP\s*4\d{2}/.test(reason)) userMsg = 'API 请求被拒绝（' + reason + '）。请检查 API 地址、密钥和模型名是否正确。';
      else if (/HTTP\s*5\d{2}/.test(reason)) userMsg = 'AI 服务端错误（' + reason + '）。请稍后重试。';
      else if (/Failed to fetch|NetworkError|Load failed/i.test(reason)) userMsg = '网络连接失败。请检查网络后重试。';
      else if (/timeout/i.test(reason)) userMsg = '请求超时。模型响应较慢或网络不稳定，请稍后重试。';
      Toast.warn('AI 生成失败：' + userMsg + '\n已按通用模式初始化。', 8000);
      App.refresh();
    });
  }

  // 绑定 seg 行点击（考试类型选择）
  function bindSegRow(containerId, onChange) {
    var btns = document.querySelectorAll('#' + containerId + ' .seg');
    btns.forEach(function (b) {
      b.onclick = function () {
        onChange(b.getAttribute('data-v'));
      };
    });
  }

  // ========== 对外：不清空数据地切换专业课（供设置页调用） ==========
  // 智能切换：注册表/缓存命中→直接应用；未知专业且已配AI→流式AI生成；否则通用模式并提示
  function switchMajor(profName) {
    profName = (profName || '').trim();
    if (!profName) { Toast.warn('请输入专业课名称'); return; }
    // 用户主动切换专业：失效当日 AI 编排缓存（避免旧专业的任务序列残留）
    try { DB.writeSchedulerPlan(null); } catch (e) {}
    Store.update(function (s) {
      s.settings.examConfig = s.settings.examConfig || { mathType: 'shuyi', engType: 'yingyi' };
      s.settings.examConfig.profName = profName;
    });
    finalizeMajor(profName);
  }

  // 强制用 AI 重建（清掉该专业本地缓存后重新生成）——用于"通用模式初始化后补配AI"场景
  function regenMajorAI(profName) {
    profName = (profName || (Store.get().settings.examConfig && Store.get().settings.examConfig.profName) || '').trim();
    if (!profName) { Toast.warn('请先设置专业课名称'); return; }
    if (typeof AI === 'undefined' || !AI.configured()) { Toast.warn('请先在下方「云端 AI」卡片填写并保存 API Key', 6000); return; }
    Store.update(function (s) {
      s.settings.examConfig = s.settings.examConfig || { mathType: 'shuyi', engType: 'yingyi' };
      s.settings.examConfig.profName = profName;
      if (s.majorData && s.majorData[profName]) delete s.majorData[profName]; // 清缓存强制重生成
    });
    genMajorWithAI(profName);
  }

  // 判断是否需要展示初始化向导：
  //   优先看 onboarded 标志（向后兼容）；
  //   若标志为 false 但已有实质用户数据（打卡/错题/学习时长，或任务数超过默认模板的6条），
  //   说明是标志丢失而非真首次使用 → 跳过，避免每次打开都误弹向导。
  //   注意：不能用"有任意任务"判断，因为 initialState 默认就生成 6 条模板任务，需用 >6 或上述实质数据区分。
  function needed() {
    var s = Store.get();
    if (s.settings && s.settings.onboarded) return false;
    var hasReal = (s.completions && Object.keys(s.completions).length > 0)
      || (s.studyHours && Object.keys(s.studyHours).length > 0)
      || (s.mistakes && s.mistakes.length > 0)
      || (s.tasks && s.tasks.length > 6);
    return !hasReal;
  }

  // 云拉取完成后回调：若此时向导正在显示但数据表明已完成过初始化，自动关闭（解决异步竞态导致的误弹）
  function dismissIfNeeded() {
    if (!needed()) {
      try { if (Modal.close) Modal.close(); } catch (e) {}
    }
  }

  window.Onboarding = {
    show: show,
    needed: needed,
    dismissIfNeeded: dismissIfNeeded,
    switchMajor: switchMajor,
    regenMajorAI: regenMajorAI
  };
})();


/* ===== js/modules/photomistake.js ===== */
/* ============================================================
 * photomistake.js — 拍题错题本（独立于 AI 测验题库）
 * 功能：拍照/选图 → 本地保存(自动云同步) → AI 提取题目 + 解析（TeX渲染）+ 举一反三出题
 * 数据：Store.mistakePhotos[]（随主数据云同步，不单独管理）
 * ============================================================ */
(function () {
  'use strict';
  var filter = 'all';

  // 图片压缩：canvas 缩放到最大边 ≤ MAX_PX，JPEG 0.7 质量，控制 localStorage 占用
  var MAX_PX = 1200;
  function compressImage(file, callback) {
    var reader = new FileReader();
    reader.onload = function () {
      var img = new Image();
      img.onload = function () {
        var w = img.width, h = img.height;
        if (w > MAX_PX || h > MAX_PX) {
          var ratio = Math.min(MAX_PX / w, MAX_PX / h);
          w = Math.round(w * ratio); h = Math.round(h * ratio);
        }
        var c = document.createElement('canvas');
        c.width = w; c.height = h;
        var ctx = c.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        var dataUrl = c.toDataURL('image/jpeg', 0.7);
        callback(dataUrl);
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  }

  // 对文本做 TeX 行内公式渲染（利用 Tex 模块）
  function renderMath(text) {
    if (!text || typeof Tex === 'undefined') return U.esc(text);
    try { return Tex.renderInline(text).replace(/\\n/g, '<br>'); } catch (e) { return U.esc(text); }
  }

  // 统计已标记疑难点的错题数
  function countPainPoints(s) {
    return (s.mistakePhotos || []).filter(function (p) { return p.painPoint && p.painPoint.trim(); }).length;
  }

  // 弱点画像卡 HTML
  function weaknessCardHtml(s) {
    var wp = s.weaknessProfile;
    var painCnt = countPainPoints(s);
    var header = '<div class="card"><div class="card-title" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px">'
      + '<span>📊 我的薄弱点画像</span>'
      + '<span style="display:flex;gap:4px">'
      + (typeof AI !== 'undefined' && AI.configured()
          ? '<button class="btn btn-ghost pm-weak-btn" data-act="weak" style="font-size:11px;padding:3px 8px">' + (wp ? '🔄 重新分析' : '🧠 分析薄弱点') + '</button>'
          : '')
      + '</span></div>';

    if (!wp) {
      var hint = painCnt > 0
        ? '已标记 <b>' + painCnt + '</b> 道错题的疑难点。点击「分析薄弱点」，AI 将主要依据这些疑难点标签（省 token、更精准）生成你的薄弱点画像与复习建议。'
        : '还没有标记疑难点。建议给每道错题标一个 ≤10 字的疑难点（如「分部积分」「洛必达」），AI 即可据此分析你的薄弱模块并给出针对性建议。';
      return header
        + '<div class="muted-sm">' + hint + '</div>'
        + (typeof AI !== 'undefined' && !AI.configured() ? '<div class="alert alert-warn" style="margin-top:6px">未配置 AI，无法生成画像。请先在设置中填写 API。</div>' : '')
        + '</div>';
    }

    // 已生成画像
    var tags = (wp.weakAreas && wp.weakAreas.length)
      ? '<div class="pm-weak-tags">' + wp.weakAreas.map(function (t) { return '<span class="tag" style="background:#cf1322;color:#fff;margin:2px">' + U.esc(t) + '</span>'; }).join('') + '</div>'
      : '';
    var summary = wp.summary ? '<div class="pm-weak-summary">' + U.esc(wp.summary).replace(/\\n/g, '<br>') + '</div>' : '';
    var advice = wp.advice ? '<div class="pm-weak-advice"><b>💡 复习建议：</b>' + U.esc(wp.advice).replace(/\\n/g, '<br>') + '</div>' : '';
    var meta = '<div class="muted-sm" style="margin-top:6px">基于 ' + (wp.basedOn ? wp.basedOn.length : 0) + ' 条疑难点 · 生成于 ' + (wp.generatedAt || '').slice(0, 16).replace('T', ' ') + '</div>';

    return header + tags + summary + advice + meta + '</div>';
  }

  // ---------- 渲染 ----------
  function render(el) {
    var s = Store.get();
    var photos = s.mistakePhotos || [];
    var tabs = [
      ['all', '全部'],
      ['math', DB.SUBJECTS.math.short],
      ['ctrl', DB.SUBJECTS.ctrl.short],
      ['eng', DB.SUBJECTS.eng.short],
      ['pol', DB.SUBJECTS.pol.short]
    ];

    var tabsHtml = tabs.map(function (t) {
      var n = t[0] === 'all' ? photos.length : photos.filter(function (p) { return p.subject === t[0]; }).length;
      return '<button class="tab' + (filter === t[0] ? ' tab-on' : '') + '" data-f="' + t[0] + '">' + t[1] + ' <span class="tab-n">' + n + '</span></button>';
    }).join('');

    var list = photos.filter(function (p) { return filter === 'all' || p.subject === filter; })
      .sort(function (a, b) { return (b.createdAt || '').localeCompare(a.createdAt || ''); });

    var cardsHtml = '';
    if (!list.length) {
      cardsHtml = '<div class="empty">暂无拍题记录。拍下你不会的题，让 AI 帮你拆解。</div>';
    } else {
      list.forEach(function (p) {
        var subj = DB.SUBJECTS[p.subject] || { short: '?', color: '#999', name: '?' };
        var hasAI = p.aiAnalysis && (p.aiAnalysis.keySteps || p.aiAnalysis.errorCause);
        var hasSimilar = !!(p.similarProblem && p.similarProblem.question);

        // 卡片主体
        cardsHtml += '<div class="pm-card" data-id="' + p.id + '">';

        // 顶栏：科目 + 日期 + 状态
        cardsHtml += '<div class="pm-meta">'
          + '<span class="task-tag" style="background:' + subj.color + '">' + subj.short + '</span>'
          + '<span class="muted-sm">' + (p.createdAt || '').slice(0, 10) + '</span>'
          + (hasAI ? '<span class="tag" style="background:#237804;color:#fff;margin-left:4px">✓ 已解析</span>' : '')
          + '</div>';

        // 题目文字（AI 提取或用户备注）
        if (p.extractedQuestion) {
          cardsHtml += '<div class="pm-question"><b>📝 题目：</b>' + renderMath(p.extractedQuestion) + '</div>';
        } else if (p.note) {
          cardsHtml += '<div class="pm-note"><b>📝 备注：</b>' + U.esc(p.note) + '</div>';
        }

        // 疑难点标记（10字以内，用于汇聚弱点画像 / 省 token 分析）
        var painVal = p.painPoint || '';
        cardsHtml += '<div class="pm-pain">'
          + '<span class="pm-pain-label">🎯 疑难点</span>'
          + '<input class="pm-pain-input" data-id="' + p.id + '" maxlength="10" value="' + U.esc(painVal) + '" placeholder="如：分部积分/洛必达...">'
          + '<span class="pm-pain-count">' + painVal.length + '/10</span>'
          + '</div>';

        // 图片：缩略图 + 查看原图按钮
        if (p.imageBase64) {
          cardsHtml += '<div class="pm-img-row">'
            + '<img class="pm-thumb" src="' + p.imageBase64 + '" alt="题目图片" loading="lazy" style="max-width:120px;max-height:80px;border-radius:6px;cursor:pointer;border:1px solid #e5e7eb;object-fit:cover">'
            + '<button class="btn btn-ghost pm-viewimg-btn" data-act="viewimg" style="margin-left:8px;font-size:12px">🔍 查看原图</button>'
            + '</div>';
        }

        // AI 解析区域（TeX 渲染）
        if (hasAI) {
          cardsHtml += '<div class="pm-ai">';
          if (p.aiAnalysis.keySteps) {
            cardsHtml += '<div class="pm-ai-section"><b>🔑 解题关键：</b><div class="pm-ai-body">' + renderMath(p.aiAnalysis.keySteps) + '</div></div>';
          }
          if (p.aiAnalysis.errorCause) {
            cardsHtml += '<div class="pm-ai-section"><b>⚠️ 易错原因：</b><div class="pm-ai-body">' + renderMath(p.aiAnalysis.errorCause) + '</div></div>';
          }
          cardsHtml += '</div>';
        }

        // 举一反三结果
        if (hasSimilar) {
          cardsHtml += '<div class="pm-similar">'
            + '<div class="pm-ai-section"><b>🔄 举一反三：</b></div>'
            + '<div class="pm-similar-q"><b>题目：</b>' + renderMath(p.similarProblem.question) + '</div>'
            + (p.similarProblem.solution ? '<div class="pm-similar-a"><b>解答：</b>' + renderMath(p.similarProblem.solution) + '</div>' : '')
            + '</div>';
        }

        // 操作按钮行
        cardsHtml += '<div class="pm-actions">';
        if (!hasAI && typeof AI !== 'undefined' && AI.configured()) {
          cardsHtml += '<button class="btn btn-primary pm-ai-btn" data-act="analyze">🤖 AI 解析</button>';
        } else if (typeof AI !== 'undefined' && AI.configured()) {
          cardsHtml += '<button class="btn btn-ghost pm-ai-btn" data-act="reanalyze">🤖 重新解析</button>';
        }
        if (typeof AI !== 'undefined' && AI.configured()) {
          cardsHtml += '<button class="btn btn-ghost pm-ai-btn" data-act="similar">🔄 举一反三</button>';
        }
        cardsHtml += '<button class="btn btn-ghost pm-ai-btn" data-act="editnote">✏️ 编辑备注</button>'
          + '<button class="btn btn-ghost pm-del-btn" data-act="del">删除</button>'
          + '</div></div>';
      });
    }

    el.innerHTML =
      weaknessCardHtml(s)

      + '<div class="card"><div class="card-title">拍照 / 选图上传</div>'
      + '<div class="pm-upload-row">'
      + '<select id="pm-subj" class="input input-sel">'
      + '<option value="math">' + DB.SUBJECTS.math.name + '</option>'
      + '<option value="ctrl">' + DB.SUBJECTS.ctrl.short + '</option>'
      + '<option value="eng">' + DB.SUBJECTS.eng.name + '</option>'
      + '<option value="pol">' + DB.SUBJECTS.pol.name + '</option>'
      + '</select>'
      + '<input type="file" id="pm-file" accept="image/*" capture="environment" style="display:none">'
      + '<label for="pm-file" class="btn btn-primary" style="cursor:pointer;margin-left:8px">📷 拍照 / 选图</label>'
      + '<input id="pm-note" class="input" placeholder="备注（可选）：这道题卡在哪？想问什么？" style="flex:1;margin-left:8px">'
      + '</div>'
      + '<div id="pm-preview" style="display:none;margin-top:10px;text-align:center"></div>'
      + '</div>'

      + '<div class="card"><div class="card-title" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px"><span>错题记录 (' + list.length + ')</span>'
      + '<span style="display:flex;gap:4px">'
      + '<button class="btn btn-ghost pm-export-btn" data-act="export-json" style="font-size:11px;padding:3px 8px" title="导出为 JSON（含图片 base64）">📥 JSON</button>'
      + '<button class="btn btn-ghost pm-export-btn" data-act="export-md" style="font-size:11px;padding:3px 8px" title="导出为 Markdown（文字+题目+解析）">📄 Markdown</button>'
      + '</span></div>'
      + '<div class="tab-row">' + tabsHtml + '</div>'
      + '<div class="pm-list">' + cardsHtml + '</div>'
      + '</div>';

    bind(el);
  }

  // ---------- 交互绑定 ----------
  function bind(el) {
    // Tab 切换
    el.querySelectorAll('.tab').forEach(function (b) {
      b.onclick = function () { filter = b.getAttribute('data-f'); render(el); };
    });

    // 疑难点输入：失焦/回车保存（10字限）
    el.querySelectorAll('.pm-pain-input').forEach(function (inp) {
      var id = inp.getAttribute('data-id');
      var cnt = inp.parentNode.querySelector('.pm-pain-count');
      var save = function () {
        var v = inp.value.trim().slice(0, 10);
        inp.value = v;
        if (cnt) cnt.textContent = v.length + '/10';
        Store.update(function (st) {
          var p = (st.mistakePhotos || []).find(function (x) { return x.id === id; });
          if (p) p.painPoint = v;
        });
      };
      inp.onblur = save;
      inp.oninput = function () { if (cnt) cnt.textContent = inp.value.length + '/10'; };
      inp.onkeydown = function (e) { if (e.key === 'Enter') { e.preventDefault(); inp.blur(); } };
    });

    // 弱点画像分析按钮

  // ---------- 从 AI 返回文本中提取 JSON ----------
  function extractJSON(raw) {
    var s = (raw || '').trim();
    // 先试 markdown 代码块
    var m = s.match(/```(?:json)?\s*([\s\S]*?)```/);
    if (m) { s = m[1].trim(); var r1 = tryParseRepair(s); if (r1) return r1; }
    // 再找最外层 { ... }
    var start = s.indexOf('{');
    if (start === -1) return null;
    var depth = 0, inStr = false, escape = false, end = -1;
    for (var i = start; i < s.length; i++) {
      var c = s.charAt(i);
      if (escape) { escape = false; continue; }
      if (c === '\\') { escape = true; continue; }
      if (c === '"') { inStr = !inStr; continue; }
      if (inStr) continue;
      if (c === '{') depth++;
      else if (c === '}') { depth--; if (depth === 0) { end = i + 1; break; } }
    }
    if (end <= start) return null;
    var r2 = tryParseRepair(s.slice(start, end));
    return r2 || null;
  }

  // 尝试 JSON.parse 并修复 LaTeX 转义吞字符问题
  function tryParseRepair(jsonStr) {
    // 直接解析
    try { return repairMangledLatexObj(JSON.parse(jsonStr)); } catch (e) {}
    // 去注释/尾逗号/单引号后重试
    var fixed = jsonStr
      .replace(/\/\/[^\n]*/g, '')
      .replace(/\/\*[\s\S]*?\*\//g, '')
      .replace(/,\s*([}\]])/g, '$1')
      .replace(/'/g, '"');
    try { return repairMangledLatexObj(JSON.parse(fixed)); } catch (e) {}
    return null;
  }

  // 递归修复对象中所有字符串值里被 JSON 转义吞掉的 LaTeX 命令
  function repairMangledLatexObj(obj) {
    if (!obj) return obj;
    if (typeof obj === 'string') return repairMangled(obj);
    if (typeof obj !== 'object') return obj;
    if (Array.isArray(obj)) { for (var i = 0; i < obj.length; i++) obj[i] = repairMangledLatexObj(obj[i]); return obj; }
    var keys = Object.keys(obj);
    for (var k = 0; k < keys.length; k++) obj[keys[k]] = repairMangledLatexObj(obj[keys[k]]);
    return obj;
  }

  // 修复单个字符串：JSON 把 \f→换页 \r→回车 \b→退格 \t→TAB \n→换行 吞掉了 LaTeX 命令首字母
  function repairMangled(s) {
    if (typeof s !== 'string') return s;
    return s
      .replace(/\x0Cfrac/g, '\\frac').replace(/\x0Cfrom/g, '\\from')
      .replace(/\x0DRightarrow/g, '\\Rightarrow').replace(/\x0Drightarrow/g, '\\rightarrow')
      .replace(/\x0Dright/g, '\\right').replace(/\x0Dleft/g, '\\left')
      .replace(/\x0Drceil/g, '\\rceil').replace(/\x0Drfloor/g, '\\rfloor')
      .replace(/\x0Drangle/g, '\\rangle').replace(/\x0Drbrace/g, '\\rbrace')
      .replace(/\x0Dmathrm/g, '\\mathrm').replace(/\x0Drm/g, '\\rm')
      .replace(/\x08begin/g, '\\begin').replace(/\x08bigg/g, '\\bigg').replace(/\x08Bigg/g, '\\Bigg')
      .replace(/\x08bigl/g, '\\bigl').replace(/\x08Bigl/g, '\\Bigl')
      .replace(/\x08bigr/g, '\\bigr').replace(/\x08Bigr/g, '\\Bigr')
      .replace(/\x08biggl/g, '\\biggl').replace(/\x08Biggl/g, '\\Biggl')
      .replace(/\x08biggr/g, '\\biggr').replace(/\x08Biggr/g, '\\Biggr')
      .replace(/\x08big/g, '\\big').replace(/\x08Big/g, '\\Big')
      .replace(/\x09ext/g, '\\text').replace(/\x09extrm/g, '\\textrm')
      .replace(/\x09extbf/g, '\\textbf').replace(/\x09an/g, '\\tan')
      .replace(/\x09imes/g, '\\times').replace(/\x09o/g, '\\to')
      .replace(/\x0Aeq/g, '\\neq').replace(/\x0Aeg/g, '\\neg');
  }

  // ---------- AI 解析（提取题目 + 解题关键 + 易错原因） ----------

      + '{"extractedQuestion":"从图片中识别出的完整题目文字（保留所有数学符号和公式，用 LaTeX 表示如 \\frac{a}{b}、\\sqrt{x}、x^{2}、\\int 等）",'
      + '"keySteps":"解题关键步骤（分步，落到具体公式/方法，数学表达式用 LaTeX）",'
      + '"errorCause":"本题最易踩的坑/典型错误原因（符号/概念/计算等）",'

      + '要求：extractedQuestion 必须准确还原题目原貌；keySteps 要具体到每步推导；errorCause 指出真正易错点；painPoint 必须精炼、≤10字、能直接作为疑难点标签。';

    var userPrompt = '请分析这张题目图片。'
      + (photo.note ? '\n考生备注：' + photo.note : '')
      + '\n科目：' + (DB.SUBJECTS[photo.subject] ? DB.SUBJECTS[photo.subject].name : photo.subject);

    Modal.open({

        analysis = { keySteps: fullText, errorCause: '', extractedQuestion: '', painPoint: '' };
      }
      // 写回数据（含提取的题目）
      var wasEmpty = !photo.painPoint; // 解析前是否已标记过疑难点

  // ---------- 导出功能 ----------
  function exportData(format) {
    var s = Store.get();
    var photos = (s.mistakePhotos || []).filter(function (p) { return filter === 'all' || p.subject === filter; })
      .sort(function (a, b) { return (b.createdAt || '').localeCompare(a.createdAt || ''); });

    if (!photos.length) { Toast.warn('当前筛选下无数据可导出'); return; }

    if (format === 'json') {
      // 导出完整 JSON（含 base64 图片），可直接导入恢复
      var data = JSON.stringify(photos, null, 2);
      downloadFile(data, '拍题错题本_' + formatDate(new Date()) + '.json', 'application/json');
    } else {
      // 导出 Markdown（文字友好，图片用占位符）
      var md = '# 拍题错题本导出\n';
      md += '> 导出时间：' + new Date().toLocaleString() + '\n';
      md += '> 共 ' + photos.length + ' 条记录\n\n';

      photos.forEach(function (p, idx) {
        var subj = DB.SUBJECTS[p.subject] || { short: '?', name: '?' };
        md += '---\n\n';
        md += '## 第 ' + (idx + 1) + ' 题 [' + subj.name + ']\n\n';
        md += '- **日期**：' + (p.createdAt || '').slice(0, 10) + '\n';
        md += '- **科目**：' + subj.name + '\n';
        if (p.note) md += '- **备注**：' + p.note + '\n';
        if (p.extractedQuestion) {
          md += '- **题目**：' + p.extractedQuestion + '\n';
        }
        if (p.imageBase64) {
          md += '- **图片**：[查看原图](data:' + p.imageBase64.slice(0, 30) + '...)\n';
        }
        if (p.aiAnalysis) {
          md += '\n### 解析\n\n';
          if (p.aiAnalysis.keySteps) md += '**解题关键**：\n' + p.aiAnalysis.keySteps + '\n\n';
          if (p.aiAnalysis.errorCause) md += '**易错原因**：\n' + p.aiAnalysis.errorCause + '\n\n';
        }
        if (p.similarProblem && p.similarProblem.question) {
          md += '### 举一反三\n\n';
          md += '**题目**：' + p.similarProblem.question + '\n\n';
          if (p.similarProblem.solution) md += '**解答**：\n' + p.similarProblem.solution + '\n\n';
          if (p.similarProblem.trap) md += '**易错点**：' + p.similarProblem.trap + '\n\n';
        }
      });

      downloadFile(md, '拍题错题本_' + formatDate(new Date()) + '.md', 'text/markdown;charset=utf-8');
    }
    Toast.success('✓ 已导出 ' + photos.length + ' 条记录（' + (format === 'json' ? 'JSON' : 'Markdown') + '）');
  }

  function downloadFile(content, filename, mimeType) {
    var blob = new Blob([content], { type: mimeType });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click();
    setTimeout(function () { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
  }

  function formatDate(d) {
    return d.getFullYear()
      + String(d.getMonth() + 1).padStart(2, '0')
      + String(d.getDate()).padStart(2, '0')
      + '_' + String(d.getHours()).padStart(2, '0')
      + String(d.getMinutes()).padStart(2, '0');
  }

  // ---------- 弱点画像分析：汇聚疑难点，省 token ----------
  function analyzeWeakness(el) {
    if (typeof AI === 'undefined' || !AI.configured()) { Toast.warn('请先在设置中配置 AI'); return; }
    var s = Store.get();
    var photos = s.mistakePhotos || [];
    // 优先取疑难点标签（10字内），最多 40 条
    var painPoints = photos.filter(function (p) { return p.painPoint && p.painPoint.trim(); })
      .map(function (p) { return p.painPoint.trim(); });
    // 备份：疑难点不足时，取最近题目的题干文字（限 12 条、每条截断 60 字）
    var fallbackQs = photos.filter(function (p) { return (p.extractedQuestion || p.note || '').trim(); })
      .slice(-12).map(function (p) { return (p.extractedQuestion || p.note).trim().slice(0, 60); });

    if (!painPoints.length && !fallbackQs.length) {
      Toast.warn('暂无错题数据，请先拍题并记录'); return;
    }

    Modal.open({
      title: '🧠 分析薄弱点中…',
      wide: true, dismissable: false,
      html: '<div class="muted-sm">正在依据你的疑难点标签生成薄弱点画像（主要用疑难点，省 token、更精准）…</div>'
        + '<pre class="report" id="pm-weak-out" style="white-space:pre-wrap;max-height:320px;overflow:auto;border:1px solid #e5e7eb;border-radius:8px;padding:10px;background:#fafafa;font-size:13px">加载中…</pre>',
      actions: [{ label: '关闭', kind: 'btn-ghost' }]
    });
    var out = document.getElementById('pm-weak-out');

    var majorName = '';
    try { majorName = (DB.getActiveMajor().name) || '专业课'; } catch (e) {}

    // 组装最省 token 的输入：以疑难点标签为主
    var ctx;
    if (painPoints.length >= 3) {
      // 仅发疑难点标签（高频聚类展示）
      var freq = {};
      painPoints.forEach(function (t) { freq[t] = (freq[t] || 0) + 1; });
      var freqList = Object.keys(freq).map(function (k) { return freq[k] > 1 ? (k + '（×' + freq[k] + '）') : k; });
      ctx = '该考生近期拍题时标记的疑难点标签（共 ' + painPoints.length + ' 条）：\n- ' + freqList.join('\n- ');
    } else {
      // 疑难点太少，退化为「标签 + 部分题干」
      ctx = '疑难点标签：' + (painPoints.length ? painPoints.join('、') : '（未标记）') + '\n';
      if (fallbackQs.length) ctx += '部分错题题干：\n- ' + fallbackQs.join('\n- ');
    }

    var systemPrompt = '你是考研学情分析师。根据考生近期错题的「疑难点标签」（必要时结合题干），'
      + '推断其知识薄弱模块与典型错误模式，输出严格 JSON（不要 markdown、不要多余文字）：'
      + '{"weakAreas":["最突出的3-5个薄弱点关键词，如\'分部积分\'、\'含参变限积分\'"],'
      + '"summary":"对薄弱点的整体描述（2-4句，点出用户核心痛点）",'
      + '"advice":"针对性复习建议（2-4句，具体到该补什么、怎么练）"}'
      + '要求：weakAreas 必须是可操作的考点名；summary 要直击痛点；advice 具体可执行。专业课背景：「' + majorName + '」。';

    var userPrompt = ctx + '\n\n请基于以上信息生成该考生的薄弱点画像。';

    AI.chatStream(systemPrompt, userPrompt, function (text, reasoning) {
      if (out) { out.textContent = text || (reasoning ? '🤔 ' + reasoning : '加载中…'); out.scrollTop = out.scrollHeight; }
    }).then(function (fullText) {
      var res = extractJSON(fullText);
      if (!res) { if (out) out.textContent = fullText; res = { weakAreas: [], summary: fullText, advice: '' }; }
      Store.update(function (st) {
        st.weaknessProfile = {
          generatedAt: new Date().toISOString(),
          basedOn: painPoints,
          weakAreas: res.weakAreas || [],
          summary: res.summary || '',
          advice: res.advice || ''
        };
      });
      Toast.success('✓ 薄弱点画像已生成');
      setTimeout(function () { Modal.close(); render(el); }, 500);
    }).catch(function (err) {
      if (out) out.textContent = '❌ 分析失败：' + (err && err.message ? err.message : err);
    });
  }

  window.PhotoMistakeModule = { render };
})();


/* ===== js/app.js ===== */
/* ============================================================
 * app.js — 应用主控
 * 交互架构（好用版）：
 *  · 底部固定5大高频Tab：作战台/排程/复盘/拍题错题本/工具（工具内含其余模块）
 *  · 任务管理已并入「排程」页（添加/打卡/编辑/删除一站式）
 *  · 顶部极简状态条：倒计时+今日时长，全局可见
 * ============================================================ */
(function () {
  'use strict';

  // 主Tab（底部固定）| 子模块（工具抽屉）
  const MAIN_TABS = [
    ['dashboard', '作战台', '🎖', DashboardModule],
    ['scheduler', '排程', '🧠', SchedulerModule],
    ['review', '复盘', '📊', ReviewModule],
    ['photomistake', '拍题', '📸', PhotoMistakeModule]
  ];
  const TOOL_TABS = [
    ['quiz', 'AI测验', '🤖', QuizModule],
    ['mistakes', '错题画像', '🎯', MistakesModule],
    ['heatmap', '考点热力', '🗺', HeatmapModule],
    ['inspector', '步骤审查', '✍️', InspectorModule],
    ['focus', '深度专注', '🔒', FocusModule],
    ['concept', '概念图谱', '🧩', ConceptMapModule],
    ['decision', '院校决策', '⚖️', DecisionModule],
    ['mental', '心理状态', '🧘', MentalModule],
    ['reading', '英语阅读', '📖', ReadingModule],
    ['redline', '红线禁令', '⛔', RedlineModule],
    ['progress', '进度追踪', '📈', ProgressModule],
    ['settings', '设置', '⚙️', SettingsModule]
  ];
  const ALL = MAIN_TABS.concat(TOOL_TABS);
  let current = 'dashboard';

  function rolloverIfNeeded() {
    const s = Store.get();
    const today = U.dkey();
    if (s.meta.lastOpenDate === today) return;
    const last = s.meta.lastOpenDate;
    if (last && last < today) {
      const doneIds = s.completions[last] || [];
      s.taskArchive[last] = s.tasks.map(t => ({ subject: t.subject, text: t.text, done: t.done || doneIds.indexOf(t.id) >= 0 }));
      s.tasks.forEach(t => { t.done = false; });
      const keys = Object.keys(s.taskArchive).sort();
      while (keys.length > 60) { delete s.taskArchive[keys.shift()]; }
    }
    Store.update(x => { x.meta.lastOpenDate = today; });
  }

  // 顶部状态条：倒计时 + 今日时长 + 今日任务完成度
  function renderStatusBar() {
    const el = document.getElementById('statusbar');
    const left = U.daysTo(Store.get().settings.examDate);
    const st = Store.todayTaskStats();
    let done = 0, total = 0;
    Object.keys(st).forEach(k => { done += st[k][0]; total += st[k][1]; });
    el.innerHTML =
      '<span class="sb-item">⏳ <b>' + left + '</b>天</span>'
      + '<span class="sb-item">🕐 <b>' + Store.todayHours() + '</b>h</span>'
      + '<span class="sb-item">✅ <b>' + done + '/' + total + '</b></span>'
      + (Store.mistakeCountToday('sign') > 0 ? '<span class="sb-item sb-warn">⚠️符号' + Store.mistakeCountToday('sign') + '</span>' : '');
  }

  function renderNav() {
    const nav = document.getElementById('bottomnav');
    let html = MAIN_TABS.map(t =>
      '<button class="bn-btn' + (current === t[0] ? ' bn-on' : '') + '" data-tab="' + t[0] + '">'
      + '<span class="bn-icon">' + t[2] + '</span><span class="bn-label">' + t[1] + '</span></button>'
    ).join('');
    html += '<button class="bn-btn' + (TOOL_TABS.some(t => t[0] === current) ? ' bn-on' : '') + '" data-tab="__tools">'
      + '<span class="bn-icon">🧰</span><span class="bn-label">工具</span></button>';
    nav.innerHTML = html;
    nav.querySelectorAll('.bn-btn').forEach(b => b.onclick = () => {
      const t = b.getAttribute('data-tab');
      if (t === '__tools') openTools();
      else App.go(t);
    });
  }

  function openTools() {
    Modal.open({
      title: '🧰 工具箱',
      html: '<div class="tools-grid">'
        + TOOL_TABS.map(t =>
          '<button class="tool-cell" data-tab="' + t[0] + '"><span class="tool-icon">' + t[2] + '</span><span>' + t[1] + '</span></button>'
        ).join('') + '</div>',
      actions: [{ label: '关闭' }]
    });
    document.querySelectorAll('.tool-cell').forEach(b => b.onclick = () => {
      Modal.close();
      App.go(b.getAttribute('data-tab'));
    });
  }

  function render() {
    renderStatusBar();
    renderNav();
    const view = document.getElementById('view');
    const tab = ALL.find(t => t[0] === current);
    tab[3].render(view);
    view.querySelectorAll('.pbar-fill').forEach(f => {
      requestAnimationFrame(() => { f.style.width = f.getAttribute('data-w') + '%'; });
    });
  }

  // 切换 Tab / 初始化时回到顶部
  function scrollToTop() {
    const view = document.getElementById('view');
    if (view) view.scrollTop = 0;
    window.scrollTo(0, 0);
  }

  const App = {
    go(tab) { current = tab; render(); scrollToTop(); },
    // 原地刷新：保留当前滚动位置（避免云同步/打卡等操作把页面滚回顶部）
    refresh() {
      const view = document.getElementById('view');
      const y = view ? view.scrollTop : 0;
      const wy = window.scrollY || window.pageYOffset || 0;
      DB.syncSubjects();
      render();
      if (view) view.scrollTop = y;
      window.scrollTo(0, wy);
    },
    get current() { return current; },
  init() {
    // 云端同步先发起；初始化向导的判断放到云端拉取完成之后，避免本地尚未拉取远端数据时误判"未初始化"而弹窗
    const cloudReady = (window.Cloud) ? Cloud.init() : Promise.resolve();
    DB.syncSubjects();
    rolloverIfNeeded();
    Notify.ensurePermission();
    render();
    cloudReady.then(function () {
      if (Onboarding.needed()) Onboarding.show();
    }).catch(function () {
      if (Onboarding.needed()) Onboarding.show();
    });
    setTimeout(() => Alerts.runDailyChecks(), 800);
  }
  };

  window.App = App;
  document.addEventListener('DOMContentLoaded', App.init);
})();

</script>
