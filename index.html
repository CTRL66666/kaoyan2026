  // \u9ed8\u8ba4\u4e13\u4e1a\u7684\u9759\u6001\u91cc\u7a0b\uff08\u5411\u540e\u517c\u5bb9\uff09
  var MILESTONES = getMilestones();

  // ---------- AI 服务预设 ----------
  var AI_PRESETS = {
    deepseek: { name: 'DeepSeek', endpoint: 'https://api.deepseek.com/v1/chat/completions', model: 'deepseek-chat', hint: 'platform.deepseek.com \u7533\u8bf7 API Key' },
    kimi: { name: 'Kimi (\u6708\u4e4b\u6697)', endpoint: 'https://api.moonshot.cn/v1/chat/completions', model: 'moonshot-v1-8k', hint: 'platform.moonshot.cn \u7533\u8bf7 API Key' },
    qwen: { name: '\u901a\u4e49\u5343\u95ee', endpoint: 'https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions', model: 'qwen-plus', hint: '\u963f\u91cc\u4e91\u767e\u70bc\u5e73\u53f0\u7533\u8bf7 API Key' },
    zhipu: { name: '\u667a\u8c31 GLM', endpoint: 'https://open.bigmodel.cn/api/paas/v4/chat/completions', model: 'glm-4-flash', hint: 'bigmodel.cn \u7533\u8bf7 API Key\uff08\u6709\u514d\u8d39\u989d\u5ea6\uff09' },
    custom: { name: '\u81ea\u5b9a\u4e49 (OpenAI\u517c\u5bb9)', endpoint: '', model: '', hint: '\u4efb\u4f55 OpenAI \u517c\u5bb9\u63a5\u53e3\u5747\u53ef' }
  };

  // ==================== 专业自适应核心引擎 ====================

  /**
   * \u52a0\u8f7d\u6307\u5b9a\u4e13\u4e1a\u7684\u6570\u636e\u5230\u8fd0\u884c\u65f6 TOPICS.ctrl / CONCEPT_GRAPH / activeMajor
   * \u4f18\u5148\u7ea7: MAJOR_REGISTRY > Store.majorData \u7f13\u5b58 > \u9ed8\u8ba4\u81ea\u63a7
   * @param {string} profName - \u4e13\u4e1a\u540d\u79f0
   * @returns {boolean} \u662f\u5426\u6210\u529f\u52a0\u8f7d
   */
  function loadMajorData(profName) {
    if (!profName) profName = '\u81ea\u63a7\u539f\u7406';
    // 1) \u6ce8\u518c\u8868\u4e2d\u67e5\u627e
    var reg = MAJOR_REGISTRY[profName];
    if (reg) {
      _applyMajor(profName, reg);
      return true;
    }
    // 2) \u672c\u5730\u7f13\u5b58\u4e2d\u67e5\u627e\uff08AI \u751f\u6210\u8fc7\u7684\uff09
    try {
      if (typeof Store !== 'undefined') {
        var cached = Store.get().majorData;
        if (cached && cached[profName]) {
          _applyMajor(profName, cached[profName]);
          return true;
        }
      }
    } catch (e) { /* ignore */ }
    // 3) \u4f7f\u7528\u9ed8\u8ba4\u81ea\u63a7\uff08\u5411\u540e\u517c\u5bb9\uff09
    return false;
  }

  /** \u5185\u90e8\uff1a\u5c06\u4e13\u4e1a\u6570\u636e\u5e94\u7528\u5230\u8fd0\u884c\u65f6\u53d8\u91cf\uff08\u5c31\u5730\u4fee\u6539\u6570\u7ec4\u4ee5\u4fdd\u6301\u5bfc\u51fa\u5f15\u7528\u7a33\u5b9a\uff09 */
  function _applyMajor(profName, data) {
    if (data.topics && data.topics.length > 0) {
      TOPICS.ctrl = data.topics;
    }
    if (data.conceptGraph && data.conceptGraph.length > 0) {
      // \u5c31\u5730\u66ff\u6362\u5185\u5bb9\uff0c\u4e0d\u91cd\u65b0\u8d4b\u503c\uff0c\u4fdd\u8bc1 window.DB.CONCEPT_GRAPH \u5f15\u7528\u4e0d\u5931\u6548
      CONCEPT_GRAPH.length = 0;
      data.conceptGraph.forEach(function (n) { CONCEPT_GRAPH.push(n); });
    }
    activeMajor = {
      name: profName,
      modules: data.modules || [],
      textbook: data.textbook || profName + '\u6559\u6750',
      alertRule: data.alertRule || {},
      localQuestions: data.localQuestions || {},
      milestoneLabel: data.milestoneLabel || '\u4e13\u4e1a\u8bfe\u6838\u5fc3\u80fd\u529b\u9a8c\u8bc1\uff08\u72ec\u7acb\u5b8c\u6210{hard}\uff09'
    };
    // \u540c\u6b65\u91cd\u65b0\u751f\u6210\u91cc\u7a0b\uff08\u5c31\u5730\u66ff\u6362\uff09
    var ms = getMilestones();
    MILESTONES.length = 0;
    ms.forEach(function (m) { MILESTONES.push(m); });
    // \u6ce8\u610f\uff1a\u5f53\u65e5 AI \u7f16\u6392\u7f13\u5b58\u7684\u5931\u6548\u4e0d\u5728\u6b64\u5904\u6267\u884c\uff08\u5426\u5219\u6bcf\u6b21\u52a0\u8f7d syncSubjects \u90fd\u4f1a\u6e05\u6389\uff09\uff1b
    // \u4ec5\u5728\u7528\u6237\u4e3b\u52a8\u5207\u6362\u4e13\u4e1a\u65f6\uff08Onboarding.switchMajor\uff09\u624d\u5931\u6548\u3002
  }

  /**
   * AI \u751f\u6210\u672a\u77e5\u4e13\u4e1a\u7684\u77e5\u8bc6\u70b9\u4f53\u7cfb
   * \u8c03\u7528 AI.chatStream \u8981\u6c42\u7ed3\u6784\u5316 JSON\uff0c\u6d41\u5f0f\u663e\u793a\u8fdb\u5ea6
   * @param {string} profName - \u4e13\u4e1a\u540d\u79f0
   * @param {function} onProgress - \u8fdb\u5ea6\u56de\u8c0f(text)
   * @returns {Promise<object|null} \u751f\u6210\u7684\u4e13\u4e1a\u6570\u636e\uff0c\u5931\u8d25\u8fd4 null
   */
  function generateMajorAI(profName, onProgress) {
    if (typeof AI === 'undefined' || !AI.configured()) {
      return Promise.resolve(null);
    }
    var prompt =
      '\u4f60\u662f\u8003\u7814\u4e13\u4e1a\u8bfe\u77e5\u8bc6\u4f53\u7cfb\u67b6\u6784\u5e08\u3002\n'
      + '\u7528\u6237\u7684\u4e13\u4e1a\u8bfe\u662f\u300c' + profName + '\u300d\uff0c\u8bf7\u4e3a\u8fd9\u95e8\u8bfe\u6784\u5efa\u5b8c\u6574\u7684\u8003\u7814\u77e5\u8bc6\u4f53\u7cfb\u3002\n'
      + '\u8fd4\u56de\u4e25\u683c JSON\uff08\u4e0d\u5e26 markdown \u4ee3\u7801\u5757\uff09\uff0c\u5b57\u6bb5\u5982\u4e0b\uff1a\n'
      + '{\n'
      + '  "modules": ["\u7ae0\u82821", "\u7ae0\u82822", ...],       // \u8be5\u4e13\u4e1a\u7684\u4e3b\u8981\u7ae0\u8282\uff083-6\u4e2a\uff09\n'
      + '  "textbook": "\u63a8\u8350\u6559\u6750",                     // \u6700\u5e38\u7528\u7684\u6559\u6750\u4e66\u540d\n'
      + '  "alertRule": {\n'
      + '    "hardModule": "\u6700\u96be\u7ae0\u8282\u540d",           // 8\u6708\u9884\u8b66\u9488\u5bf9\u7684\u96be\u6a21\u5757\n'
      + '    "hardMilestone": "8\u6708\u5e95\u5fc5\u987b\u638c\u63e1\u7684\u6838\u5fc3\u80fd\u529b",\n'
      + '    "learnPath": "\u7ae0\u8282A \u2192 \u7ae0\u8282B \u2192 \u7ae0\u8282C"  // \u63a8\u8350\u5b66\u4e60\u8def\u5f84\n'
      + '  },\n'
      + '  "topics": [\n'
      + '    {"id":"p1","name":"\u8003\u70b9\u540d","tier":1,"group":"\u7ae0\u82821"},\n'
      + '    {"id":"p2","name":"\u8003\u70b9\u540d","tier":2,"group":"\u7ae0\u82821"},\n'
      + '    ...\n'
      + '  ],  // 8-18\u4e2a\u8003\u70b9\uff1btier=1\u5fc5\u62ff\u5c42(100-110)\u3001tier=2\u62d4\u9ad8\u5c42(110-125)\u3001tier=3\u51b2\u523a\u5c42(125+)\uff1bgroup\u6309\u7ae0\u8282\u5206\u7ec4\n'
      + '  "conceptGraph": [\n'
      + '    {"id":"p1","name":"\u8282\u70b9\u540d","x":60,"y":40,"deps":[],"book":"\u6559\u6750 PXX \u4f8bX-Y","glossary":[["\u4e2d\u6587","english"]]},\n'
      + '    ...\n'
      + '  ]   // 6-12\u4e2a\u8282\u70b9\uff0cid\u4e0etopics.id\u5bf9\u5e94\uff1bx/y\u4e3aSVG\u5750\u6807\uff1bdeps\u4e3a\u524d\u7f6e\u8282\u70b9id\u6570\u7ec4\n'
      + '}\n\n'
      + '\u8981\u6c42\uff1a\n'
      + '1. modules \u5fc5\u987b\u662f\u8be5\u4e13\u4e1a\u7684\u771f\u5b9e\u7ae0\u8282\uff0c\u4e0d\u80fd\u662f\u901a\u7528\u540d\u79f0\n'
      + '2. topics \u8986\u76d6\u8be5\u4e13\u4e1a\u8003\u7814\u7684\u6838\u5fc3\u77e5\u8bc6\u70b9\uff0ctier\u5206\u5e03\u5408\u7406\n'
      + '3. conceptGraph \u53cd\u6620\u771f\u5b9e\u7684\u524d\u7f6e\u4f9d\u8d56\u5173\u7cfb\n'
      + '4. \u53ea\u8fd4\u7eaf JSON\uff0c\u4e0d\u8981\u52a0\u6ce8\u91ca';

    // ---- 鲁棒 JSON 提取与修复 ----
    function extractJSON(raw) {
      var s = (raw || '').trim();
      var m = s.match(/```(?:json)?\s*([\s\S]*?)```/);
      if (m) return m[1].trim();
      var start = s.indexOf('{');
      if (start === -1) return '';
      var depth = 0, inStr = false, escape = false, end = -1;
      for (var i = start; i < s.length; i++) {
        var c = s.charAt(i);
        if (escape) { escape = false; continue; }
        if (c === '\\') { escape = true; continue; }
        if (c === '"') { inStr = !inStr; continue; }
        if (inStr) continue;
        if (c === '{') depth++;
        else if (c === '}') { depth--; if (depth === 0) { end = i + 1; break; } }
      }
      return end > start ? s.slice(start, end) : '';
    }

    function repairJSON(str) {
      var s = str;
      s = s.replace(/\/\/(?=(?:[^"']*(?:"[^"]*"|'[^']*'))*[^"']*$)[^\n]*/g, '');
      s = s.replace(/\/\*[\s\S]*?\*\//g, '');
      s = s.replace(/'([^'\\]*(?:\\.[^'\\]*)*)'/g, '"$1"');
      s = s.replace(/,\s*([}\]])/g, '$1');
      s = s.replace(/([{,]\s*)([a-zA-Z_$][a-zA-Z0-9_$]*)(\s*:)/g, '"$2"$3');
      s = s.replace(/[\x00-\x09\x0b\x0c\x0e-\x1f]/g, ' ');
      return s;
    }

    function tryParseJSON(raw) {
      var extracted = extractJSON(raw);
      if (!extracted) return null;
      var r1, r2;
      try { r1 = JSON.parse(extracted); } catch (e1) {}
      try { if (!r1) r2 = JSON.parse(repairJSON(extracted)); } catch (e2) {}
      var obj = r1 || r2;
      if (!obj) return null;
      // 修复 JSON 转义吞掉的 LaTeX 命令（\f→换页 \r→回车 \b→退格 等）
      return repairMangledLatex(obj);
    }

    // 递归修复对象中所有字符串值里被 JSON 转义吞掉的 LaTeX 命令
    function repairMangledLatex(obj) {
      if (!obj) return obj;
      if (typeof obj === 'string') return _repairMangledStr(obj);
      if (typeof obj !== 'object') return obj;
      if (Array.isArray(obj)) { for (var i = 0; i < obj.length; i++) obj[i] = repairMangledLatex(obj[i]); return obj; }
      var keys = Object.keys(obj);
      for (var k = 0; k < keys.length; k++) obj[keys[k]] = repairMangledLatex(obj[keys[k]]);
      return obj;
    }
    function _repairMangledStr(s) {
      if (typeof s !== 'string') return s;
      return s
        .replace(/\x0Cfrac/g, '\\frac').replace(/\x0Cfrom/g, '\\from')
        .replace(/\x0DRightarrow/g, '\\Rightarrow').replace(/\x0Drightarrow/g, '\\rightarrow')
        .replace(/\x0Dright/g, '\\right').replace(/\x0Dleft/g, '\\left')
        .replace(/\x08begin/g, '\\begin').replace(/\x08bigg/g, '\\bigg').replace(/\x08Bigg/g, '\\Bigg')
        .replace(/\x08bigl/g, '\\bigl').replace(/\x08Bigl/g, '\\Bigl')
        .replace(/\x08bigr/g, '\\bigr').replace(/\x08Bigr/g, '\\Bigr')
        .replace(/\x08big/g, '\\big').replace(/\x08Big/g, '\\Big')
        .replace(/\x09ext/g, '\\text').replace(/\x09an/g, '\\tan')
        .replace(/\x09imes/g, '\\times').replace(/\x09o/g, '\\to')
        .replace(/\x0Aeq/g, '\\neq').replace(/\x0Aeg/g, '\\neg');
    }

    var MAX_RETRIES = 1;
    var attempt = 0;
    var lastError = null;

    // 判断是否为可重试的瞬时错误（网络/服务端问题，非配置错误）
    function isRetryable(err) {
      var msg = (err && err.message) || '';
      // HTTP 5xx、网络失败、超时、AbortError、CORS（偶发）、空响应
      if (/HTTP\s*5\d{2}/.test(msg)) return true;
      if (/Failed to fetch|NetworkError|TypeError.*network|Load failed|abort/i.test(msg)) return true;
      if (/timeout|timed? out|ETIMEDOUT/i.test(msg)) return true;
      if (err instanceof DOMException || (err && err.name === 'AbortError')) return true;
      // 4xx 中仅 429(限流) 和 403(临时限额) 可重试
      if (/HTTP\s*(429|403)/.test(msg)) return true;
      return false;
    }

    function doAttempt() {
      attempt++;
      var promptToSend = (attempt === 1) ? prompt :
        prompt + '\n\n【重要】上次返回的内容无法解析为有效 JSON。请务必：只输出一个标准 JSON 对象，不要任何解释文字、不要 markdown 标记、不要注释、不要尾逗号。直接以 { 开头、以 } 结尾。';

      // 更新进度弹窗状态
      if (attempt > 1) {
        try {
          var stEl = document.getElementById('gm-status');
          if (stEl) stEl.textContent = '🔄 第 ' + attempt + ' 次尝试生成中…';
        } catch (e) {}
      }

      return AI.chatStream(promptToSend, '请按上述要求生成。', function (text, reasoning) {
        if (onProgress) onProgress(text || reasoning || '');
      }).then(function (fullText) {
        var data = tryParseJSON(fullText);
        if (data) {
          if (!data.modules || !Array.isArray(data.topics)) throw new Error('缺少 modules/topics');
          data.topics.forEach(function (t, i) {
            if (!t.id) t.id = 'gen-' + i;
          });
          if (data.conceptGraph) {
            data.conceptGraph.forEach(function (n, i) {
              if (!n.id) n.id = 'cg-' + i;
            });
          }
          if (typeof Store !== 'undefined') {
            Store.update(function (s) {
              if (!s.majorData) s.majorData = {};
              s.majorData[profName] = data;
            });
          }
          _applyMajor(profName, data);
          return data;
        }
        // JSON 解析失败 → 重试
        if (attempt <= MAX_RETRIES) {
          console.warn('[DB] AI 专业数据 JSON 解析失败，第 ' + attempt + ' 次重试…(原始长度:' + (fullText||'').length + ')');
          return doAttempt();
        }
        console.warn('[DB] AI 生成专业数据解析最终失败。原始响应前200字符:', (fullText || '').slice(0, 200));
        lastError = new Error('AI 返回内容无法解析为有效 JSON');
        return null;
      }).catch(function (err) {
        console.warn('[DB] AI 生成专业请求失败(第' + attempt + '次):', err.message);
        lastError = err;
        // 可重试的网络/瞬时错误 → 重试
        if (attempt <= MAX_RETRIES && isRetryable(err)) {
          console.warn('[DB] 检测到可重试错误，将重试…');
          return doAttempt();
        }
        // 不可重试或已耗尽 → 抛出（由外层 .catch 展示具体原因）
        throw err;
      });
    }

    return doAttempt().catch(function (finalErr) {
      // 最终兜底：确保外层拿到带上下文的错误对象
      throw finalErr || lastError || new Error('未知错误');
    });
  }

  // 将静态 SUBJECTS 同步为动态配置（应用启动时调用）
  function syncSubjects() {
    try {
      if (typeof Store === 'undefined') return;
      var s = Store.get();
      if (s && s.settings && s.settings.examConfig) {
        var active = getActiveSubjects(s.settings.examConfig);
        Object.keys(active).forEach(function (k) {
          SUBJECTS[k] = active[k];
        });
        // \u52a0\u8f7d\u4e13\u4e1a\u6570\u636e
        var profName = s.settings.examConfig.profName || '\u81ea\u63a7\u539f\u7406';
        loadMajorData(profName);
        // \u540c\u6b65 progress.ctrl.modules \u952e\u5230\u5f53\u524d\u4e13\u4e1a\u6a21\u5757
        reconcileProgressModules(profName);
      }
    } catch (e) { /* Store \u672a\u5c31\u7eea\uff0c\u4fdd\u7559\u9ed8\u8ba4 */ }
  }

  /**
   * \u5c06 Store.progress.ctrl.modules \u7684\u952e\u5bf9\u9f50\u5230\u5f53\u524d\u4e13\u4e1a\u7684\u6a21\u5757\u3002
   * \u540d\u79f0\u5339\u914d\u65f6\u4fdd\u7559\u65e7\u8fdb\u5ea6\u503c\uff0c\u65b0\u6a21\u5757\u521d\u59cb\u4e3a0\u3002
   * \u4ec5\u5728 activeMajor.name \u4e0e profName \u4e00\u81f4\uff08\u5373\u6570\u636e\u5df2\u771f\u6b63\u52a0\u8f7d\uff09\u4e14\u952e\u786e\u5b9e\u6539\u53d8\u65f6\u5199\u5165\uff0c\u907f\u514d\u65e0\u8c13 cloud push\u3002
   */
  function reconcileProgressModules(profName) {
    try {
      if (typeof Store === 'undefined') return;
      // \u53ea\u6709\u5728\u4e13\u4e1a\u6570\u636e\u771f\u6b63\u52a0\u8f7d\u540e\u624d\u91cd\u5efa\u6a21\u5757\uff08\u907f\u514d\u672a\u77e5\u4e13\u4e1a\u7528 \u9ed8\u8ba4 topics \u8986\u76d6\uff09
      if (activeMajor.name !== profName) return;
      var mods = activeMajor.modules || [];
      if (!mods.length) return;
      var s = Store.get();
      var old = (s.progress && s.progress.ctrl && s.progress.ctrl.modules) || {};
      // \u5224\u65ad\u662f\u5426\u9700\u8981\u66f4\u65b0\uff08\u952e\u96c6\u5408\u4e0d\u540c\u624d\u5199\uff09
      var oldKeys = Object.keys(old);
      var same = oldKeys.length === mods.length && mods.every(function (m) { return old.hasOwnProperty(m); });
      if (same) return;
      var next = {};
      mods.forEach(function (m) { next[m] = old[m] || 0; });
      Store.update(function (st) { st.progress.ctrl.modules = next; });
    } catch (e) { /* ignore */ }
  }

  // \u83b7\u53d6\u5f53\u524d\u6fc0\u6d3b\u4e13\u4e1a\u5143\u4fe1\u606f\uff08\u4f9b alerts/scheduler \u7b49\u6a21\u5757\u8bfb\u53d6\uff09
  function getActiveMajor() {
    return activeMajor;
  }

  // ---------- \u53ef\u8986\u5199\u8bbf\u95ee\u5668\uff1a\u628a\u201c\u786c\u7f16\u7801\u89c4\u5219\u201d\u5347\u7ea7\u4e3a\u53ef\u88ab AI/\u7528\u6237\u6539\u5199\u7684\u6570\u636e ----------
  // \u7ea2\u7ebf\u7981\u4ee4\u5899\uff1asettings.redline.items \u6709\u503c\u5219\u7528\u7528\u6237\u7248\uff0c\u5426\u5219\u56de\u9000\u9ed8\u8ba4\uff08\u786c\u4ef6/B\u7ad9\uff09
  function redlineItems() {
    try { var v = Store.get().settings.redline.items; if (Array.isArray(v) && v.length) return v; } catch (e) {}
    return RED_LINES;
  }
  // \u9632\u5446\u68c0\u67e5\u6e05\u5355\uff1a\u540c\u4e0a\u903b\u8f91
  function redlineChecklist() {
    try { var v = Store.get().settings.redline.checklist; if (Array.isArray(v) && v.length) return v; } catch (e) {}
    return FOOLPROOF_CHECKLIST;
  }

  // \u51b3\u7b56\u76ee\u6807\u5206\uff08\u6309\u4e13\u4e1a\u53ef\u8c03\uff0c\u4e0d\u518d\u5199\u6b7b 130/135/70/65\uff09
  function targetScores() {

/* ===== js/core/charts.js ===== */
/* ============================================================
 * charts.js — 纯SVG图表库（零依赖，离线可用）
 * 返回 SVG 字符串，模块自行 innerHTML
 * ============================================================ */
(function () {
  'use strict';

  function svgOpen(w, h) { return '<svg viewBox="0 0 ' + w + ' ' + h + '" width="100%" height="' + h + '" xmlns="http://www.w3.org/2000/svg">'; }

  const Charts = {
    // 柱状图：data=[{label, value, highlight}], opts={height, unit, color}
    bar(data, opts) {
      opts = opts || {};
      const W = 680, H = opts.height || 160, padB = 24, padT = 16, padL = 8, padR = 8;
      const max = Math.max.apply(null, data.map(d => d.value).concat([1]));
      const n = data.length || 1;
      const iw = (W - padL - padR) / n;
      const bw = Math.min(44, iw * 0.55);
      let s = svgOpen(W, H);
      for (let i = 0; i < n; i++) {
        const d = data[i];
        const bh = Math.max(2, (d.value / max) * (H - padB - padT));
        const x = padL + i * iw + (iw - bw) / 2;
        const y = H - padB - bh;
        const color = d.highlight ? (opts.hiColor || '#000') : (opts.color || '#bfbfbf');
        s += '<rect x="' + x + '" y="' + y + '" width="' + bw + '" height="' + bh + '" rx="4" fill="' + color + '">'
          + '<title>' + U.esc(d.label) + '：' + d.value + (opts.unit || '') + '</title></rect>';
        s += '<text x="' + (x + bw / 2) + '" y="' + (H - 8) + '" text-anchor="middle" font-size="11" fill="#8c8c8c">' + U.esc(d.label) + '</text>';
        if (d.value > 0) s += '<text x="' + (x + bw / 2) + '" y="' + (y - 4) + '" text-anchor="middle" font-size="11" fill="#595959">' + d.value + '</text>';
      }
      return s + '</svg>';
    },

    // 环形图：data=[{label, value, color}]，中心显示总数
    donut(data, opts) {
      opts = opts || {};
      const W = 680, H = opts.height || 190;
      const cx = 110, cy = H / 2, r = 66, ir = 40;
      const total = U.sum(data.map(d => d.value));
      let s = svgOpen(W, H);
      if (total === 0) {
        s += '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="none" stroke="#f0f0f0" stroke-width="' + (r - ir) + '"/>';
        s += '<text x="' + cx + '" y="' + (cy + 5) + '" text-anchor="middle" font-size="13" fill="#bfbfbf">暂无数据</text>';
      } else {
        let a0 = -Math.PI / 2;
        data.forEach(d => {
          if (d.value <= 0) return;
          const frac = d.value / total;
          const a1 = a0 + frac * Math.PI * 2;
          const large = frac > 0.5 ? 1 : 0;
          const x0 = cx + r * Math.cos(a0), y0 = cy + r * Math.sin(a0);
          const x1 = cx + r * Math.cos(a1), y1 = cy + r * Math.sin(a1);
          const xi1 = cx + ir * Math.cos(a1), yi1 = cy + ir * Math.sin(a1);
          const xi0 = cx + ir * Math.cos(a0), yi0 = cy + ir * Math.sin(a0);
          s += '<path d="M' + x0 + ' ' + y0 + ' A' + r + ' ' + r + ' 0 ' + large + ' 1 ' + x1 + ' ' + y1
            + ' L' + xi1 + ' ' + yi1 + ' A' + ir + ' ' + ir + ' 0 ' + large + ' 0 ' + xi0 + ' ' + yi0 + ' Z" fill="' + d.color + '">'
            + '<title>' + U.esc(d.label) + '：' + d.value + '次 (' + Math.round(frac * 100) + '%)</title></path>';
          a0 = a1;
        });
        s += '<text x="' + cx + '" y="' + (cy - 2) + '" text-anchor="middle" font-size="22" font-weight="500" fill="#000">' + total + '</text>';
        s += '<text x="' + cx + '" y="' + (cy + 16) + '" text-anchor="middle" font-size="11" fill="#8c8c8c">总计</text>';
      }
      // 图例
      let ly = 24;
      data.forEach(d => {
        const pctN = total ? Math.round(d.value / total * 100) : 0;
        s += '<rect x="230" y="' + (ly - 10) + '" width="10" height="10" rx="2" fill="' + d.color + '"/>';
        s += '<text x="246" y="' + ly + '" font-size="12" fill="#262626">' + U.esc(d.label) + '</text>';
        s += '<text x="660" y="' + ly + '" font-size="12" text-anchor="end" fill="#595959">' + d.value + '次 · ' + pctN + '%</text>';
        ly += 24;
      });
      return s + '</svg>';
    },

    // 折线图：data=[{label, value}]，opts={height, unit, min, max, warnBelow}
    line(data, opts) {
      opts = opts || {};
      const W = 680, H = opts.height || 170, padB = 22, padT = 14, padL = 30, padR = 10;
      const vals = data.map(d => d.value);
      const lo = opts.min != null ? opts.min : Math.min.apply(null, vals.concat([0]));
      const hi = opts.max != null ? opts.max : Math.max.apply(null, vals.concat([10]));
      const n = data.length;
      if (n === 0) return svgOpen(W, H) + '<text x="340" y="90" text-anchor="middle" fill="#bfbfbf" font-size="13">暂无数据</text></svg>';
      const X = i => padL + (n === 1 ? (W - padL - padR) / 2 : i * (W - padL - padR) / (n - 1));
      const Y = v => H - padB - ((v - lo) / ((hi - lo) || 1)) * (H - padB - padT);
      let s = svgOpen(W, H);
      // 预警线
      if (opts.warnBelow != null) {
        s += '<line x1="' + padL + '" y1="' + Y(opts.warnBelow) + '" x2="' + (W - padR) + '" y2="' + Y(opts.warnBelow) + '" stroke="#cf1322" stroke-dasharray="4 4" stroke-width="1"/>';
        s += '<text x="' + (W - padR) + '" y="' + (Y(opts.warnBelow) - 4) + '" text-anchor="end" font-size="10" fill="#cf1322">预警线 ' + opts.warnBelow + '</text>';
      }
      let path = '';
      data.forEach((d, i) => { path += (i === 0 ? 'M' : 'L') + X(i) + ' ' + Y(d.value); });
      s += '<path d="' + path + '" fill="none" stroke="#000" stroke-width="2"/>';
      data.forEach((d, i) => {
        const bad = opts.warnBelow != null && d.value < opts.warnBelow;
        s += '<circle cx="' + X(i) + '" cy="' + Y(d.value) + '" r="4" fill="' + (bad ? '#cf1322' : '#000') + '"><title>' + U.esc(d.label) + '：' + d.value + (opts.unit || '') + '</title></circle>';
        if (n <= 12) s += '<text x="' + X(i) + '" y="' + (H - 6) + '" text-anchor="middle" font-size="10" fill="#8c8c8c">' + U.esc(d.label) + '</text>';
      });
      return s + '</svg>';
    },

    // 进度条（HTML，非SVG）：pct 0-100
    progressBar(pct, color, height) {
      pct = U.clamp(pct, 0, 100);
      return '<div class="pbar" style="height:' + (height || 8) + 'px"><div class="pbar-fill" style="width:0%;background:' + color + '" data-w="' + pct + '"></div></div>';
    }
  };

  window.Charts = Charts;
})();

/* ============================================================
 * components.js — Toast 通知 / Modal 弹窗 / 通用表单弹窗
 * ============================================================ */
(function () {
  'use strict';

  // ---------- Toast ----------
  const Toast = {
    show(msg, type, ms) {
      const wrap = document.getElementById('toast-wrap');
      if (!wrap) return;
      const el = document.createElement('div');
      el.className = 'toast toast-' + (type || 'info');
      el.innerHTML = '<span>' + msg + '</span><button class="toast-x" aria-label="关闭">×</button>';
      wrap.appendChild(el);
      requestAnimationFrame(() => el.classList.add('show'));
      const close = () => { el.classList.remove('show'); setTimeout(() => el.remove(), 200); };
      el.querySelector('.toast-x').onclick = close;
      setTimeout(close, ms || 3000);
    },
    success(m) { Toast.show(m, 'success'); },
    warn(m) { Toast.show(m, 'warn', 4200); },
    danger(m) { Toast.show(m, 'danger', 5000); }
  };

  // ---------- Modal ----------
  const Modal = {
    // opts: {title, html, actions:[{label, kind, onClick(close)}], wide, onClose, dismissable}
    open(opts) {
      Modal.close();
      const ov = document.createElement('div');
      ov.className = 'modal-overlay';
      ov.id = 'modal-overlay';
      const box = document.createElement('div');
      box.className = 'modal' + (opts.wide ? ' modal-wide' : '');
      let acts = '';
      (opts.actions || []).forEach((a, i) => {
        acts += '<button class="btn ' + (a.kind || 'btn-ghost') + '" data-act="' + i + '">' + U.esc(a.label) + '</button>';
      });
      box.innerHTML =
        '<div class="modal-head"><span class="modal-title">' + opts.title + '</span>' +
        (opts.dismissable === false ? '' : '<button class="modal-x" aria-label="关闭">×</button>') + '</div>' +
        '<div class="modal-body">' + opts.html + '</div>' +
        (acts ? '<div class="modal-foot">' + acts + '</div>' : '');
      ov.appendChild(box);
      document.body.appendChild(ov);
      document.body.style.overflow = 'hidden';
      const close = () => { Modal.close(); if (opts.onClose) opts.onClose(); };
      const x = box.querySelector('.modal-x');
      if (x) x.onclick = close;
      if (opts.dismissable !== false) ov.addEventListener('click', e => { if (e.target === ov) close(); });
      (opts.actions || []).forEach((a, i) => {
        box.querySelector('[data-act="' + i + '"]').onclick = () => { if (a.onClick) a.onClick(close); else close(); };
      });
      requestAnimationFrame(() => ov.classList.add('show'));
      return close;
    },
    close() {
      const ov = document.getElementById('modal-overlay');
      if (ov) { ov.remove(); document.body.style.overflow = ''; }
    },
    confirm(title, html, okLabel, onOk, danger) {
      Modal.open({
        title, html,
        actions: [
          { label: '取消', kind: 'btn-ghost' },
          { label: okLabel || '确定', kind: danger ? 'btn-danger' : 'btn-primary', onClick: close => { close(); onOk && onOk(); } }
        ]
      });
    }
  };

  window.Toast = Toast;
  window.Modal = Modal;
})();

/* ============================================================
 * notify.js — 系统消息通知（Notification API + Toast 兜底）
 * ============================================================ */
(function () {
  'use strict';
  const Notify = {
    // 首次调用请求权限
    ensurePermission() {
      if (!('Notification' in window)) return false;
      if (Notification.permission === 'default') {
        try { Notification.requestPermission(); } catch (e) { /* 忽略 */ }
      }
      return Notification.permission === 'granted';
    },
    send(title, body) {
      if (Notify.ensurePermission()) {
        try { new Notification(title, { body }); return; } catch (e) { /* 走兜底 */ }
      }
      Toast.show('🔔 ' + title + '：' + body, 'info', 5000);
    }
  };
  window.Notify = Notify;
})();

  function configured() {

  // 一次性迁移：老用户 thinkingMode 默认是 true（旧硬编码），从未手动设置过思考模式的应归为 undefined

  function httpError(res, fallbackMsg) {

      throw new Error('HTTP ' + res.status + (detail ? ' (' + detail + ')' : ''));
    }).catch(function (err) {

    _noKwArgs = !!_noKwArgs;
    const a = Store.get().ai;
    // _noKwArgs 重试模式：极简 body
    const body = _noKwArgs
      ? { model: a.model, messages: messages }
      : { model: a.model, messages: messages, temperature: 0.6 };
    // 思考模式控制 Thinking 扩展：
    //   thinkingMode === true  → 发 enable_thinking:true（让支持思考的模型进入思考）
    //   thinkingMode === false → 发 enable_thinking:false（显式关闭）
    //   未设置(undefined)     → 不发送 chat_template_kwargs（兼容非 DeepSeek 接口）
    //   _noKwArgs=true        → 强制跳过（400 自动重试时使用）
    if (!_noKwArgs && (a.thinkingMode === true || a.thinkingMode === false)) {
      body.chat_template_kwargs = { enable_thinking: a.thinkingMode };
    }
    var jsonBody = JSON.stringify(body);
    console.log('[AI] rawChat 请求 endpoint=' + (a.endpoint || '').slice(0, 60) + ' model=' + a.model
      + ' messages数量=' + messages.length + ' body前200字=' + jsonBody.slice(0, 200));
    return fetch(a.endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + a.key },
      body: jsonBody
    }).then(function (r) {
      if (!r.ok) {
        // 400 无条件重试：首次失败时用极简 body 重试一次（只保留 model+messages）
        if (r.status === 400 && !_noKwArgs) {
          console.error('[AI] rawChat 400！原始body前300字:', jsonBody.slice(0, 300));
          console.warn('[AI] 自动用极简请求体重试…');
          return rawChat(messages, true);
        }
        return httpError(r, '请求被拒绝');
      }
      return r.json();
    }).then(function (j) {
      const txt = j.choices && j.choices[0] && j.choices[0].message && j.choices[0].message.content;
      if (!txt) throw new Error('接口返回异常');
      return txt;
    });
  }

  function chat(userText) {
    return rawChat([
      { role: 'system', content: systemPrompt() },
      { role: 'user', content: userText }
    ]);
  }

  // JSON 调用：多层容错提取（代码块 → 括号计数 → 修复 → 正则兜底）
  function chatJSON(systemPrompt, userText, imageDataUrl) {
    const userMsg = imageDataUrl
      ? { role: 'user', content: [{ type: 'text', text: userText }, { type: 'image_url', image_url: { url: imageDataUrl } }] }
      : { role: 'user', content: userText };
    return rawChat([
      { role: 'system', content: systemPrompt },
      userMsg
    ]).then(txt => extractRobustJSON(txt));
  }

  // 通用稳健 JSON 提取器（供 chatJSON 和各模块复用）
  function extractRobustJSON(raw) {
    var str = (raw || '').trim();

    // 第 1 层：markdown 代码块
    var m = str.match(/```(?:json)?\s*([\s\S]*?)```/);
    if (m) { try { return JSON.parse(m[1].trim()); } catch (e) {} }

    // 第 2 层：括号计数找最外层 [{...}] 或 {...}
    var start = -1;
    for (var i = 0; i < str.length; i++) {
      if (str.charAt(i) === '[' || str.charAt(i) === '{') { start = i; break; }
    }
    if (start === -1) throw new Error('AI未返回JSON（未找到 [ 或 {）');
    var isArr = str.charAt(start) === '[';
    var openChar = isArr ? '[' : '{';
    var closeChar = isArr ? ']' : '}';
    var depth = 0, inStr = false, esc = false, end = -1;
    for (var j = start; j < str.length; j++) {
      var c = str.charAt(j);
      if (esc) { esc = false; continue; }
      if (c === '\\') { esc = true; continue; }
      if (c === '"') { inStr = !inStr; continue; }
      if (inStr) continue;
      if (c === openChar) depth++;
      else if (c === closeChar) { depth--; if (depth === 0) { end = j + 1; break; } }
    }
    if (end <= start) throw new Error('AI返回的JSON不完整');

    var jsonStr = str.slice(start, end);

    // 第 3 层：直接解析
    try { return JSON.parse(jsonStr); } catch (e) {}

    // 第 4 层：修复常见格式问题后重试
    var repaired = jsonStr
      .replace(/\/\/[^\n]*/g, '')          // 去单行注释
      .replace(/\/\*[\s\S]*?\*\//g, '')     // 去块注释
      .replace(/,\s*([}\]])/g, '$1')        // 去尾逗号
      .replace(/'/g, '"');                  // 单引号→双引号
    try { return JSON.parse(repaired); } catch (e) {}

    // 第 5 层（终极兜底）：正则逐字段捞值，构造对象
    if (!isArr) {
      var fields = {};
      var patterns = [
        ['w', /"w"\s*:\s*"((?:[^"\\]|\\.)*)"/],
        ['com', /"com"\s*:\s*"((?:[^"\\]|\\.)*)"/],
        ['rare', /"rare"\s*:\s*"((?:[^"\\]|\\.)*)"/],
        ['ex', /"ex"\s*:\s*"((?:[^"\\]|\\.)*)"/],
        ['word', /"word"\s*:\s*"((?:[^"\\]|\\.)*)"/],
        ['question', /"question"\s*:\s*"((?:[^"\\]|\\.)*)"/],
        ['solution', /"solution"\s*:\s*"((?:[^"\\]|\\.)*)"/],
        ['subject', /"subject"\s*:\s*"([^"]*)"/],
        ['keySteps', /"keySteps"\s*:\s*"((?:[^"\\]|\\.)*)"/],
        ['errorCause', /"errorCause"\s*:\s*"((?:[^"\\]|\\.)*)"/],
        ['extractedQuestion', /"extractedQuestion"\s*:\s*"((?:[^"\\]|\\.)*)"/],
        ['painPoint', /"painPoint"\s*:\s*"((?:[^"\\]|\\.)*)"/]
      ];
      patterns.forEach(function (p) {
        var mm = raw.match(p[1]);
        if (mm) fields[p[0]] = mm[1].replace(/\\n/g, '\n').replace(/\\t/g, '\t');
      });
      // 如果捞到了关键字段就返回，否则抛出原始错误
      if (fields.w || fields.word || fields.question) return fields;
    }

    throw new Error('AI未返回有效JSON（已尝试5层提取均失败）。原始回复前200字：' + str.slice(0, 200));
  }

  // 流式调用（SSE）：onChunk(累积正式内容, 累积思考内容) 逐字回调，最后 resolve 完整正式内容。
  // 兼容推理模型：思考流可能位于 delta.reasoning_content（DeepSeek-R1等）或 delta.reasoning。
  // 支持 imageDataUrl（base64）传入图片，构建多模态 user message。
  function chatStream(systemPrompt, userText, onChunk, imageDataUrl, _noKwArgs) {
    _noKwArgs = !!_noKwArgs;
    const a = Store.get().ai;
    const userMsg = imageDataUrl
      ? { role: 'user', content: [{ type: 'text', text: userText }, { type: 'image_url', image_url: { url: imageDataUrl } }] }
      : { role: 'user', content: userText };
    // _noKwArgs 重试模式：极简 body（只保留 model + messages，去掉 stream/temperature 等可选字段）
    const body = _noKwArgs
      ? { model: a.model, messages: [{ role: 'system', content: systemPrompt }, userMsg] }
      : { model: a.model, stream: true,
          messages: [{ role: 'system', content: systemPrompt }, userMsg]
        };
    // 思考模式控制（同 rawChat 逻辑：仅在显式设置时发送；_noKwArgs 强制跳过）
    if (!_noKwArgs && (a.thinkingMode === true || a.thinkingMode === false)) {
      body.chat_template_kwargs = { enable_thinking: a.thinkingMode };
    }
    var jsonBody = JSON.stringify(body);
    // 调试日志：400 时可在控制台看到完整请求体（帮助定位问题）
    console.log('[AI] chatStream 请求 endpoint=' + a.endpoint + ' model=' + a.model
      + ' messages[0].content长度=' + (systemPrompt || '').length
      + ' messages[1].content长度=' + (userText || '').length
      + ' body前200字=' + jsonBody.slice(0, 200));
    return fetch(a.endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + a.key },
      body: jsonBody
    }).then(function (r) {
      if (!r.ok) {
        // 400 无条件安全网：首次失败时，用最精简的请求体重试一次（只保留 model+messages，去掉 stream/temperature 等所有可选字段）
        if (r.status === 400 && !_noKwArgs) {
          console.error('[AI] chatStream 400！原始body前300字:', jsonBody.slice(0, 300));
          console.warn('[AI] 自动用极简请求体重试…');
          return chatStream(systemPrompt, userText, onChunk, imageDataUrl, true);
        }
        return httpError(r, '请求被拒绝');
      }
      const reader = r.body.getReader();
      const dec = new TextDecoder();
      let full = '', reasoning = '', buf = '';
      const emit = () => { if (onChunk) onChunk(full, reasoning); };
      function pump() {
        return reader.read().then(({ done, value }) => {
          if (done) { emit(); return full; }
          buf += dec.decode(value, { stream: true });
          const lines = buf.split('\n');
          buf = lines.pop();
          lines.forEach(line => {
            const t = line.trim();
            if (!t || t === 'data: [DONE]' || t.indexOf('data:') !== 0) return;
            try {
              const j = JSON.parse(t.slice(5));
              const d = j.choices && j.choices[0] && j.choices[0].delta;
              if (!d) return;
              let changed = false;
              const rc = d.reasoning_content != null ? d.reasoning_content : d.reasoning;
              if (rc) { reasoning += rc; changed = true; }
              if (d.content) { full += d.content; changed = true; }
              if (changed) emit();
            } catch (e) { /* 忽略半行 */ }
          });
          return pump();
        });
      }
      return pump();
    });
  }

  const AI = {
    configured, applyPreset, weeklySummary, chat, chatJSON, chatStream,
    useStream() { return !!Store.get().ai.stream; },
    useThinking() { return Store.get().ai.thinkingMode === true; },
    // 通用稳健 JSON 提取器（供各模块复用）
    extractRobustJSON,
    // 动态出题提示词：每次访问按当前专业课生成（getter 保证换专业后即时生效）
    get QUIZ_PROMPT() { return quizPrompt(); },
    // 深度复盘系统提示词：基于打包的「学习进度全景快照」做结构化深度分析
    get DEEP_REVIEW_PROMPT() {
      var major = activeMajorName();
      return '你是一名2026考研深度复盘教练，服务对象专业课为「' + major + '」。'
        + '用户提交了一份【当前学习进度全景快照】（已控制在5000字内，含四科进度、正确率趋势、错题/疑难点、弱点画像、心理状态、里程碑、学习时长等）。\n'
        + '请基于这份快照做一次**深度复盘**，结构清晰、可直接指导行动：\n'
        + '1. 总体诊断：当前状态健康度评估（给出风险等级：安全 / 警戒 / 危险）；\n'
        + '2. 学科短板定位：每科最致命的 1-2 个问题（务必引用快照中的具体数据说话）；\n'
        + '3. 根因分析：为何出现这些短板（学习习惯 / 时间分配 / 概念漏洞 / 心态）；\n'
        + '4. 下周作战方案：逐日可执行的任务调整（具体到科目 / 题量 / 时长）；\n'
        + '5. 防呆强化：针对符号、分式、易错点的强化动作；\n'
        + '6. 心态与节奏：基于心理状态记录给出建议。\n'
        + '要求：用简体中文；每个结论都要落到具体动作；避免空话套话；如快照数据不足请明确指出缺什么。';
    },
    JUDGE_PROMPT,
    reviewWeekly(reportText) {
      const summary = weeklySummary();
      const payload = reportText + '\n\n' + summary + '\n\n请给出：1)风险诊断 2)下周逐日任务调整 3)防呆强化点。';
      Modal.open({
        title: '🤖 AI 深度复盘中…',
        wide: true, dismissable: false,
        html: '<div class="muted-sm">已自动附带本周学习摘要，正在等待云端教练回复…</div><pre class="report" id="ai-out">加载中…</pre>',
        actions: [{ label: '关闭', kind: 'btn-ghost' }]
      });
      chat(payload).then(txt => {
        const out = document.getElementById('ai-out');
        if (out) out.textContent = txt;
      }).catch(e => {
        const out = document.getElementById('ai-out');
        if (out) out.textContent = '调用失败：' + e.message + '\n\n可改用本地摘要手动复盘：\n' + summary;
      });
    },
    test() { return chat('用一句话回复：系统连通正常').then(t => t.slice(0, 60)); }
  };

  window.AI = AI;
})();

/* ============================================================
 * alerts.js — 每日预警检查（业务规则4 & 5 + 备份提醒）
 *  规则4：专业课"难模块"<40% 且日期>8月15日 → 每日首次打开黄色预警弹窗
 *  规则5：10月底里程碑未勾选 → 11月1日起每日推送院校决策建议
 *  所有专业相关文案从 DB.getActiveMajor() 动态读取
 * ============================================================ */
(function () {
  'use strict';

  function runDailyChecks() {
    const s = Store.get();
    const today = U.dkey();
    const now = new Date();
    const y = now.getFullYear();
    const md = (now.getMonth() + 1) * 100 + now.getDate(); // MMDD 数字

    // --- 规则4：专业课难模块预警（8月15日后，<40%，每日首次） ---
    try {
      var major = DB.getActiveMajor();
      var rule = major.alertRule || {};
      var hardMod = rule.hardModule || '\u4e13\u4e1a\u8bfe';
      var hardMilestone = rule.hardMilestone || '\u6838\u5fc3\u80fd\u529b';
      var learnPath = rule.learnPath || '';
      var profPercent = Store.profAdvancedPercent();
      var warnKey = 'lastProfWarn';

      if (md >= 815 && profPercent < 40 && s.alerts[warnKey] !== today) {
        Store.update(x => { x.alerts[warnKey] = today; });
        Modal.open({
          title: '\u26a0\ufe0f ' + hardMod + ' \u9ec4\u8272\u9884\u8b66',
          html: '<p>\u4eca\u5929\u662f ' + (now.getMonth() + 1) + '\u6708' + now.getDate() + '\u65e5\uff0c\u4f60\u7684' + hardMod + ' \u8fdb\u5ea6\u4e3a <b>' + profPercent + '%</b>\uff08&lt;40%\uff09\u3002</p>'
            + '<p><b>8\u6708\u5e95\u524d\u5fc5\u987b\u72ec\u7acb\u5b8c\u6210' + hardMilestone + '\uff0c\u5426\u5219\u89e6\u53d1\u5907\u9009\u9662\u5207\u6362\u3002</b></p>'
            + (learnPath ? '<p class="muted-sm">\u5efa\u8bae\uff1a\u4eca\u5929\u8d77\u6bcf\u5929\u56fa\u5b9a1\u5c0f\u65f6' + hardMod + '\uff0c\u6309\u6982\u5ff5\u56fe\u8c31\u987a\u5e8f\u63a8\u8fdb\uff1a' + learnPath + '\u3002</p>' : ''),
          actions: [
            { label: '\u53bb\u6982\u5ff5\u56fe\u8c31', kind: 'btn-primary', onClick: c => { c(); App.go('concept'); } },
            { label: '\u77e5\u9053\u4e86', kind: 'btn-ghost' }
          ]
        });
        return;
      }
    } catch (e) { /* activeMajor 未就绪，跳过 */ }

    // --- 规则5：11月1日决策推送（10月底里程碑未勾选） ---
    if (md >= 1101 && !s.milestones.octMath && s.alerts.lastNovPush !== today) {
      Store.update(x => { x.alerts.lastNovPush = today; });
      Modal.open({
        title: '\u2696\ufe0f \u9662\u6821\u51b3\u7b56\u63d0\u9192',
        html: '<p>\u5df2\u523011\u6708\uff0c\u300c\u6570\u5b66\u771f\u9898\u6a21\u62df\u2112120\u5206\u300d\u91cc\u7a0b\u78ca\u5c1a\u672a\u52fe\u9009\u3002</p>'
          + '<p><b>\u8bf7\u7acb\u5373\u6839\u636e\u6570\u5b66\u6210\u7ee9\u51b3\u5b9a\u51b2\u4e0a\u5927\u8fd8\u662f\u5b88\u6cb3\u5de5\u5927\u3002</b>\u62a5\u540d\u7a97\u53e3\u4e0d\u7b49\u4eba\uff0c\u7528\u6570\u636e\u8bf4\u8bdd\uff0c\u4e0d\u80fd\u51ed\u611f\u89c9\u3002</p>',
        actions: [
          { label: '\u53bb\u51b3\u7b56\u53c2\u8c0b', kind: 'btn-primary', onClick: c => { c(); App.go('decision'); } },
          { label: '\u7a0d\u540e', kind: 'btn-ghost' }
        ]
      });
      return;
    }

    // --- 存储备份提醒（占用>60% 或 7天未备份，每周提醒一次） ---
    const usagePct = Store.usageBytes() / (5 * 1024 * 1024);
    const lastBak = s.meta.lastBackupReminder || '';
    const daysSinceBak = lastBak ? (Date.now() - new Date(lastBak).getTime()) / U.DAY_MS : 999;
    if ((usagePct > 0.6 || daysSinceBak > 7) && s.alerts['lastBakWarn'] !== today) {
      Store.update(x => { x.alerts['lastBakWarn'] = today; });
      Toast.warn('\u1f4be \u5df2' + Math.floor(daysSinceBak) + '\u5929\u672a\u5bfc\u51fa\u5907\u4efd\u3002\u6570\u636e\u53ea\u5b58\u5728\u6d4f\u89c8\u5668\uff0c\u5efa\u8bae\u7acb\u5373\u5bfc\u51fa\uff08\u8bbe\u7f6e \u2192 \u5bfc\u51faJSON\u5907\u4efd\uff09\u3002', 6000);
    }
  }

  // 仪表盘预警条（非弹窗，常显）
  function bannerHtml() {
    const s = Store.get();
    const now = new Date();
    const md = (now.getMonth() + 1) * 100 + now.getDate();
    const out = [];
    try {
      var major = DB.getActiveMajor();
      var rule = major.alertRule || {};
      var hardMod = rule.hardModule || '\u4e13\u4e1a\u8bfe';
      var hardMilestone = rule.hardMilestone || '\u6838\u5fc3\u80fd\u529b';
      var profPercent = Store.profAdvancedPercent();

      if (md >= 815 && profPercent < 40) {
        out.push('<div class="alert alert-warn">\u26a0\ufe0f ' + hardMod + ' ' + profPercent + '% &lt; 40%\uff1a8\u6708\u5e95\u524d\u9700\u72ec\u7acb\u5b8c\u6210' + hardMilestone + '\uff0c\u5426\u5219\u89e6\u53d1\u5907\u5207\u6362\u3002</div>');
      }
    } catch (e) { /* skip */ }
    if (md >= 1101 && !s.milestones.octMath) {
      out.push('<div class="alert alert-danger">\u2696\ufe0f 11\u6708\u5df2\u5230\u800c\u6570\u5b66\u6a21\u62df\u91cc\u7a0b\u78ca\u672a\u8fbe\u6210\uff1a<a href="javascript:App.go(\'decision\')">\u7acb\u5373\u53bb\u51b3\u7b56\u53c2\u8c0b\u5b9a\u9662 \u2192</a></div>');
    }
    if (Store.mistakeCountWeek('sign') > 3) {
      out.push('<div class="alert alert-warn">\u270d\ufe0f \u672c\u5468\u7b26\u53f7\u9519\u8bef ' + Store.mistakeCountWeek('sign') + ' \u6b21 &gt; 3\u6b21\uff1a\u667a\u80fd\u6392\u7a0b\u5df2\u5f3a\u5236\u63d2\u5165\u7b26\u53f7\u4e13\u9879\u3002</div>');
    }
    return out.join('');
  }

  window.Alerts = { runDailyChecks, bannerHtml };
})();


/* ===== js/modules/dashboard.js ===== */
/* ============================================================
 * dashboard.js — 作战台（好用版）
 * 设计哲学：打开即用，一页答三问——现在该干嘛？干得怎么样？有什么雷？
 * 结构：①当前行动卡（NOW） ②今日序列就地勾选 ③四科完成度 ④快捷操作 ⑤本周节奏 ⑥预警
 * ============================================================ */
(function () {
  'use strict';

  // 当前时刻该干什么：优先当日 AI 编排序列，否则规则引擎
  function nowAction() {
    const s = Store.get();
    const gen = SchedulerModule.currentPlan();
    const next = gen.sequence.find(x => !x.done);
    return next || null;
  }

  function render(el) {
    const s = Store.get();
    const st = Store.todayTaskStats();
    const allDone = Store.todayAllDone();
    const next = nowAction();

    // ---------- ① NOW 行动卡 ----------
    let nowHtml;
    if (allDone) {
      nowHtml = '<div class="now-card now-done"><div class="now-kicker">今日已清场</div>'
        + '<div class="now-title">✓ 今日任务全部完成</div>'
        + '<div class="now-sub">可以安心复盘、早点睡。明天继续。</div></div>';
    } else if (next) {
      nowHtml = '<div class="now-card"><div class="now-kicker">⚡ 现在就干这个</div>'
        + '<div class="now-title">' + U.esc(next.text) + '</div>'
        + '<div class="now-sub"><span class="task-tag" style="background:' + DB.SUBJECTS[next.subject].color + '">' + DB.SUBJECTS[next.subject].short + '</span> '
        + U.esc(next.reason) + '</div>'
        + '<div class="now-actions">'
        + '<button class="btn btn-primary" id="now-done">✓ 完成打卡</button>'
        + '<button class="btn btn-ghost" id="now-focus">🔒 专注' + (next.subject === 'math' ? '45' : '25') + '分钟</button>'
        + '</div></div>';
    } else {
      nowHtml = '<div class="now-card"><div class="now-kicker">今日无待办</div>'
        + '<div class="now-title">还没排任务</div>'
        + '<div class="now-actions"><button class="btn btn-primary" id="now-add">去任务中心添加</button></div></div>';
    }

    // ---------- ② 今日序列（前5条，就地勾选） ----------
    const gen = SchedulerModule.currentPlan();
    let seqHtml = '';

    });

    // ---------- ④ 本周节奏（柱图，今天高亮，点按录入） ----------
    const hours = Store.weekHours();
