/* ============================================================
 * redline.js — 红线禁令：绝对禁令墙 + 防呆检查清单
 * ============================================================ */
(function () {
  'use strict';

  function render(el) {
    // 禁令墙（动态：settings.redline.items 优先，否则默认）
    const wall = DB.redlineItems().map(r =>
      '<div class="red-item">'
      + '<div class="red-icon">' + (r.icon || '🚫') + '</div>'
      + '<div><div class="red-title">' + U.esc(r.title) + '</div>'
      + '<div class="red-desc">' + U.esc(r.desc) + '</div></div>'
      + '</div>'
    ).join('');

    // 检查清单（状态存 sessionStorage，重置按钮清零；做题前必做，不持久化到隔天）
    const saved = JSON.parse(sessionStorage.getItem('foolproof_check') || '[]');
    const checks = DB.redlineChecklist().map((c, i) =>
      '<label class="check-row"><input type="checkbox" data-i="' + i + '"' + (saved[i] ? ' checked' : '') + '><span class="box"></span><span>' + U.esc(c) + '</span></label>'
    ).join('');
    const doneN = saved.filter(Boolean).length;
    const custom = !!(Store.get().settings.redline && Store.get().settings.redline.items);

    el.innerHTML =
      '<div class="card card-redline"><div class="card-title card-title-red">🚫 绝对禁令墙' + (custom ? ' <span class="tag tag-warn">已自定义</span>' : '') + '</div>' + wall + '</div>'

      + '<div class="card"><div class="card-title">防呆检查清单（做题前必做） <span class="muted-sm">' + doneN + '/' + DB.redlineChecklist().length + '</span></div>'
      + checks
      + '<div class="btn-row" style="margin-top:10px">'
      + '<button class="btn btn-primary" id="rl-all">全部确认</button>'
      + '<button class="btn btn-ghost" id="rl-reset">重置清单</button>'
      + '</div></div>'

      + '<div class="card"><div class="card-title">🤖 AI 红线建议</div>'
      + '<div class="muted-sm">基于你的「分心源画像」和当前专业课，让 AI 生成更贴合你的绝对禁令与防呆清单。</div>'
      + '<button class="btn btn-primary" id="rl-ai" style="margin-top:8px">按我的分心源生成红线</button>'
      + '<div id="rl-ai-out" class="muted-sm" style="margin-top:8px"></div></div>'

      + '<div class="card"><div class="card-title">违规记录</div><div id="rl-violations" class="muted-sm">分心冲动拦截记录见「心理状态」模块的冲动统计。</div></div>';

    bind(el);
  }

  function bind(el) {
    el.querySelectorAll('.check-row input').forEach(cb => {
      cb.onchange = () => {
        const arr = JSON.parse(sessionStorage.getItem('foolproof_check') || '[false,false,false,false,false]');
        arr[+cb.getAttribute('data-i')] = cb.checked;
        sessionStorage.setItem('foolproof_check', JSON.stringify(arr));
        if (arr.filter(Boolean).length === DB.redlineChecklist().length) Toast.success('✓ 检查完毕，可以开始做题。保持流程不走样。');
        App.refresh();
      };
    });
    el.querySelector('#rl-all').onclick = () => {
      const n = DB.redlineChecklist().length;
      const all = []; for (let i = 0; i < n; i++) all.push(true);
      sessionStorage.setItem('foolproof_check', JSON.stringify(all));
      Toast.success('✓ 全部确认，开工'); App.refresh();
    };
    el.querySelector('#rl-reset').onclick = () => {
      const n = DB.redlineChecklist().length;
      const all = []; for (let i = 0; i < n; i++) all.push(false);
      sessionStorage.setItem('foolproof_check', JSON.stringify(all));
      App.refresh();
    };
    const aiBtn = el.querySelector('#rl-ai');
    if (aiBtn) aiBtn.onclick = () => suggestRedlines(el);
  }

  // AI 按分心源画像生成红线（含禁令墙 + 防呆清单），确认后写入 settings.redline
  function suggestRedlines(el) {
    if (!AI.configured()) { Toast.warn('请先在「设置」配置 AI'); return; }
    const cp = (function () { try { return DB.coachProfile(); } catch (e) { return null; } })() || { distractions: '分心/畏难' };
    let major = '专业课'; try { major = DB.getActiveMajor().name || '专业课'; } catch (e) {}
    const sys = '你是考研纪律教练。根据考生的分心源与专业课，生成「绝对禁令墙」（3-5 条）和「防呆检查清单」（4-5 条）。'
      + '只输出 JSON，不要多余文字、不要 markdown。格式：'
      + '{"redlines":[{"icon":"emoji","title":"短标题","desc":"一句话禁令"}],"checklist":["检查项1","检查项2"]}';
    const usr = '考生专业课：' + major + '\n分心源画像：' + cp.distractions + '\n请生成贴合该考生的红线与防呆清单（禁令要具体可执行，不要泛泛而谈）。';
    const out = el.querySelector('#rl-ai-out');
    if (out) out.textContent = '生成中…';
    AI.chatStream(sys, usr, function (txt) { if (out) out.textContent = txt; })
      .then(function (full) {
        const m = full.match(/\{[\s\S]*\}/);
        if (!m) { if (out) out.textContent = full + '\n（未能解析为结构化结果）'; return; }
        const json = JSON.parse(m[0]);
        Modal.open({
          title: '🤖 AI 红线建议（确认后应用）',
          wide: true,
          html: '<div class="muted-sm">以下为 AI 基于你的分心源生成，确认后将覆盖当前红线与防呆清单：</div>'
            + '<div class="card" style="margin-top:8px"><div class="card-title">绝对禁令墙</div>'
            + (json.redlines || []).map(r => '<div class="red-item"><div class="red-icon">' + (r.icon || '🚫') + '</div><div><div class="red-title">' + U.esc(r.title) + '</div><div class="red-desc">' + U.esc(r.desc) + '</div></div></div>').join('')

/* ===== js/modules/heatmap.js ===== */
/* ============================================================
 * heatmap.js — 考点热力图 + 130分能力分层训练
 * 绿=掌握 黄=薄弱 红=危险；点击格子录入掌握度并可生成针对任务
 * 分层规则：必拿层正确率<90% → 提示先补必拿层（弱锁定）
 * ============================================================ */
(function () {
  'use strict';
  let subjTab = 'math';

  function tierStats(list, heat) {
    const byTier = { 1: [], 2: [], 3: [] };
    list.forEach(t => byTier[t.tier].push(t));
    const out = {};
    [1, 2, 3].forEach(tier => {
      const items = byTier[tier];
      const scored = items.filter(t => heat[t.id] && heat[t.id].score != null);
      out[tier] = {
        total: items.length,
        mastered: items.filter(t => heat[t.id] && heat[t.id].level === 2).length,
        avg: scored.length ? Math.round(U.avg(scored.map(t => heat[t.id].score))) : null
      };
    });
    return out;
  }

  function cell(t, heat, tierLocked) {
    const h = heat[t.id] || {};
    const lv = h.level || 0;
    const cls = lv === 2 ? 'hm-green' : lv === 1 ? 'hm-yellow' : 'hm-red';
    const scoreTxt = h.score != null ? h.score + '%' : '未测';
    return '<button class="hm-cell ' + cls + (tierLocked ? ' hm-locked' : '') + '" data-id="' + t.id + '" title="' + U.esc(t.group + ' · ' + t.name) + '：' + scoreTxt + '">'
      + '<span class="hm-name">' + U.esc(t.name) + '</span>'
      + '<span class="hm-score">' + scoreTxt + '</span>'
      + '</button>';
  }

  function render(el) {
    const s = Store.get();
    const heat = s.heat;
    const list = DB.TOPICS[subjTab];
    const ts = tierStats(list, heat);
    // 必拿层弱锁定：必拿层平均<90 → 拔高/冲刺层提示先补基础
    const tier1Weak = ts[1].avg != null && ts[1].avg < 90;
    const tier1Untested = ts[1].avg == null;

    let tierCards = '';
    [1, 2, 3].forEach(tier => {
      const meta = DB.TIERS[tier];
      const st = ts[tier];
      tierCards += '<div class="tier-card" style="border-top-color:' + meta.color + '">'
        + '<div class="tier-head">' + meta.icon + ' ' + meta.name + ' <span class="muted-sm">' + meta.range + '</span></div>'
        + '<div class="tier-nums">' + st.mastered + '/' + st.total + ' 掌握' + (st.avg != null ? ' · 平均 ' + st.avg + '%' : ' · 未测评') + '</div>'
        + '<div class="muted-sm">' + meta.rule + '</div>'
        + '</div>';
    });

    let groups = '';
    const groupNames = [];
    list.forEach(t => { if (groupNames.indexOf(t.group) < 0) groupNames.push(t.group); });
    groupNames.forEach(g => {
      const items = list.filter(t => t.group === g);
      groups += '<div class="hm-group"><div class="hm-group-name">' + U.esc(g) + '</div><div class="hm-grid">'
        + items.map(t => cell(t, heat, false)).join('') + '</div></div>';
    });

    el.innerHTML =
      '<div class="card"><div class="card-title">🎯 考点热力图与真题切片追踪</div>'
      + '<div class="tab-row">'
      + '<button class="tab' + (subjTab === 'math' ? ' tab-on' : '') + '" data-t="math">' + DB.SUBJECTS.math.name + '（' + (DB.TOPICS.math ? DB.TOPICS.math.length : 0) + '考点）</button>'
      + '<button class="tab' + (subjTab === 'ctrl' ? ' tab-on' : '') + '" data-t="ctrl">' + DB.SUBJECTS.ctrl.short + '（' + (DB.TOPICS.ctrl ? DB.TOPICS.ctrl.length : 0) + '考点）</button>'
      + '</div>'
      + '<div class="legend"><span class="lg lg-green"></span>掌握(≥80%) <span class="lg lg-yellow"></span>薄弱(50-79%) <span class="lg lg-red"></span>危险(&lt;50%或未测) <span class="muted-sm">点击格子录入/更新掌握度</span></div>'
      + '</div>'

      + '<div class="tier-row">' + tierCards + '</div>'
      + (tier1Weak ? '<div class="alert alert-danger">🔒 必拿层平均 ' + ts[1].avg + '% < 90%：按规则应暂停拔高/冲刺层新题，先把必拿层补到零失误。错一题罚5道同类题。</div>' : '')
      + (tier1Untested ? '<div class="alert alert-warn">必拿层尚未测评：建议先用步骤审查器做3道必拿层题目，录入掌握度后再解锁拔高层。</div>' : '')

      + '<div class="card">' + groups + '</div>'

      + '<div class="card"><div class="card-title">层级跃迁报告（本周）</div><div class="muted-sm" id="hm-week"></div></div>';

    // 周跃迁统计
    const weekAgo = Date.now() - 7 * U.DAY_MS;
    const updated = Object.keys(heat).filter(id => heat[id].updatedAt && new Date(heat[id].updatedAt).getTime() > weekAgo);
    document.getElementById('hm-week').textContent = updated.length
      ? '本周更新了 ' + updated.length + ' 个考点的掌握度：' + updated.map(id => { const t = (DB.TOPICS.math.concat(DB.TOPICS.ctrl)).find(x => x.id === id); return t ? t.name : id; }).join('、')
      : '本周尚未更新任何考点。做题后记得回来点格子。';

    bind(el);
  }

  function bind(el) {
    el.querySelectorAll('[data-t]').forEach(b => b.onclick = () => { subjTab = b.getAttribute('data-t'); render(el); });

    el.querySelectorAll('.hm-cell').forEach(c => {
      c.onclick = () => {
        const id = c.getAttribute('data-id');
        const topic = (DB.TOPICS.math.concat(DB.TOPICS.ctrl)).find(t => t.id === id);
        const heat = Store.get().heat;
        const h = heat[id] || {};
        const meta = DB.TIERS[topic.tier];
        Modal.open({
          title: topic.group + ' · ' + topic.name + '（' + meta.icon + meta.name + '）',
          html:
            '<div class="form-grid">'
            + '<label class="fld"><span>自测正确率（%，近10题）</span><input id="hm-in-score" class="input" type="number" min="0" max="100" value="' + (h.score != null ? h.score : '') + '"></label>'
            + '<label class="fld"><span>掌握状态</span><select id="hm-in-level" class="input input-sel">'
            + '<option value="0"' + (h.level === 0 ? ' selected' : '') + '>🔴 危险</option>'
            + '<option value="1"' + (h.level === 1 ? ' selected' : '') + '>🟡 薄弱</option>'
            + '<option value="2"' + (h.level === 2 ? ' selected' : '') + '>🟢 掌握</option>'
            + '</select></label></div>'
            + '<div class="muted-sm">保存正确率后系统将自动判定状态：≥80绿 / 50-79黄 / &lt;50红</div>',
          actions: [
            { label: '取消' },
            {
              label: '生成针对训练任务', kind: 'btn-ghost', onClick: close => {
                Store.update(s => {
                  s.mistakeDrills.push({ id: U.uid(), source: 'topic', refId: id, title: '【' + topic.name + '】针对训练3题（热力图生成）', subject: subjTab === 'math' ? 'math' : 'ctrl', status: 'pending', createdAt: new Date().toISOString() });
                });
                close(); Toast.success('已加入错题重练队列'); App.refresh();
              }
            },
            {
              label: '保存', kind: 'btn-primary', onClick: close => {
                const score = parseFloat(document.getElementById('hm-in-score').value);
                const level = parseInt(document.getElementById('hm-in-level').value, 10);
                Store.update(s => {
                  const autoLevel = !isNaN(score) ? (score >= 80 ? 2 : score >= 50 ? 1 : 0) : level;
                  s.heat[id] = { level: autoLevel, score: isNaN(score) ? null : score, updatedAt: new Date().toISOString() };
                  // 必拿层惩罚规则：必拿层考点录入<90 → 生成罚练
                  if (topic.tier === 1 && !isNaN(score) && score < 90) {
                    for (let i = 0; i < 5; i++) {
                      s.mistakeDrills.push({ id: U.uid(), source: 'topic', refId: id, title: '【罚练】' + topic.name + ' 同类题 ' + (i + 1) + '/5', subject: subjTab === 'math' ? 'math' : 'ctrl', status: 'pending', penaltyOf: id, createdAt: new Date().toISOString() });
                    }
                    Toast.warn('必拿层正确率<90%：按规则罚5道同类题，已加入重练队列');
                  }
                });
                close(); App.refresh();
              }
            }
          ]
        });
        setTimeout(() => { const i = document.getElementById('hm-in-score'); if (i) i.focus(); }, 50);
      };
    });
  }

  window.HeatmapModule = { render };
})();


/* ===== js/modules/quiz.js ===== */
/* ============================================================
 * quiz.js — AI 智能出题与自动判卷（高度智能化）
 * 工作流（全程无需手动标记"测没测"）：
 *   选考点 → 引擎生成题目（云端AI 或 本地模板兜底）
 *   → 结构化作答（选择点选 / 解答分步输入）
 *   → 自动判卷（云端JSON判分 或 本地规则评分）
 *   → 自动回写：热力图掌握度 + 错题记录 + 防呆干预 + 重练队列
 * ============================================================ */
(function () {
  'use strict';

  // 本地出题引擎（离线兜底）。题干用纯文本/Unicode（∫ π → ²），避免反斜杠转义事故。
  // lv: 1简单 2中等 3真题难度 4极难（localQuiz按难度筛选）
  const LOCAL_BANK = {
    'm-subst': [
      { lv: 1, gen: () => { const a = U.randInt(1, 3); return { stem: '计算定积分 ∫(从0到π/2) ' + a + '·sinx·cosx dx（用换元法，写出完整步骤）', type: 'solve', answer: a + '/2', solution: '令 u=sinx, du=cosx dx → ∫' + a + 'u du = ' + a + '·u²/2，代入0→1得 ' + a + '/2', trap: '换元后上下限必须同步变换，且负号前置' }; } },
      { lv: 2, gen: () => { const a = U.randInt(1, 4); return { stem: '计算 ∫(从0到1) ' + a + 'x/(1+x²) dx', type: 'solve', answer: a + 'ln2/2', solution: 'u=1+x², du=2x dx → (' + a + '/2)ln(1+x²) 代入0→1 = ' + a + 'ln2/2', trap: '分式系数易漏，u代换回代要彻底' }; } },
      { lv: 3, gen: () => { const a = U.randInt(2, 5); return { stem: '计算 ∫(从0到π) x·sin(' + a + 'x) dx（需分部积分，注意符号）', type: 'solve', answer: '含三角求值', solution: '分部：u=x, dv=sin(' + a + 'x)dx → -x·cos(' + a + 'x)/' + a + ' + ∫cos(' + a + 'x)/' + a + ' dx，逐项代入上下限', trap: '分部积分两次符号交替，最易出错' }; } }
    ],
    'm-limit': [
      { lv: 1, gen: () => { const a = U.randInt(1, 5); return { stem: '求极限：当 x→0 时，sin(' + a + 'x)/x = ?', type: 'choice', options: ['A. ' + a, 'B. 1', 'C. 0', 'D. ' + (a * a)], answer: 'A', solution: 'sin(ax) 等价于 ax，极限 = a = ' + a, trap: '等价无穷小系数别丢' }; } },
      { lv: 2, gen: () => { const a = U.randInt(2, 4); return { stem: '求极限：当 x→0 时，(1-cosx)/x² = ?', type: 'choice', options: ['A. 0', 'B. 1/2', 'C. 1', 'D. 2'], answer: 'B', solution: '1-cosx 等价于 x²/2，比值 1/2', trap: '泰勒展开阶数要够' }; } },
      { lv: 3, gen: () => { return { stem: '求极限：当 x→0 时，[ln(1+x) - x] / x² = ?', type: 'choice', options: ['A. 0', 'B. -1/2', 'C. 1/2', 'D. -1'], answer: 'B', solution: 'ln(1+x) 泰勒展开 x - x²/2 + ...，减去x得 -x²/2，除以x² → -1/2', trap: '展开到二阶，符号为负' }; } },
      { lv: 4, gen: () => { return { stem: '求极限：当 x→0 时，[(e^x - 1 - x) / (x·sin(x))] = ?', type: 'choice', options: ['A. 0', 'B. 1/2', 'C. 1', 'D. 2'], answer: 'B', solution: 'e^x = 1+x+x²/2+...，分子≈x²/2；分母 x·sinx≈x²，比值 1/2', trap: '分子分母都需展开到同阶，sinx≈x' }; } }
    ],
    'm-eigen': [
      { lv: 1, gen: () => { const a = U.randInt(1, 3); return { stem: '设 A 为 2 阶矩阵，特征值为 ' + a + ' 和 ' + (a + 1) + '，则 |A| = ?', type: 'choice', options: ['A. ' + (a * (a + 1)), 'B. ' + (a + a + 1), 'C. ' + a, 'D. ' + (a * a)], answer: 'A', solution: '行列式 = 特征值之积 = ' + a + '×' + (a + 1) + ' = ' + (a * (a + 1)), trap: '与迹混淆：迹是特征值之和' }; } },
      { lv: 3, gen: () => { const a = U.randInt(2, 4); return { stem: '设 A 为 3 阶矩阵，特征值为 1, ' + a + ', ' + (a + 1) + '，则 A 的迹 tr(A) 与 |A| 分别为？', type: 'choice', options: ['A. ' + (1 + a + a + 1) + ' 和 ' + (a * (a + 1)), 'B. ' + (a * (a + 1)) + ' 和 ' + (1 + a + a + 1), 'C. ' + (a + a) + ' 和 ' + a, 'D. ' + a + ' 和 ' + (a * a)], answer: 'A', solution: '迹=特征值之和=1+' + a + '+' + (a + 1) + '=' + (2 + 2 * a) + '；行列式=之积=1×' + a + '×' + (a + 1) + '=' + (a * (a + 1)), trap: '迹与行列式别记反' }; } }
    ],
    'm-ode': [
      { lv: 2, gen: () => { const a = U.randInt(1, 3); return { stem: "求微分方程 y' + " + a + 'y = e^x 的积分因子 μ(x)', type: 'choice', options: ['A. e^(' + a + 'x)', 'B. e^(-' + a + 'x)', 'C. e^x', 'D. ' + a + 'e^x'], answer: 'A', solution: 'μ = e^(∫' + a + 'dx) = e^(' + a + 'x)', trap: '⚠️积分因子指数符号必须反向检查：P(x)=' + a + '，指数为正' }; } }
    ],
    'c-pole': [
      { lv: 2, gen: () => { return { stem: '状态反馈极点配置的前提条件是系统（ ）', type: 'choice', options: ['A. 完全能控', 'B. 完全能观', 'C. 渐近稳定', 'D. 最小相位'], answer: 'A', solution: '极点可任意配置 ⟺ 系统完全能控', trap: '能控↔极点配置，能观↔观测器，别记反' }; } }
    ],
    'c-ctrb': [
      { lv: 2, gen: () => { return { stem: 'n 阶线性定常系统完全能控的充要条件是能控性矩阵 [B AB ... Aⁿ⁻¹B] 的秩为（ ）', type: 'choice', options: ['A. n', 'B. n-1', 'C. 1', 'D. 0'], answer: 'A', solution: '秩判据：rank(Qc) = n', trap: '能控用Qc，能观用Qo=[C;CA;...]，矩阵别写错' }; } }
    ],
    'c-tf': [
      { lv: 2, gen: () => { const a = U.randInt(1, 5); return { stem: '单位反馈系统开环传递函数 G(s) = ' + a + '/[s(s+1)]，闭环特征方程为？', type: 'solve', answer: 's² + s + ' + a + ' = 0', solution: '1+G(s)=0 → s(s+1)+' + a + '=0 → s²+s+' + a + '=0', trap: '分式合并三步法：先写分母s(s+1)，再加分子' + a }; } }
    ]
  };

  function fallbackLocal(topic) {
    var refBook = topic.id[0] === 'm'
      ? '高数/线代/概率'
      : ((DB.getActiveMajor && DB.getActiveMajor().textbook) || '专业课');
    return {
      stem: '【自测】' + topic.group + ' · ' + topic.name + '：请写出该考点的核心定义/公式，并举一个典型应用。',
      type: 'solve', answer: '（概念复述题，对照课本自评）',
      solution: '对照 ' + refBook + ' 教材核对要点完整性。',
      trap: '概念混淆是你画像里的高频错误'
    };
  }

  // 合并静态本地题库 + 当前专业的 localQuestions（AI/注册表提供）
  function bankFor(tid) {
    if (LOCAL_BANK[tid]) return LOCAL_BANK[tid];
    try {
      var lq = DB.getActiveMajor().localQuestions || {};
      if (lq[tid]) return lq[tid];
    } catch (e) { /* ignore */ }
    return null;
  }

  // ==================== 状态 ====================
  let phase = 'pick';
  let topicId = null;
  let quiz = null;
  let judge = null;
  let difficulty = 'auto';   // auto|easy|medium|real|hard —— auto按掌握度推荐
  let customReq = '';        // 用户自定义出题要求（备注，追加到 prompt 尾部）
  let variantOf = null;      // 错题变式复现：{topicName, errorType, originDesc}

  const DIFFS = {
    easy: { name: '简单', icon: '🟢', prompt: '单一考点、直接套公式、计算量小的基础题，确保零失误拿分' },
    medium: { name: '中等', icon: '🟡', prompt: '常规考研题型、一两个知识点结合、需要标准步骤的中等题' },
    real: { name: '真题难度', icon: '🟠', prompt: '完全对标考研真题风格的综合题，多知识点交叉、有陷阱、计算量适中偏大' },
    hard: { name: '极难', icon: '🔴', prompt: '压轴题级别，创新题型或极复杂计算，训练战略性取舍能力' }
  };

  // 按掌握度自动推荐难度
  function autoDifficulty(tid) {
    const h = Store.get().heat[tid] || {};
    const s = h.score;
    if (s == null) return 'easy';
    if (s < 50) return 'easy';
    if (s < 75) return 'medium';
    if (s < 90) return 'real';
    return 'hard';
  }

  function allTopics() { return DB.TOPICS.math.concat(DB.TOPICS.ctrl); }

  // ==================== 出题 ====================
  function makeQuiz() {
    const topic = allTopics().find(t => t.id === topicId);
    phase = 'quizzing'; judge = null; quiz = null;
    render(document.getElementById('view'));

    const diff = difficulty === 'auto' ? autoDifficulty(topicId) : difficulty;
    const diffMeta = DIFFS[diff];
    const userWeak = Store.weekTopMistakes().map(t => (DB.MISTAKE_TYPES[t.key] || {}).name).join('、') || '符号错误';

    if (!AI.configured()) {
      // 未配置AI：提示去配置（本地题库仅作兜底演示）
      quiz = localQuiz(topic, diff);
      render(document.getElementById('view'));
      return;
    }

    let ask;
    if (variantOf) {
      ask = '这是一道需要变式复现的错题。原题/考点：' + variantOf.originDesc +
        '；学生错误类型：' + (DB.MISTAKE_TYPES[variantOf.errorType] || {}).name +
        '。请出一道【同源变式题】：同一知识点、保留同样的陷阱（' + userWeak + '），但更换数字、情境或问法，' +
        '难度等级：' + diffMeta.name + '（' + diffMeta.prompt + '）。用于验证学生是否真正掌握。';
    } else {
      ask = '考点：' + topic.group + '·' + topic.name + '；层级：' + DB.TIERS[topic.tier].name +
        '（' + DB.TIERS[topic.tier].range + '）；难度等级：' + diffMeta.name + '（' + diffMeta.prompt + '）；' +
        '该生本周高频错误：' + userWeak + '。请出1道题。'
        + (customReq ? '\n【用户补充要求】' + customReq : '');
    }

    // 流式出题：实时显示「思考过程 + 生成内容」，让用户能判断请求是否成功/失败
    const view = document.getElementById('view');
    view.innerHTML =
      '<div class="card"><div class="card-title-row"><span class="card-title">🤖 AI 出题中…</span>'
      + '<button class="btn btn-sm btn-ghost" id="quiz-stream-cancel">取消</button></div>'
      + '<div class="muted-sm" id="quiz-stream-status">⏳ 正在连接模型…</div>'
      + '<div id="quiz-think-wrap" style="display:none;margin-top:10px">'
      + '<div class="card-title-sm" style="opacity:.7">💭 思考过程</div>'
      + '<pre class="report" id="quiz-think" style="max-height:200px;overflow:auto;opacity:.72;font-size:12px;white-space:pre-wrap"></pre></div>'
      + '<div id="quiz-content-wrap" style="display:none;margin-top:10px">'
      + '<div class="card-title-sm">📝 生成内容（题目原文）</div>'
      + '<pre class="report" id="quiz-content" style="max-height:240px;overflow:auto;white-space:pre-wrap"></pre></div>'
      + '</div>';

    let cancelled = false;
    const cancelBtn = document.getElementById('quiz-stream-cancel');
    if (cancelBtn) cancelBtn.onclick = () => { cancelled = true; phase = 'pick'; variantOf = null; render(document.getElementById('view')); };

    AI.chatStream(AI.QUIZ_PROMPT, ask, (content, reasoning) => {
      if (cancelled) return;
      const st = document.getElementById('quiz-stream-status');
      if (reasoning) {
        const tw = document.getElementById('quiz-think-wrap');
        const te = document.getElementById('quiz-think');
        if (tw) tw.style.display = '';
        if (te) { te.textContent = reasoning; te.scrollTop = te.scrollHeight; }
        if (st && !content) st.textContent = '💭 模型正在思考…';
      }
      if (content) {
        const cw = document.getElementById('quiz-content-wrap');
        const ce = document.getElementById('quiz-content');
        if (cw) cw.style.display = '';
        if (ce) { ce.textContent = content; ce.scrollTop = ce.scrollHeight; }
        if (st) st.textContent = '✍️ 正在生成题目…';
      }
    }).then(txt => {
      if (cancelled) return;
      let q = null;
      try { const m = txt.match(/\{[\s\S]*\}/); if (m) q = JSON.parse(m[0]); } catch (e) { q = null; }
      if (!q || !q.stem) throw new Error('AI 返回内容无法解析为题目（请重试或检查模型是否稳定输出 JSON）');
      quiz = Object.assign({ source: 'ai', diff }, q);
      render(document.getElementById('view'));
    }).catch(e => {
      if (cancelled) return;
      // 失败：提供重试/中止，不再自动转本地题库
      const v = document.getElementById('view');
      v.innerHTML =
        '<div class="card"><div class="card-title">⚠️ AI 出题失败</div>'
        + '<div class="muted-sm">原因：' + U.esc(e.message || '网络或接口异常') + '。本地题库题量有限，建议重试或检查API配置。</div>'
        + '<div class="btn-row" style="margin-top:14px">'
        + '<button class="btn btn-primary" id="quiz-retry">🔄 重试出题</button>'
        + '<button class="btn btn-ghost" id="quiz-local">用本地题库兜底</button>'
        + '<button class="btn btn-ghost" id="quiz-cancel">返回选题</button>'
        + '</div></div>';
      document.getElementById('quiz-retry').onclick = () => makeQuiz();
      document.getElementById('quiz-local').onclick = () => { quiz = localQuiz(topic, diff); render(v); };
      document.getElementById('quiz-cancel').onclick = () => { phase = 'pick'; variantOf = null; render(v); };
    });
  }

  function localQuiz(topic, diff) {
    const bank = bankFor(topic.id);
    let q;
    if (bank) {
      // 本地题库按难度分层：题目标记了lv则匹配，无标记则按难度筛选
      const lvMap = { easy: 1, medium: 2, real: 3, hard: 4 };
      const want = lvMap[diff] || 2;
      const pool = bank.filter(b => (b.lv || 2) === want);
      const use = pool.length ? pool : bank; // 无该难度题则全库随机
      q = use[U.randInt(0, use.length - 1)].gen();
    } else {
      q = fallbackLocal(topic);
    }
    return Object.assign({ source: 'local', diff }, q);
  }

  // ==================== 判卷 ====================
  function submitAnswer(payload) {
    phase = 'result'; judge = null;
    render(document.getElementById('view'));

    const answerText = quiz.type === 'choice'
      ? '学生选择：' + payload.choice
      : (payload.image
        ? '学生上传了手写步骤照片（见图），' + (payload.final ? '文字结论：' + payload.final : '未给文字结论')
        : ('学生文字作答：' + payload.steps.filter(Boolean).join(' → ') + ' 结论：' + payload.final));
    const useAI = AI.configured();

    if (useAI) {
      const ask = '题目：' + quiz.stem + '\n标准答案：' + quiz.answer + '\n参考解析：' + quiz.solution +
        '\n' + answerText + '\n该生易错点：' + Store.weekTopMistakes().map(t => (DB.MISTAKE_TYPES[t.key] || {}).name).join('、');
      // 流式或普通判卷
      if (AI.useStream() && !payload.image) {
        // 流式：显示判卷过程（思考 + 内容）
        const view = document.getElementById('view');
        view.innerHTML = '<div class="card"><div class="card-title">🤖 AI 判卷中…</div>'
          + '<div id="judge-think-wrap" style="display:none;margin-bottom:10px">'
          + '<div class="card-title-sm" style="opacity:.7">💭 思考过程</div>'
          + '<pre class="report" id="judge-think" style="max-height:180px;overflow:auto;opacity:.72;font-size:12px;white-space:pre-wrap"></pre></div>'
          + '<div class="card-title-sm">📝 判卷内容</div>'
          + '<pre class="report" id="judge-stream" style="max-height:240px;overflow:auto;white-space:pre-wrap"></pre></div>';
        AI.chatStream(AI.JUDGE_PROMPT, ask, (content, reasoning) => {
          if (reasoning) {
            const tw = document.getElementById('judge-think-wrap');
            const te = document.getElementById('judge-think');
            if (tw) tw.style.display = '';
            if (te) { te.textContent = reasoning; te.scrollTop = te.scrollHeight; }
          }
          const el = document.getElementById('judge-stream');
          if (el) { el.textContent = content; el.scrollTop = el.scrollHeight; }
        }).then(txt => {
          try {
            const m = txt.match(/\{[\s\S]*\}/);
            judge = normalizeJudge(JSON.parse(m[0]), 'ai');
          } catch (e) { judge = localJudge(payload); }
          commitResult(answerText);
        }).catch(() => { judge = localJudge(payload); commitResult(answerText); });
      } else {
        AI.chatJSON(AI.JUDGE_PROMPT, ask, payload.image).then(j => {
          judge = normalizeJudge(j, 'ai');
          commitResult(answerText);
        }).catch(() => {
          judge = localJudge(payload);
          commitResult(answerText);
        });
      }
    } else {
      judge = localJudge(payload);
      commitResult(answerText);
    }
  }

  function normalizeJudge(j, source) {
    return {
      score: U.clamp(parseInt(j.score, 10) || 0, 0, 100),
      verdict: j.verdict || (j.score >= 80 ? '对' : j.score >= 40 ? '部分对' : '错'),
      steps: Array.isArray(j.steps) ? j.steps : [],
      errorType: j.errorType || 'none',
      comment: j.comment || '',
      source
    };
  }

  // 本地规则判卷（离线）
  function localJudge(payload) {
    if (quiz.type === 'choice') {
      const right = String(payload.choice).trim().toUpperCase() === String(quiz.answer).trim().toUpperCase().replace(/[^A-D]/g, '');
      return { score: right ? 100 : 0, verdict: right ? '对' : '错', steps: [{ point: '选项判定', got: right, note: right ? '正确' : '应为 ' + quiz.answer }], errorType: right ? 'none' : 'concept', comment: right ? '选对。' : '选错，对照解析找概念漏洞。', source: 'local' };
    }
    const steps = (payload.steps || []).filter(s => s && s.trim());
    let score = 40;
    const flags = [];
    if (steps.length >= 3) score += 20; else flags.push({ point: '步骤完整度', got: false, note: '只写了 ' + steps.length + ' 步，疑似跳步' });
    if (payload.final && payload.final.trim()) score += 20; else flags.push({ point: '最终结论', got: false, note: '未写最终结论' });
    const allText = steps.join(' ') + ' ' + (payload.final || '');
    // 危险模式：双负号 / 负号结尾
    if (/-\s*-|\d\s+-\s*$|-\s*$/.test(allText)) { score -= 20; flags.push({ point: '符号检查', got: false, note: '检测到疑似后置/双写负号' }); }
    // 分式：出现 a/b 但未出现"通分/分母"字样
    if (/\d\s*\/\s*\d/.test(allText) && !/通分|分母|公分母/.test(allText)) { score -= 15; flags.push({ point: '分式检查', got: false, note: '分式未见通分痕迹，疑似漏分母' }); }
    score = U.clamp(score, 0, 100);
    const errType = flags.some(f => f.point === '符号检查') ? 'sign' : flags.some(f => f.point === '分式检查') ? 'fraction' : flags.length ? 'careless' : 'none';
    if (!flags.length) flags.push({ point: '流程规范', got: true, note: '步骤完整，未检出危险模式' });
    return { score, verdict: score >= 80 ? '对' : score >= 40 ? '部分对' : '错', steps: flags, errorType: errType, comment: '本地规则评分（无AI，配置Key可得逐点精评）。', source: 'local' };
  }

  // ==================== 自动回写 ====================
  function commitResult(answerText) {
    const topic = allTopics().find(t => t.id === topicId);
    const score = judge.score;
    const level = score >= 80 ? 2 : score >= 50 ? 1 : 0;
    Store.update(s => {
      s.heat[topicId] = { level, score, updatedAt: new Date().toISOString() };
      if (score < 80 && judge.errorType && judge.errorType !== 'none') {
        s.mistakes.push({
          id: U.uid(), subject: topic.id[0] === 'm' ? 'math' : 'ctrl', type: judge.errorType,
          desc: '【AI测验】' + topic.name + '：' + (judge.comment || '作答有误'),
          date: U.shortDate(), createdAt: new Date().toISOString()
        });
      }
      if (topic.tier === 1 && score < 90) {
        for (let i = 0; i < 5; i++) {
          s.mistakeDrills.push({ id: U.uid(), source: 'topic', refId: topicId, title: '【罚练】' + topic.name + ' 同类题 ' + (i + 1) + '/5', subject: topic.id[0] === 'm' ? 'math' : 'ctrl', status: 'pending', penaltyOf: topicId, createdAt: new Date().toISOString() });
        }
      }
      s.quizHistory = s.quizHistory || [];
      s.quizHistory.push({ id: U.uid(), topicId, topicName: topic.name, score, verdict: judge.verdict, date: U.shortDate(), createdAt: new Date().toISOString(), source: judge.source });
      if (s.quizHistory.length > 100) s.quizHistory = s.quizHistory.slice(-100);
    });

    if (judge.errorType === 'sign') {
      setTimeout(() => {
        Modal.open({
          title: '⚠️ 符号错误自动捕获',
          html: '<p>判卷确认你又犯了<b>符号错误</b>（已自动记入错题本）。</p><p>强制复读：<b>负号立即提到最前面，不留在后面。</b></p>',
          actions: [{ label: '收到，下题前置符号', kind: 'btn-primary' }]
        });
      }, 600);
    }
    render(document.getElementById('view'));
  }

  // ==================== 渲染 ====================
  function render(el) {
    if (!el) return;
    if (phase === 'pick') renderPick(el);
    else if (phase === 'quizzing') renderQuiz(el);
    else renderResult(el);
  }

  function renderPick(el) {
    const heat = Store.get().heat;
    const scored = allTopics().map(t => {
      const h = heat[t.id] || {};
      const urgency = (h.level === 0 ? 3 : h.level === 1 ? 2 : 0) + (t.tier === 1 && (h.score == null || h.score < 90) ? 2 : 0);
      return { t, urgency, score: h.score };
    }).sort((a, b) => b.urgency - a.urgency);
    const recommend = scored.slice(0, 6);

    el.innerHTML =
      '<div class="card"><div class="card-title">🤖 AI 智能测验</div>'
      + '<div class="muted-sm">选考点 → 引擎出题（' + (AI.configured() ? '云端AI' : '本地题库') + '）→ 你作答 → <b>自动判卷并回写热力图/错题本</b>，全程不用手动标记。</div>'
      + (AI.configured() ? '<div class="alert alert-ok" style="margin-top:8px">✓ 云端AI已就绪：AI出题 + AI逐点精判</div>'
        : '<div class="alert alert-warn" style="margin-top:8px">当前为本地题库模式（离线）。到设置配API Key可解锁AI自由出题+逐点精判。</div>')
      + '</div>'

      // 难度选择
      + '<div class="card"><div class="card-title">难度</div>'
      + '<div class="seg-row" id="diff-row">'
      + '<button class="seg" data-d="auto">🎯 智能推荐</button>'
      + Object.keys(DIFFS).map(k => '<button class="seg" data-d="' + k + '">' + DIFFS[k].icon + ' ' + DIFFS[k].name + '</button>').join('')
      + '</div>'
      + '<div class="muted-sm" id="diff-hint">' + diffHint() + '</div>'
      + '</div>'

      // 自定义出题要求（备注）
      + '<div class="card"><div class="card-title">📝 出题备注（可选）</div>'
      + '<div class="muted-sm">补充更精细的出题要求，如指定题型、知识点范围、出题风格等。留空则仅按难度和考点自动出题。</div>'
      + '<textarea id="quiz-custom-req" class="input" rows="2" placeholder="例如：只出证明题、侧重洛必达法则、结合2023真题风格、不要含参变积分...">' + U.esc(customReq) + '</textarea>'
      + '</div>'

      + '<div class="card"><div class="card-title">🎯 系统推荐（按危险度排序）</div>'
      + recommend.map(r =>
        '<button class="seq-row quiz-pick" data-id="' + r.t.id + '">'
        + '<span class="seq-text">' + r.t.group + ' · ' + r.t.name + ' <span class="muted-sm">' + DB.TIERS[r.t.tier].icon + DB.TIERS[r.t.tier].name + '</span></span>'
        + '<span class="seq-badge" style="color:' + (r.score == null ? '#999' : r.score >= 80 ? 'var(--ok)' : r.score >= 50 ? 'var(--warn)' : 'var(--danger)') + '">' + (r.score == null ? '未测' : r.score + '%') + '</span>'
        + '</button>'
      ).join('')
      + '<div class="muted-sm" style="margin-top:8px">或从全部考点中选：</div>'
      + '<select id="quiz-sel" class="input input-sel" style="margin-top:6px">'
      + allTopics().map(t => '<option value="' + t.id + '">' + t.group + ' · ' + t.name + '（' + DB.TIERS[t.tier].name + '）</option>').join('')
      + '</select>'
      + '<button class="btn btn-primary btn-block" id="quiz-go">开始测验</button>'
      + '</div>'

      + historyHtml();

    // 难度选择交互
    el.querySelectorAll('#diff-row .seg').forEach(b => {
      if (b.getAttribute('data-d') === difficulty) b.classList.add('seg-on');
      b.onclick = () => {
        difficulty = b.getAttribute('data-d');
        el.querySelectorAll('#diff-row .seg').forEach(x => x.classList.remove('seg-on'));
        b.classList.add('seg-on');
        el.querySelector('#diff-hint').textContent = diffHint();
      };
    });

    // 自定义出题要求
    const reqInput = el.querySelector('#quiz-custom-req');
    if (reqInput) reqInput.oninput = () => { customReq = reqInput.value.trim(); };

    el.querySelectorAll('.quiz-pick').forEach(b => b.onclick = () => { topicId = b.getAttribute('data-id'); variantOf = null; makeQuiz(); });
    el.querySelector('#quiz-go').onclick = () => { topicId = el.querySelector('#quiz-sel').value; variantOf = null; makeQuiz(); };

    // 题库交互
    const bankExp = el.querySelector('#bank-export');
    if (bankExp) bankExp.onclick = () => {

      U.download('quiz_bank_' + U.dkey() + '.json', JSON.stringify(bank, null, 2));

    el.querySelectorAll('.bank-view').forEach(b => b.onclick = () => {
      const q = (Store.get().quizBank || []).find(x => x.id === b.getAttribute('data-id'));

    return d.icon + ' ' + d.name + '：' + d.prompt + '。';

      + (variantOf ? '<span class="tag tag-red">变式复现</span> ' : '')
      + '<span class="tag ' + (quiz.source === 'ai' ? 'tag-ok' : '') + '">' + (quiz.source === 'ai' ? 'AI出题' : '本地题') + '</span>'
