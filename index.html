    const diff = difficulty === 'auto' ? autoDifficulty(topicId) : difficulty;
    const diffMeta = DIFFS[diff];
    const userWeak = Store.weekTopMistakes().map(t => (DB.MISTAKE_TYPES[t.key] || {}).name).join('、') || '符号错误';

    if (!AI.configured()) {
      // 未配置AI：提示去配置（本地题库仅作兜底演示）
      quiz = localQuiz(topic, diff);
      render(document.getElementById('view'));
      return;
    }

    let ask;
    if (variantOf) {
      ask = '这是一道需要变式复现的错题。原题/考点：' + variantOf.originDesc +
        '；学生错误类型：' + (DB.MISTAKE_TYPES[variantOf.errorType] || {}).name +
        '。请出一道【同源变式题】：同一知识点、保留同样的陷阱（' + userWeak + '），但更换数字、情境或问法，' +
        '难度等级：' + diffMeta.name + '（' + diffMeta.prompt + '）。用于验证学生是否真正掌握。';
    } else {
      ask = '考点：' + topic.group + '·' + topic.name + '；层级：' + DB.TIERS[topic.tier].name +
        '（' + DB.TIERS[topic.tier].range + '）；难度等级：' + diffMeta.name + '（' + diffMeta.prompt + '）；' +
        '该生本周高频错误：' + userWeak + '。请出1道题。';
    }

    const doFetch = () => AI.chatJSON(AI.QUIZ_PROMPT, ask);
    doFetch().then(q => {
      quiz = Object.assign({ source: 'ai', diff }, q);
      render(document.getElementById('view'));
    }).catch(e => {
      // 失败：提供重试/中止，不再自动转本地题库
      const view = document.getElementById('view');
      view.innerHTML =
        '<div class="card"><div class="card-title">⚠️ AI 出题失败</div>'
        + '<div class="muted-sm">原因：' + U.esc(e.message || '网络或接口异常') + '。本地题库题量有限，建议重试或检查API配置。</div>'
        + '<div class="btn-row" style="margin-top:14px">'
        + '<button class="btn btn-primary" id="quiz-retry">🔄 重试出题</button>'
        + '<button class="btn btn-ghost" id="quiz-local">用本地题库兜底</button>'
        + '<button class="btn btn-ghost" id="quiz-cancel">返回选题</button>'
        + '</div></div>';
      document.getElementById('quiz-retry').onclick = () => makeQuiz();
      document.getElementById('quiz-local').onclick = () => { quiz = localQuiz(topic, diff); render(view); };
      document.getElementById('quiz-cancel').onclick = () => { phase = 'pick'; variantOf = null; render(view); };
    });
  }

  function localQuiz(topic, diff) {
    const bank = LOCAL_BANK[topic.id];
    let q;
    if (bank) {
      // 本地题库按难度分层：题目标记了lv则匹配，无标记则按难度筛选
      const lvMap = { easy: 1, medium: 2, real: 3, hard: 4 };
      const want = lvMap[diff] || 2;
      const pool = bank.filter(b => (b.lv || 2) === want);
      const use = pool.length ? pool : bank; // 无该难度题则全库随机
      q = use[U.randInt(0, use.length - 1)].gen();
    } else {
      q = fallbackLocal(topic);
    }
    return Object.assign({ source: 'local', diff }, q);
  }

  // ==================== 判卷 ====================
  function submitAnswer(payload) {
    phase = 'result'; judge = null;
    render(document.getElementById('view'));

    const answerText = quiz.type === 'choice'
      ? '学生选择：' + payload.choice
      : (payload.image
        ? '学生上传了手写步骤照片（见图），' + (payload.final ? '文字结论：' + payload.final : '未给文字结论')
        : ('学生文字作答：' + payload.steps.filter(Boolean).join(' → ') + ' 结论：' + payload.final));
    const useAI = AI.configured();

    if (useAI) {
      const ask = '题目：' + quiz.stem + '\n标准答案：' + quiz.answer + '\n参考解析：' + quiz.solution +
        '\n' + answerText + '\n该生易错点：' + Store.weekTopMistakes().map(t => (DB.MISTAKE_TYPES[t.key] || {}).name).join('、');
      // 流式或普通判卷
      if (AI.useStream() && !payload.image) {
        // 流式：显示判卷过程
        const view = document.getElementById('view');
        view.innerHTML = '<div class="card"><div class="card-title">🤖 AI 判卷中…</div><pre class="report" id="judge-stream"></pre></div>';
        AI.chatStream(AI.JUDGE_PROMPT, ask, txt => {
          const el = document.getElementById('judge-stream');
          if (el) el.textContent = txt;
        }).then(txt => {
          try {
            const m = txt.match(/\{[\s\S]*\}/);
            judge = normalizeJudge(JSON.parse(m[0]), 'ai');
          } catch (e) { judge = localJudge(payload); }
          commitResult(answerText);
        }).catch(() => { judge = localJudge(payload); commitResult(answerText); });
      } else {
        AI.chatJSON(AI.JUDGE_PROMPT, ask, payload.image).then(j => {
          judge = normalizeJudge(j, 'ai');
          commitResult(answerText);
        }).catch(() => {
          judge = localJudge(payload);
          commitResult(answerText);
        });
      }
    } else {
      judge = localJudge(payload);
      commitResult(answerText);
    }
  }

  function normalizeJudge(j, source) {
    return {
      score: U.clamp(parseInt(j.score, 10) || 0, 0, 100),
      verdict: j.verdict || (j.score >= 80 ? '对' : j.score >= 40 ? '部分对' : '错'),
      steps: Array.isArray(j.steps) ? j.steps : [],
      errorType: j.errorType || 'none',
      comment: j.comment || '',
      source
    };
  }

  // 本地规则判卷（离线）
  function localJudge(payload) {
    if (quiz.type === 'choice') {
      const right = String(payload.choice).trim().toUpperCase() === String(quiz.answer).trim().toUpperCase().replace(/[^A-D]/g, '');
      return { score: right ? 100 : 0, verdict: right ? '对' : '错', steps: [{ point: '选项判定', got: right, note: right ? '正确' : '应为 ' + quiz.answer }], errorType: right ? 'none' : 'concept', comment: right ? '选对。' : '选错，对照解析找概念漏洞。', source: 'local' };
    }
    const steps = (payload.steps || []).filter(s => s && s.trim());
    let score = 40;
    const flags = [];
    if (steps.length >= 3) score += 20; else flags.push({ point: '步骤完整度', got: false, note: '只写了 ' + steps.length + ' 步，疑似跳步' });
    if (payload.final && payload.final.trim()) score += 20; else flags.push({ point: '最终结论', got: false, note: '未写最终结论' });
    const allText = steps.join(' ') + ' ' + (payload.final || '');
    // 危险模式：双负号 / 负号结尾
    if (/-\s*-|\d\s+-\s*$|-\s*$/.test(allText)) { score -= 20; flags.push({ point: '符号检查', got: false, note: '检测到疑似后置/双写负号' }); }
    // 分式：出现 a/b 但未出现"通分/分母"字样
    if (/\d\s*\/\s*\d/.test(allText) && !/通分|分母|公分母/.test(allText)) { score -= 15; flags.push({ point: '分式检查', got: false, note: '分式未见通分痕迹，疑似漏分母' }); }
    score = U.clamp(score, 0, 100);
    const errType = flags.some(f => f.point === '符号检查') ? 'sign' : flags.some(f => f.point === '分式检查') ? 'fraction' : flags.length ? 'careless' : 'none';
    if (!flags.length) flags.push({ point: '流程规范', got: true, note: '步骤完整，未检出危险模式' });
    return { score, verdict: score >= 80 ? '对' : score >= 40 ? '部分对' : '错', steps: flags, errorType: errType, comment: '本地规则评分（无AI，配置Key可得逐点精评）。', source: 'local' };
  }

  // ==================== 自动回写 ====================
  function commitResult(answerText) {
    const topic = allTopics().find(t => t.id === topicId);
    const score = judge.score;
    const level = score >= 80 ? 2 : score >= 50 ? 1 : 0;
    Store.update(s => {
      s.heat[topicId] = { level, score, updatedAt: new Date().toISOString() };
      if (score < 80 && judge.errorType && judge.errorType !== 'none') {
        s.mistakes.push({
          id: U.uid(), subject: topic.id[0] === 'm' ? 'math' : 'ctrl', type: judge.errorType,
          desc: '【AI测验】' + topic.name + '：' + (judge.comment || '作答有误'),
          date: U.shortDate(), createdAt: new Date().toISOString()
        });
      }
      if (topic.tier === 1 && score < 90) {
        for (let i = 0; i < 5; i++) {
          s.mistakeDrills.push({ id: U.uid(), source: 'topic', refId: topicId, title: '【罚练】' + topic.name + ' 同类题 ' + (i + 1) + '/5', subject: topic.id[0] === 'm' ? 'math' : 'ctrl', status: 'pending', penaltyOf: topicId, createdAt: new Date().toISOString() });
        }
      }
      s.quizHistory = s.quizHistory || [];
      s.quizHistory.push({ id: U.uid(), topicId, topicName: topic.name, score, verdict: judge.verdict, date: U.shortDate(), createdAt: new Date().toISOString(), source: judge.source });
      if (s.quizHistory.length > 100) s.quizHistory = s.quizHistory.slice(-100);
    });

    if (judge.errorType === 'sign') {
      setTimeout(() => {
        Modal.open({
          title: '⚠️ 符号错误自动捕获',
          html: '<p>判卷确认你又犯了<b>符号错误</b>（已自动记入错题本）。</p><p>强制复读：<b>负号立即提到最前面，不留在后面。</b></p>',
          actions: [{ label: '收到，下题前置符号', kind: 'btn-primary' }]
        });
      }, 600);
    }
    render(document.getElementById('view'));
  }

  // ==================== 渲染 ====================
  function render(el) {
    if (!el) return;
    if (phase === 'pick') renderPick(el);
    else if (phase === 'quizzing') renderQuiz(el);
    else renderResult(el);
  }

  function renderPick(el) {
    const heat = Store.get().heat;
    const scored = allTopics().map(t => {
      const h = heat[t.id] || {};
      const urgency = (h.level === 0 ? 3 : h.level === 1 ? 2 : 0) + (t.tier === 1 && (h.score == null || h.score < 90) ? 2 : 0);
      return { t, urgency, score: h.score };
    }).sort((a, b) => b.urgency - a.urgency);
    const recommend = scored.slice(0, 6);

    el.innerHTML =
      '<div class="card"><div class="card-title">🤖 AI 智能测验</div>'
      + '<div class="muted-sm">选考点 → 引擎出题（' + (AI.configured() ? '云端AI' : '本地题库') + '）→ 你作答 → <b>自动判卷并回写热力图/错题本</b>，全程不用手动标记。</div>'
      + (AI.configured() ? '<div class="alert alert-ok" style="margin-top:8px">✓ 云端AI已就绪：AI出题 + AI逐点精判</div>'
        : '<div class="alert alert-warn" style="margin-top:8px">当前为本地题库模式（离线）。到设置配API Key可解锁AI自由出题+逐点精判。</div>')
      + '</div>'

      // 难度选择
      + '<div class="card"><div class="card-title">难度</div>'
      + '<div class="seg-row" id="diff-row">'
      + '<button class="seg" data-d="auto">🎯 智能推荐</button>'
      + Object.keys(DIFFS).map(k => '<button class="seg" data-d="' + k + '">' + DIFFS[k].icon + ' ' + DIFFS[k].name + '</button>').join('')
      + '</div>'
      + '<div class="muted-sm" id="diff-hint">' + diffHint() + '</div>'
      + '</div>'

      + '<div class="card"><div class="card-title">🎯 系统推荐（按危险度排序）</div>'
      + recommend.map(r =>
        '<button class="seq-row quiz-pick" data-id="' + r.t.id + '">'
        + '<span class="seq-text">' + r.t.group + ' · ' + r.t.name + ' <span class="muted-sm">' + DB.TIERS[r.t.tier].icon + DB.TIERS[r.t.tier].name + '</span></span>'
        + '<span class="seq-badge" style="color:' + (r.score == null ? '#999' : r.score >= 80 ? 'var(--ok)' : r.score >= 50 ? 'var(--warn)' : 'var(--danger)') + '">' + (r.score == null ? '未测' : r.score + '%') + '</span>'
        + '</button>'
      ).join('')
      + '<div class="muted-sm" style="margin-top:8px">或从全部考点中选：</div>'
      + '<select id="quiz-sel" class="input input-sel" style="margin-top:6px">'
      + allTopics().map(t => '<option value="' + t.id + '">' + t.group + ' · ' + t.name + '（' + DB.TIERS[t.tier].name + '）</option>').join('')
      + '</select>'
      + '<button class="btn btn-primary btn-block" id="quiz-go">开始测验</button>'
      + '</div>'

      + historyHtml();

    // 难度选择交互
    el.querySelectorAll('#diff-row .seg').forEach(b => {
      if (b.getAttribute('data-d') === difficulty) b.classList.add('seg-on');
      b.onclick = () => {
        difficulty = b.getAttribute('data-d');
        el.querySelectorAll('#diff-row .seg').forEach(x => x.classList.remove('seg-on'));
        b.classList.add('seg-on');
        el.querySelector('#diff-hint').textContent = diffHint();
      };
    });

    el.querySelectorAll('.quiz-pick').forEach(b => b.onclick = () => { topicId = b.getAttribute('data-id'); variantOf = null; makeQuiz(); });
    el.querySelector('#quiz-go').onclick = () => { topicId = el.querySelector('#quiz-sel').value; variantOf = null; makeQuiz(); };

    // 题库交互
    const bankExp = el.querySelector('#bank-export');
    if (bankExp) bankExp.onclick = () => {
      const bank = Store.get().quizBank || [];
      U.download('quiz_bank_' + U.dkey() + '.json', JSON.stringify(bank, null, 2));
      Toast.success('题库已导出 ' + bank.length + ' 题');
    };
    el.querySelectorAll('.bank-view').forEach(b => b.onclick = () => {
      const q = (Store.get().quizBank || []).find(x => x.id === b.getAttribute('data-id'));
      if (!q) return;
      Modal.open({
        title: '⭐ ' + q.topicName + '（收藏题）', wide: true,
        html: '<div class="quiz-stem">' + formatStem(q.stem) + '</div>'
          + '<div class="card-title-sm" style="margin-top:12px">答案</div><div class="report">' + U.esc(q.answer) + '</div>'
          + '<div class="card-title-sm">解析</div><div class="report">' + formatStem(q.solution || '') + '</div>'
          + (q.trap ? '<div class="alert alert-warn" style="margin-top:8px">💣 陷阱：' + U.esc(q.trap) + '</div>' : ''),
        actions: [{ label: '关闭', kind: 'btn-primary' }]
      });
    });
    el.querySelectorAll('.bank-del').forEach(b => b.onclick = () => {
      const id = b.getAttribute('data-id');
      Modal.confirm('删除题目', '<p>从本地题库删除此题？</p>', '删除', () => {
        Store.update(s => { s.quizBank = s.quizBank.filter(x => x.id !== id); });
        App.refresh();
      }, true);
    });
  }

  function diffHint() {
    if (difficulty === 'auto') return '智能推荐：按你在该考点的掌握度自动选难度（未测/薄弱→简单，掌握→真题难度，熟练→极难）。';
    const d = DIFFS[difficulty];
    return d.icon + ' ' + d.name + '：' + d.prompt + '。';
  }

  function historyHtml() {
    const his = U.clone(Store.get().quizHistory || []).reverse().slice(0, 8);
    const bank = Store.get().quizBank || [];
    let html = '';
    if (his.length) {
      html += '<div class="card"><div class="card-title">最近测验</div>'
        + his.map(h => '<div class="his-row"><span>' + h.topicName + ' · ' + h.date + (h.source === 'ai' ? ' <span class="tag tag-ok">AI</span>' : '') + '</span>'
          + '<span class="risk-' + (h.score >= 80 ? 'low' : h.score >= 50 ? 'mid' : 'high') + '">' + h.score + '分</span></div>').join('')
        + '</div>';
    }
    // 我的题库
    html += '<div class="card"><div class="card-title-row"><span class="card-title">⭐ 我的题库（' + bank.length + ' 题）</span>'
      + (bank.length ? '<button class="link-btn" id="bank-export">导出JSON</button>' : '') + '</div>'
      + (bank.length
        ? U.clone(bank).reverse().slice(0, 10).map(q =>
          '<div class="mis-row" style="border-left-color:#d48806"><div class="mis-head">'
          + '<span class="tag" style="background:#d48806">' + U.esc(q.topicName) + '</span>'
          + '<span class="mis-date">' + U.esc((q.savedAt || '').slice(5, 10)) + '</span></div>'
          + '<div class="mis-desc">' + formatStem(q.stem).slice(0, 120) + '</div>'
          + '<div class="mis-actions"><button class="btn btn-sm btn-ghost bank-view" data-id="' + q.id + '">查看解析</button>'
          + '<button class="btn btn-sm btn-ghost bank-del" data-id="' + q.id + '">删除</button></div></div>'
        ).join('')
        : '<div class="empty">答完题点"加入本地题库"即可收藏。好题值得反复做。</div>')
      + '</div>';
    return html;
  }

  function renderQuiz(el) {
    if (!quiz) {
      el.innerHTML = '<div class="card"><div class="empty">🤖 出题中…（云端AI生成）</div></div>';
      return;
    }
    let answerUI = '';
    if (quiz.type === 'choice') {
      answerUI = '<div id="quiz-opts">'
        + (quiz.options || []).map(o => {
          const letter = o.trim().charAt(0);
          return '<button class="seq-row quiz-opt" data-v="' + letter + '"><span class="seq-text">' + U.esc(o) + '</span></button>';
        }).join('') + '</div>';
    } else {
      answerUI = '<div class="muted-sm" style="margin:6px 0">作答方式（二选一，也可结合）：</div>'
        + '<div class="btn-row" style="margin-bottom:8px"><button class="btn btn-sm btn-ghost" id="quiz-img-btn">📷 上传手写步骤照片（AI识别）</button>'
        + '<input type="file" id="quiz-img" accept="image/*" style="display:none"></div>'
        + '<div id="quiz-img-preview"></div>'
        + '<div class="muted-sm" style="margin:6px 0">或文字分步输入（可只写关键步骤，不强制每步）：</div>'
        + [1, 2, 3, 4].map(i => '<textarea class="input step-in quiz-step" data-i="' + (i - 1) + '" rows="2" placeholder="第' + i + '步（可留空）"></textarea>').join('')
        + '<input class="input" id="quiz-final" placeholder="最终结论（可留空，直接看解析）" style="margin-top:8px">';
    }

    el.innerHTML =
      '<div class="card"><div class="card-title-row"><span class="card-title">📝 作答中</span>'
      + '<span>'
      + (quiz.diff ? '<span class="tag" style="background:' + (quiz.diff === 'easy' ? '#237804' : quiz.diff === 'medium' ? '#d48806' : quiz.diff === 'real' ? '#d4380d' : '#cf1322') + '">' + DIFFS[quiz.diff].icon + DIFFS[quiz.diff].name + '</span> ' : '')
      + (variantOf ? '<span class="tag tag-red">变式复现</span> ' : '')
      + '<span class="tag ' + (quiz.source === 'ai' ? 'tag-ok' : '') + '">' + (quiz.source === 'ai' ? 'AI出题' : '本地题') + '</span>'
      + '</span></div>'
      + '<div class="quiz-stem">' + formatStem(quiz.stem) + '</div>'
      + '<div class="alert alert-warn" style="margin:10px 0">💣 本题陷阱预警：' + formatStem(quiz.trap || '无') + '</div>'
      + answerUI
      + '<div class="btn-row" style="margin-top:14px">'
      + '<button class="btn btn-primary" id="quiz-submit">提交判卷</button>'
      + '<button class="btn btn-ghost" id="quiz-giveup">🤷 不会，看解析</button>'
      + '</div></div>';

    bindQuiz(el);
  }

  function formatStem(s) {
    // 用极简LaTeX渲染器处理 $..$ 公式，普通文本转义
    return window.Tex ? Tex.renderInline(s) : U.esc(s).replace(/\n/g, '<br>');
  }

  function bindQuiz(el) {
    let choice = null;
    let imageDataUrl = null;
    el.querySelectorAll('.quiz-opt').forEach(b => b.onclick = () => {
      el.querySelectorAll('.quiz-opt').forEach(x => x.classList.remove('opt-on'));
      b.classList.add('opt-on');
      choice = b.getAttribute('data-v');
    });

    // 图片上传（手写步骤）
    const imgBtn = el.querySelector('#quiz-img-btn');
    if (imgBtn) {
      imgBtn.onclick = () => el.querySelector('#quiz-img').click();
      el.querySelector('#quiz-img').onchange = e => {
        const f = e.target.files[0];
        if (!f) return;
        const rd = new FileReader();
        rd.onload = () => {
          imageDataUrl = rd.result;
          el.querySelector('#quiz-img-preview').innerHTML =
            '<div class="img-prev"><img src="' + imageDataUrl + '" alt="手写步骤"><span class="muted-sm">已上传，AI将分析你的手写步骤</span></div>';
        };
        rd.readAsDataURL(f);
      };
    }

    // 不会，看解析（不判卷，直接给0分+解析）
    el.querySelector('#quiz-giveup').onclick = () => {
      judge = { score: 0, verdict: '未作答', steps: [], errorType: 'none', comment: '直接看解析。看懂后点"再来一题"巩固。', source: 'giveup' };
      phase = 'result';
      // 仍然回写：未掌握
      const topic = allTopics().find(t => t.id === topicId);
      Store.update(s => {
        s.heat[topicId] = { level: 0, score: 0, updatedAt: new Date().toISOString() };
      });
      render(el);
    };

    el.querySelector('#quiz-submit').onclick = () => {
      if (quiz.type === 'choice') {
        if (!choice) { Toast.warn('请先选择一个选项'); return; }
        submitAnswer({ choice });
      } else {
        const steps = [];
        el.querySelectorAll('.quiz-step').forEach(t => steps.push(t.value));
        const final = el.querySelector('#quiz-final').value.trim();
        const hasSteps = steps.some(s => s.trim());
        if (!hasSteps && !final && !imageDataUrl) { Toast.warn('写点东西或传张照片再提交，或点"不会，看解析"。'); return; }
        submitAnswer({ steps, final, image: imageDataUrl });
      }
    };
  }

  function renderResult(el) {
    if (!judge) {
      el.innerHTML = '<div class="card"><div class="empty">🤖 判卷中…（' + (AI.configured() ? 'AI逐点精评' : '本地规则评分') + '）</div></div>';
      return;
    }
    const cls = judge.score >= 80 ? 'low' : judge.score >= 50 ? 'mid' : 'high';
    const errMeta = judge.errorType !== 'none' && DB.MISTAKE_TYPES[judge.errorType] ? DB.MISTAKE_TYPES[judge.errorType] : null;

    el.innerHTML =
      '<div class="card"><div class="card-title-row"><span class="card-title">📋 判卷结果</span>'
      + '<span class="tag ' + (judge.source === 'ai' ? 'tag-ok' : '') + '">' + (judge.source === 'ai' ? 'AI精判' : '本地判') + '</span></div>'
      + '<div class="risk-card risk-bg-' + cls + '"><div class="risk-score">' + judge.score + '<span class="risk-max">/100</span></div>'
      + '<div class="risk-label">' + (judge.score >= 80 ? '🟢 ' : judge.score >= 50 ? '🟡 ' : '🔴 ') + U.esc(judge.verdict) + '</div></div>'

      + (judge.steps.length ? '<div class="card-title-sm" style="margin-top:14px">采分点</div>'
        + judge.steps.map(s => '<div class="judge-step"><span class="judge-ico">' + (s.got ? '✅' : '❌') + '</span><span><b>' + U.esc(s.point) + '</b> — ' + U.esc(s.note || '') + '</span></div>').join('') : '')

      + (errMeta ? '<div class="alert alert-danger" style="margin-top:12px">错误类型已标记：<span class="tag" style="background:' + errMeta.color + '">' + errMeta.name + '</span>（已自动记入错题本）</div>' : '')
      + (judge.comment ? '<div class="reason-box" style="margin-top:10px">💬 ' + U.esc(judge.comment) + '</div>' : '')

      + '<div class="card-title-sm" style="margin-top:14px">标准解析</div><div class="report">' + formatStem(quiz.solution || '见教材') + '</div>'

      + '<div class="alert alert-ok" style="margin-top:12px">✓ 已自动回写：热力图「' + U.esc(allTopics().find(t => t.id === topicId).name) + '」掌握度 → ' + judge.score + '%'
      + (judge.score < 80 ? '；错题本+1' + (allTopics().find(t => t.id === topicId).tier === 1 && judge.score < 90 ? '；必拿层罚5题已入重练队列' : '') : '') + '</div>'

      + '<div class="btn-row" style="margin-top:14px">'
      + '<button class="btn btn-primary" id="quiz-next">再来一题（同考点）</button>'
      + '<button class="btn btn-ghost" id="quiz-save">⭐ 加入本地题库</button>'
      + '<button class="btn btn-ghost" id="quiz-back">返回选题</button>'
      + '</div></div>';

    el.querySelector('#quiz-next').onclick = () => { makeQuiz(); };
    el.querySelector('#quiz-back').onclick = () => { phase = 'pick'; variantOf = null; render(el); };
    el.querySelector('#quiz-save').onclick = () => {
      const topic = allTopics().find(t => t.id === topicId);
      Store.update(s => {
        s.quizBank.push({
          id: U.uid(), topicId, topicName: topic ? topic.name : '综合',
          stem: quiz.stem, type: quiz.type, options: quiz.options || null,
          answer: quiz.answer, solution: quiz.solution, trap: quiz.trap,
          diff: quiz.diff || 'medium', savedAt: new Date().toISOString(),
          note: '得分 ' + judge.score + ' · ' + judge.verdict
        });
      });
      Toast.success('已存入本地题库（共 ' + Store.get().quizBank.length + ' 题）');
    };
  }

  // 错题变式复现入口：从错题本跳入，生成同源变式题
  function startVariant(mistake) {
    // 根据错题科目猜考点：用错误类型映射到一个相关考点，或让用户在选题页确认
    variantOf = {
      topicName: mistake.desc || '综合',
      errorType: mistake.type,
      originDesc: mistake.desc || '（原题描述缺失）'
    };
    // 找一个与错误类型最相关的考点作为默认（符号/分式→定积分换元，概念→对应科目首考点）
    const guessTopic = mistake.subject === 'ctrl' ? DB.TOPICS.ctrl[0].id
      : mistake.type === 'sign' || mistake.type === 'fraction' ? 'm-subst'
      : mistake.type === 'integral' ? 'm-ode' : DB.TOPICS.math[0].id;
    topicId = guessTopic;
    phase = 'pick';
    // 直接进入出题（用变式）
    makeQuiz();
  }

  window.QuizModule = { render, startVariant };
})();


/* ===== js/modules/inspector.js ===== */
/* ============================================================
 * inspector.js — 数学计算步骤审查器（Step Inspector）
 * 结构化步骤输入 + 规则级检查（负号后置/分式漏分母/未求导验证）
 * 输出 1-10 风险评分，高风险(≥7)自动加入错题本
 * ============================================================ */
(function () {
  'use strict';
  let curType = 'integral';
  let stepInputs = [];
  let checkState = {};

  // 规则级文本检查
  function analyze(texts) {
    const flags = [];
    texts.forEach((t, i) => {
      if (!t) return;
      // 负号后置/双写：如 "3 - -2" 或行尾裸露负号
      if (/-\s*-|-\s*$/.test(t)) {
        flags.push({ step: i + 1, type: 'sign', msg: '第' + (i + 1) + '步检测到疑似后置/双写负号，请立即前置处理' });
      }
      // 分式漏分母：出现 a/b 但全文无"分母/通分"字样
      if (/\d\s*\/\s*\d/.test(t) && texts[i + 1] && !/分母|通分|公分母/.test(texts[i + 1])) {
        flags.push({ step: i + 2, type: 'fraction', msg: '第' + (i + 2) + '步疑似分式未带分母，请用三步法（分母→分子→计算）核对' });
      }
      // 跳步痕迹：单步文本过长
      if (t.length > 60) flags.push({ step: i + 1, type: 'careless', msg: '第' + (i + 1) + '步内容过长，疑似跳步，建议拆开重写' });
    });
    return flags;
  }

  function riskScore(flags, checks) {
    let score = 1;
    flags.forEach(f => { score += f.type === 'sign' ? 2.5 : f.type === 'fraction' ? 2.5 : 1; });
    Object.keys(checks).forEach(k => { if (!checks[k]) score += 1.5; });
    return U.clamp(Math.round(score), 1, 10);
  }

  function render(el) {
    const tpl = DB.INSPECTOR_TYPES[curType];
    stepInputs = tpl.steps.map(() => '');
    checkState = {};
    tpl.checks.forEach(c => checkState[c.key] = false);

    el.innerHTML =
      '<div class="card"><div class="card-title">✍️ 数学计算步骤审查器</div>'
      + '<div class="muted-sm">结构化步骤输入，专治符号错误 / 分式漏分母 / 积分因子符号反。每步必填，系统做规则级检查。</div>'
      + '<div class="tab-row">'
      + Object.keys(DB.INSPECTOR_TYPES).map(k => '<button class="tab' + (curType === k ? ' tab-on' : '') + '" data-t="' + k + '">' + DB.INSPECTOR_TYPES[k].name + '</button>').join('')
      + '</div>'
      + '<div id="insp-steps">'
      + tpl.steps.map((st, i) =>
        '<div class="step-row"><div class="step-head"><span class="step-no">' + (i + 1) + '</span><b>' + U.esc(st.name) + '</b></div>'
        + '<div class="muted-sm">' + U.esc(st.hint) + '</div>'
        + '<textarea class="input step-in" data-i="' + i + '" rows="2" placeholder="写下这一步的中间结果（必填）"></textarea></div>'
      ).join('')
      + '</div>'
      + '<div class="card-inner"><div class="card-title-sm">强制验证项</div>'
      + tpl.checks.map(c =>
        '<label class="check-row"><input type="checkbox" data-chk="' + c.key + '"><span class="box"></span>'
        + '<span><b>' + U.esc(c.label) + '</b> — ' + U.esc(c.desc) + '</span></label>'
      ).join('')
      + '</div>'
      + '<button class="btn btn-primary btn-block" id="insp-run">执行审查</button>'
      + '<div id="insp-result"></div>'
      + '</div>'

      + historyHtml();

    bind(el);
  }

  function historyHtml() {
    const runs = U.clone(Store.get().inspector.runs).reverse().slice(0, 8);
    if (!runs.length) return '';
    return '<div class="card"><div class="card-title">审查历史</div>'
      + runs.map(r => '<div class="his-row"><span>' + (DB.INSPECTOR_TYPES[r.type] || {}).name + ' · ' + r.date + '</span>'
        + '<span class="risk-' + (r.risk >= 7 ? 'high' : r.risk >= 4 ? 'mid' : 'low') + '">风险 ' + r.risk + '/10</span></div>').join('')
      + '</div>';
  }

  function bind(el) {
    el.querySelectorAll('[data-t]').forEach(b => b.onclick = () => { curType = b.getAttribute('data-t'); render(el); });
    el.querySelectorAll('.step-in').forEach(t => t.oninput = () => { stepInputs[+t.getAttribute('data-i')] = t.value; });
    el.querySelectorAll('[data-chk]').forEach(cb => cb.onchange = () => { checkState[cb.getAttribute('data-chk')] = cb.checked; });

    el.querySelector('#insp-run').onclick = () => {
      const tpl = DB.INSPECTOR_TYPES[curType];
      const emptyIdx = stepInputs.findIndex((v) => !v.trim());
      if (emptyIdx >= 0) { Toast.warn('第 ' + (emptyIdx + 1) + ' 步「' + tpl.steps[emptyIdx].name + '」未填写。步骤化就是为了防止跳步，请补全。'); return; }

      const flags = analyze(stepInputs);
      const risk = riskScore(flags, checkState);

      let html = '<div class="risk-card risk-bg-' + (risk >= 7 ? 'high' : risk >= 4 ? 'mid' : 'low') + '">'
        + '<div class="risk-score">' + risk + '<span class="risk-max">/10</span></div>'
        + '<div class="risk-label">' + (risk >= 7 ? '🔴 高风险：建议重做并加入错题本' : risk >= 4 ? '🟡 中风险：复核标记步骤' : '🟢 低风险：流程规范') + '</div></div>';
      if (flags.length) {
        html += '<div class="flag-list">' + flags.map(f => '<div class="flag-row flag-' + f.type + '">⚠️ ' + U.esc(f.msg) + '</div>').join('') + '</div>';
      } else {
        html += '<div class="muted-sm" style="margin-top:8px">未检测到规则级错误模式。</div>';
      }
      const unchecked = Object.keys(checkState).filter(k => !checkState[k]);
      if (unchecked.length) {
        html += '<div class="alert alert-warn" style="margin-top:8px">未完成的强制验证：' + unchecked.map(k => { const c = tpl.checks.find(x => x.key === k); return c ? c.label : k; }).join('、') + '</div>';
      }
      document.getElementById('insp-result').innerHTML = html;

      Store.update(s => {
        s.inspector.runs.push({ id: U.uid(), date: U.shortDate(), type: curType, risk, flags: flags.map(f => f.msg) });
        if (s.inspector.runs.length > 100) s.inspector.runs = s.inspector.runs.slice(-100);
        if (risk >= 7) {
          s.mistakes.push({
            id: U.uid(), subject: 'math', type: flags[0] ? flags[0].type : 'careless',
            desc: '【步骤审查高风险' + risk + '/10】' + tpl.name + '：' + (flags[0] ? flags[0].msg : '强制验证未通过'),
            date: U.shortDate(), createdAt: new Date().toISOString()
          });
          Toast.danger('风险≥7：已自动记入错题本');
        } else {
          Toast.success('审查完成，风险 ' + risk + '/10');
        }
      });
    };
  }

  window.InspectorModule = { render };
})();


/* ===== js/modules/focus.js ===== */
/* ============================================================
 * focus.js — 深度专注模式 + 番茄钟（学习契约系统）
 * 全屏倒计时25/45/90三档；每15分钟疲劳自检；结束强制5分钟防呆复盘；
 * 连续3次强制休息15分钟；统计日/周/月专注数据
 * ============================================================ */
(function () {
  'use strict';
  let timer = null;          // setInterval handle
  let session = null;        // {mins, subject, startAt, remainSec, lastFatigueMark}
  let fatigueShownAt = 0;

  function todaySessions() {
    const s = Store.get();
    const k = U.dkey();
    return s.focus.sessions.filter(x => x.date === k);
  }
  function todayCount() { return todaySessions().filter(x => !x.aborted).length; }
  function todayMins() { return U.sum(todaySessions().map(x => x.mins)); }

  function render(el) {
    const s = Store.get();
    const count = todayCount();
    const mins = todayMins();
    const weekMins = U.sum(s.focus.sessions.filter(x => U.inThisWeek(x.date)).map(x => x.mins));
    const aborted = s.focus.sessions.filter(x => U.inThisWeek(x.date) && x.aborted).length;
    const mustRest = count > 0 && count % 3 === 0;

    el.innerHTML =
      '<div class="card"><div class="card-title">🔒 深度专注模式</div>'
      + '<div class="muted-sm">启动即签订学习契约：屏蔽非学习操作，每15分钟疲劳自检，结束后强制5分钟防呆复盘。</div>'
      + '<div class="stat-row">'
      + '<div class="stat"><div class="stat-num">' + count + '</div><div class="stat-label">今日专注</div></div>'
      + '<div class="stat"><div class="stat-num">' + mins + '</div><div class="stat-label">今日分钟</div></div>'
      + '<div class="stat"><div class="stat-num">' + U.round1(weekMins / 60) + '</div><div class="stat-label">本周小时</div></div>'
      + '<div class="stat"><div class="stat-num">' + aborted + '</div><div class="stat-label">本周中断</div></div>'
      + '</div>'
      + (mustRest ? '<div class="alert alert-danger">😴 已连续专注3次，系统强制休息15分钟。去走动、喝水、远眺。此期间无法启动新专注。</div>' : '')
      + '<div class="focus-setup">'
      + '<div class="seg-row">' + [25, 45, 90].map(m => '<button class="seg" data-m="' + m + '"' + (mustRest ? ' disabled' : '') + '>' + m + ' 分钟</button>').join('') + '</div>'
      + '<select id="fc-subj" class="input input-sel">'
      + '<option value="math">数学一</option><option value="ctrl">自控</option><option value="eng">英语一</option><option value="pol">政治</option></select>'
      + '</div></div>'

      + '<div class="card"><div class="card-title">近7天专注趋势</div>'
      + Charts.line(U.lastNDays(7).map(k => ({ label: k.slice(5), value: U.round1(U.sum(s.focus.sessions.filter(x => x.date === k).map(x => x.mins)) / 60) })), { height: 150, unit: 'h' })
      + '</div>'

      + '<div class="card"><div class="card-title">专注规则</div><ul class="rule-list">'
      + '<li>专注期间隐藏任务添加/错题记录等干扰操作</li>'
      + '<li>每15分钟弹出疲劳检测：是否出现「想当然」或跳步冲动</li>'
      + '<li>结束后强制5分钟防呆复盘（符号/分式回顾）</li>'
      + '<li>连续3次专注 → 强制休息15分钟（无法跳过）</li>'
      + '<li>专注时长自动计入学习时长统计</li>'
      + '</ul></div>';

    el.querySelectorAll('.seg').forEach(b => {
      b.onclick = () => startFocus(+b.getAttribute('data-m'), el.querySelector('#fc-subj').value);
    });
  }

  // ---------- 专注会话 ----------
  function startFocus(mins, subject) {
    if (session) return;
    session = { mins, subject, startAt: Date.now(), remainSec: mins * 60, lastFatigueMark: mins * 60 };
    fatigueShownAt = 0;
    document.body.classList.add('focus-lock');
    renderOverlay();
    Notify.send('专注开始', DB.SUBJECTS[subject].name + ' · ' + mins + '分钟。手机扣过来，开工。');
    timer = setInterval(tick, 1000);
  }

  function tick() {
    if (!session) return;
    session.remainSec--;
    // 每15分钟疲劳检测（剩余时间为15的倍数分钟时触发，且非最后一分钟）
    const elapsed = session.mins * 60 - session.remainSec;
    if (elapsed > 0 && elapsed % 900 === 0 && session.remainSec > 60 && fatigueShownAt !== elapsed) {
      fatigueShownAt = elapsed;
      showFatigueCheck();
    }
    if (session.remainSec <= 0) { finishFocus(false); return; }
    updateOverlay();
  }

  function fmt(sec) {
    const m = Math.floor(sec / 60), s = sec % 60;
    return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
  }

  function renderOverlay() {
    const old = document.getElementById('focus-overlay');
    if (old) old.remove();
    const ov = document.createElement('div');
    ov.id = 'focus-overlay';
    ov.innerHTML =
      '<div class="fo-inner">'
      + '<div class="fo-subj">' + DB.SUBJECTS[session.subject].name + ' · 深度专注中</div>'
      + '<div class="fo-time" id="fo-time">' + fmt(session.remainSec) + '</div>'
      + '<div class="fo-hint">屏蔽干扰中。卡壳3分钟标记"?"跳过，不倒推。</div>'
      + '<div class="fo-btns"><button class="btn btn-danger" id="fo-abort">中断专注（计入中断）</button></div>'
      + '</div>';
    document.body.appendChild(ov);
    document.getElementById('fo-abort').onclick = () => {
      Modal.confirm('中断专注', '<p>确定中断？本次将计为中断，专注时长按已过分钟计入。</p>', '中断', () => finishFocus(true), true);
    };
  }

  function updateOverlay() {
    const t = document.getElementById('fo-time');
    if (t) t.textContent = fmt(session.remainSec);
  }

  function showFatigueCheck() {
    const div = document.createElement('div');
    div.className = 'fatigue-pop';
    div.innerHTML = '<b>⏱ 疲劳自检</b><p>此刻是否出现「想当然」？是否想跳步？</p>'
      + '<div class="btn-row"><button class="btn btn-sm btn-primary" id="ft-ok">没有，状态在线</button>'
      + '<button class="btn btn-sm btn-ghost" id="ft-yes">有点，提醒我走流程</button></div>';
    document.body.appendChild(div);
    div.querySelector('#ft-ok').onclick = () => div.remove();
    div.querySelector('#ft-yes').onclick = () => {
      div.remove();
      Toast.warn('⚠️ 默念：符号前置 / 分式三步法 / 草稿分区。下一步开始走流程。', 5000);
    };
  }

  function finishFocus(aborted) {
    clearInterval(timer); timer = null;
    const doneMins = aborted ? Math.floor((session.mins * 60 - session.remainSec) / 60) : session.mins;
    const rec = { id: U.uid(), date: U.dkey(), mins: doneMins, subject: session.subject, endedAt: new Date().toISOString(), aborted };
    Store.update(s => { s.focus.sessions.push(rec); });
    if (doneMins > 0) Store.addHours(U.round1(doneMins / 60 * 10) / 10);
    document.body.classList.remove('focus-lock');
    const ov = document.getElementById('focus-overlay');
    if (ov) ov.remove();
    session = null;

    if (aborted) {
      Toast.warn('已记录中断 ' + doneMins + ' 分钟');
      App.refresh();
    } else {
      Notify.send('专注完成', '强制5分钟防呆复盘开始');
      Modal.open({
        title: '🧘 强制防呆复盘（5分钟）',
        dismissable: false,
        html: '<p>闭眼回忆刚才的练习，逐条确认：</p>'
          + '<ol style="padding-left:18px;line-height:2">'
          + '<li>有没有出现<b>负号后置</b>？翻草稿检查最后3题</li>'
          + '<li>分式合并是否走了<b>分母→分子→计算</b>三步？</li>'
          + '<li>草稿是否保持<b>左乱草/右正稿</b>分区？</li>'
          + '<li>卡壳题是否已标记"?"，没有死磕超过3分钟？</li></ol>'
          + '<p class="muted-sm">发现违规 → 立即去错题画像记录一条，类型选对应项。</p>',
        actions: [
          { label: '发现违规，去记错题', kind: 'btn-ghost', onClick: close => { close(); App.go('mistakes'); } },
          { label: '复盘完毕，无违规', kind: 'btn-primary', onClick: close => { close(); App.refresh(); } }
        ]
      });
    }
  }

  window.FocusModule = { render, get active() { return !!session; } };
})();


/* ===== js/modules/conceptmap.js ===== */
/* ============================================================
 * conceptmap.js — 自控概念依赖图谱（技能树 + 锁定机制 + 术语桥）
 * 锁定规则：前置节点掌握度<60% → 后继节点锁定，无法添加相关任务
 * ============================================================ */
(function () {
  'use strict';

  function nodeState(n) {
    const heat = Store.get().heat;
    const h = heat[n.id] || {};
    const score = h.score;
    const mastered = (score != null ? score : (h.level === 2 ? 80 : h.level === 1 ? 55 : 0));
    // 锁定判定：任一前置<60
    const lockBy = n.deps.filter(d => {
      const dh = heat[d] || {};
      const ds = dh.score != null ? dh.score : (dh.level === 2 ? 80 : dh.level === 1 ? 55 : 0);
      return ds < 60;
    });
    return { score, mastered, locked: lockBy.length > 0, lockBy };
  }

  function render(el) {
    const nodes = DB.CONCEPT_GRAPH;
    const byId = {}; nodes.forEach(n => byId[n.id] = n);

    // SVG 连线
    let edges = '';
    nodes.forEach(n => n.deps.forEach(d => {
      const p = byId[d];
      const locked = nodeState(n).locked;
      edges += '<line x1="' + (p.x + 70) + '" y1="' + (p.y + 22) + '" x2="' + (n.x) + '" y2="' + (n.y + 22)
        + '" stroke="' + (locked ? '#d9d9d9' : '#8c8c8c') + '" stroke-width="1.5" marker-end="url(#arr)"/>';
    }));

    let svgNodes = '';
    nodes.forEach(n => {
      const st = nodeState(n);
      const color = st.locked ? '#bfbfbf' : st.mastered >= 80 ? '#237804' : st.mastered >= 50 ? '#d48806' : '#cf1322';
      svgNodes += '<g class="cm-node" data-id="' + n.id + '" style="cursor:pointer">'
        + '<rect x="' + n.x + '" y="' + n.y + '" width="150" height="44" rx="8" fill="#fff" stroke="' + color + '" stroke-width="2"/>'
        + '<text x="' + (n.x + 75) + '" y="' + (n.y + 20) + '" text-anchor="middle" font-size="12" fill="#262626">' + (st.locked ? '🔒 ' : '') + U.esc(n.name) + '</text>'
        + '<text x="' + (n.x + 75) + '" y="' + (n.y + 36) + '" text-anchor="middle" font-size="11" fill="' + color + '">' + (st.locked ? '未解锁' : st.mastered + '%') + '</text>'
        + '</g>';
    });

    el.innerHTML =
      '<div class="card"><div class="card-title">🗺️ 自控概念依赖图谱</div>'
      + '<div class="muted-sm">前置节点掌握度 &lt; 60% → 后继节点锁定。点击节点查看推荐任务与「工程↔学术」术语桥。左列经典控制，右列现代控制。</div>'
      + '<div class="cm-scroll"><svg viewBox="0 0 780 470" width="100%" height="470" xmlns="http://www.w3.org/2000/svg">'
      + '<defs><marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8" fill="none" stroke="#8c8c8c"/></marker></defs>'
      + edges + svgNodes
      + '</svg></div>'
      + '<div class="legend"><span class="lg lg-green"></span>≥80 掌握 <span class="lg lg-yellow"></span>50-79 薄弱 <span class="lg lg-red"></span>&lt;50 危险 <span class="lg" style="background:#bfbfbf"></span>🔒 锁定</div>'
      + '</div>'

      + '<div class="card" id="cm-detail"><div class="card-title">节点详情</div><div class="empty">点击上方节点查看依赖、推荐任务与术语桥</div></div>';

    bind(el);
  }

  function bind(el) {
    el.querySelectorAll('.cm-node').forEach(g => {
      g.addEventListener('click', () => {
        const id = g.getAttribute('data-id');
        const n = DB.CONCEPT_GRAPH.find(x => x.id === id);
        const st = nodeState(n);
        const heat = Store.get().heat;
        const byId = {}; DB.CONCEPT_GRAPH.forEach(x => byId[x.id] = x);
        const lockNames = st.lockBy.map(d => byId[d].name).join('、');

        let gloss = n.glossary.map(g2 =>
          '<div class="gloss-row"><span class="gloss-eng">' + U.esc(g2[0]) + '</span><span class="gloss-arrow">↔</span><span>' + U.esc(g2[1]) + '</span></div>'
        ).join('');

        document.getElementById('cm-detail').innerHTML =
          '<div class="card-title">' + (st.locked ? '🔒 ' : '') + U.esc(n.name) + ' <span class="muted-sm">掌握度 ' + st.mastered + '%</span></div>'
          + (st.locked
            ? '<div class="alert alert-danger">🔒 未解锁：需先完成 <b>' + U.esc(lockNames) + '</b>（掌握度≥60%）<br>推荐任务：' + U.esc(n.book) + '</div>'
            : '<div class="alert alert-ok">已解锁。推荐任务：' + U.esc(n.book) + '</div>')
          + '<div class="card-title-sm">复试术语桥（工程 ↔ 学术）</div>' + gloss
          + '<div class="btn-row" style="margin-top:10px">'
          + (st.locked
            ? '<button class="btn btn-ghost" id="cm-go-dep">去提升前置：' + U.esc(byId[st.lockBy[0]].name) + '</button>'
            : '<button class="btn btn-primary" id="cm-add-task">添加相关任务到任务中心</button>')
          + '<button class="btn btn-ghost" id="cm-set-score">录入掌握度</button>'
          + '</div>';

        const depBtn = document.getElementById('cm-go-dep');
        if (depBtn) depBtn.onclick = () => Toast.show('先去热力图把「' + byId[st.lockBy[0]].name + '」练到60%以上', 'info', 4000);
        const addBtn = document.getElementById('cm-add-task');
        if (addBtn) addBtn.onclick = () => {
          Store.update(s => {
            s.tasks.push({ id: U.uid(), subject: 'ctrl', text: '【图谱】' + n.name + '：' + n.book, done: false, createdAt: new Date().toISOString() });
          });
          Toast.success('已加入任务中心');
        };
        document.getElementById('cm-set-score').onclick = () => {
          Modal.open({
            title: '录入「' + n.name + '」掌握度',
            html: '<input id="cm-score" class="input" type="number" min="0" max="100" value="' + (st.score != null ? st.score : '') + '" placeholder="自测正确率%">',
            actions: [{ label: '取消' }, {
              label: '保存', kind: 'btn-primary', onClick: close => {
                const v = parseFloat(document.getElementById('cm-score').value);
                Store.update(s => {
                  s.heat[id] = { level: !isNaN(v) ? (v >= 80 ? 2 : v >= 50 ? 1 : 0) : 0, score: isNaN(v) ? null : v, updatedAt: new Date().toISOString() };
                });
                close(); App.refresh();
              }
            }]
          });
          setTimeout(() => document.getElementById('cm-score').focus(), 50);
        };
      });
    });
  }

  window.ConceptMapModule = { render };
})();


/* ===== js/modules/decision.js ===== */
/* ============================================================
 * decision.js — 10月院校决策参谋
 * 决策逻辑（蓝图v2.0硬编码）：
 *  数学≥120 + 现控≥7 → 冲上海大学
 *  数学115-120 + 现控≥6 → 河北工业大学
 *  数学<115 或 现控<5 → 广东工业大学
 *  数学<100 → 红色警报
 * ============================================================ */
(function () {
  'use strict';

  function evaluate(inp) {
    const mathAvg = inp.mathSims.length ? U.avg(inp.mathSims) : null;
    const xk = +inp.xiankongScore || 0;
    if (mathAvg == null) return null;
    let rec, level, reason;
    if (mathAvg < 100) {
      rec = 'alert'; level = 'danger';
      reason = '数学一均分 <100：触发红色警报。建议立即评估是否更换目标或调整策略——当前节奏无法支撑任何目标院校，先止损再谈择校。';
    } else if (mathAvg >= 120 && xk >= 7) {
      rec = 'shu'; level = 'ok';
      reason = '数学≥120 + 现控自评≥7：具备冲上海大学的硬条件。上大836现控对口，复试微机与你的STM32经历高度匹配，上海大厂实习资源是职业目标的最优解。';
    } else if (mathAvg >= 115 && xk >= 6) {
      rec = 'hebut'; level = 'ok';
      reason = '数学115-120 + 现控≥6：建议河北工业大学。专业课给分大方、一志愿保护好，是"一志愿上岸拒绝二战"前提下的稳妥首选。';
    } else {
      rec = 'gdut'; level = 'warn';
      reason = '数学<115 或 现控<5：建议广东工业大学。控制学科A-、录取约275分、招生约120人，珠三角就业极强，是风险可控的优质退路。';
    }
    return { rec, level, reason, mathAvg: U.round1(mathAvg) };
  }

  function schoolRow(key, hl) {
    const sc = DB.SCHOOLS[key];
    return '<div class="sch-row' + (hl ? ' sch-hl' : '') + '">'
      + '<div class="sch-name">' + sc.name + (hl ? ' <span class="tag tag-red">推荐</span>' : '') + '</div>'
      + '<div class="sch-info">' + sc.code + '｜' + sc.exam + '</div>'
      + '<div class="sch-info">' + sc.reexam + '</div>'
      + '<div class="sch-info muted-sm">' + sc.line + '｜' + sc.ratio + '</div>'
      + '</div>';
  }

  function render(el) {
    const inp = Store.get().decision.inputs;
    const res = evaluate(inp);

    el.innerHTML =
      '<div class="card"><div class="card-title">⚖️ 10月院校决策参谋</div>'
      + '<div class="muted-sm">报名前的数据化决策工具。填入近5套数学模拟分，系统按固化规则给出建议。此建议不可手动覆盖——防止"我觉得我能行"式冲动。</div>'
      + '<div class="form-grid">'
      + '<label class="fld fld-full"><span>数学一近5套模拟分数（逗号分隔，必填）</span>'
      + '<input id="dc-sims" class="input" placeholder="如：118, 122, 115, 121, 119" value="' + U.esc(inp.mathSims.join(', ')) + '"></label>'
      + '<label class="fld"><span>专业课真题自测分（必填）</span><input id="dc-prof" class="input" type="number" value="' + inp.profScore + '"></label>'
      + '<label class="fld"><span>英语一阅读正确率（%）</span><input id="dc-eng" class="input" type="number" value="' + inp.engAccuracy + '"></label>'
      + '<label class="fld"><span>政治完成度（%）</span><input id="dc-pol" class="input" type="number" value="' + inp.polProgress + '"></label>'
      + '<label class="fld"><span>现控掌握度自评（1-10）</span><input id="dc-xk" class="input" type="number" min="1" max="10" value="' + inp.xiankongScore + '"></label>'
      + '</div>'
      + '<button class="btn btn-primary" id="dc-run">生成决策建议</button>'
      + '<div id="dc-result">' + (res ? resultHtml(res, inp) : '') + '</div>'
      + '</div>'

      + '<div class="card"><div class="card-title">院校对比决策表</div>'
      + schoolRow('hebut', res && res.rec === 'hebut')
      + schoolRow('shu', res && res.rec === 'shu')
      + schoolRow('gdut', res && res.rec === 'gdut')
      + schoolRow('hfut', res && res.rec === 'hfut')
      + schoolRow('futzu', res && res.rec === 'futzu')
      + '</div>';

    bind(el);
  }

  function resultHtml(res, inp) {
    const cls = res.level === 'danger' ? 'alert-danger' : res.level === 'warn' ? 'alert-warn' : 'alert-ok';
    const sc = DB.SCHOOLS[res.rec];
    return '<div class="alert ' + cls + '" style="margin-top:12px">'
      + '<b>' + (res.rec === 'alert' ? '🚨 红色警报' : '推荐：' + sc.name) + '</b>（数学均分 ' + res.mathAvg + '）<br>' + res.reason + '</div>'
      + (res.rec !== 'alert' ? '<button class="btn btn-primary" id="dc-confirm" style="margin-top:8px">将目标院校设为 ' + sc.name + '</button>' : '');
  }

  function collect(el) {
    const sims = el.querySelector('#dc-sims').value.split(/[,，\s]+/).map(Number).filter(n => !isNaN(n) && n > 0);
    return {
      mathSims: sims,
      profScore: el.querySelector('#dc-prof').value,
      engAccuracy: el.querySelector('#dc-eng').value,
      polProgress: +el.querySelector('#dc-pol').value || 0,
      xiankongScore: +el.querySelector('#dc-xk').value || 5
    };
  }

  function bind(el) {
    el.querySelector('#dc-run').onclick = () => {
      const inp = collect(el);
      if (!inp.mathSims.length) { Toast.warn('请至少填入一套数学模拟分数'); return; }
      const res = evaluate(inp);
      Store.update(s => { s.decision.inputs = inp; s.decision.result = res; s.decision.updatedAt = new Date().toISOString(); });
      render(el);
      const confirmBtn = document.getElementById('dc-confirm');
      if (confirmBtn) confirmBtn.onclick = () => {
        const rec = Store.get().decision.result.rec;
        Store.update(s => { s.settings.targetSchool = rec; });
        Toast.success('目标院校已设为 ' + DB.SCHOOLS[rec].name);
        App.refresh();
      };
    };
  }

  window.DecisionModule = { render, evaluate };
})();

/* ============================================================
 * mental.js — 心理状态量化追踪（每日强制1分钟）
 * 预警：连续3天<5分 → 强制休息建议；硬件冲动 → 复读红线禁令
 * ============================================================ */
(function () {
  'use strict';

  function render(el) {
    const s = Store.get();
    const today = s.mental.find(m => m.date === U.dkey());

    // 近30天心情趋势
    const last30 = U.lastNDays(30).map(k => {
      const m = s.mental.find(x => x.date === k);
      return { label: k.slice(8), value: m ? m.mood : null };
    }).filter(d => d.value != null);
    // 近7天
    const last7 = last30.slice(-7);

    // 预警
    const recent3 = U.lastNDays(3).map(k => { const m = s.mental.find(x => x.date === k); return m ? m.mood : null; });
    const lowStreak = recent3.every(v => v != null && v < 5);
    const urgeWeek = s.mental.filter(m => U.inThisWeek(m.date) && m.hwUrge).length;

    el.innerHTML =
      '<div class="card"><div class="card-title">🧘 心理状态量化追踪</div>'
      + (today ? '<div class="alert alert-ok">✓ 今日已记录（心情 ' + today.mood + '/10）。一天一次，诚实面对自己。</div>'
        : '<div class="alert alert-warn">今日尚未记录。学习结束后强制1分钟完成。</div>')
      + '<div class="form-grid">'
      + '<label class="fld fld-full"><span>今日心情评分（1-10）：<b id="mt-mood-v">5</b></span>'
      + '<input id="mt-mood" type="range" min="1" max="10" value="5" class="range"></label>'
      + '<label class="fld"><span>疲劳程度</span><select id="mt-fatigue" class="input input-sel">'
      + '<option value="fresh">清醒</option><option value="tired">略累</option><option value="exhausted">疲惫</option><option value="giveup">想放弃</option></select></label>'
      + '<label class="fld"><span>是否出现「想当然」/跳步冲动</span><select id="mt-jumpy" class="input input-sel"><option value="no">否</option><option value="yes">是</option></select></label>'
      + '<label class="fld"><span>是否有硬件/B站冲动</span><select id="mt-urge" class="input input-sel"><option value="no">否</option><option value="yes">是</option></select></label>'
      + '<label class="fld"><span>今日最卡壳的科目/知识点</span><input id="mt-stuck" class="input" placeholder="如：现控-状态转移矩阵"></label>'
      + '</div>'
      + '<button class="btn btn-primary" id="mt-save">' + (today ? '更新今日记录' : '提交今日记录') + '</button>'
      + '</div>'

      + (lowStreak ? '<div class="alert alert-danger">😴 疲劳预警：连续3天心情<5分。建议明天强制休息半日——效率崩了，努力只是自我感动。</div>' : '')
      + (urgeWeek > 0 ? '<div class="alert alert-danger">🔧 冲动预警：本周检测到 ' + urgeWeek + ' 次硬件/B站冲动。复读红线第1条：<b>初试前绝对禁止硬件项目</b>。你的STM32履历已经够用了。</div>' : '')

      + '<div class="card"><div class="card-title">心情趋势（近7天）</div>'
      + (last7.length >= 2 ? Charts.line(last7, { height: 150, min: 0, max: 10, warnBelow: 5 }) : '<div class="empty">记录满2天后显示趋势</div>')
      + '</div>'

      + '<div class="card"><div class="card-title">卡壳热点（近30天）</div><div id="mt-stuck-list" class="muted-sm"></div></div>';

    // 卡壳热点统计
    const stucks = s.mental.filter(m => m.stuck && new Date(m.date) > new Date(Date.now() - 30 * U.DAY_MS)).map(m => m.stuck);
    const cnt = U.countBy(stucks, x => x);
    const top = U.topN(cnt, 5);
    document.getElementById('mt-stuck-list').innerHTML = top.length
      ? '本周最需突破：' + top.map(t => '<span class="tag tag-warn">' + U.esc(t.key) + '（' + t.count + '次）</span>').join(' ')
      : '暂无卡壳记录';

    bind(el, today);
  }

  function bind(el, today) {
    const mood = el.querySelector('#mt-mood');
    mood.oninput = () => { document.getElementById('mt-mood-v').textContent = mood.value; };
    if (today) {
      mood.value = today.mood; document.getElementById('mt-mood-v').textContent = today.mood;
      el.querySelector('#mt-fatigue').value = today.fatigue;
      el.querySelector('#mt-jumpy').value = today.jumpy ? 'yes' : 'no';
      el.querySelector('#mt-urge').value = today.hwUrge ? 'yes' : 'no';
      el.querySelector('#mt-stuck').value = today.stuck || '';
    }
    el.querySelector('#mt-save').onclick = () => {
      const urge = el.querySelector('#mt-urge').value === 'yes';
      const rec = {
        id: today ? today.id : U.uid(),
        date: U.dkey(),
        mood: +mood.value,
        fatigue: el.querySelector('#mt-fatigue').value,
        jumpy: el.querySelector('#mt-jumpy').value === 'yes',
        hwUrge: urge,
        stuck: el.querySelector('#mt-stuck').value.trim()
      };
      Store.update(s => {
        const i = s.mental.findIndex(m => m.date === U.dkey());
        if (i >= 0) s.mental[i] = rec; else s.mental.push(rec);
      });
      if (urge) {
        Modal.open({
          title: '🔧 硬件冲动拦截',
          html: '<p>检测到硬件/B站冲动。复读绝对禁令第1条：</p><p><b>初试前绝对禁止硬件项目——禁止PCB、B站视频、STM32新工程。</b></p><p class="muted-sm">冲动已记录。现在去喝口水，然后回到数学题上。</p></div>',
          actions: [{ label: '收到，回去学习', kind: 'btn-primary' }]
        });
      } else {
        Toast.success('已记录。诚实面对自己，是防呆的第一步。');
      }
      App.refresh();
    };
  }

  window.MentalModule = { render };
})();


/* ===== js/modules/reading.js ===== */
/* ============================================================
 * reading.js — 英语阅读定位法训练器
 * 功能1：熟词僻义闪卡（Leitner盒间隔重复）
 * 功能2：定位法计时训练（每题≤90秒）
 * 功能3：虚假繁荣检测（连续全对但用时极短 → 提示）
 * ============================================================ */
(function () {
  'use strict';
  let tab = 'drill'; // drill | flash
  let cardIdx = 0, cardFlip = false;

  // 词库：内置 + 用户自定义合并（自定义在前优先复习）
  function allVocab() {
    const custom = Store.get().reading.customVocab || [];
    return custom.concat(DB.VOCAB);
  }

  // Leitner 盒：box 1-5，间隔 1/2/4/7/15 天
  const BOX_DAYS = [0, 1, 2, 4, 7, 15];
  function dueCards() {
    const cards = Store.get().reading.cards;
    const today = U.dkey();
    return allVocab().filter(v => {
      const c = cards[v.w];
      return !c || !c.due || c.due <= today;
    });
  }

  function grade(word, known) {
    Store.update(s => {
      const c = s.reading.cards[word] || { box: 1, due: U.dkey() };
      c.box = known ? Math.min(5, c.box + 1) : 1;
      const d = new Date(); d.setDate(d.getDate() + BOX_DAYS[c.box]);
      c.due = U.dkey(d);
      s.reading.cards[word] = c;
    });
  }

  // 虚假繁荣检测
  function bubbleCheck() {
    const rs = Store.get().reading.results.slice(-10);
    if (rs.length < 10) return null;
    const allRight = rs.every(r => r.correct);
    const avgSecs = U.avg(rs.map(r => r.secs));
    if (allRight && avgSecs < 40) return { allRight, avgSecs: Math.round(avgSecs) };
    return null;
  }

  function render(el) {
    const s = Store.get();
    const results = s.reading.results;
    const recent = results.slice(-20).reverse();
    const bubble = bubbleCheck();
    const due = dueCards();
    const learned = Object.keys(s.reading.cards).length;

    let body = '';
    if (tab === 'drill') {
      body =
        '<div class="card"><div class="card-title">定位法计时训练（每题≤90秒）</div>'
        + '<div class="form-grid">'
        + '<label class="fld"><span>真题来源（如 2023 Text 2 Q1）</span><input id="rd-src" class="input" placeholder="2023 Text 2 Q1"></label>'
        + '<label class="fld"><span>正确答案是第几段</span><select id="rd-ans" class="input input-sel"><option value="1">第1段</option><option value="2">第2段</option><option value="3">第3段</option><option value="4">第4段</option></select></label>'
        + '</div>'
        + '<div class="muted-sm">流程：计时开始 → 回原文定位 → 选择你认为的定位段落 → 系统判定并记录用时。</div>'
        + '<div class="btn-row" style="margin-top:10px">'
        + '<button class="btn btn-primary" id="rd-start">开始计时定位</button>'
        + '</div><div id="rd-arena"></div></div>'

        + (bubble ? '<div class="alert alert-warn">🎈 虚假繁荣检测：近10题全对但平均仅 ' + bubble.avgSecs + ' 秒。是否存在蒙对可能？建议精读错题分析，并对每题复述定位依据。</div>' : '')

        + '<div class="card"><div class="card-title">近期定位记录（' + results.length + ' 题）</div>'
        + (recent.length ? recent.map(r =>
          '<div class="his-row"><span>' + U.esc(r.source) + ' <span class="tag ' + (r.correct ? 'tag-ok' : 'tag-red') + '">' + (r.correct ? '定位正确' : '定位错误') + '</span></span>'
          + '<span class="muted-sm">' + r.secs + '秒 · ' + r.date + '</span></div>'
        ).join('') : '<div class="empty">暂无记录</div>')
        + '</div>';
    } else {
      const cur = due[cardIdx % Math.max(1, due.length)];
      body =
        '<div class="card"><div class="card-title-row"><span class="card-title">熟词僻义闪卡（Leitner间隔重复）</span>'
        + '<button class="link-btn" id="fc-import">+ 导入单词</button></div>'
        + '<div class="muted-sm">到期 ' + due.length + ' 张 · 已入库 ' + learned + '/' + allVocab().length + ' 词（含自定义 ' + (Store.get().reading.customVocab || []).length + '）。答错回到第1盒，答对晋级。</div>'
        + (cur
          ? '<div class="flashcard" id="fc-card">'
            + '<div class="fc-word">' + U.esc(cur.w) + '</div>'
            + (cardFlip
              ? '<div class="fc-back"><div><b>常义：</b>' + U.esc(cur.com) + '</div><div class="fc-rare"><b>僻义：</b>' + U.esc(cur.rare) + '</div><div class="fc-ex">' + U.esc(cur.ex) + '</div></div>'
              : '<div class="fc-hint">点击卡片翻面（先回忆僻义再翻）</div>')
            + '</div>'
          + (cardFlip
            ? '<div class="btn-row"><button class="btn btn-danger" id="fc-no">没想起来</button><button class="btn btn-primary" id="fc-yes">想起来了</button></div>'
            : '')
          : '<div class="empty">今日闪卡全部完成！明天再来。</div>')
        + '</div>'
        + '<div class="card"><div class="card-title">词库掌握分布</div><div id="fc-dist"></div></div>';
    }

    el.innerHTML =
      '<div class="card"><div class="card-title">📖 英语阅读定位法训练器</div>'
      + '<div class="tab-row">'
      + '<button class="tab' + (tab === 'drill' ? ' tab-on' : '') + '" data-t="drill">定位法计时</button>'
      + '<button class="tab' + (tab === 'flash' ? ' tab-on' : '') + '" data-t="flash">熟词僻义闪卡</button>'
      + '</div></div>'
      + body;

    bind(el);
    if (tab === 'flash') renderDist();
  }

  function renderDist() {
    const cards = Store.get().reading.cards;
    const dist = [0, 0, 0, 0, 0, 0];
    DB.VOCAB.forEach(v => { const c = cards[v.w]; dist[c ? c.box : 0]++; });
    const el = document.getElementById('fc-dist');
    if (!el) return;
    el.innerHTML = Charts.bar(dist.map((n, i) => ({ label: i === 0 ? '未学' : '盒' + i, value: n })), { height: 130, color: '#722ed1' });
  }

  function bind(el) {
    el.querySelectorAll('[data-t]').forEach(b => b.onclick = () => { tab = b.getAttribute('data-t'); cardFlip = false; render(el); });

    // ---- 定位计时 ----
    const startBtn = el.querySelector('#rd-start');
    if (startBtn) startBtn.onclick = () => {
      const src = el.querySelector('#rd-src').value.trim();
      if (!src) { Toast.warn('先填写真题来源'); return; }
      const ans = +el.querySelector('#rd-ans').value;
      const t0 = Date.now();
      const arena = el.querySelector('#rd-arena');
      arena.innerHTML = '<div class="rd-timer" id="rd-clock">00:00</div>'
        + '<div class="muted-sm">回原文定位！找到依据段落后果断选择。90秒上限。</div>'
        + '<div class="seg-row">' + [1, 2, 3, 4].map(p => '<button class="seg" data-p="' + p + '">第' + p + '段</button>').join('') + '</div>';
      const clock = setInterval(() => {
        const sec = Math.floor((Date.now() - t0) / 1000);
        const c = document.getElementById('rd-clock');
        if (c) { c.textContent = String(Math.floor(sec / 60)).padStart(2, '0') + ':' + String(sec % 60).padStart(2, '0'); if (sec >= 90) c.classList.add('rd-over'); }
      }, 500);
      arena.querySelectorAll('[data-p]').forEach(b => b.onclick = () => {
        clearInterval(clock);
        const secs = Math.round((Date.now() - t0) / 1000);
        const choice = +b.getAttribute('data-p');
        const correct = choice === ans;
        Store.update(s => {
          s.reading.results.push({ id: U.uid(), date: U.shortDate(), source: src, answer: ans, choice, correct, secs });
          if (s.reading.results.length > 200) s.reading.results = s.reading.results.slice(-200);
        });
        if (!correct) {
          Modal.open({
            title: '❌ 定位错误',
            html: '<p>你选了第' + choice + '段，正确答案在第' + ans + '段（用时' + secs + '秒）。</p>'
              + '<div class="warn-box"><div class="warn-title">定位技巧提示</div><div class="warn-body">1. 题干关键词（人名/数字/大写词）优先定位<br>2. 顺序原则：题目顺序≈段落顺序<br>3. 定位句只读一句，别贪恋全段<br>4. 同义替换是答案的标志</div></div>',
            actions: [{ label: '记下了', kind: 'btn-primary' }]
          });
        } else {
          Toast.success('✓ 定位正确，用时 ' + secs + ' 秒' + (secs > 90 ? '（超90秒上限，提速！）' : ''));
        }
        render(el);
      });
    };

    // ---- 闪卡 ----
    const card = el.querySelector('#fc-card');
    if (card) card.onclick = () => { if (!cardFlip) { cardFlip = true; render(el); } };
    const yes = el.querySelector('#fc-yes'), no = el.querySelector('#fc-no');
    const due = dueCards();
    if (yes) yes.onclick = () => { const cur = due[cardIdx % due.length]; grade(cur.w, true); cardIdx++; cardFlip = false; render(el); };
    if (no) no.onclick = () => { const cur = due[cardIdx % due.length]; grade(cur.w, false); cardIdx++; cardFlip = false; Toast.warn('已回到第1盒，明天再见'); render(el); };

    // ---- 导入单词 ----
    const imp = el.querySelector('#fc-import');
    if (imp) imp.onclick = () => openImport(el);
  }

  // 导入弹窗：手动粘贴 或 AI整理
  function openImport(el) {
    const hasAI = AI.configured();
    Modal.open({
      title: '📥 导入自定义单词',
      wide: true,
      html:
        '<div class="muted-sm">方式一：直接粘贴标准格式（每行一个词，用 | 分隔 单词/常见义/僻义/例句）：</div>'
        + '<textarea class="input" id="imp-raw" rows="5" placeholder="subject | 科目；主题 | 受试者；使服从 | The subjects were tested.&#10;address | 地址 | 处理；探讨 | address the problem"></textarea>'
        + '<div class="btn-row" style="margin:10px 0"><button class="btn btn-primary" id="imp-manual">✓ 按格式导入</button></div>'
        + '<hr style="border:none;border-top:1px solid var(--line);margin:14px 0">'
        + '<div class="muted-sm">方式二：粘贴任意英文材料/混乱词表，AI自动提取熟词僻义并整理成标准格式' + (hasAI ? '' : '（需先配置API Key）') + '：</div>'
        + '<textarea class="input" id="imp-ai-raw" rows="4" placeholder="粘贴真题阅读原文、或一堆没整理的单词…"></textarea>'
        + '<div class="btn-row" style="margin:10px 0"><button class="btn ' + (hasAI ? 'btn-primary' : 'btn-ghost') + '" id="imp-ai"' + (hasAI ? '' : ' disabled') + '>🤖 AI整理并导入</button></div>'
        + '<div id="imp-result"></div>',
      actions: [{ label: '完成', kind: 'btn-primary' }]
    });

    // 手动导入
    document.getElementById('imp-manual').onclick = () => {
      const raw = document.getElementById('imp-raw').value;
      const parsed = parseVocabLines(raw);
      if (!parsed.length) { Toast.warn('没识别到有效行。格式：单词 | 常见义 | 僻义 | 例句'); return; }
      addVocab(parsed);
      document.getElementById('imp-result').innerHTML = '<div class="alert alert-ok">✓ 成功导入 ' + parsed.length + ' 个单词到闪卡系统。</div>';
    };

    // AI整理导入
    const aiBtn = document.getElementById('imp-ai');
    if (aiBtn && hasAI) aiBtn.onclick = () => {
      const raw = document.getElementById('imp-ai-raw').value.trim();
      if (!raw) { Toast.warn('请先粘贴材料'); return; }
      aiBtn.disabled = true; aiBtn.textContent = '🤖 AI整理中…';
      const prompt = '你是考研英语词汇专家。从以下材料中提取考研高频"熟词僻义"单词（或整理用户给的混乱词表），' +
        '必须只输出JSON数组，不要多余文字。格式：' +
        '[{"w":"单词","com":"常见义","rare":"僻义（考研常考）","ex":"英文例句（带中文）"}]。' +
        '只挑真正有生僻义的词，最多15个。材料：\n' + raw.slice(0, 2000);
      AI.chatJSON('你是词汇整理助手，只输出JSON数组。', prompt).then(arr => {
        const list = Array.isArray(arr) ? arr : (arr.words || []);
        const parsed = list.filter(v => v && v.w && v.rare).map(v => ({ w: String(v.w).trim(), com: String(v.com || '—'), rare: String(v.rare), ex: String(v.ex || '') }));
        if (!parsed.length) throw new Error('AI未提取到有效单词');
        addVocab(parsed);
        document.getElementById('imp-result').innerHTML = '<div class="alert alert-ok">✓ AI整理完成，导入 ' + parsed.length + ' 个熟词僻义词：' + parsed.map(v => v.w).join('、') + '</div>';
        aiBtn.disabled = false; aiBtn.textContent = '🤖 AI整理并导入';
      }).catch(e => {
        document.getElementById('imp-result').innerHTML = '<div class="alert alert-danger">AI整理失败：' + U.esc(e.message) + '。可改用方式一手动粘贴。</div>';
        aiBtn.disabled = false; aiBtn.textContent = '🤖 AI整理并导入';
      });
    };
  }

  // 解析 "单词 | 常见义 | 僻义 | 例句" 每行
  function parseVocabLines(raw) {
    return String(raw).split('\n').map(line => {
      const parts = line.split('|').map(x => x.trim());
      if (parts.length < 3 || !parts[0]) return null;
      return { w: parts[0], com: parts[1] || '—', rare: parts[2], ex: parts[3] || '' };
    }).filter(Boolean);
  }

  // 入库（去重：同词覆盖僻义更新）
  function addVocab(list) {
    Store.update(s => {
      s.reading.customVocab = s.reading.customVocab || [];
      list.forEach(v => {
        const key = v.w.toLowerCase();
        // 内置词不重复加，直接更新其卡片即可；自定义词去重
        const existCustom = s.reading.customVocab.findIndex(x => x.w.toLowerCase() === key);
        if (existCustom >= 0) s.reading.customVocab[existCustom] = v;
        else if (!DB.VOCAB.some(x => x.w.toLowerCase() === key)) s.reading.customVocab.push(v);
        // 重置该词的到期时间，让它立即可复习
        if (s.reading.cards[key]) delete s.reading.cards[key];
      });
    });
  }

  window.ReadingModule = { render };
})();

  // 编辑我的信息某一项
  function editMyStat(mode, el) {
    const s = Store.get();
    const doModal = (title, cur, onSave, type) => {
      Modal.open({
        title, html: '<input id="ms-in" class="input" type="' + (type || 'number') + '" value="' + cur + '">',
        actions: [{ label: '取消' }, {
          label: '保存', kind: 'btn-primary', onClick: close => {
            const v = document.getElementById('ms-in').value;
            onSave(v); close(); App.refresh(); Toast.success('已修正');
          }
        }]
      });
      setTimeout(() => { const i = document.getElementById('ms-in'); if (i) { i.focus(); i.select(); } }, 50);
    };
    if (mode.indexOf('pct:') === 0) {
      const key = mode.slice(4);
      doModal('修正' + DB.SUBJECTS[key].name + '进度(%)', s.progress[key].percent, v => {
        Store.update(x => { x.progress[key].percent = U.clamp(parseInt(v, 10) || 0, 0, 100); });
      });
    } else if (mode === 'acc') {
      const wk = Store.weekKey();
      const cur = (s.weeklyStats[wk] || {}).mathAccuracy;
      doModal('修正本周数学正确率(%)', cur != null ? cur : 70, v => {
        Store.update(x => { x.weeklyStats[wk] = x.weeklyStats[wk] || {}; x.weeklyStats[wk].mathAccuracy = U.clamp(parseInt(v, 10) || 0, 0, 100); });
      });
    } else if (mode === 'xk') {
      doModal('修正现控掌握度(1-10)', s.decision.inputs.xiankongScore || 5, v => {
        Store.update(x => { x.decision.inputs.xiankongScore = U.clamp(parseInt(v, 10) || 5, 1, 10); });
      });
    } else if (mode === 'target') {
      doModal('修正周目标时长(h)', s.settings.weeklyTargetHours || 50, v => {
        Store.update(x => { x.settings.weeklyTargetHours = U.clamp(parseInt(v, 10) || 50, 10, 100); });
      });

      Modal.open({

  function bind(el) {
    // 我的信息：点值编辑
    el.querySelectorAll('.mystat[data-edit]:not([disabled])').forEach(b => b.onclick = () => {
      const mode = b.getAttribute('data-edit');
      editMyStat(mode, el);
    });

    el.querySelectorAll('[data-school]').forEach(b => b.onclick = () => {
      Store.update(s => { s.settings.targetSchool = b.getAttribute('data-school'); });

    });

    el.querySelector('#st-target-save').onclick = () => {
      const v = U.clamp(+el.querySelector('#st-target').value || 50, 10, 100);
      Store.update(s => { s.settings.weeklyTargetHours = v; });
      Toast.success('周目标已设为 ' + v + 'h');
    };

    el.querySelector('#st-export').onclick = () => {
      U.download('kaoyan2026_backup_' + U.dkey() + '.json', Store.exportJSON());
      Store.update(s => { s.meta.lastBackupReminder = U.dkey(); });
      Toast.success('备份已导出，请妥善保存');
    };

    el.querySelector('#st-import').onclick = () => el.querySelector('#st-file').click();

      const rd = new FileReader();
      rd.onload = () => {
        try {
          const data = JSON.parse(rd.result);
          if (!data.tasks || !data.settings) throw new Error('文件结构不符');
          Modal.confirm('导入确认', '<p>将用备份覆盖当前全部数据（当前数据建议先导出）。继续？</p>', '覆盖导入', () => {
            Store.replace(data);
            Toast.success('导入成功');
            App.refresh();
          }, true);
        } catch (err) { Toast.danger('导入失败：' + err.message); }
      };
      rd.readAsText(f);
      e.target.value = '';
    };

    el.querySelector('#st-summary').onclick = () => {
      const txt = AI.weeklySummary();
      if (navigator.clipboard) navigator.clipboard.writeText(txt).then(() => Toast.success('周摘要已复制，可粘贴给任何AI'));
      else Toast.show(txt, 'info', 8000);
    };

    // AI 配置
    const presetSel = el.querySelector('#ai-preset');
    presetSel.onchange = () => {
      AI.applyPreset(presetSel.value);
      const p = DB.AI_PRESETS[presetSel.value];
      el.querySelector('#ai-endpoint').value = p.endpoint;
      el.querySelector('#ai-model').value = p.model;
      el.querySelector('#ai-hint').textContent = p.hint;
    };
    el.querySelector('#ai-save').onclick = () => {
      Store.update(s => {
        s.ai.key = el.querySelector('#ai-key').value.trim();
        s.ai.endpoint = el.querySelector('#ai-endpoint').value.trim();
        s.ai.model = el.querySelector('#ai-model').value.trim();
        s.ai.stream = el.querySelector('#ai-stream').checked;
      });
      Toast.success('AI 配置已保存' + (AI.configured() ? '，可直接使用AI复盘' : ''));
    };
    el.querySelector('#ai-test').onclick = () => {
      el.querySelector('#ai-save').onclick();
      if (!AI.configured()) { Toast.warn('请先完整填写配置'); return; }
      Toast.show('正在测试连通…', 'info');
      AI.test().then(t => Toast.success('连通正常：' + t)).catch(e => Toast.danger('测试失败：' + e.message));
    };

    el.querySelector('#st-reset').onclick = () => {
      Modal.open({
        title: '⚠️ 最终确认',
        html: '<p><b>此操作非常危险，可能导致不可逆的数据丢失！</b></p><p>将清空：全部任务、错题、时长、心理状态、考点掌握度、AI配置。</p><p>强烈建议先「导出JSON备份」。</p>',
        actions: [
          { label: '取消' },
          { label: '我已备份，确认清空', kind: 'btn-danger', onClick: close => { Store.resetAll(); close(); Toast.success('已重置'); App.refresh(); } }
        ]
      });
    };
  }

  window.SettingsModule = { render };
})();


/* ===== js/modules/onboarding.js ===== */
/* ============================================================
 * onboarding.js — 首次使用引导（5步）
 * 欢迎+倒计时 → 各科进度 → 本周时间 → 目标院校 → 生成模板+防呆教学
 * ============================================================ */
(function () {
  'use strict';
  let step = 0;
  const collected = { progress: {}, hours: { workday: 4, weekend: 8 }, school: 'undecided' };

  function show() {
    step = 0;
    collected.progress = {};
    renderStep();
  }

  function shell(inner, foot) {
    Modal.open({
      title: '🎖 26考研全能作战系统 · 初始化',
      wide: true, dismissable: false,
      html: '<div class="ob-steps">' + [0, 1, 2, 3, 4].map(i => '<span class="ob-dot' + (i <= step ? ' ob-on' : '') + '">' + (i + 1) + '</span>').join('') + '</div>' + inner,
      actions: foot
    });
  }

  function renderStep() {
    if (step === 0) {
      const left = U.daysTo('2026-12-26');
      shell(
        '<h3 class="ob-h">欢迎，考生。</h3>'
        + '<p>距离2026考研初试还有 <b class="ob-big">' + left + '</b> 天。</p>'
        + '<p>本系统是你的"外接大脑"：规划、追踪、复盘、防错、心理干预五位一体。所有规则都为一个目标服务——<b>一志愿上岸，拒绝二战</b>。</p>'
        + '<p class="muted-sm">接下来用1分钟完成初始化：各科进度 → 可用时间 → 目标院校 → 防呆教学。</p>',
        [{ label: '开始初始化 →', kind: 'btn-primary', onClick: c => { step = 1; renderStep(); } }]
      );
    } else if (step === 1) {
      const fields = [
        ['math', '数学一', '高数/线代/概率 各到第几章？（文字描述）'],
        ['ctrl', '自控', '经典控制/现控 各到第几节？'],
        ['eng', '英语一', '真题做到哪一年？单词几轮？'],
        ['pol', '政治', '马原开始了吗？']
      ];
      shell(
        '<h3 class="ob-h">各科目当前进度</h3>'
        + fields.map(f =>
          '<label class="fld" style="margin-bottom:10px"><span><b>' + f[1] + '</b> — ' + f[2] + '</span>'
          + '<input class="input ob-prog" data-k="' + f[0] + '" placeholder="如：高数到第6章，线代未开始"></label>'
        ).join('')
        + '<div class="muted-sm">顺便录入各科总进度百分比（粗略即可）：</div>'
        + ['math', 'ctrl', 'eng', 'pol'].map(k =>
          '<label class="fld fld-inline"><span>' + DB.SUBJECTS[k].short + '</span><input class="input ob-pct" data-k="' + k + '" type="number" min="0" max="100" value="10"> %</label>'
        ).join(''),
        [
          { label: '← 上一步', onClick: () => { step = 0; renderStep(); } },
          {
            label: '下一步 →', kind: 'btn-primary', onClick: () => {
              document.querySelectorAll('.ob-prog').forEach(i => collected.progress[i.getAttribute('data-k')] = i.value.trim());
              document.querySelectorAll('.ob-pct').forEach(i => collected.progress[i.getAttribute('data-k') + '_pct'] = U.clamp(+i.value || 0, 0, 100));
              step = 2; renderStep();
            }
          }
        ]
      );
    } else if (step === 2) {
      shell(
        '<h3 class="ob-h">本周可用时间</h3>'
        + '<label class="fld" style="margin-bottom:10px"><span>工作日每天可学几小时？</span>'
        + '<input id="ob-wd" class="input" type="number" min="1" max="16" value="4"></label>'
        + '<label class="fld"><span>周末每天可学几小时？</span>'
        + '<input id="ob-we" class="input" type="number" min="1" max="16" value="8"></label>'
        + '<div class="muted-sm">系统将按 5×工作日 + 2×周末 计算每周目标时长。</div>',
        [
          { label: '← 上一步', onClick: () => { step = 1; renderStep(); } },
          {
            label: '下一步 →', kind: 'btn-primary', onClick: () => {
              collected.hours.workday = U.clamp(+document.getElementById('ob-wd').value || 4, 1, 16);
              collected.hours.weekend = U.clamp(+document.getElementById('ob-we').value || 8, 1, 16);
              step = 3; renderStep();
            }
          }
        ]
      );
    } else if (step === 3) {
      collected.school = 'undecided'; // 进入本步时重置默认，防止快速回退/前进导致旧值残留
      shell(
        '<h3 class="ob-h">目标院校</h3>'
        + '<p>主目标河工大（081100），备选上大（并行主攻）。现在不确定也没关系——<b>10月底系统会用数学模拟分替你做决策</b>。</p>'
        + '<div class="seg-row">'
        + '<button class="seg ob-school" data-v="hebut">河北工业大学</button>'
        + '<button class="seg ob-school" data-v="shu">上海大学</button>'
        + '<button class="seg ob-school seg-on" data-v="undecided">未确定（推荐）</button>'
        + '</div>',
        [
          { label: '← 上一步', onClick: () => { step = 2; renderStep(); } },
          { label: '下一步 →', kind: 'btn-primary', onClick: () => { step = 4; renderStep(); } }
        ]
      );
      document.querySelectorAll('.ob-school').forEach(b => b.onclick = () => {
        document.querySelectorAll('.ob-school').forEach(x => x.classList.remove('seg-on'));
        b.classList.add('seg-on');
        collected.school = b.getAttribute('data-v');
      });
    } else if (step === 4) {
      const weekly = collected.hours.workday * 5 + collected.hours.weekend * 2;
      shell(
        '<h3 class="ob-h">最后一课：防呆检查清单</h3>'
        + '<p>你的致命弱点不是不会，而是<b>符号、分式、积分因子</b>。所以每次做数学题前，必须在「红线禁令」页逐项勾选：</p>'
        + '<div class="warn-box"><div class="warn-body">'
        + DB.FOOLPROOF_CHECKLIST.map((c, i) => (i + 1) + '. ' + c).join('<br>')
        + '</div></div>'
        + '<p class="muted-sm">每周目标时长已定为 <b>' + weekly + 'h</b>（可在设置中调整）。初始任务模板与4个里程碑已生成。</p>',
        [{
          label: '✓ 完成初始化，进入系统', kind: 'btn-primary', onClick: c => {
            Store.update(s => {
              ['math', 'ctrl', 'eng', 'pol'].forEach(k => {
                s.progress[k].percent = collected.progress[k + '_pct'] || 0;
                if (collected.progress[k]) s.progress[k].stage = collected.progress[k];
              });
              s.settings.weeklyTargetHours = collected.hours.workday * 5 + collected.hours.weekend * 2;
              s.settings.targetSchool = collected.school;
              s.settings.onboarded = true;
            });
            c();
            Toast.success('初始化完成。一志愿上岸，开工。');
            App.refresh();
          }
        }]
      );
    }
  }

  window.Onboarding = { show, needed: function () { return !Store.get().settings.onboarded; } };
})();


/* ===== js/app.js ===== */
/* ============================================================
 * app.js — 应用主控
 * 交互架构（好用版）：
 *  · 底部固定5大高频Tab：作战台/任务/排程/复盘/工具（工具内含其余9模块）
 *  · 顶部极简状态条：倒计时+今日时长，全局可见
 * ============================================================ */
(function () {
  'use strict';

  // 主Tab（底部固定）| 子模块（工具抽屉）
  const MAIN_TABS = [
    ['dashboard', '作战台', '🎖', DashboardModule],
    ['tasks', '任务', '✅', TasksModule],
    ['scheduler', '排程', '🧠', SchedulerModule],
    ['review', '复盘', '📊', ReviewModule]
  ];
  const TOOL_TABS = [
    ['quiz', 'AI测验', '🤖', QuizModule],
    ['mistakes', '错题画像', '🎯', MistakesModule],
    ['heatmap', '考点热力', '🗺', HeatmapModule],
    ['inspector', '步骤审查', '✍️', InspectorModule],
    ['focus', '深度专注', '🔒', FocusModule],
    ['concept', '概念图谱', '🧩', ConceptMapModule],
    ['decision', '院校决策', '⚖️', DecisionModule],
    ['mental', '心理状态', '🧘', MentalModule],
    ['reading', '英语阅读', '📖', ReadingModule],
    ['redline', '红线禁令', '⛔', RedlineModule],
    ['progress', '进度追踪', '📈', ProgressModule],
    ['settings', '设置', '⚙️', SettingsModule]
  ];
  const ALL = MAIN_TABS.concat(TOOL_TABS);
  let current = 'dashboard';

  function rolloverIfNeeded() {
    const s = Store.get();
    const today = U.dkey();
    if (s.meta.lastOpenDate === today) return;
    const last = s.meta.lastOpenDate;
    if (last && last < today) {
      const doneIds = s.completions[last] || [];
      s.taskArchive[last] = s.tasks.map(t => ({ subject: t.subject, text: t.text, done: t.done || doneIds.indexOf(t.id) >= 0 }));
      s.tasks.forEach(t => { t.done = false; });
      const keys = Object.keys(s.taskArchive).sort();
      while (keys.length > 60) { delete s.taskArchive[keys.shift()]; }
    }
    Store.update(x => { x.meta.lastOpenDate = today; });
  }

  // 顶部状态条：倒计时 + 今日时长 + 今日任务完成度
  function renderStatusBar() {
    const el = document.getElementById('statusbar');
    const left = U.daysTo(Store.get().settings.examDate);
    const st = Store.todayTaskStats();
    let done = 0, total = 0;
    Object.keys(st).forEach(k => { done += st[k][0]; total += st[k][1]; });
    el.innerHTML =
      '<span class="sb-item">⏳ <b>' + left + '</b>天</span>'
      + '<span class="sb-item">🕐 <b>' + Store.todayHours() + '</b>h</span>'
      + '<span class="sb-item">✅ <b>' + done + '/' + total + '</b></span>'
      + (Store.mistakeCountToday('sign') > 0 ? '<span class="sb-item sb-warn">⚠️符号' + Store.mistakeCountToday('sign') + '</span>' : '');
  }

  function renderNav() {
    const nav = document.getElementById('bottomnav');
    let html = MAIN_TABS.map(t =>
      '<button class="bn-btn' + (current === t[0] ? ' bn-on' : '') + '" data-tab="' + t[0] + '">'
      + '<span class="bn-icon">' + t[2] + '</span><span class="bn-label">' + t[1] + '</span></button>'
    ).join('');
    html += '<button class="bn-btn' + (TOOL_TABS.some(t => t[0] === current) ? ' bn-on' : '') + '" data-tab="__tools">'
      + '<span class="bn-icon">🧰</span><span class="bn-label">工具</span></button>';
    nav.innerHTML = html;
    nav.querySelectorAll('.bn-btn').forEach(b => b.onclick = () => {
      const t = b.getAttribute('data-tab');
      if (t === '__tools') openTools();
      else App.go(t);
    });
  }

  function openTools() {
    Modal.open({
      title: '🧰 工具箱',
      html: '<div class="tools-grid">'
        + TOOL_TABS.map(t =>
          '<button class="tool-cell" data-tab="' + t[0] + '"><span class="tool-icon">' + t[2] + '</span><span>' + t[1] + '</span></button>'
        ).join('') + '</div>',
      actions: [{ label: '关闭' }]
    });
    document.querySelectorAll('.tool-cell').forEach(b => b.onclick = () => {
      Modal.close();
      App.go(b.getAttribute('data-tab'));
    });
  }

  function render() {
    renderStatusBar();
    renderNav();
    const view = document.getElementById('view');
    const tab = ALL.find(t => t[0] === current);
    view.scrollTop = 0; window.scrollTo(0, 0);
    tab[3].render(view);
    view.querySelectorAll('.pbar-fill').forEach(f => {
      requestAnimationFrame(() => { f.style.width = f.getAttribute('data-w') + '%'; });
    });
  }

  const App = {
    go(tab) { current = tab; render(); },
    refresh() { render(); renderStatusBar(); },
    get current() { return current; },
    init() {
      rolloverIfNeeded();
      Notify.ensurePermission();
      render();
      if (Onboarding.needed()) setTimeout(() => Onboarding.show(), 300);
      setTimeout(() => Alerts.runDailyChecks(), 800);
    }
  };

  window.App = App;
  document.addEventListener('DOMContentLoaded', App.init);
})();

</script>
</body>
</html>
