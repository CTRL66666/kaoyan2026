    const barData = hours.map((v, i) => ({ label: ['一', '二', '三', '四', '五', '六', '日'][i], value: v, highlight: i === todayIdx }));

    el.innerHTML =
      '<div id="alert-slot">' + Alerts.bannerHtml() + '</div>'
      + nowHtml
      + '<div class="card"><div class="card-title-row"><span class="card-title">今日作战序列</span>'
      + '<button class="link-btn" id="go-sched">完整排程 →</button></div>' + (seqHtml || '<div class="empty">暂无任务</div>') + '</div>'
      + '<div class="chip-row">' + chips + '</div>'
      + '<div class="quick-grid">'
      + '<button class="quick-btn" data-go="tasks">✅<span>任务</span></button>'
      + '<button class="quick-btn" data-go="mistakes">🎯<span>错题</span></button>'
      + '<button class="quick-btn" data-go="review">📊<span>复盘</span></button>'
      + '<button class="quick-btn" data-go="redline">⛔<span>红线</span></button>'
      + '</div>'
      + '<div class="card"><div class="card-title-row"><span class="card-title">本周节奏</span>'
      + '<button class="link-btn" id="log-hours">+ 记录时长</button></div>'
      + '<div id="wk-chart">' + Charts.bar(barData, { height: 130, unit: 'h', hiColor: '#000' }) + '</div>'
      + '<div class="muted-sm">今日 ' + Store.todayHours() + 'h · 本周累计 ' + U.round1(U.sum(hours)) + 'h / 目标 ' + (s.settings.weeklyTargetHours || 50) + 'h</div>'
      + '</div>'

      + dailyQuizHtml(s);

    bind(el, next);
    ensureDailyQuiz(el);
  }

  // ---------- 每日一题 ----------
  var dailyGenerating = false;
  var dqSubject = 'auto'; // 用户选定的出题科目：auto|math|ctrl|eng|pol

  function dailyQuizHtml(s) {
    var dq = s.dailyQuiz;
    var today = U.dkey();
    var subjOpts = ['auto|🎲 自动(薄弱点)', 'math|📐 数学', 'ctrl|🎛 专业课', 'eng|📚 英语', 'pol|🏛 政治']
      .map(function (o) { var p = o.split('|'); return '<option value="' + p[0] + '"' + (dqSubject === p[0] ? ' selected' : '') + '>' + p[1] + '</option>'; }).join('');
    var title = '<div class="card-title-row"><span class="card-title">📅 每日一题</span>'
      + '<span style="display:flex;gap:4px;align-items:center">'
      + '<select id="dq-subj" class="input input-sel" style="font-size:11px;padding:2px 4px;height:auto;width:auto" title="指定出题科目">'
      + subjOpts
      + '</select>'
      + (dq && dq.date === today && dq.question
          ? '<button class="btn btn-ghost" id="dq-again" style="font-size:11px;padding:3px 8px">🔁 再来一题</button>'
          : '')
      + '</span></div>';

    if (dq && dq.date === today && dq.question) {
      // 今日已生成
      var subj = DB.SUBJECTS[dq.subject] || { short: '题', color: '#666' };
      return '<div class="card" id="dq-card">' + title
        + '<div class="pm-question"><b>📝 ' + subj.short + '题：</b>' + renderMathSafe(dq.question) + '</div>'
        + (dq.solution ? '<div class="pm-ai-section"><b>🔑 解答：</b><div class="pm-ai-body">' + renderMathSafe(dq.solution) + '</div></div>' : '')
        + (dq.trap ? '<div class="pm-ai-section"><b>⚠️ 易错点：</b><div class="pm-ai-body">' + renderMathSafe(dq.trap) + '</div></div>' : '')
        + '<div class="muted-sm" style="margin-top:6px">基于你的薄弱点生成 · ' + (dq.generatedAt || '').slice(0, 16).replace('T', ' ') + '</div>'
        + '</div>';
    }
    if (dq && dq.date === today && dq.failed) {
      // 今日生成失败：提供手动重试（不再自动重试，避免刷新循环）
      return '<div class="card" id="dq-card">' + title
        + '<div class="alert alert-warn">⚠️ 今日一题生成失败：' + U.esc(dq.error || '未知错误') + '</div>'
        + '<button class="btn btn-ghost" id="dq-retry" style="font-size:11px;padding:3px 8px;margin-top:6px">🔁 重试生成</button>'
        + '</div>';
    }
    if (typeof AI !== 'undefined' && AI.configured()) {
      return '<div class="card" id="dq-card">' + title
        + '<div class="muted-sm">⏳ 正在依据你的薄弱点生成今日一题…</div></div>';
    }
    // 未配置 AI
    return '<div class="card" id="dq-card">' + title
      + '<div class="alert alert-warn">未配置 AI，无法生成每日一题。请先在「设置」中填写 API，或前往「拍题」标记疑难点后由 AI 出针对性练习。</div></div>';
  }

  // 渲染数学/文本（无 Tex 时降级）
  function renderMathSafe(text) {
    if (!text) return '';
    if (typeof Tex !== 'undefined') { try { return Tex.renderInline(text).replace(/\\n/g, '<br>'); } catch (e) {} }
    return U.esc(text).replace(/\\n/g, '<br>');
  }

  // 进入作战台时：今日未生成则自动生成一道（不重复生成；失败当日不再自动重试）
  function ensureDailyQuiz(el) {
    var s = Store.get();
    var today = U.dkey();
    if (typeof AI === 'undefined' || !AI.configured()) return;
    if (s.dailyQuiz && s.dailyQuiz.date === today) return; // 今日已有（成功或失败占位）→ 不再自动重试
    if (dailyGenerating) return; // 防重入
    dailyGenerating = true;
    generateDailyQuiz(false, function () {
      dailyGenerating = false;
      App.refresh(); // 重新渲染展示结果
    });
  }

  // 生成每日一题。force=true 为「再来一题」（覆盖今日）；subject 指定出题科目（auto|math|ctrl|eng|pol）
  function generateDailyQuiz(force, done, subject) {
    if (typeof AI === 'undefined' || !AI.configured()) { if (done) done(); return; }
    var s = Store.get();
    var today = U.dkey();
    var chosen = (subject || 'auto');
    var chosenSubject = (chosen && chosen !== 'auto') ? chosen : null;

    var majorName = '';
    try { majorName = (DB.getActiveMajor().name) || '专业课'; } catch (e) {}
    var examCfg = (s.settings && s.settings.examConfig) || {};
    var profName = examCfg.profName || '自控原理';

    // 取弱点画像 + 近期疑难点/题干，作为出题依据
    var wp = s.weaknessProfile;
    var photos = s.mistakePhotos || [];
    var painPoints = photos.filter(function (p) { return p.painPoint && p.painPoint.trim(); })
      .map(function (p) { return p.painPoint.trim(); }).slice(-15);
    var qSamples = photos.filter(function (p) { return (p.extractedQuestion || p.note || '').trim(); })
      .slice(-6).map(function (p) { return (p.extractedQuestion || p.note).trim().slice(0, 50); });

    var ctxParts = [];
    if (chosenSubject) {
      var subjName = (DB.SUBJECTS[chosenSubject] && DB.SUBJECTS[chosenSubject].name) || chosenSubject;
      ctxParts.push('本次请**聚焦科目「' + subjName + '」**出题（不要出其它科目的题）。');
    }
    if (wp && wp.weakAreas && wp.weakAreas.length) ctxParts.push('考生薄弱点画像关键词：' + wp.weakAreas.join('、'));
    if (painPoints.length) ctxParts.push('近期疑难点标签：' + painPoints.join('、'));
    if (qSamples.length) ctxParts.push('部分错题题干样例：\n- ' + qSamples.join('\n- '));
    var ctx = ctxParts.length ? ctxParts.join('\n') : '（暂无错题记录，请基于该考生专业课「' + profName + '」常见易错点出题）';

    var subjectHint = chosenSubject
      ? '本题必须属于科目「' + ((DB.SUBJECTS[chosenSubject] && DB.SUBJECTS[chosenSubject].name) || chosenSubject) + '」，输出 JSON 时 "subject" 字段固定填 "' + chosenSubject + '"。'
      : '输出 JSON 时 "subject" 字段填该题目实际所属科目（math|ctrl|eng|pol）。';
    var systemPrompt = '你是考研出题官，熟悉「' + profName + '」及数学公共课的命题。'
      + '根据考生的薄弱点画像与近期错题，出一道**针对性练习题**（聚焦其真正薄弱的考点，难度贴合真题）。'
      + subjectHint
      + '输出严格 JSON（不要 markdown、不要多余文字）：'
      + '{"subject":"math|ctrl|eng|pol（该题目所属科目）",'
      + '"question":"完整题干（数学表达式用 LaTeX 如 \\frac{a}{b}、\\sqrt{x}、x^{2}、\\int、\\sum）",'
      + '"solution":"详细解答步骤（分步，含关键公式推导，LaTeX 格式）",'
      + '"trap":"本题最易踩的坑（与考生薄弱点对应）"}'
      + '要求：question 必须可独立作答；solution 自洽；trap 要点中考生该补的短板。';

    var userPrompt = ctx + '\n\n请出今日针对性练习一题。';

    AI.chatStream(systemPrompt, userPrompt, null).then(function (fullText) {
      var res = extractDailyJSON(fullText);
      if (!res || !res.question) {
        // 提取彻底失败：尝试从原始文本中剥离 JSON 外壳，只保留可读内容
        var cleaned = fullText
          .replace(/```\w*\s*/g, '').replace(/```/g, '')  // 去代码块标记
          .replace(/^\s*[\{\[]/, '').replace(/[\}\]]\s*$/, '') // 去首尾括号
          .replace(/^\s*"subject"\s*:\s*"[^"]*",?\s*/i, '')   // 去字段名
          .replace(/^\s*"question"\s*:\s*"/i, '')
          .replace(/",\s*solution"\s*:.*/s, '');               // 截断到 question 尾
        cleaned = cleaned.trim().replace(/\n+$/, '');
        res = { subject: chosenSubject || 'math', question: cleaned || fullText, solution: '', trap: '' };
      }
      Store.update(function (st) {
        var prev = st.dailyQuiz;
        if (prev && prev.date && !force) {
          // 正常情况下不会走到这里（ensureDailyQuiz 已拦截），保险起见保留
        }
        // 归档旧题到历史（"再来一题"时保留可回看）
        if (prev && prev.question) {
          st.dailyQuizHistory = st.dailyQuizHistory || [];
          st.dailyQuizHistory.push(prev);
          if (st.dailyQuizHistory.length > 30) st.dailyQuizHistory = st.dailyQuizHistory.slice(-30);
        }
        st.dailyQuiz = {
          date: today,
          subject: chosenSubject || res.subject || 'math',
          question: res.question || '',
          solution: res.solution || '',
          trap: res.trap || '',
          generatedAt: new Date().toISOString()
        };
      });
      if (done) done();
    }).catch(function (err) {
      // 生成失败：写入「失败占位」（当日不再自动重试，避免刷新循环；用户可手动点重试）
      console.warn('[Dashboard] 每日一题生成失败:', err && err.message);
      Store.update(function (st) {
        st.dailyQuiz = { date: today, failed: true, error: (err && err.message) || String(err || '未知错误'), generatedAt: new Date().toISOString() };
      });
      if (done) done();
    });
  }

  // 从 AI 返回中稳健提取每日一题 JSON（含修复常见格式问题）
  function extractDailyJSON(raw) {
    var str = (raw || '').trim();

    // 先试 markdown 代码块
    var m = str.match(/```(?:json)?\s*([\s\S]*?)```/);
    if (m) { try { return repairFields(JSON.parse(m[1].trim())); } catch (e) {} }

    // 找最外层 { ... }
    var start = str.indexOf('{');
    if (start === -1) return null;
    var depth = 0, inStr = false, esc = false, end = -1;
    for (var i = start; i < str.length; i++) {
      var c = str.charAt(i);
      if (esc) { esc = false; continue; }
      if (c === '\\') { esc = true; continue; }
      if (c === '"') { inStr = !inStr; continue; }
      if (inStr) continue;
      if (c === '{') depth++;
      else if (c === '}') { depth--; if (depth === 0) { end = i + 1; break; } }
    }
    if (end <= start) return null;
    var jsonStr = str.slice(start, end);

    // 直接解析
    try { return repairFields(JSON.parse(jsonStr)); } catch (e) {}

    // 修复常见问题后重试
    var repaired = jsonStr
      .replace(/\/\/[^\n]*/g, '')       // 去单行注释
      .replace(/\/\*[\s\S]*?\*\//g, '') // 去块注释
      .replace(/,\s*([}\]])/g, '$1')     // 去尾逗号
      .replace(/'/g, '"');               // 单引号→双引号
    try { return repairFields(JSON.parse(repaired)); } catch (e) {}

    // 最后兜底：用正则从原始文本中捞各字段值
    var fields = {};
    var patterns = [
      ['subject', /"subject"\s*:\s*"([^"]*)"/],
      ['question', /"question"\s*:\s*"((?:[^"\\]|\\.)*)"/],
      ['solution', /"solution"\s*:\s*"((?:[^"\\]|\\.)*)"/],
      ['trap', /"trap"\s*:\s*"((?:[^"\\]|\\.)*)"/]
    ];
    // 也试无引号的值（数字/布尔）
    patterns.push(['subject', /"subject"\s*:\s*(\w+)/]);
    patterns.forEach(function (p) {
      var mm = raw.match(p[1]);
      if (mm) fields[p[0]] = mm[1].replace(/\\n/g, '\n').replace(/\\t/g, '\t');
    });
    // 兜底提取的字段也需要修复 LaTeX 转义
    return fields.question ? repairFields(fields) : null;
  }

  // ★ 关键修复：JSON 解析会把 LaTeX 命令中的 \f \r \b \t 吞掉（变成控制字符）
  // 例如 "\frac" → JSON.parse 后变成 <formfeed>rac
  // 此函数遍历对象所有字符串值，恢复被吞的 LaTeX 反斜杠
  function repairFields(obj) {
    if (!obj) return obj;
    if (typeof obj === 'string') return repairMangled(obj);
    if (typeof obj !== 'object') return obj;
    // 数组
    if (Array.isArray(obj)) { for (var i = 0; i < obj.length; i++) obj[i] = repairFields(obj[i]); return obj; }
    // 对象
    var keys = Object.keys(obj);
    for (var k = 0; k < keys.length; k++) obj[keys[k]] = repairFields(obj[keys[k]]);
    return obj;
  }
  // 修复单个字符串中被 JSON 转义吞掉的 LaTeX 命令
  function repairMangled(s) {
    if (typeof s !== 'string') return s;
    // 按长度降序排列（先匹配长的前缀，避免 \bigg 被 \big 先匹配掉）
    return s
      // ===== \f (form feed U+000C) 冲突 =====
      .replace(/\x0Cfrac/g, '\\frac')
      .replace(/\x0Cfrom/g, '\\from')
      // ===== \r (CR U+000D) 冲突 —— 大量命令以 r 开头 =====
      .replace(/\x0DRightarrow/g, '\\Rightarrow')
      .replace(/\x0Drightarrow/g, '\\rightarrow')
      .replace(/\x0Dlefteqn/g, '\\lefteqn')
      .replace(/\x0Dright/g, '\\right')
      .replace(/\x0Dleft/g, '\\left')
      .replace(/\x0Drceil/g, '\\rceil')
      .replace(/\x0Drfloor/g, '\\rfloor')
      .replace(/\x0Drangle/g, '\\rangle')
      .replace(/\x0Drbrace/g, '\\rbrace')
      .replace(/\x0Dmathrm/g, '\\mathrm')
      .replace(/\x0Drm/g, '\\rm')
      .replace(/\x0Draise/g, '\\raise')
      .replace(/\x0Droot/g, '\\root')
      .replace(/\x0Drule/g, '\\rule')
      .replace(/\x0Dlimits/g, '\\limits')
      .replace(/\x0Dnolimits/g, '\\nolimits')
      .replace(/\x0Dot/g, '\\rot')   // 少见但可能
      // ===== \b (BS U+0008) 冲突 =====
      .replace(/\x08begin/g, '\\begin')
      .replace(/\x08bigg/g, '\\bigg')
      .replace(/\x08Bigg/g, '\\Bigg')
      .replace(/\x08bigl/g, '\\bigl')
      .replace(/\x08Bigl/g, '\\Bigl')
      .replace(/\x08bigr/g, '\\bigr')
      .replace(/\x08Bigr/g, '\\Bigr')
      .replace(/\x08biggl/g, '\\biggl')
      .replace(/\x08Biggl/g, '\\Biggl')
      .replace(/\x08biggr/g, '\\biggr')
      .replace(/\x08Biggr/g, '\\Biggr')
      .replace(/\x08big/g, '\\big')
      .replace(/\x08Big/g, '\\Big')
      .replace(/\x08eta/g, '\\eta')
      .replace(/\x08in/g, '\\bin')   // \binom 可能
      .replace(/\x08eta/g, '\\beta')
      .replace(/\x08ar/g, '\\bar')
      .replace(/\x08f/g, '\\bf')
      .replace(/\x08old/g, '\\bold')
      .replace(/\x08ot/g, '\\bot')
      .replace(/\x08race/g, '\\brace')
      .replace(/\x08rack/g, '\\brack')
      .replace(/\x08ullet/g, '\\bullet')
      .replace(/\x08ackslash/g, '\\backslash')
      .replace(/\x08reve/g, '\\breve')
      // ===== \t (TAB U+0009) 冲突 =====
      .replace(/\x09ext/g, '\\text')
      .replace(/\x09extrm/g, '\\textrm')
      .replace(/\x09extbf/g, '\\textbf')
      .replace(/\x09extit/g, '\\textit')
      .replace(/\x09exttt/g, '\\texttt')
      .replace(/\x09an/g, '\\tan')
      .replace(/\x09imes/g, '\\times')
      .replace(/\x09o/g, '\\to')
      .replace(/\x09op/g, '\\top')
      .replace(/\x09au/g, '\\tau')
      .replace(/\x09heta/g, '\\theta')
      .replace(/\x09ilde/g, '\\tilde')
      .replace(/\x09iny/g, '\\tiny')
      // ===== \n (LF U+000A) 冲突（较少但可能） =====
      .replace(/\x0Aeq/g, '\\neq')
      .replace(/\x0Aearrow/g, '\\nearrow')
      .replace(/\x0Awarrow/g, '\\nwarrow')
      .replace(/\x0Aatural/g, '\\natural')
      .replace(/\x0Aeg/g, '\\neg')
      ; // 末尾分号空语句
  }

  function bind(el, next) {
    // NOW 卡动作
    const doneBtn = el.querySelector('#now-done');
    if (doneBtn && next) doneBtn.onclick = () => toggleTask(next.id, true);
    const focBtn = el.querySelector('#now-focus');
    if (focBtn && next) focBtn.onclick = () => { App.go('focus'); };
    const addBtn = el.querySelector('#now-add');
    if (addBtn) addBtn.onclick = () => App.go('tasks');

    // 序列就地勾选
    el.querySelectorAll('.seq-row input[type=checkbox]').forEach(cb => {
      cb.onchange = () => {
        const id = cb.closest('.seq-row').getAttribute('data-id');
        toggleTask(id, cb.checked);
      };
    });

    // 快捷入口
    el.querySelectorAll('[data-go]').forEach(b => b.onclick = () => App.go(b.getAttribute('data-go')));
    el.querySelector('#go-sched').onclick = () => App.go('scheduler');

    // 每日一题：科目选择
    var dqSubjSel = el.querySelector('#dq-subj');
    if (dqSubjSel) dqSubjSel.onchange = () => { dqSubject = dqSubjSel.value; };

    // 每日一题「再来一题」/「重试生成」
    var dqAgain = el.querySelector('#dq-again');
    if (dqAgain) dqAgain.onclick = () => {
      dqAgain.disabled = true;
      dqAgain.textContent = '生成中…';
      generateDailyQuiz(true, function () { App.refresh(); }, dqSubject);
    };
    var dqRetry = el.querySelector('#dq-retry');
    if (dqRetry) dqRetry.onclick = () => {
      dqRetry.disabled = true;
      dqRetry.textContent = '生成中…';
      generateDailyQuiz(true, function () { App.refresh(); }, dqSubject);
    };

    // 记时长
    el.querySelector('#log-hours').onclick = () => {
      Modal.open({
        title: '记录学习时长',
        html: '<div class="seg-row" id="hr-segs">'
          + [0.5, 1, 1.5, 2, 3].map(h => '<button class="seg" data-h="' + h + '">+' + h + 'h</button>').join('')
          + '</div><div class="muted-sm">点击即累加到今天（当前 ' + Store.todayHours() + 'h）</div>',
        actions: [{ label: '完成', kind: 'btn-primary' }]
      });
      document.querySelectorAll('#hr-segs .seg').forEach(b => b.onclick = () => {
        Store.addHours(+b.getAttribute('data-h'));
        Toast.success('+' + b.getAttribute('data-h') + 'h，今日共 ' + Store.todayHours() + 'h');
        renderStatusOnly();
      });
    };
  }

  function renderStatusOnly() { App.refresh(); }

  function toggleTask(id, done) {
    let subject = null, count = 0;
    Store.update(s => {
      const t = s.tasks.find(x => x.id === id);
      if (!t) return;
      t.done = done; subject = t.subject;
      const k = U.dkey();
      s.completions[k] = s.completions[k] || [];
      const i = s.completions[k].indexOf(id);
      if (done && i < 0) s.completions[k].push(id);
      if (!done && i >= 0) s.completions[k].splice(i, 1);
      count = s.completions[k].length;
    });
    if (done) {
      // 连击反馈
      Toast.show(['✓ 打卡', '✓ 拿下', '✓ 干净利落', '✓ 继续推进'][count % 4] + '（今日第' + count + '个）', 'success', 1800);
      confettiBurst();
      if (subject === 'math' && Store.mistakeCountToday('sign') > 0) {
        Modal.open({
          title: '⚠️ 数学防呆提醒',
          html: '<p>今日已记 <b>' + Store.mistakeCountToday('sign') + '</b> 次符号错误。下一题前默念：</p>'
            + '<ol style="padding-left:18px;line-height:1.9"><li>符号前置</li><li>分式三步法</li><li>草稿分区</li></ol>',
          actions: [{ label: '收到', kind: 'btn-primary' }]
        });
      }
    }
    App.refresh();
  }

  // 轻量庆祝动效（纯CSS，无库）
  function confettiBurst() {
    const c = document.createElement('div');
    c.className = 'burst';
    for (let i = 0; i < 10; i++) {
      const p = document.createElement('i');
      p.style.setProperty('--a', (i * 36) + 'deg');
      p.style.setProperty('--d', (34 + (i % 3) * 14) + 'px');
      c.appendChild(p);
    }
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 700);
  }

  window.DashboardModule = { render };
})();


/* ===== js/modules/tasks.js ===== */
/* ============================================================
 * tasks.js — 任务中心：添加/打卡/就地编辑/删除 + 防呆提醒区
 * 业务规则：
 *  1. 数学任务勾选完成且今日符号错误>0 → 防呆弹窗
 *  2. 政治任务超过2个 → 警告
 *  3. 任务文本含硬件关键词 → 禁止添加 + 红线警告
 * ============================================================ */
(function () {
  'use strict';
  let filter = 'all';

  function hitHardware(text) {
    return DB.redlineKeywords().find(k => text.indexOf(k) >= 0);
  }

  function render(el) {
    const s = Store.get();
    const tabs = [['all', '全部'], ['math', DB.SUBJECTS.math.short], ['ctrl', DB.SUBJECTS.ctrl.short], ['eng', DB.SUBJECTS.eng.short], ['pol', DB.SUBJECTS.pol.short]];

    let tabsHtml = '';
    tabs.forEach(t => {
      const n = t[0] === 'all' ? s.tasks.length : s.tasks.filter(x => x.subject === t[0]).length;
      tabsHtml += '<button class="tab' + (filter === t[0] ? ' tab-on' : '') + '" data-f="' + t[0] + '">' + t[1] + ' <span class="tab-n">' + n + '</span></button>';
    });

    const list = s.tasks.filter(t => filter === 'all' || t.subject === filter)
      .sort((a, b) => (a.done - b.done) || ((a.order != null ? a.order : Number.MAX_SAFE_INTEGER) - (b.order != null ? b.order : Number.MAX_SAFE_INTEGER)));

    let rows = '';
    if (list.length === 0) {
      rows = '<div class="empty">暂无任务，在下方添加一条吧</div>';
    } else {
      list.forEach(t => {
        const subj = DB.SUBJECTS[t.subject] || { short: '?', color: '#999' };
        rows += '<div class="task' + (t.done ? ' task-done' : '') + '" data-id="' + t.id + '">'
          + '<label class="task-check"><input type="checkbox"' + (t.done ? ' checked' : '') + ' data-act="toggle"><span class="box"></span></label>'
          + '<span class="task-tag" style="background:' + subj.color + '">' + subj.short + '</span>'
          + '<span class="task-text" data-act="edit" title="点击编辑">' + U.esc(t.text) + '</span>'
          + '<button class="task-x" data-act="del" aria-label="删除">×</button>'
          + '</div>';
      });
    }

    el.innerHTML =
      '<div class="card"><div class="card-title">任务中心</div>'
      + '<div class="tab-row">' + tabsHtml + '</div>'
      + '<div class="task-list">' + rows + '</div>'
      + '<div class="add-row">'
      +   '<select id="add-subj" class="input input-sel">'
      +     '<option value="math">' + DB.SUBJECTS.math.name + '</option><option value="ctrl">' + DB.SUBJECTS.ctrl.short + '</option>'
      +     '<option value="eng">' + DB.SUBJECTS.eng.name + '</option><option value="pol">' + DB.SUBJECTS.pol.name + '</option>'
      +   '</select>'
      +   '<input id="add-text" class="input" placeholder="添加任务，回车确认（硬件关键词将被拦截）">'
      +   '<button id="add-btn" class="btn btn-primary">添加</button>'
      + '</div></div>'

      // 防呆提醒区（固定在列表下方，PRD 4.2-4）
      + '<div class="warn-box">'
      + '<div class="warn-title">⚠️ 防呆提醒</div>'
      + '<div class="warn-body">数学任务执行前请确认：<br>'
      + '1. 符号前置，负号立即提到最前面<br>'
      + '2. 分式合并三步法（分母→分子→计算）<br>'
      + '3. 草稿分区：左侧乱草，右侧正稿</div>'
      + '</div>';

    bind(el);
  }

  function addTask(el) {
    const subj = el.querySelector('#add-subj').value;
    const input = el.querySelector('#add-text');
    const text = input.value.trim();
    if (!text) { Toast.warn('任务内容不能为空'); return; }

    // 业务规则3：分心源冲动拦截（拦截词来自 redlineKeywords，含默认硬件词 + 用户追加分心源）
    const hit = hitHardware(text);
    if (hit) {
      const dist = (function () { try { return DB.coachProfile().distractions; } catch (e) { return '分心源'; } })();
      Toast.danger('🚫 红线拦截：检测到「' + hit + '」。初试前请暂停「' + dist + '」！');
      Modal.open({
        title: '🚫 红线警告',
        html: '<p>你试图添加包含 <b>「' + U.esc(hit) + '」</b> 的任务。</p>'
          + '<p>这触犯了绝对禁令第1条：<b>初试前绝对禁止 ' + U.esc(dist) + '</b>。</p>'
          + '<p class="muted-sm">你的 ' + U.esc(dist) + ' 经历已经够用了。现在每一小时分心时间，都是在从 ' + DB.SUBJECTS.math.name + ' 的分数里偷分。任务已被拒绝。</p>',
        actions: [{ label: '我明白，回去学数学', kind: 'btn-primary' }]
      });
      return;
    }

    // 业务规则2：政治时间监控
    if (subj === 'pol') {
      const polCount = Store.get().tasks.filter(t => t.subject === 'pol' && !t.done).length;
      if (polCount >= 2) {
        Toast.warn('⚠️ 政治任务已超标，请优先保证数学/专业课。');
      }
    }

    Store.update(s => {
      let maxOrder = -1;
      s.tasks.forEach(t => { if (typeof t.order === 'number' && t.order > maxOrder) maxOrder = t.order; });
      s.tasks.push({ id: U.uid(), subject: subj, text, done: false, createdAt: new Date().toISOString(), order: maxOrder + 1 });
    });
    Toast.success('已添加');
    App.refresh();
  }

  function bind(el) {
    el.querySelectorAll('.tab').forEach(b => b.onclick = () => { filter = b.getAttribute('data-f'); render(el); });
    el.querySelector('#add-btn').onclick = () => addTask(el);
    el.querySelector('#add-text').addEventListener('keydown', e => { if (e.key === 'Enter') addTask(el); });

    el.querySelectorAll('.task').forEach(row => {
      const id = row.getAttribute('data-id');
      row.querySelector('[data-act="toggle"]').onchange = e => toggleTask(id, e.target.checked);
      row.querySelector('[data-act="del"]').onclick = () => {
        Modal.confirm('删除任务', '<p>确认删除该任务？此操作不可恢复。</p>', '删除', () => {
          Store.update(s => { s.tasks = s.tasks.filter(t => t.id !== id); });
          App.refresh();
        }, true);
      };
      // 就地编辑
      const textEl = row.querySelector('[data-act="edit"]');
      textEl.onclick = () => {
        if (row.classList.contains('editing')) return;
        const task = Store.get().tasks.find(t => t.id === id);
        if (!task) return;
        row.classList.add('editing');
        const inp = document.createElement('input');
        inp.className = 'input task-edit-input';
        inp.value = task.text;
        textEl.replaceWith(inp);
        inp.focus(); inp.select();
        const commit = save => {
          if (save) {
            const v = inp.value.trim();
            const hit = v && hitHardware(v);
            if (hit) { Toast.danger('🚫 红线拦截：文本包含「' + hit + '」，修改被拒绝'); }
            else if (v) Store.update(s => { const t = s.tasks.find(x => x.id === id); if (t) t.text = v; });
          }
          App.refresh();
        };
        inp.onkeydown = e => {
          if (e.key === 'Enter') commit(true);
          else if (e.key === 'Escape') commit(false);
        };
        inp.onblur = () => commit(true);
      };
    });
  }

  function toggleTask(id, done) {
    let subject = null;
    Store.update(s => {
      const t = s.tasks.find(x => x.id === id);
      if (!t) return;
      t.done = done;
      subject = t.subject;
      const k = U.dkey();
      s.completions[k] = s.completions[k] || [];
      const i = s.completions[k].indexOf(id);
      if (done && i < 0) s.completions[k].push(id);
      if (!done && i >= 0) s.completions[k].splice(i, 1);
    });

    if (done) {
      Toast.success('✓ 打卡完成');
      // 业务规则1：数学防呆触发（今日符号错误>0才弹）
      if (subject === 'math' && Store.mistakeCountToday('sign') > 0) {
        Modal.open({
          title: '⚠️ 数学防呆提醒',
          html: '<p>检测到今日已记录 <b>' + Store.mistakeCountToday('sign') + '</b> 次符号错误。下一题开始前请默念：</p>'
            + '<ol style="padding-left:18px;line-height:1.9"><li>符号前置，负号立即提到最前面</li>'
            + '<li>分式合并三步法（分母→分子→计算）</li>'
            + '<li>草稿分区：左侧乱草，右侧正稿</li></ol>',
          actions: [{ label: '收到，继续', kind: 'btn-primary' }]
        });
      }
    }
    App.refresh();
  }

  window.TasksModule = { render };
})();


/* ===== js/modules/scheduler.js ===== */
/* ============================================================
 * scheduler.js — 智能任务调度引擎
 * 设计：阈值来自 settings.scheduler（数据化，可配/可 AI 改写）；
 *       AI 已配置时由 AI 基于实时状态动态编排今日序列，结果按天缓存（独立本地 key kaoyan2026_schedplan，不进云同步）；
 *       进入页面时「今天已生成过→直接展示缓存（不重复调 AI）」，「今天未生成→自动流式编排」，无 AI→规则引擎（generate）。
 *       失败/未配置时回退规则引擎并缓存降级结果（当日不再自动重试）。手动「重新 AI 编排」可强制刷新。
 * 输出：每日唯一最优任务序列（generate() 同步规则版供 Dashboard NOW 卡复用；render() 负责缓存/流式/降级调度）
 * ============================================================ */
(function () {
  'use strict';

  // 当前专业课名（动态）
  function majorName() {
    try { return (DB.getActiveMajor().name) || '专业课'; } catch (e) { return '专业课'; }
  }

  function ctx() {
    const cfg = DB.schedulerConfig();
    const acc = Store.currentMathAccuracy();
    return {
      acc,
      cfg,
      mathBoost: (acc != null && acc < cfg.mathAccThreshold) ? 1.3 : 1,
      signWeek: Store.mistakeCountWeek('sign'),
      ctrlIdle: !Store.subjectDoneInDays('ctrl', cfg.idleDays),
      polCap: cfg.polCap
    };
  }

  // 强制项（AI 与规则版共用，保证安全网不被 AI 跳过）
  function forcedItems(c) {
    const forced = [];
    if (c.signWeek > c.cfg.signWeekThreshold) {
      forced.push({ id: '__sign', subject: 'math', text: '【符号专项】' + c.cfg.signForceCount + '题（本周符号错误 ' + c.signWeek + ' 次，强制插入）', reason: '符号错误本周 ' + c.signWeek + ' 次 > ' + c.cfg.signWeekThreshold + '次 → 强制插入符号专项', weight: 99, forced: true, done: false });
    }
    if (c.ctrlIdle) {
      forced.push({ id: '__cool', subject: 'ctrl', text: '【知识冷却补救】' + DB.SUBJECTS.ctrl.short + '：复习最近3天错题 → 重做薄弱考点', reason: DB.SUBJECTS.ctrl.short + '连续' + c.cfg.idleDays + '天未打卡 → 触发知识冷却，优先排' + DB.SUBJECTS.ctrl.short, weight: 98, forced: true, done: false });
    }
    return forced;
  }

  // 未完成任务池（供规则排序或 AI 编排）
  function pendingTasks(s, c) {
    const doneIds = s.completions[U.dkey()] || [];
    return s.tasks.map(t => ({
      id: t.id, subject: t.subject, text: t.text,
      done: t.done || doneIds.indexOf(t.id) >= 0
    })).filter(t => !t.done);
  }

  // 规则引擎（同步、离线可用）：加权排序 + 政治红线削减
  function generate() {
    const s = Store.get();
    const c = ctx();
    const reasons = [];
    const forced = forcedItems(c);
    if (c.mathBoost > 1) reasons.push('数学正确率 ' + c.acc + '% < ' + c.cfg.mathAccThreshold + '% → 数学权重 +30%');
    if (c.ctrlIdle) reasons.push(DB.SUBJECTS.ctrl.short + '连续' + c.cfg.idleDays + '天未打卡 → 触发知识冷却，优先排' + DB.SUBJECTS.ctrl.short);

    const weight = t => {
      let w = 1;
      if (t.subject === 'math') w *= c.mathBoost;
      if (t.subject === 'ctrl' && c.ctrlIdle) w *= 1.5;
      if (t.subject === 'pol') w *= 0.6;
      return w + (Math.random() * 0.01);
    };
    const pending = pendingTasks(s, c);
    const sorted = pending.sort((a, b) => b.weight - a.weight);

    let polN = 0, polCut = false;
    const picked = [];
    sorted.forEach(t => {
      if (t.subject === 'pol') {
        if (polN >= c.polCap) { polCut = true; return; }
        polN++;
      }
      picked.push(t);
    });
    if (polCut) reasons.push('政治超过时间红线（当日>' + c.polCap + '）→ 已自动削减未排政治任务');

    return { sequence: forced.concat(picked).slice(0, 9).map(t => ({ id: t.id, subject: t.subject, text: t.text, reason: '', weight: Math.round(weight(t) * 100) / 100, forced: !!t.forced, done: false })), reasons, ctx: c, ai: false };
  }

  // ---------- AI 动态编排 ----------
  function buildSchedulerSystem() {
    return '你是考研每日任务编排教练。根据考生的正确率/连续打卡/易错类型/政治红线等真实状态，对“待办任务池”做最优排序，输出今日唯一最优序列。'
      + '只输出JSON，不要多余文字、不要markdown代码块。格式：'
      + '{"sequence":[{"id":"任务id","reason":"为何排此位（落到具体科目/题量/时间）","weight":0-100}],"reasons":["全局调度说明1","2"]}'
      + '要求：1) sequence 必须包含全部给定 id（顺序即优先级，重要的在前）；2) 数学正确率低时数学靠前；3) 专业课冷却时专业课靠前；4) 政治当日不超过红线数量；5) weight 用 0-100 表示优先级。';
  }
  function buildSchedulerPrompt(c, pending, major) {
    const lines = pending.map(t =>
      '- id:' + t.id + ' | 科目:' + (DB.SUBJECTS[t.subject] ? DB.SUBJECTS[t.subject].short : t.subject) + ' | 任务:' + t.text
    ).join('\n');
    return '考生状态：\n'
      + '- 专业课：' + major + '\n'
      + '- 数学正确率：' + (c.acc != null ? c.acc + '%' : '未录入') + '（<阈值' + c.cfg.mathAccThreshold + '% → 数学加权）\n'
      + '- 符号错误本周：' + c.signWeek + ' 次（>' + c.cfg.signWeekThreshold + ' → 已强制插入符号专项）\n'
      + '- 专业课冷却：' + (c.ctrlIdle ? '是（已强制优先）' : '否') + '\n'
      + '- 政治当日上限：' + c.cfg.polCap + ' 个\n'
      + '待办任务池（必须全部排入，按优先级排序）：\n' + lines + '\n'
      + '请输出 JSON：sequence 为上述 id 的最优顺序（可附 reason），reasons 为调度说明。';
  }

  // 提取 JSON（容错：去代码块围栏、取首个对象）
  function extractJson(t) {
    if (!t) return null;
    let s = ('' + t).trim();
    s = s.replace(/^```(?:json)?\s*/i, '').replace(/\s*```$/i, '');
    const m = s.match(/\{[\s\S]*\}/);
    try { return m ? JSON.parse(m[0]) : null; } catch (e) { return null; }
  }

  // 把 AI 返回的 JSON + 实时上下文/任务池，组装成最终 plan
  function buildPlanFromJson(json, c, forced, pending) {
    const order = {};
    (json.sequence || []).forEach(function (it, i) { if (it && it.id) order[it.id] = i; });
    const ranked = pending.slice().sort(function (a, b) {
      const ia = order[a.id] != null ? order[a.id] : 999;
      const ib = order[b.id] != null ? order[b.id] : 999;
      return ia - ib;
    });
    const seq = forced.concat(ranked.map(function (t) {
      const m = (json.sequence || []).find(function (x) { return x.id === t.id; });
      return { id: t.id, subject: t.subject, text: t.text, reason: m ? m.reason : '', weight: m ? m.weight : 1, forced: false, done: false };
    }));
    const reasons = (json.reasons || []).slice();
    reasons.unshift('🤖 由 AI 基于实时状态动态编排（规则引擎作为兜底）');
    return { date: U.dkey(), sequence: seq, reasons: reasons, ctx: c, ai: true, generatedAt: Date.now() };
  }

  // 每日缓存：今天已生成过 AI 编排则直接复用，避免每次进入都重排（读独立本地 key，不随云同步丢失）
  function cachedPlan() {
    try {
      const p = DB.readSchedulerPlan();
      if (p && p.date === U.dkey() && Array.isArray(p.sequence)) return p;
    } catch (e) {}
    return null;
  }
  function savePlan(plan) {
    DB.writeSchedulerPlan(plan); // 写入独立本地 key（不参与云同步）
    // 写回任务顺序，使「任务」页与作战台同步 AI 编排（order 随任务云同步，持久）
    Store.update(function (s) {
      var idOrder = (plan.sequence || [])
        .filter(function (it) { return it.id && it.id.indexOf('__') !== 0; })
        .map(function (it) { return it.id; });
      if (idOrder.length) {
        var byId = {};
        s.tasks.forEach(function (t) { byId[t.id] = t; });
        var reordered = [];
        idOrder.forEach(function (id) {
          if (byId[id]) { var tk = byId[id]; tk.order = reordered.length; reordered.push(tk); delete byId[id]; }
        });
        // 未排入的任务（如编排后新增）追加在末尾，order 顺延
        Object.keys(byId).forEach(function (id) { var tk = byId[id]; tk.order = reordered.length; reordered.push(tk); });
        s.tasks = reordered;
      }
    });
  }

  // 当任务上带有 AI 写回的 order（说明编排过），即使本地缓存丢了也按该顺序排（持久、可云同步）
  function hasOrder() {
    return Store.get().tasks.some(function (t) { return typeof t.order === 'number'; });
  }
  function planFromTaskOrder() {
    var s = Store.get();
    var doneIds = s.completions[U.dkey()] || [];
    var seq = s.tasks.slice().sort(function (a, b) {
      return (a.order != null ? a.order : Number.MAX_SAFE_INTEGER) - (b.order != null ? b.order : Number.MAX_SAFE_INTEGER);
    }).map(function (t) {
      return {
        id: t.id, subject: t.subject, text: t.text,
        reason: '（沿用上次 AI 编排的任务顺序）', weight: 50, forced: false,
        done: !!t.done || doneIds.indexOf(t.id) >= 0
      };
    });
    return { sequence: seq, reasons: ['（沿用上次 AI 编排的任务顺序，未重新调用 AI）'], ctx: ctx(), ai: true };
  }

  // 对外：当前最佳序列——优先当日 AI 编排缓存，其次任务 order，否则规则引擎（供作战台 NOW 卡/序列复用）
  function currentPlan() {
    var cfg = DB.schedulerConfig();
    var plan = null;
    if (AI.configured() && cfg.useAI) {
      var cached = cachedPlan();
      if (cached && Array.isArray(cached.sequence)) plan = cached;
    }
    if (!plan && hasOrder()) plan = planFromTaskOrder();
    if (!plan) plan = generate();
    // 重新派生 done（缓存只反映生成时状态）
    var s = Store.get();
    var doneIds = s.completions[U.dkey()] || [];
    var seq = (plan.sequence || []).map(function (it) {
      var done = !!it.done;
      if (!done && it.id && it.id.indexOf('__') !== 0) {
        var t = s.tasks.find(function (x) { return x.id === it.id; });
        if (t && t.done) done = true;
        else if (doneIds.indexOf(it.id) >= 0) done = true;
      }
      return Object.assign({}, it, { done: done });
    });
    return { sequence: seq, reasons: plan.reasons || [], ctx: plan.ctx || {}, ai: !!plan.ai };
  }

  // 自动流式编排（带思考流，防“未响应”观感）。生成后写入每日缓存并展示。
  function startAutoGen(el) {
    el.innerHTML =
      '<div class="card"><div class="card-title">🧠 智能任务调度引擎 <span class="tag" style="background:#2f54eb;color:#fff">🤖 AI 编排中…</span></div>'
      + '<div class="muted-sm">正在基于「正确率 / 连续打卡 / 易错类型 / 政治红线」调用 AI 编排今日任务，可看到思考与生成过程。</div>'
      + '<pre class="report" id="sc-stream" style="white-space:pre-wrap;max-height:260px;overflow:auto;border:1px solid #e5e7eb;border-radius:8px;padding:10px;background:#fafafa"></pre>'
      + '</div>';
    const out = el.querySelector('#sc-stream');
    const s = Store.get();
    const c = ctx();
    const forced = forcedItems(c);
    const pending = pendingTasks(s, c);
    if (!pending.length) {
      const plan = { date: U.dkey(), sequence: forced, reasons: ['任务池为空，无待办可编排'], ctx: c, ai: true, generatedAt: Date.now() };
      savePlan(plan); paint(el, plan, { cached: false }); return;
    }
    const major = majorName();
    let buf = '';
    AI.chatStream(buildSchedulerSystem(), buildSchedulerPrompt(c, pending, major), function (text, reasoning) {
      buf = text || '';
      if (out) { out.textContent = (reasoning ? '🤔 ' + reasoning + '\n\n' : '') + (text || ''); out.scrollTop = out.scrollHeight; }
    }).then(function () {
      const json = extractJson(buf);
      if (!json || !json.sequence) {
        const gen = generate();
        gen.date = U.dkey(); gen.ai = true; gen.degraded = true;
        gen.degradedNote = 'AI 返回无法解析为调度 JSON，已回退规则引擎（今日不再自动重试，可点「重新编排」手动重试）。';
        savePlan(gen); paint(el, gen, { cached: false }); return;
      }
      const plan = buildPlanFromJson(json, c, forced, pending);
      savePlan(plan); paint(el, plan, { cached: false });
    }).catch(function (err) {
      const gen = generate();
      gen.date = U.dkey(); gen.ai = true; gen.degraded = true;
      gen.degradedNote = 'AI 调用失败：' + (err && err.message ? err.message : err) + '，已回退规则引擎（今日不再自动重试，可点「重新编排」手动重试）。';
      savePlan(gen); paint(el, gen, { cached: false });
    });
  }

  // 入口：有 API 且今日未生成 → 自动流式编排；今日已生成 → 直接展示缓存；无 AI → 规则引擎
  function render(el) {
    const cfg = DB.schedulerConfig();
    const aiReady = AI.configured() && cfg.useAI;
    if (aiReady) {
      const cached = cachedPlan();
      if (cached && Array.isArray(cached.sequence)) { paint(el, cached, { cached: true }); return; }
      startAutoGen(el); return;
    }
    paint(el, generate(), { cached: false, rule: true });
  }

  function paint(el, plan, opts) {
    opts = opts || {};
    const s = Store.get();
    const c = ctx();
    // 重建序列：当前强制项（按最新 ctx）+ 缓存中 AI 排序的非强制项 + 新增未排入待办
    const curForced = forcedItems(c);
    const validTaskIds = {};
    s.tasks.forEach(t => { validTaskIds[t.id] = true; });
    const aiOrdered = (plan.sequence || []).filter(function (it) {
      if (it.id && it.id.indexOf('__') === 0) return false;   // 强制项由 curForced 重新提供
      return !!validTaskIds[it.id];                            // 丢弃已删除任务
    });
    const aiIdSet = {};
    aiOrdered.forEach(function (it) { aiIdSet[it.id] = true; });
    const pending = pendingTasks(s, c);
    const missing = pending.filter(function (t) { return !aiIdSet[t.id]; });
    const sequence = curForced.concat(aiOrdered).concat(missing.map(function (t) {
      return { id: t.id, subject: t.subject, text: t.text, reason: '（新增待办，未参与今日 AI 排序）', weight: 1, forced: false, done: false };
    }));
    // 派生 done（缓存序列只反映生成时状态，这里按最新打卡重算）
    const doneIds = s.completions[U.dkey()] || [];
    const seqView = sequence.map(function (it) {
      let done = !!it.done;
      if (!done && it.id.indexOf('__') !== 0) {
        const task = s.tasks.find(function (x) { return x.id === it.id; });
        if (task && task.done) done = true;
        else if (doneIds.indexOf(it.id) >= 0) done = true;
      }
      return { id: it.id, subject: it.subject, text: it.text, reason: it.reason || '', weight: it.weight, forced: !!it.forced, done: done };
    });

    let rows = '';
    if (!seqView.length) rows = '<div class="empty">任务池为空。先去「任务」页添加今天的任务，排程引擎才能工作。</div>';
    seqView.forEach(item => {
      const meta = DB.SUBJECTS[item.subject];
      rows += '<div class="seq-row' + (item.forced ? ' seq-forced' : '') + (item.done ? ' seq-is-done' : '') + '" data-id="' + item.id + '">'
        + '<label class="task-check"><input type="checkbox"' + (item.done ? ' checked' : '') + (item.forced ? ' disabled' : '') + '><span class="box"></span></label>'
        + '<span class="seq-text">' + U.esc(item.text) + '</span>'
        + '<span class="seq-badge" style="color:' + (meta ? meta.color : '#8c8c8c') + '">' + (item.forced ? '🔒' : item.weight) + '</span>'
        + '</div>';
    });

    const cfg = DB.schedulerConfig();
    let modeBadge;
    if (opts.rule) modeBadge = '<span class="tag tag-warn">规则引擎（未启用 AI）</span>';
    else if (plan.degraded) modeBadge = '<span class="tag tag-warn">🤖 AI 失败·回退规则</span>';
    else if (opts.cached) modeBadge = '<span class="tag" style="background:#2f54eb;color:#fff">🤖 AI 编排（今日已生成·缓存）</span>';
    else modeBadge = '<span class="tag" style="background:#2f54eb;color:#fff">🤖 AI 动态编排</span>';

    const showRegen = AI.configured() && cfg.useAI;

    el.innerHTML =
      '<div class="card"><div class="card-title">🧠 智能任务调度引擎 ' + modeBadge + '</div>'
      + (plan.degradedNote ? '<div class="alert alert-danger" style="margin-top:8px">' + U.esc(plan.degradedNote) + '</div>' : '')
      + '<div class="muted-sm">基于 正确率/连续打卡/易错类型/政治红线 实时编排的<b>今日唯一最优序列</b>。'
      + (opts.rule ? '（未配 AI 或已关闭，使用规则引擎）' : (opts.cached ? '（今日已生成并缓存，切换页面不再重复调用 AI）' : '阈值来自设置，可随时调。')) + '</div>'
      + '<div class="ctx-grid">'
      + '<div class="ctx-item">数学正确率<b>' + (c.acc != null ? c.acc + '%' : '未录入') + '</b></div>'
      + '<div class="ctx-item">数学权重<b>×' + c.mathBoost + '</b></div>'
      + '<div class="ctx-item">符号错误(周)<b>' + c.signWeek + ' 次</b></div>'
      + '<div class="ctx-item">' + DB.SUBJECTS.ctrl.short + '冷却<b>' + (c.ctrlIdle ? '⚠️ 是' : '否') + '</b></div>'
      + '</div>'
      + ((seqView.length && (plan.reasons || []).length) ? '<div class="reason-box">⚙️ 调度决策：<br>' + plan.reasons.map(r => '· ' + r).join('<br>') + '</div>' : '<div class="reason-box">⚙️ 今日无特殊调度干预，按常规权重排序。</div>')
      + (showRegen ? '<button class="btn btn-primary" id="sc-regen" style="margin-top:10px">🤖 重新 AI 编排</button>' : '')
      + '</div>'

      + '<div class="card"><div class="card-title">今日最优序列（' + seqView.filter(x => !x.done).length + ' 项待办）</div>' + rows
      + '<div class="muted-sm" style="margin-top:8px">🔒 = 系统强制项，不可跳过；数字 = 动态权重。勾选直接打卡。</div></div>'

      + '<div class="card"><div class="card-title">调度阈值（数据化 · 可在设置调整）</div><ul class="rule-list">'
      + '<li>数学正确率 &lt; ' + cfg.mathAccThreshold + '% → 数学任务权重 +30%</li>'
      + '<li>' + DB.SUBJECTS.ctrl.short + '连续' + cfg.idleDays + '天未打卡 → 触发知识冷却，强制优先</li>'
      + '<li>符号错误本周 &gt; ' + cfg.signWeekThreshold + '次 → 每日强制插入符号专项' + cfg.signForceCount + '题</li>'
      + '<li>政治任务当日超' + cfg.polCap + '个 → 超出部分自动削减</li>'
      + '</ul></div>'

      // ===== 任务管理（原「任务」页功能并入此处）=====
      + renderTaskSection();

    bind(el);
  }

  // 任务管理区域渲染（独立函数，方便 paint 末尾调用）
  var _taskFilter = 'all';
  function renderTaskSection() {
    var s = Store.get();
    var tabs = [['all', '全部'], ['math', DB.SUBJECTS.math.short], ['ctrl', DB.SUBJECTS.ctrl.short], ['eng', DB.SUBJECTS.eng.short], ['pol', DB.SUBJECTS.pol.short]];
    var tabsHtml = tabs.map(function (t) {
      var n = t[0] === 'all' ? s.tasks.length : s.tasks.filter(function (x) { return x.subject === t[0]; }).length;
      return '<button class="tab sc-task-tab' + (_taskFilter === t[0] ? ' tab-on' : '') + '" data-tf="' + t[0] + '">' + t[1] + ' <span class="tab-n">' + n + '</span></button>';
    }).join('');

    var list = s.tasks.filter(function (t) { return _taskFilter === 'all' || t.subject === _taskFilter; })
      .sort(function (a, b) { return (a.done - b.done) || ((a.order != null ? a.order : Number.MAX_SAFE_INTEGER) - (b.order != null ? b.order : Number.MAX_SAFE_INTEGER)); });

    var rows = '';
    if (!list.length) {
      rows = '<div class="empty">暂无任务，在下方添加一条吧</div>';
    } else {
      list.forEach(function (t) {
        var subj = DB.SUBJECTS[t.subject] || { short: '?', color: '#999' };
        rows += '<div class="task sc-task-row' + (t.done ? ' task-done' : '') + '" data-id="' + t.id + '">'
          + '<label class="task-check"><input type="checkbox"' + (t.done ? ' checked' : '') + ' data-act="stoggle"><span class="box"></span></label>'
          + '<span class="task-tag" style="background:' + subj.color + '">' + subj.short + '</span>'
          + '<span class="task-text" data-act="sedit" title="点击编辑">' + U.esc(t.text) + '</span>'
          + '<button class="task-x" data-act="sdel" aria-label="删除">×</button>'
          + '</div>';
      });
    }

    return '<div class="card"><div class="card-title">📋 任务管理（添加 / 打卡 / 编辑 / 删除）</div>'
      + '<div class="tab-row">' + tabsHtml + '</div>'
      + '<div class="task-list">' + rows + '</div>'
      + '<div class="add-row">'
      +   '<select id="sc-add-subj" class="input input-sel">'
      +     '<option value="math">' + DB.SUBJECTS.math.name + '</option><option value="ctrl">' + DB.SUBJECTS.ctrl.short + '</option>'
      +     '<option value="eng">' + DB.SUBJECTS.eng.name + '</option><option value="pol">' + DB.SUBJECTS.pol.name + '</option>'
      +   '</select>'
      +   '<input id="sc-add-text" class="input" placeholder="添加新任务，回车确认" style="flex:1;margin-left:8px">'
      +   '<button id="sc-add-btn" class="btn btn-primary" style="margin-left:8px">＋ 添加</button>'
      + '</div>'
      + '<div class="add-row" style="margin-top:10px;justify-content:flex-end">'
      +   '<button id="sc-clear-btn" class="btn btn-ghost" style="color:#c0392b;border-color:#e0b4b4">🗑 一键清空</button>'
      + '</div></div>'
      + '<div class="warn-box">'
      + '<div class="warn-title">⚠️ 防呆提醒</div>'
      + '<div class="warn-body">数学任务执行前请确认：<br>1. 符号前置，负号立即提到最前面<br>2. 分式合并三步法（分母→分子→计算）<br>3. 草稿分区：左侧乱草，右侧正稿</div>'
      + '</div>';
  }

  function bind(el) {
    el.querySelectorAll('.seq-row input[type=checkbox]').forEach(cb => {
      cb.onchange = () => {
        const id = cb.closest('.seq-row').getAttribute('data-id');
        if (id.indexOf('__') === 0) return; // 强制项不走任务存储
        let subject = null;
        Store.update(s => {
          const t = s.tasks.find(x => x.id === id);
          if (!t) return;
          t.done = cb.checked; subject = t.subject;
          const k = U.dkey();
          s.completions[k] = s.completions[k] || [];
          const i = s.completions[k].indexOf(id);
          if (cb.checked && i < 0) s.completions[k].push(id);
          if (!cb.checked && i >= 0) s.completions[k].splice(i, 1);
        });
        if (cb.checked) {
          Toast.success('✓ 打卡完成');
          if (subject === 'math' && Store.mistakeCountToday('sign') > 0) {
            Modal.open({
              title: '⚠️ 数学防呆提醒',
              html: '<p>今日已记 <b>' + Store.mistakeCountToday('sign') + '</b> 次符号错误。下一题前默念：符号前置 / 分式三步法 / 草稿分区。</p>',
              actions: [{ label: '收到', kind: 'btn-primary' }]
            });
          }
        }
        App.refresh();
      };
    });
    // 手动重新 AI 编排（忽略今日缓存，强制再调一次）
    const regen = el.querySelector('#sc-regen');
    if (regen) regen.onclick = () => { startAutoGen(el); };

    // ===== 任务管理交互 =====
    // Tab 切换
    el.querySelectorAll('.sc-task-tab').forEach(function (b) {
      b.onclick = function () { _taskFilter = b.getAttribute('data-tf'); render(el); };
    });
    // 添加任务
    var addBtn = el.querySelector('#sc-add-btn');
    var addText = el.querySelector('#sc-add-text');
    if (addBtn && addText) {
      function scAddTask() {
        var subj = el.querySelector('#sc-add-subj').value;
        var text = addText.value.trim();
        if (!text) { Toast.warn('任务内容不能为空'); return; }
        // 分心源拦截
        var hitKw;
        try { hitKw = DB.redlineKeywords().find(function (k) { return text.indexOf(k) >= 0; }); } catch (e) {}
        if (hitKw) {
          var dist = '';
          try { dist = DB.coachProfile().distractions || '分心源'; } catch (e) {}
          Toast.danger('🚫 红线拦截：检测到「' + hitKw + '」。初试前请暂停「' + dist + '」！');
          Modal.open({
            title: '🚫 红线警告',
            html: '<p>你试图添加包含 <b>「' + U.esc(hitKw) + '」</b> 的任务。</p>'
              + '<p>这触犯了绝对禁令第1条：<b>初试前绝对禁止 ' + U.esc(dist) + '</b>。</p>',
            actions: [{ label: '我明白，回去学数学', kind: 'btn-primary' }]
          });
          return;
        }
        if (subj === 'pol') {
          var polN = Store.get().tasks.filter(function (t) { return t.subject === 'pol' && !t.done; }).length;
          if (polN >= 2) Toast.warn('⚠️ 政治任务已超标，请优先保证数学/专业课。');
        }
        Store.update(function (st) {
          var maxO = -1;
          st.tasks.forEach(function (t) { if (typeof t.order === 'number' && t.order > maxO) maxO = t.order; });
          st.tasks.push({ id: U.uid() + Math.random().toString(36).slice(2, 4), subject: subj, text: text, done: false, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString(), order: maxO + 1 });
        });
        addText.value = '';
        Toast.success('已添加'); App.refresh();
      }
      addBtn.onclick = scAddTask;
      addText.onkeydown = function (e) { if (e.key === 'Enter') scAddTask(); };
    }
    // 一键清空：写入墓碑，使删除能跨设备同步
    var clearBtn = el.querySelector('#sc-clear-btn');
    if (clearBtn) {
      clearBtn.onclick = function () {
        var count = Store.get().tasks.length;
        if (count === 0) { Toast.warn('当前没有任务可清空'); return; }
        Modal.confirm('一键清空任务', '<p>确认清空全部 <b>' + count + '</b> 个任务？此操作不可恢复，且会同步到其它设备。</p>', '清空', function () {
          Store.update(function (st) {
            st.taskTomb = st.taskTomb || {};
            st.tasks.forEach(function (t) { st.taskTomb[t.id] = new Date().toISOString(); });
            st.tasks = [];
          });
          Toast.success('已清空全部任务'); App.refresh();
        }, true);
      };
    }
    // 任务行：打卡 / 编辑 / 删除
    el.querySelectorAll('.sc-task-row').forEach(function (row) {
      var tid = row.getAttribute('data-id');
      // 打卡
      row.querySelector('[data-act="stoggle"]').onchange = function (e) {
        var done = e.target.checked;
        var subj = null;
        Store.update(function (st) {
          var t = st.tasks.find(function (x) { return x.id === tid; });
          if (!t) return;
          t.done = done; t.updatedAt = new Date().toISOString(); subj = t.subject;
          var k = U.dkey();
          st.completions[k] = st.completions[k] || [];
          var idx = st.completions[k].indexOf(tid);
          if (done && idx < 0) st.completions[k].push(tid);
          if (!done && idx >= 0) st.completions[k].splice(idx, 1);
        });
        if (done) {
          Toast.success('✓ 打卡完成');
          if (subj === 'math' && Store.mistakeCountToday('sign') > 0) {
            Modal.open({
              title: '⚠️ 数学防呆提醒',
              html: '<p>今日已记 <b>' + Store.mistakeCountToday('sign') + '</b> 次符号错误。下一题开始前请默念：</p>'
                + '<ol style="padding-left:18px;line-height:1.9"><li>符号前置，负号立即提到最前面</li><li>分式合并三步法（分母→分子→计算）</li><li>草稿分区：左侧乱草，右侧正稿</li></ol>',
              actions: [{ label: '收到，继续', kind: 'btn-primary' }]
            });
          }
        }
        App.refresh();
      };
      // 删除（写入墓碑 taskTomb，使删除能跨设备同步，而不被另一方旧副本"复活"）
      row.querySelector('[data-act="sdel"]').onclick = function () {
        Modal.confirm('删除任务', '<p>确认删除该任务？此操作不可恢复（将同步到其它设备）。</p>', '删除', function () {
          Store.update(function (st) {
            st.tasks = st.tasks.filter(function (t) { return t.id !== tid; });
            st.taskTomb = st.taskTomb || {};
            st.taskTomb[tid] = new Date().toISOString();
          });
          App.refresh();
        }, true);
      };
      // 就地编辑
      row.querySelector('[data-act="sedit"]').onclick = function () {
        if (row.classList.contains('editing')) return;
        var task = Store.get().tasks.find(function (t) { return t.id === tid; });
        if (!task) return;
        row.classList.add('editing');
        var textEl = row.querySelector('[data-act="sedit"]');
        var inp = document.createElement('input');
        inp.className = 'input task-edit-input';
        inp.value = task.text;
        textEl.replaceWith(inp);
        inp.focus(); inp.select();
        var commitFn = function (save) {
          if (save) {
            var v = inp.value.trim();
            var hitV;
            try { hitV = DB.redlineKeywords().find(function (k) { return v.indexOf(k) >= 0; }); } catch (e) {}
            if (hitV) { Toast.danger('🚫 红线拦截：文本包含「' + hitV + '」，修改被拒绝'); }
            else if (v) Store.update(function (st) { var tt = st.tasks.find(function (x) { return x.id === tid; }); if (tt) { tt.text = v; tt.updatedAt = new Date().toISOString(); } });
          }
          App.refresh();
        };
        inp.onkeydown = function (e) { if (e.key === 'Enter') commitFn(true); else if (e.key === 'Escape') commitFn(false); };
        inp.onblur = function () { commitFn(true); };
      };
    });
  }

  window.SchedulerModule = { render, generate, currentPlan };
})();


/* ===== js/modules/progress.js ===== */
/* ============================================================
 * progress.js — 进度追踪：四科进度卡片 + 里程碑时间线
 * 特殊预警：现控<40%黄警 / 政治红色警告（PRD 4.3）
 * ============================================================ */
(function () {
  'use strict';

  function subjCard(key) {
    const meta = DB.SUBJECTS[key];
    const p = Store.get().progress[key];
    const now = new Date();
    const month = now.getMonth() + 1;

    let warn = '';
    if (key === 'ctrl' && p.modules) {
      var ctrlMods = Object.keys(p.modules);
      var lowMods = ctrlMods.filter(function (m) { return (p.modules[m] || 0) < 40; });
      if (lowMods.length > 0) {
        warn = '<div class="alert alert-warn">⚠️ ' + DB.SUBJECTS.ctrl.short + '核心模块进度偏低（' + lowMods.join('、') + '），建议优先推进</div>';
      }
    }
    if (key === 'pol' && month < 9) {
      warn = '<div class="alert alert-danger">⏰ 9月前每天≤45分钟，禁止挤占数学/专业课时间</div>';
    }

    let moduleChips = '';
    meta.modules.forEach(m => {
      const v = (p.modules && p.modules[m]) || 0;
      moduleChips += '<span class="tag tag-mod" data-subj="' + key + '" data-mod="' + U.esc(m) + '" title="点击更新进度">' + U.esc(m) + ' ' + v + '%</span>';
    });

    return '<div class="card prog-card">'
      + '<div class="prog-head"><span class="prog-name" style="color:' + meta.color + '">' + meta.name + '</span>'
      + '<span class="prog-target">目标 ' + meta.target + ' 分</span></div>'
      + '<div class="prog-bar-row">' + Charts.progressBar(p.percent, meta.color) + '<span class="prog-pct" data-subj="' + key + '" title="点击更新总进度">' + p.percent + '%</span></div>'
      + '<div class="muted-sm">当前阶段：' + U.esc(p.stage) + ' <button class="link-btn" data-stage="' + key + '">修改</button></div>'
      + '<div class="tag-row">' + moduleChips + '</div>'
      + warn
      + '</div>';
  }

  // 计算当前日期在里程碑时间线中的位置（0~1），以及应插入的索引
  function calcCurrentPosition() {
    var now = new Date();
    var ms = DB.MILESTONES;
    if (!ms || !ms.length) return { index: 0, ratio: 0, label: '' };

    // 将每个里程碑 deadline 转为 Date 对象（用当年）
    var year = now.getFullYear();
    var dates = ms.map(function (m) {
      var parts = m.deadline.split('-');
      return new Date(year, parseInt(parts[0], 10) - 1, parseInt(parts[1], 10), 23, 59, 59);
    });

    // 找到当前日期应该插入的位置
    var idx = 0;
    for (var i = 0; i < dates.length; i++) {
      if (now <= dates[i]) { idx = i; break; }
      else { idx = i + 1; }
    }

    // 计算在区间内的比例位置
    var ratio = 0;
    var prevDate = idx > 0 ? dates[idx - 1] : new Date(year, 5, 30); // 默认从7月初开始
    var nextDate = idx < dates.length ? dates[idx] : dates[dates.length - 1];
    var range = nextDate.getTime() - prevDate.getTime();
    if (range > 0) {
      ratio = Math.min(1, Math.max(0, (now.getTime() - prevDate.getTime()) / range));
    } else if (now <= dates[0]) {
      ratio = 0; // 在第一个里程碑之前
    } else {
      ratio = 1; // 在最后一个里程碑之后
    }

    // 生成标签文字
    var monthNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
    var label = '📍 当前：' + monthNames[now.getMonth()] + now.getDate() + '日';

    return { index: idx, ratio: ratio, label: label };
  }

  function milestoneNode(m, currentInfo, nodeIndex) {
    const done = Store.get().milestones[m.id];
    var html = '<div class="ms-node' + (done ? ' ms-done' : '') + '" data-id="' + m.id + '">'
      + '<div class="ms-dot"></div>'
      + '<div class="ms-body"><div class="ms-date">' + m.date + (done ? ' <span class="ms-badge">已完成</span>' : ' <span class="ms-badge ms-badge-doing">' + (new Date() <= new Date('2026-' + m.deadline + 'T23:59:59') ? '进行中' : '逾期') + '</span>') + '</div>'
      + '<div class="ms-title">' + U.esc(m.title) + '</div></div>'
      + '<label class="ms-check"><input type="checkbox"' + (done ? ' checked' : '') + '><span class="box"></span></label>'
      + '</div>';

    // 在正确的节点前插入「当前位置」指示器
    if (currentInfo && nodeIndex === currentInfo.index) {
      html = renderCurrentIndicator(currentInfo) + html;
    }
    return html;
  }

  // 渲染动态当前位置指示器
  function renderCurrentIndicator(info) {
    // 如果 ratio 接近 0，显示在上方；否则根据比例微调
    var style = '';
    if (info.ratio > 0 && info.ratio < 1) {
      style = ' style="margin-top:' + Math.round(info.ratio * 40) + 'px"';
    }
    return '<div class="ms-now"' + style + '>'
      + '<div class="ms-now-arrow">▼</div>'
      + '<div class="ms-now-label">' + U.esc(info.label) + '</div>'
      + '</div>';
  }

  function render(el) {
    // 每次渲染时刷新里程碑（目标院校可能已变更，确保校名动态）
    if (typeof DB !== 'undefined' && DB.getMilestones) {
      var fresh = DB.getMilestones();
      if (fresh) { DB.MILESTONES.length = 0; fresh.forEach(function(m) { DB.MILESTONES.push(m); }); }
    }
    var currentInfo = calcCurrentPosition();
    el.innerHTML =
      '<div class="grid-2">'
      + subjCard('math') + subjCard('ctrl') + subjCard('eng') + subjCard('pol')
      + '</div>'
      + '<div class="card"><div class="card-title">里程碑时间线</div>'
      + '<div class="ms-line">' + DB.MILESTONES.map(function (m, i) { return milestoneNode(m, currentInfo, i); }).join('') + '</div>'
      + '<div class="muted-sm" style="margin-top:8px">勾选里程碑将触发系统通知；10月底节点未达成时，系统将在11月1日推送院校决策建议。</div>'
      + '</div>';

    bind(el);
  }

  function bind(el) {
    // 总进度点击更新
    el.querySelectorAll('.prog-pct').forEach(sp => {
      sp.onclick = () => {
        const key = sp.getAttribute('data-subj');
        const cur = Store.get().progress[key].percent;
        Modal.open({
          title: '更新 ' + DB.SUBJECTS[key].name + ' 总进度',
          html: '<input id="pct-input" class="input" type="number" min="0" max="100" value="' + cur + '">',
          actions: [{ label: '取消' }, {
            label: '保存', kind: 'btn-primary', onClick: close => {
              const v = U.clamp(parseInt(document.getElementById('pct-input').value, 10) || 0, 0, 100);
              Store.update(s => { s.progress[key].percent = v; });
              close(); App.refresh(); Toast.success('进度已更新为 ' + v + '%');
            }
          }]
        });
        setTimeout(() => document.getElementById('pct-input').focus(), 50);
      };
    });
    // 阶段修改
    el.querySelectorAll('[data-stage]').forEach(b => {
      b.onclick = () => {
        const key = b.getAttribute('data-stage');
        const cur = Store.get().progress[key].stage;
        Modal.open({
          title: '修改当前阶段',
          html: '<input id="stage-input" class="input" value="' + U.esc(cur) + '">',
          actions: [{ label: '取消' }, {
            label: '保存', kind: 'btn-primary', onClick: close => {
              const v = document.getElementById('stage-input').value.trim() || cur;
              Store.update(s => { s.progress[key].stage = v; });
              close(); App.refresh();
            }
          }]
        });
        setTimeout(() => document.getElementById('stage-input').focus(), 50);
      };
    });
    // 子模块进度点击更新
    el.querySelectorAll('.tag-mod').forEach(tag => {
      tag.onclick = () => {
        const key = tag.getAttribute('data-subj');
        const mod = tag.getAttribute('data-mod');
        const cur = (Store.get().progress[key].modules || {})[mod] || 0;
        Modal.open({
          title: '更新「' + mod + '」进度',
          html: '<input id="mod-input" class="input" type="number" min="0" max="100" value="' + cur + '">',
          actions: [{ label: '取消' }, {
            label: '保存', kind: 'btn-primary', onClick: close => {
              const v = U.clamp(parseInt(document.getElementById('mod-input').value, 10) || 0, 0, 100);
              Store.update(s => {
                s.progress[key].modules = s.progress[key].modules || {};
                s.progress[key].modules[mod] = v;
              });
              close(); App.refresh(); Toast.success(mod + ' → ' + v + '%');
            }
          }]
        });
        setTimeout(() => document.getElementById('mod-input').focus(), 50);
      };
    });
    // 里程碑勾选 → 系统通知
    el.querySelectorAll('.ms-node input[type=checkbox]').forEach(cb => {
      cb.onchange = () => {
        const id = cb.closest('.ms-node').getAttribute('data-id');
        const m = DB.MILESTONES.find(x => x.id === id);
        Store.update(s => { s.milestones[id] = cb.checked; });
        if (cb.checked && window.Notify) Notify.send('里程碑达成', '🏁 里程碑达成：' + m.title);
        App.refresh();
      };
    });
  }

  window.ProgressModule = { render };
})();

(function () {

  // 生成本周复盘数据
  function weekData() {
    const s = Store.get();

    const totalHours = U.round1(U.sum(hours));
    const target = s.settings.weeklyTargetHours || 50;

    const top2 = Store.weekTopMistakes().map(t => ({ name: (DB.MISTAKE_TYPES[t.key] || {}).name || t.key, count: t.count }));
    const weekMistakes = s.mistakes.filter(m => U.inThisWeek((m.createdAt || '').slice(0, 10))).length;
    return { wk, hours, totalHours, target, accuracy: w.mathAccuracy, prevAccuracy: w.prevAccuracy, top2, weekMistakes, mental: w.mentalState, special: w.specialEvent };
  }

  function reportText(d) {
    const gap = U.round1(d.target - d.totalHours);
    const accDiff = (d.accuracy != null && d.prevAccuracy != null) ? U.round1(d.accuracy - d.prevAccuracy) : null;
    const topStr = d.top2.length ? d.top2.map(t => t.name + '（' + t.count + '次）').join('、') : '本周未记录错题';
    const mentalMap = { normal: '正常', anxious: '焦虑', tired: '疲劳', impulsive: '冲动', panic: '恐慌' };
    let tips = [];
    const signN = Store.mistakeCountWeek('sign');
    if (signN >= 3) tips.push('数学：增加「符号专项」5题/天（本周符号错误已达 ' + signN + ' 次）');
    if (d.accuracy != null && d.accuracy < 70) tips.push('数学：正确率低于70%，智能排程已自动提高数学权重');
    if (d.top2.some(t => t.name === '分式漏分母')) tips.push('数学：分式合并强制执行三步法，每题书面验证');
    if (gap > 0) tips.push('时长：本周缺口 ' + gap + 'h，建议周末补足或下调下周目标');
    if (!Store.subjectDoneInDays('ctrl', 3)) tips.push(DB.SUBJECTS.ctrl.short + '：近3天未打卡，下周优先排' + DB.SUBJECTS.ctrl.short + '任务');
    if (tips.length === 0) tips.push('节奏健康，保持当前计划，注意防呆流程不走样');
    return '📊 本周战报（' + U.keyLabel(U.weekKeys()[0]) + ' ~ ' + U.keyLabel(U.weekKeys()[6]) + '）\n'
      + '├── 有效学习时长：' + d.totalHours + 'h / 目标 ' + d.target + 'h（' + (gap > 0 ? '缺口 ' + gap + 'h' : '已达标') + '）\n'
      + '├── 数学平均正确率：' + (d.accuracy != null ? d.accuracy + '%' : '未录入') + (accDiff != null ? '（较上周 ' + (accDiff >= 0 ? '+' : '') + accDiff + '%）' : '') + '\n'
      + '├── 主要错误类型：' + topStr + '\n'
      + '├── 心理状态：' + (mentalMap[d.mental] || '未记录') + (d.special ? '（' + d.special + '）' : '') + '\n'
      + '└── 下周调整建议：\n' + tips.map(t => '    • ' + t).join('\n');
  }

      + '</select></label>'
      + '<label class="fld fld-full"><span>特殊事件（如：周三出现硬件冲动，已劝阻）</span><input id="rv-special" class="input" value="' + U.esc(d.special || '') + '"></label>'
      + '</div>'
      + '<button class="btn btn-primary" id="rv-save">保存并生成周报</button>'
      + '</div>'

      // 周报预览
      + '<div class="card"><div class="card-title">本周战报 <button class="link-btn" id="rv-copy">复制文本</button></div>'
      + '<pre class="report" id="rv-report"></pre>'
      + '<div class="btn-row">'
      + '<button class="btn btn-primary" id="rv-deep-btn">🧠 启动深度复盘（看AI思考过程）</button>'
      + '<button class="btn btn-ghost" id="rv-ai">🤖 发给AI(快速版)</button>'
      + '<button class="btn btn-ghost" id="rv-export">导出本周JSON</button>'
      + '</div>'
      + '<div class="card" id="rv-deep-card" style="display:none;margin-top:10px">'
      + '<div class="card-title">🧠 AI 深度复盘'
      + '<span class="muted-sm">（结果已自动保存，切去别的页面再回来仍在这里）</span></div>'
      + '<details style="margin-bottom:8px"><summary class="muted-sm">查看打包发给 AI 的进度快照（≤5000字）</summary>'
      + '<pre class="report" id="rv-deep-snap" style="max-height:200px;overflow:auto;font-size:11px;white-space:pre-wrap"></pre></details>'
      + '<div id="rv-deep-think-wrap" style="display:none;margin-bottom:8px">'
      + '<div class="card-title-sm" style="opacity:.72">💭 AI 思考过程</div>'
      + '<pre class="report" id="rv-deep-think" style="max-height:220px;overflow:auto;opacity:.82;font-size:12px;white-space:pre-wrap"></pre></div>'
      + '<div class="card-title-sm">📋 深度分析结论</div>'

      + '<div class="muted-sm" id="rv-deep-status"></div>'

      // 月里程碑检查
      + '<div class="card"><div class="card-title">月里程碑检查</div>'
      + DB.MILESTONES.map(m => {
        const done = Store.get().milestones[m.id];
        return '<label class="check-row"><input type="checkbox" data-ms="' + m.id + '"' + (done ? ' checked' : '') + '><span class="box"></span><span>' + m.date + ' — ' + U.esc(m.title) + '</span></label>';
      }).join('')
      + '</div>'

      // 历史
      + (history ? '<div class="card"><div class="card-title">历史周报</div>' + history + '</div>' : '');

    document.getElementById('rv-report').textContent = reportText(d);
    bind(el);

  }

  function bind(el) {
    el.querySelector('#go-mental').onclick = () => App.go('mental');

  // ---------- 深度复盘：打包全部学习进度快照（≤5000字）----------
  function activeProfName() {
    try { return (DB.getActiveMajor() && DB.getActiveMajor().name) || '专业课'; } catch (e) { return '专业课'; }
  }
  function schoolLabel(t) {
    if (!t || t === 'undecided') return '未定';
    return (DB.SCHOOLS[t] && DB.SCHOOLS[t].name) || t;
  }
  function deepSnapshot() {
    const s = Store.get();
    const lines = [];
    const push = (t) => lines.push(t);
    push('【考研学习进度全景快照】生成日期：' + U.dkey());
    // 目标与背景
    push('目标院校：' + schoolLabel(s.settings.targetSchool) + '；专业课：' + activeProfName()
      + '；周目标时长：' + (s.settings.weeklyTargetHours || 50) + 'h；考试日期：' + (s.settings.examDate || '未设'));
    // 四科进度
    push('\n【四科进度】');
    ['math', 'ctrl', 'eng', 'pol'].forEach(k => {
      const meta = DB.SUBJECTS[k];
      const p = s.progress[k] || {};
      let mods = '';
      if (p.modules) { const ks = Object.keys(p.modules); if (ks.length) mods = ' 模块：' + ks.map(m => m + ':' + p.modules[m] + '%').join('、'); }
      push('· ' + meta.name + '：总进度 ' + (p.percent || 0) + '%' + (p.stage ? '（阶段：' + p.stage + '）' : '') + mods);
    });
    // 正确率趋势（近8周）
    push('\n【数学正确率趋势（近8周）】');
    const wks = Object.keys(s.weeklyStats || {}).sort().reverse().slice(0, 8).reverse();
    push(wks.length ? wks.map(k => k + '=' + ((s.weeklyStats[k] && s.weeklyStats[k].mathAccuracy != null) ? s.weeklyStats[k].mathAccuracy + '%' : '-')).join('  ') : '（无记录）');
    // 错题
    push('\n【错题统计】');
    const totalM = (s.mistakes || []).length;
    const wkM = (s.mistakes || []).filter(m => U.inThisWeek((m.createdAt || '').slice(0, 10))).length;
    push('累计 ' + totalM + ' 条，本周 ' + wkM + ' 条；符号错误本周 ' + Store.mistakeCountWeek('sign') + ' 次');
    const top = Store.weekTopMistakes().map(t => ((DB.MISTAKE_TYPES[t.key] || {}).name || t.key) + '×' + t.count);
    push('本周主要错误类型：' + (top.length ? top.join('、') : '无'));
    // 拍题疑难点 + 弱点画像
    push('\n【拍题疑难点标签】');
    const pains = (s.mistakePhotos || []).filter(p => p.painPoint && p.painPoint.trim()).map(p => p.painPoint.trim());
    push(pains.length ? pains.slice(-20).join('、') : '（无记录）');
    if (s.weaknessProfile) {
      const wp = s.weaknessProfile;
      push('\n【弱点画像】（' + (wp.generatedAt || '').slice(0, 10) + '）');
      push('薄弱点：' + (wp.weakAreas || []).join('、'));
      push('总结：' + (wp.summary || ''));
      push('复习建议：' + (wp.advice || ''));
    }
    // 每日一题历史
    push('\n【每日一题历史（最近5道）】');
    const dqh = (s.dailyQuizHistory || []).slice(-5).reverse();
    push(dqh.length ? dqh.map((q, i) => ((i + 1) + '. ' + ((DB.SUBJECTS[q.subject] || { short: '题' }).short) + '：' + (q.question || '').slice(0, 40))).join('\n') : '（无）');
    // 心理状态
    push('\n【心理状态（最近8条）】');
    const mentalMap = { normal: '正常', anxious: '焦虑', tired: '疲劳', impulsive: '冲动', panic: '恐慌' };
    const ment = (s.mental || []).slice(-8);
    push(ment.length ? ment.map(m => (m.date || '').slice(5) + ':' + (mentalMap[m.mood] || m.mood) + (m.hwUrge ? '(分心冲动)' : '')).join('  ') : '（无记录）');
    // 里程碑
    push('\n【里程碑达成】');
    push(DB.MILESTONES.map(m => (s.milestones[m.id] ? '✓' : '✗') + m.date + (m.title ? (' ' + m.title.slice(0, 22)) : '')).join('  '));
    // 学习时长
    push('\n【本周学习时长】');
    push(Store.weekHours().map((v, i) => (['一', '二', '三', '四', '五', '六', '日'][i] + ':' + v + 'h')).join(' '));
    const focusSessions = (s.focus && s.focus.sessions) || [];
    push('累计专注 ' + U.round1(U.sum(focusSessions.map(x => x.mins)) / 60) + 'h，专注次数 ' + focusSessions.length);
    // 教练已知弱点
    const cp = DB.coachProfile();
    push('\n【教练已知你的弱点】数学：' + cp.mathWeak + '；分心源：' + cp.distractions);

    let txt = lines.join('\n');
    const MAX = 5000;
    if (txt.length > MAX) txt = txt.slice(0, MAX) + '\n…（已截断至5000字）';
    return txt;
  }

  // 启动深度复盘（流式，结果持久化到 Store，切页面/刷新不丢失，非阻塞）
  let _lastSaveTs = 0;
  function saveDeep(partial) {
    Store.update(s => {
      s.deepReview = Object.assign(s.deepReview || {}, { generatedAt: s.deepReview && s.deepReview.generatedAt || new Date().toISOString() }, partial);
    });
  }
  function startDeepReview() {
    const card = document.getElementById('rv-deep-card');
    const snapEl = document.getElementById('rv-deep-snap');
    const thinkEl = document.getElementById('rv-deep-think');
    const thinkWrap = document.getElementById('rv-deep-think-wrap');
    const outEl = document.getElementById('rv-deep-out');
    const statusEl = document.getElementById('rv-deep-status');
    const btn = document.getElementById('rv-deep-btn');
    if (card) card.style.display = '';
    const snap = deepSnapshot();
    if (snapEl) snapEl.textContent = snap;
    if (thinkWrap) thinkWrap.style.display = 'none';
    if (thinkEl) thinkEl.textContent = '';
    if (outEl) { outEl.textContent = '🤔 AI 思考中…'; outEl.scrollTop = 0; }
    if (statusEl) statusEl.textContent = '⏳ 正在生成深度复盘（可随时切到其它页面，结果会自动保存）…';
    if (btn) { btn.disabled = true; btn.textContent = '生成中…'; }

    // 安全校验：确保 prompt 和 snapshot 有效
    var sysPrompt = AI.DEEP_REVIEW_PROMPT;
    if (typeof sysPrompt !== 'string' || !sysPrompt) {
      console.error('[DeepReview] DEEP_REVIEW_PROMPT 异常！type=' + typeof sysPrompt, sysPrompt);
      if (outEl) outEl.textContent = '错误：系统提示词生成失败，请刷新页面重试。';
      if (btn) { btn.disabled = false; btn.textContent = '🧠 重试深度复盘'; }
      return;
    }
    console.log('[DeepReview] 开始调用AI sysPrompt长度=' + sysPrompt.length + ' snap长度=' + snap.length);

    // 持久化初始状态（即使切走也能恢复）
    saveDeep({ week: Store.weekKey(), snap: snap, reasoning: '', output: '🤔 AI 思考中…', status: '生成中', running: true });

    AI.chatStream(sysPrompt, snap, function (text, reasoning) {
      if (reasoning && thinkEl && thinkWrap) { thinkWrap.style.display = ''; thinkEl.textContent = reasoning; thinkEl.scrollTop = thinkEl.scrollHeight; }
      if (text && outEl) { outEl.textContent = text; outEl.scrollTop = outEl.scrollHeight; }
      if (statusEl && text) statusEl.textContent = '✓ 流式输出中…';
      // 节流写入 Store（每 ~1.2s 一次，避免每次 chunk 都触发 localStorage 写）
      var now = Date.now();
      if (now - _lastSaveTs > 1200) {
        _lastSaveTs = now;
        saveDeep({ reasoning: reasoning || '', output: text || '', status: '生成中', running: true });
      }
    }).then(function () {
      if (statusEl) statusEl.textContent = '✓ 深度复盘完成。可复制下方结论，或继续其它操作。';
      if (btn) { btn.disabled = false; btn.textContent = '🧠 重新深度复盘'; }
      // 终态持久化（确保最后的完整结论被保存）
      saveDeep({ status: '完成', running: false, generatedAt: new Date().toISOString() });
      // 把最终 output 从 DOM 同步回 Store（节流可能漏掉最后几字）
      if (outEl) saveDeep({ output: outEl.textContent, reasoning: (thinkEl ? thinkEl.textContent : '') });
    }).catch(function (e) {
      if (outEl) outEl.textContent = '生成失败：' + (e && e.message ? e.message : e);
      if (statusEl) statusEl.textContent = '⚠ 生成失败，请检查 AI 配置后重试。';
      if (btn) { btn.disabled = false; btn.textContent = '🧠 重试深度复盘'; }
      saveDeep({ status: '失败：' + (e && e.message ? e.message : e), running: false });
    });
  }

  // 渲染时恢复已持久化的深度复盘结果（切页面/刷新后不丢失，无需重生成）
  function restoreDeepReview() {
    const s = Store.get();
    const dr = s.deepReview;
    if (!dr || !dr.week || dr.week !== Store.weekKey()) return; // 仅当周有效
    const card = document.getElementById('rv-deep-card');
    const snapEl = document.getElementById('rv-deep-snap');
    const thinkEl = document.getElementById('rv-deep-think');
    const thinkWrap = document.getElementById('rv-deep-think-wrap');
    const outEl = document.getElementById('rv-deep-out');
    const statusEl = document.getElementById('rv-deep-status');
    const btn = document.getElementById('rv-deep-btn');
    if (!card) return;
    card.style.display = '';
    if (snapEl) snapEl.textContent = dr.snap || '';
    if (thinkEl) thinkEl.textContent = dr.reasoning || '';
    if (thinkWrap) thinkWrap.style.display = (dr.reasoning ? '' : 'none');
    if (outEl) outEl.textContent = dr.output || '等待开始…';
    if (statusEl) {
      statusEl.textContent = dr.running
        ? '⏳ 正在生成中（后台进行，可切换页面；回来此处自动刷新）…'
        : (dr.status || '✓ 已完成（结果已保存）');
    }
    if (btn) {
      if (dr.running) { btn.disabled = true; btn.textContent = '生成中…'; }
      else { btn.disabled = false; btn.textContent = '🧠 重新深度复盘'; }
    }
  }

  window.ReviewModule = { render, reportText, weekData };
})();

/* ============================================================
 * mistakes.js — 错题画像：类型分布环形图 / 记录新错题 / 列表 / 重练
 * ============================================================ */
(function () {
  'use strict';

  function render(el) {
    const s = Store.get();

    // 分布图数据
    const counts = U.countBy(s.mistakes, m => m.type);
    const pie = Object.keys(DB.MISTAKE_TYPES).map(k => ({
      label: DB.MISTAKE_TYPES[k].name, value: counts[k] || 0, color: DB.MISTAKE_TYPES[k].color
    }));

    // 错题列表（时间倒序，最多50条）
    const list = U.clone(s.mistakes).sort((a, b) => (a.createdAt < b.createdAt ? 1 : -1)).slice(0, 50);
    let rows = '';
    if (list.length === 0) rows = '<div class="empty">还没有错题记录。错题不可怕，重复错才可怕。</div>';
    list.forEach(m => {
      const t = DB.MISTAKE_TYPES[m.type] || DB.MISTAKE_TYPES.other;
      rows += '<div class="mis-row" style="border-left-color:' + t.color + '">'
        + '<div class="mis-head"><span class="tag" style="background:' + t.color + '">' + t.name + '</span>'
        + '<span class="mis-subj">' + ((DB.SUBJECTS[m.subject] || {}).name || m.subject) + '</span>'
        + '<span class="mis-date">' + U.esc(m.date || '') + '</span></div>'
        + '<div class="mis-desc">' + U.esc(m.desc) + '</div>'
        + '<div class="mis-actions"><button class="btn btn-sm btn-ghost mis-variant" data-id="' + m.id + '">🔄 重练变式题</button></div>'
        + '</div>';
    });

    // 重练队列
    const drills = s.mistakeDrills.filter(d => d.status === 'pending');
    let drillHtml = '';
    if (drills.length) {
      drillHtml = drills.map(d =>
        '<div class="drill-row" data-id="' + d.id + '"><span>🎯 ' + U.esc(d.title) + (d.penaltyOf ? ' <span class="tag tag-red">罚练</span>' : '') + '</span>'
        + '<button class="btn btn-sm btn-primary" data-done="' + d.id + '">完成</button></div>'
      ).join('');
    } else {
      drillHtml = '<div class="empty">重练队列为空。记录错题后可一键生成重练任务。</div>';
    }

    el.innerHTML =
      '<div class="card"><div class="card-title-row"><span class="card-title">错题类型分布（全部 ' + s.mistakes.length + ' 条）</span>'
      + '<button class="link-btn" id="ms-export">导出错题JSON</button></div>'
      + Charts.donut(pie, { height: 200 })
      + '</div>'

      + '<div class="card"><div class="card-title">记录新错题</div>'
      + '<div class="form-grid">'
      + '<label class="fld"><span>科目</span><select id="ms-subj" class="input input-sel">'
      +   '<option value="math">' + DB.SUBJECTS.math.name + '</option><option value="ctrl">' + DB.SUBJECTS.ctrl.short + '</option><option value="eng">' + DB.SUBJECTS.eng.name + '</option></select></label>'
      + '<label class="fld"><span>错误类型</span><select id="ms-type" class="input input-sel">'
      +   Object.keys(DB.MISTAKE_TYPES).map(k => '<option value="' + k + '">' + DB.MISTAKE_TYPES[k].name + '</option>').join('') + '</select></label>'
      + '<label class="fld fld-full"><span>题目描述</span><input id="ms-desc" class="input" placeholder="如：定积分换元法负号处理"></label>'
      + '</div>'
      + '<button class="btn btn-primary" id="ms-add">提交</button>'
      + '</div>'

      + '<div class="card"><div class="card-title-row"><span class="card-title">错题重练</span><span>'
      + '<button class="link-btn" id="ms-gen">生成本周Top重练5题</button>'
      + (drills.length ? ' <button class="link-btn" id="ms-to-tasks" style="color:var(--danger)">一键转入任务中心 →</button>' : '')
      + '</span></div>'
      + drillHtml
      + '</div>'

      + '<div class="card"><div class="card-title">错题列表（最近50条）</div>' + rows + '</div>';

    bind(el);
  }

  function bind(el) {
    // 导出错题
    el.querySelector('#ms-export').onclick = () => {
      const s = Store.get();
      const data = {
        exportedAt: new Date().toISOString(),
        total: s.mistakes.length,
        typeCount: U.countBy(s.mistakes, m => m.type),
        mistakes: s.mistakes
      };
      U.download('mistakes_' + U.dkey() + '.json', JSON.stringify(data, null, 2));
      Toast.success('已导出 ' + s.mistakes.length + ' 条错题');
    };
    el.querySelector('#ms-add').onclick = () => {
      const desc = el.querySelector('#ms-desc').value.trim();
      if (!desc) { Toast.warn('请填写题目描述'); return; }
      const type = el.querySelector('#ms-type').value;
      Store.update(s => {
        s.mistakes.push({
          id: U.uid(), subject: el.querySelector('#ms-subj').value, type, desc,
          date: U.shortDate(), createdAt: new Date().toISOString()
        });
      });
      Toast.success('已记录。同类错误再犯时，系统会加重干预。');
      // 符号错误即时提醒
      if (type === 'sign') Toast.warn('⚠️ 今日符号错误已达 ' + Store.mistakeCountToday('sign') + ' 次，下次数学打卡将触发防呆提醒');
      App.refresh();
    };

    el.querySelector('#ms-gen').onclick = () => {
      const top = Store.weekTopMistakes();
      if (!top.length) { Toast.warn('本周暂无错题记录'); return; }
      Store.update(s => {
        top.slice(0, 2).forEach(t => {
          const name = (DB.MISTAKE_TYPES[t.key] || {}).name || t.key;
          for (let i = 1; i <= (t.key === top[0].key ? 3 : 2); i++) {
            s.mistakeDrills.push({
              id: U.uid(), source: 'mistake', refId: t.key,
              title: '【' + name + '专项】自行从题库选1道同类题（第' + i + '题）',
              subject: 'math', status: 'pending', createdAt: new Date().toISOString()
            });
          }
        });
      });
      Toast.success('已生成5道重练任务');
      App.refresh();
    };

    // 闭环：重练完成 → 自动累加为数学任务打卡记录
    el.querySelectorAll('[data-done]').forEach(b => {
      b.onclick = () => {
        const id = b.getAttribute('data-done');
        Store.update(s => { const d = s.mistakeDrills.find(x => x.id === id); if (d) d.status = 'done'; });
        Toast.success('重练完成 +1');
        App.refresh();
      };
    });

    // 错题变式复现：跳到AI测验生成同源变式题
    el.querySelectorAll('.mis-variant').forEach(b => {
      b.onclick = () => {
        const id = b.getAttribute('data-id');
        const m = Store.get().mistakes.find(x => x.id === id);
        if (!m) return;
        if (window.QuizModule && QuizModule.startVariant) {
          App.go('quiz');
          // 等quiz模块渲染后启动变式
          setTimeout(() => QuizModule.startVariant(m), 50);
        } else {
          Toast.warn('AI测验模块未就绪');
        }
      };
    });

    // 闭环：一键把全部待重练转成任务中心正式任务（打卡才算数）
    const genBtn = el.querySelector('#ms-to-tasks');
    if (genBtn) genBtn.onclick = () => {
      const drills = Store.get().mistakeDrills.filter(d => d.status === 'pending');
      if (!drills.length) { Toast.warn('重练队列已空'); return; }
      Store.update(s => {
        s.mistakeDrills.filter(d => d.status === 'pending').forEach(d => {
          s.tasks.push({ id: U.uid(), subject: d.subject === 'ctrl' ? 'ctrl' : 'math', text: d.title, done: false, createdAt: new Date().toISOString() });
          d.status = 'done';
        });
      });
      Toast.success('已转入任务中心，去打卡吧');
      App.go('tasks');
    };
  }

  window.MistakesModule = { render };
})();
