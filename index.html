<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>26考研全能作战系统</title>
<style>
/* ============================================================
 * 26考研全能作战系统 — 样式表
 * 规范：黑白灰主调 / 移动端优先(max-width:720px) / 圆角6,8,12
 * 间距 4/8/12/16/20/24/32 / 无渐变无阴影无玻璃拟态
 * 字重仅400/500 / 数字 tabular-nums / CSS过渡60-300ms
 * ============================================================ */
:root {
  --text-primary: #000;
  --text-secondary: #595959;
  --text-muted: #8c8c8c;
  --line: #e8e8e8;
  --surface-muted: #f5f5f5;
  --surface: #fff;
  --ok: #237804;
  --warn: #d48806;
  --danger: #cf1322;
  --blue: #2f54eb;
  --purple: #722ed1;
  --r-tag: 6px; --r-btn: 8px; --r-card: 12px;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html { font-size: 15px; }
body {
  font-family: system-ui, -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  color: var(--text-primary); background: var(--surface-muted);
  font-weight: 400; line-height: 1.6;
  font-variant-numeric: tabular-nums;
}
b, strong, .card-title, .btn, .prog-name, .stat-num, .cd-num { font-weight: 500; }

.app { max-width: 720px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; background: var(--surface); }

/* ---------- 顶栏 ---------- */
.topbar { padding: 16px 16px 8px; border-bottom: 1px solid var(--line); }
.topbar-title { font-size: 17px; font-weight: 500; }
.topbar-sub { font-size: 12px; color: var(--text-muted); }

/* ---------- 导航（横向滑动，唯一允许横向滚动的区域） ---------- */
.nav {
  display: flex; gap: 4px; padding: 8px 12px; overflow-x: auto;
  border-bottom: 1px solid var(--line); scrollbar-width: none; position: sticky; top: 0;
  background: var(--surface); z-index: 10;
}
.nav::-webkit-scrollbar { display: none; }
.nav-btn {
  flex: 0 0 auto; border: 1px solid var(--line); background: var(--surface);
  padding: 6px 12px; border-radius: var(--r-btn); font-size: 13px; cursor: pointer;
  color: var(--text-secondary); transition: all 120ms;
}
.nav-on { background: var(--text-primary); color: #fff; border-color: var(--text-primary); }

/* ---------- 主视图 ---------- */
.view { flex: 1; padding: 16px 16px 32px; }
.foot { padding: 12px 16px 24px; text-align: center; }

/* ---------- 卡片 ---------- */
.card {
  background: var(--surface-muted); border-radius: var(--r-card);
  padding: 16px; margin-bottom: 12px;
}
.card-title { font-size: 15px; margin-bottom: 10px; }
.card-title-sm { font-size: 13px; font-weight: 500; margin: 10px 0 6px; }
.card-title-red { color: var(--danger); }
.card-dark { background: var(--text-primary); color: #fff; }
.card-inner { background: var(--surface); border-radius: var(--r-btn); padding: 12px; margin-top: 12px; }
.grid-2 { display: grid; grid-template-columns: 1fr; gap: 12px; }
@media (min-width: 560px) { .grid-2 { grid-template-columns: 1fr 1fr; } }
.grid-2 .card { margin-bottom: 0; }

/* ---------- 倒计时 ---------- */
.cd-label { font-size: 12px; color: #bfbfbf; }
.cd-days { display: flex; align-items: baseline; gap: 8px; margin: 4px 0; }
.cd-num { font-size: 56px; font-weight: 500; line-height: 1; }
.cd-unit { font-size: 16px; color: #bfbfbf; }
.cd-sub { font-size: 12px; color: #d9d9d9; }

/* ---------- 四科 chips ---------- */
.chip-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 8px; }
.chip {
  background: var(--surface); border-radius: var(--r-btn); padding: 10px 6px;
  text-align: center; border-top: 3px solid var(--sc, #999); transition: opacity 200ms;
}
.chip-name { display: block; font-size: 12px; color: var(--text-secondary); }
.chip-num { display: block; font-size: 17px; font-weight: 500; }
.chip-done { opacity: .55; }
.chip-done .chip-num::after { content: " ✓"; color: var(--ok); }
.all-done { background: #f6ffed; color: var(--ok); border-radius: var(--r-btn); padding: 10px 12px; font-size: 13px; margin-top: 4px; }

/* ---------- 快捷按钮 ---------- */
.quick-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 12px; }
.quick-btn {
  background: var(--surface-muted); border: 1px solid var(--line); border-radius: var(--r-card);
  padding: 12px 4px; font-size: 20px; cursor: pointer; display: flex; flex-direction: column; gap: 4px;
  align-items: center; transition: background 120ms;
}
.quick-btn span { font-size: 12px; color: var(--text-secondary); }
.quick-btn:active { background: var(--line); }

/* ---------- 进度条 ---------- */
.pbar { background: var(--line); border-radius: 99px; overflow: hidden; flex: 1; }
.pbar-fill { height: 100%; border-radius: 99px; width: 0; transition: width 300ms; }
.prog-bar-row { display: flex; align-items: center; gap: 10px; margin: 8px 0; }
.prog-head { display: flex; justify-content: space-between; align-items: baseline; }
.prog-name { font-size: 15px; font-weight: 500; }
.prog-target { font-size: 12px; color: var(--text-muted); }
.prog-pct { font-size: 14px; font-weight: 500; min-width: 44px; text-align: right; cursor: pointer; }
.prog-pct:hover { text-decoration: underline; }

/* ---------- 标签 ---------- */
.tag {
  display: inline-block; font-size: 11px; color: #fff; padding: 2px 8px;
  border-radius: var(--r-tag); line-height: 1.5; cursor: default;
}
.tag-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.tag-mod { background: var(--surface); color: var(--text-secondary); border: 1px solid var(--line); cursor: pointer; }
.tag-red { background: var(--danger); }
.tag-warn { background: var(--warn); }
.tag-ok { background: var(--ok); }

/* ---------- 警示框 ---------- */
.warn-box { background: #fffbe6; border: 1px solid #ffe58f; border-radius: var(--r-card); padding: 14px 16px; margin-bottom: 12px; }
.warn-title { color: #ad6800; font-weight: 500; margin-bottom: 6px; font-size: 14px; }
.warn-body { font-size: 13px; line-height: 1.8; color: #614700; }
.alert { border-radius: var(--r-btn); padding: 10px 12px; font-size: 13px; margin-top: 10px; line-height: 1.6; }
.alert-warn { background: #fffbe6; border: 1px solid #ffe58f; color: #ad4e00; }
.alert-danger { background: #fff1f0; border: 1px solid #ffa39e; color: var(--danger); }
.alert-ok { background: #f6ffed; border: 1px solid #b7eb8f; color: var(--ok); }
.alert a { color: inherit; font-weight: 500; }

/* ---------- 任务 ---------- */
.tab-row { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 8px; scrollbar-width: none; }
.tab-row::-webkit-scrollbar { display: none; }
.tab {
  flex: 0 0 auto; border: 1px solid var(--line); background: var(--surface);
  border-radius: var(--r-btn); padding: 5px 12px; font-size: 13px; cursor: pointer; color: var(--text-secondary);
  transition: all 120ms;
}
.tab-on { background: var(--text-primary); color: #fff; border-color: var(--text-primary); }
.tab-n { font-size: 11px; opacity: .7; }
.task-list { margin: 4px 0 12px; }
.task {
  display: flex; align-items: center; gap: 10px; background: var(--surface);
  border: 1px solid var(--line); border-radius: var(--r-btn); padding: 10px 12px; margin-bottom: 8px;
  transition: opacity 200ms;
}
.task-done { opacity: .45; }
.task-done .task-text { text-decoration: line-through; color: var(--text-muted); }
.task-check { display: flex; cursor: pointer; }
.task-check input, .check-row input, .ms-check input { position: absolute; opacity: 0; pointer-events: none; }
.box {
  width: 20px; height: 20px; border: 2px solid #bfbfbf; border-radius: var(--r-tag);
  display: inline-flex; align-items: center; justify-content: center; flex: 0 0 auto;
  transition: all 120ms; background: var(--surface);
}
.box::after { content: "✓"; color: #fff; font-size: 13px; opacity: 0; transition: opacity 120ms; }
input:checked + .box { background: var(--text-primary); border-color: var(--text-primary); }
input:checked + .box::after { opacity: 1; }
.task-tag { font-size: 11px; color: #fff; border-radius: var(--r-tag); padding: 1px 7px; flex: 0 0 auto; }
.task-text { flex: 1; font-size: 14px; cursor: text; word-break: break-all; }
.task-edit-input { flex: 1; }
.task-x {
  border: none; background: none; font-size: 18px; color: var(--text-muted);
  cursor: pointer; opacity: 0; transition: opacity 120ms; padding: 0 2px; line-height: 1;
}
.task:hover .task-x, .task-x:focus { opacity: 1; }
@media (hover: none) { .task-x { opacity: .6; } }

/* ---------- 表单 ---------- */
.input {
  width: 100%; border: 1px solid var(--line); border-radius: var(--r-btn);
  padding: 9px 12px; font-size: 14px; font-family: inherit; background: var(--surface);
  color: var(--text-primary); transition: border-color 120ms;
}
.input:focus { outline: none; border-color: var(--text-primary); }
.input-sel { cursor: pointer; }
textarea.input { resize: vertical; }
.add-row { display: flex; gap: 8px; }
.add-row .input-sel { flex: 0 0 96px; }
.add-row .btn { flex: 0 0 auto; }
.form-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 12px; }
@media (min-width: 560px) { .form-grid { grid-template-columns: 1fr 1fr; } .fld-full { grid-column: 1 / -1; } }
.fld { display: flex; flex-direction: column; gap: 4px; font-size: 13px; color: var(--text-secondary); }
.fld-inline { flex-direction: row; align-items: center; gap: 8px; }
.fld-inline .input { width: 90px; }
.range { width: 100%; accent-color: var(--text-primary); }

/* ---------- 按钮 ---------- */
.btn {
  border: 1px solid var(--line); background: var(--surface); border-radius: var(--r-btn);
  padding: 9px 16px; font-size: 14px; cursor: pointer; font-family: inherit;
  transition: all 120ms; color: var(--text-primary);
}
.btn:active { transform: scale(.98); }
.btn-primary { background: var(--text-primary); color: #fff; border-color: var(--text-primary); }
.btn-danger { background: var(--danger); color: #fff; border-color: var(--danger); }
.btn-ghost { background: transparent; }
.btn-sm { padding: 5px 12px; font-size: 13px; }
.btn-block { width: 100%; margin-top: 8px; }
.btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
.link-btn { border: none; background: none; color: var(--text-muted); font-size: 12px; cursor: pointer; text-decoration: underline; padding: 0; }
.seg-row { display: flex; gap: 8px; flex-wrap: wrap; margin: 8px 0; }
.seg {
  border: 1px solid var(--line); background: var(--surface); border-radius: var(--r-btn);
  padding: 8px 14px; font-size: 13px; cursor: pointer; transition: all 120ms;
}
.seg-on, .seg:active { background: var(--text-primary); color: #fff; border-color: var(--text-primary); }
.seg[disabled] { opacity: .4; cursor: not-allowed; }

/* ---------- 统计 ---------- */
.stat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 10px 0; }
.stat { background: var(--surface); border-radius: var(--r-btn); padding: 10px 4px; text-align: center; }
.stat-num { font-size: 20px; font-weight: 500; }
.stat-label { font-size: 11px; color: var(--text-muted); }
.muted-sm { font-size: 12px; color: var(--text-muted); }
.empty { text-align: center; color: var(--text-muted); font-size: 13px; padding: 20px 0; }
.his-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--line); font-size: 13px; }
.his-row:last-child { border-bottom: none; }

/* ---------- 报告 ---------- */
.report {
  background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-btn);
  padding: 12px; font-size: 12.5px; line-height: 1.8; white-space: pre-wrap; word-break: break-all;
  font-family: ui-monospace, "SF Mono", Consolas, monospace; max-height: 340px; overflow-y: auto;
}

/* ---------- 里程碑 ---------- */
.ms-line { position: relative; padding-left: 20px; }
.ms-line::before { content: ""; position: absolute; left: 7px; top: 8px; bottom: 8px; width: 2px; background: var(--line); }
.ms-node { position: relative; display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; }
.ms-dot { position: absolute; left: -18px; top: 16px; width: 12px; height: 12px; border-radius: 50%; background: var(--surface); border: 3px solid #bfbfbf; }
.ms-done .ms-dot { border-color: var(--ok); background: var(--ok); }
.ms-body { flex: 1; }
.ms-date { font-size: 12px; color: var(--text-muted); }
.ms-badge { font-size: 10px; background: var(--line); border-radius: var(--r-tag); padding: 1px 6px; color: var(--text-secondary); }
.ms-done .ms-badge { background: var(--ok); color: #fff; }
.ms-badge-doing { background: #fffbe6; color: #ad6800; }
.ms-title { font-size: 14px; }
.ms-done .ms-title { color: var(--text-muted); text-decoration: line-through; }
.ms-check { cursor: pointer; margin-top: 4px; }

/* ---------- 里程碑：动态当前位置指示器 ---------- */
.ms-now { position: relative; padding: 6px 0 2px; margin-left: -18px; }
.ms-now-arrow {
  display: inline-block;
  color: #cf1322;
  font-size: 16px;
  line-height: 1;
  animation: msPulse 2s ease-in-out infinite;
  filter: drop-shadow(0 1px 3px rgba(207,19,34,0.4));
}
.ms-now-label {
  display: inline-block;
  font-size: 11px;
  font-weight: 600;
  color: #cf1322;
  background: #fff1f0;
  border: 1px solid #ffa39e;
  border-radius: 10px;
  padding: 1px 8px;
  margin-left: 4px;
  vertical-align: middle;
  white-space: nowrap;
}
@keyframes msPulse {
  0%, 100% { opacity: 1; transform: translateY(0); }
  50% { opacity: 0.6; transform: translateY(-3px); }
}

/* ---------- 错题 ---------- */
.mis-row { background: var(--surface); border: 1px solid var(--line); border-left: 4px solid; border-radius: var(--r-btn); padding: 10px 12px; margin-bottom: 8px; }
.mis-head { display: flex; align-items: center; gap: 8px; }
.mis-subj { font-size: 12px; color: var(--text-secondary); }
.mis-date { margin-left: auto; font-size: 12px; color: var(--text-muted); }
.mis-desc { font-size: 13px; margin-top: 4px; }
.drill-row { display: flex; justify-content: space-between; align-items: center; background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-btn); padding: 8px 12px; margin-bottom: 8px; font-size: 13px; gap: 8px; }

/* ---------- 红线 ---------- */
.card-redline { background: #fff1f0; border: 1px solid #ffa39e; }
.red-item { display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid #ffccc7; }
.red-item:last-child { border-bottom: none; }
.red-icon { font-size: 22px; flex: 0 0 auto; }
.red-title { font-weight: 500; font-size: 14px; color: var(--danger); }
.red-desc { font-size: 13px; color: #5c0011; margin-top: 2px; }
.check-row { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; font-size: 14px; cursor: pointer; }
.check-row .box { margin-top: 2px; }

/* ---------- 排程 ---------- */
.ctx-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 10px; }
@media (min-width: 560px) { .ctx-grid { grid-template-columns: repeat(4, 1fr); } }
.ctx-item { background: var(--surface); border-radius: var(--r-btn); padding: 8px 10px; font-size: 12px; color: var(--text-muted); }
.ctx-item b { display: block; font-size: 15px; color: var(--text-primary); font-weight: 500; }
.reason-box { background: var(--surface); border-radius: var(--r-btn); padding: 10px 12px; font-size: 13px; margin-top: 10px; line-height: 1.9; }
.seq-row { display: flex; align-items: center; gap: 8px; background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-btn); padding: 9px 12px; margin-bottom: 8px; font-size: 14px; }
.seq-forced { border-color: var(--danger); background: #fff1f0; }
.seq-no { width: 22px; height: 22px; border-radius: 50%; background: var(--text-primary); color: #fff; font-size: 12px; display: inline-flex; align-items: center; justify-content: center; flex: 0 0 auto; }
.seq-text { flex: 1; word-break: break-all; }
.rule-list { padding-left: 18px; font-size: 13px; line-height: 2; color: var(--text-secondary); }

/* ---------- 热力图 ---------- */
.legend { font-size: 12px; color: var(--text-secondary); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
.lg { width: 12px; height: 12px; border-radius: 3px; display: inline-block; }
.lg-green { background: #b7eb8f; } .lg-yellow { background: #ffe58f; } .lg-red { background: #ffa39e; }
.hm-group { margin-bottom: 14px; }
.hm-group-name { font-size: 13px; font-weight: 500; margin-bottom: 8px; color: var(--text-secondary); }
.hm-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
@media (min-width: 560px) { .hm-grid { grid-template-columns: repeat(4, 1fr); } }
.hm-cell {
  border: 1px solid var(--line); border-radius: var(--r-btn); padding: 8px 6px;
  cursor: pointer; display: flex; flex-direction: column; gap: 2px; transition: transform 120ms;
}
.hm-cell:active { transform: scale(.96); }
.hm-green { background: #f6ffed; border-color: #b7eb8f; }
.hm-yellow { background: #fffbe6; border-color: #ffe58f; }
.hm-red { background: #fff1f0; border-color: #ffa39e; }
.hm-locked { opacity: .5; }
.hm-name { font-size: 12px; font-weight: 500; }
.hm-score { font-size: 11px; color: var(--text-muted); }
.tier-row { display: grid; grid-template-columns: 1fr; gap: 8px; margin-bottom: 12px; }
@media (min-width: 560px) { .tier-row { grid-template-columns: repeat(3, 1fr); } }
.tier-card { background: var(--surface); border: 1px solid var(--line); border-top: 3px solid; border-radius: var(--r-btn); padding: 10px 12px; }
.tier-head { font-size: 13px; font-weight: 500; }
.tier-nums { font-size: 13px; margin: 4px 0; }

/* ---------- 步骤审查器 ---------- */
.step-row { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-btn); padding: 10px 12px; margin-bottom: 8px; }
.step-head { display: flex; align-items: center; gap: 8px; font-size: 14px; }
.step-no { width: 20px; height: 20px; border-radius: 50%; background: var(--text-primary); color: #fff; font-size: 11px; display: inline-flex; align-items: center; justify-content: center; }
.step-in { margin-top: 8px; font-size: 13px; }
.risk-card { border-radius: var(--r-card); padding: 16px; text-align: center; margin-top: 12px; }
.risk-bg-low { background: #f6ffed; } .risk-bg-mid { background: #fffbe6; } .risk-bg-high { background: #fff1f0; }
.risk-score { font-size: 40px; font-weight: 500; line-height: 1; }
.risk-max { font-size: 16px; color: var(--text-muted); }
.risk-label { font-size: 13px; margin-top: 6px; }
.risk-low { color: var(--ok); } .risk-mid { color: var(--warn); } .risk-high { color: var(--danger); }
.flag-list { margin-top: 10px; }
.flag-row { font-size: 13px; padding: 8px 12px; border-radius: var(--r-btn); margin-bottom: 6px; background: #fff1f0; color: var(--danger); }
.flag-fraction { background: #fffbe6; color: #ad4e00; }
.flag-careless { background: #f5f5f5; color: var(--text-secondary); }

/* ---------- 专注模式 ---------- */
.focus-setup { margin-top: 12px; }
body.focus-lock .nav, body.focus-lock .foot { display: none; }
#focus-overlay {
  position: fixed; inset: 0; background: var(--surface); z-index: 200;
  display: flex; align-items: center; justify-content: center; text-align: center;
}
.fo-subj { font-size: 15px; color: var(--text-secondary); }
.fo-time { font-size: 84px; font-weight: 500; line-height: 1.1; margin: 12px 0; font-variant-numeric: tabular-nums; }
.fo-hint { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; }
.fatigue-pop {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--text-primary); color: #fff; border-radius: var(--r-card);
  padding: 14px 18px; z-index: 300; width: min(90vw, 380px); font-size: 14px;
}
.fatigue-pop .btn-row { margin-top: 8px; }
.fatigue-pop .btn-primary { background: #fff; color: #000; border-color: #fff; }
.fatigue-pop .btn-ghost { color: #fff; border-color: #595959; }

/* ---------- 概念图谱 ---------- */
.cm-scroll { overflow-x: auto; }
.cm-node { transition: opacity 120ms; }
.cm-node:hover { opacity: .8; }
.gloss-row { display: flex; gap: 8px; font-size: 13px; padding: 6px 0; border-bottom: 1px dashed var(--line); }
.gloss-eng { font-weight: 500; min-width: 90px; }
.gloss-arrow { color: var(--text-muted); }

/* ---------- 决策 ---------- */
.sch-row { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-btn); padding: 12px; margin-bottom: 8px; }
.sch-hl { border-color: var(--danger); border-width: 2px; }
.sch-name { font-weight: 500; font-size: 15px; display: flex; align-items: center; gap: 8px; }
.sch-info { font-size: 13px; margin-top: 4px; }

/* ---------- 阅读训练 ---------- */
.rd-timer { font-size: 40px; font-weight: 500; text-align: center; margin: 12px 0; font-variant-numeric: tabular-nums; }
.rd-over { color: var(--danger); }
.flashcard {
  background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-card);
  min-height: 180px; display: flex; flex-direction: column; align-items: center; justify-content: center;
  cursor: pointer; margin: 12px 0; padding: 20px; text-align: center; transition: background 120ms;
}
.flashcard:active { background: var(--surface-muted); }

<script>

/* ===== js/core/utils.js ===== */
/* ============================================================
 * utils.js — 通用工具函数（纯函数，无副作用）
 * ============================================================ */
(function () {
  'use strict';
  const DAY_MS = 86400000;

  const U = {
    DAY_MS,
    // 生成唯一ID（时间戳+随机，足够本地使用）
    uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); },
    // 'YYYY-MM-DD' 本地时区日期键
    dkey(d) {
      d = d || new Date();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return d.getFullYear() + '-' + m + '-' + day;
    },
    // 'M.D' 短日期（错题列表显示用）
    shortDate(d) { d = d ? new Date(d) : new Date(); return (d.getMonth() + 1) + '.' + d.getDate(); },
    // 'HH:MM'
    hm(d) { d = d || new Date(); return String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0'); },
    // 距离目标日期的天数（今天为0）
    daysTo(dateStr) {
      const t = new Date(dateStr + 'T00:00:00');
      const n = new Date(); n.setHours(0, 0, 0, 0);
      return Math.round((t - n) / DAY_MS);
    },
    // 今天星期几：0=周一 ... 6=周日
    dow(d) { d = d || new Date(); return (d.getDay() + 6) % 7; },
    // 本周周一的 Date
    weekMonday(d) {
      d = d || new Date(); const t = new Date(d); t.setHours(0, 0, 0, 0);
      t.setDate(t.getDate() - U.dow(t)); return t;
    },
    // 本周7个日期键
    weekKeys(d) {
      const m = U.weekMonday(d); const out = [];
      for (let i = 0; i < 7; i++) { const t = new Date(m); t.setDate(m.getDate() + i); out.push(U.dkey(t)); }
      return out;
    },
    // 日期键 → 'M.D（周X）'
    keyLabel(k) {
      const d = new Date(k + 'T00:00:00');
      const wk = ['周一', '周二', '周三', '周四', '周五', '周六', '周日'][U.dow(d)];
      return (d.getMonth() + 1) + '.' + d.getDate() + ' ' + wk;
    },
    esc(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    },
    clamp(v, a, b) { return Math.max(a, Math.min(b, v)); },
    pct(done, total) { return total > 0 ? Math.round(done / total * 100) : 0; },
    sum(arr) { return (arr || []).reduce((a, b) => a + (+b || 0), 0); },
    avg(arr) { return arr && arr.length ? U.sum(arr) / arr.length : 0; },
    round1(v) { return Math.round(v * 10) / 10; },
    // 对象数组按字段计数 → {key: n}
    countBy(arr, fn) { const o = {}; (arr || []).forEach(x => { const k = fn(x); if (k != null) o[k] = (o[k] || 0) + 1; }); return o; },
    // 取计数Top N → [{key,count}]
    topN(countObj, n) {
      return Object.keys(countObj || {}).map(k => ({ key: k, count: countObj[k] }))
        .sort((a, b) => b.count - a.count).slice(0, n || 2);
    },
    // 最近n天的日期键数组（含今天）
    lastNDays(n) {
      const out = []; const t = new Date();
      for (let i = n - 1; i >= 0; i--) { const d = new Date(t); d.setDate(t.getDate() - i); out.push(U.dkey(d)); }
      return out;
    },
    // 判断日期键是否属于本周
    inThisWeek(k) { return U.weekKeys().indexOf(k) >= 0; },
    // 防抖
    debounce(fn, ms) { let t; return function () { clearTimeout(t); const a = arguments, s = this; t = setTimeout(() => fn.apply(s, a), ms); }; },
    // 深拷贝（JSON安全）
    clone(o) { return JSON.parse(JSON.stringify(o)); },
    // 下载文本文件
    download(filename, text) {
      const blob = new Blob([text], { type: 'application/json;charset=utf-8' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob); a.download = filename;
      document.body.appendChild(a); a.click();
      setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 100);
    },
    // 全局事件
    on(evt, fn) { document.addEventListener(evt, fn); },
    emit(evt, detail) { document.dispatchEvent(new CustomEvent(evt, { detail })); }
  };

  window.U = U;
})();

  // 函数名单词（保持正体）
  const FUNC = ['sin', 'cos', 'tan', 'cot', 'sec', 'csc', 'arcsin', 'arccos', 'arctan',
    'sinh', 'cosh', 'tanh', 'ln', 'log', 'lg', 'exp', 'lim', 'max', 'min', 'sup', 'inf',

  function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

  // 读取一个分组：支持 {...} 或 (...)，返回 [内容, 消耗长度]
  function readGroup(s, i) {
    const open = s[i];
    if (open !== '{' && open !== '(') return [s[i] || '', 1];
    const close = open === '{' ? '}' : ')';

    for (; j < s.length; j++) {

  // 递归渲染一段（不含外层 $）
  function seg(input) {
    let s = input, out = '', i = 0;
    while (i < s.length) {
      const c = s[i];

        if (!m) { i++; continue; }

        if (cmd === 'frac' || cmd === 'dfrac' || cmd === 'tfrac') {
          const g1 = readGroup(s, i + m[0].length);
          const g2 = readGroup(s, i + m[0].length + g1[1]);
          // 对分子分母内容再做一轮简写规范化（处理内部 / → \frac 等模式）
          const n1 = normalizeShorthand(g1[0]);
          const n2 = normalizeShorthand(g2[0]);
          out += '<span class="tx-frac"><span class="tx-num">' + seg(n1) + '</span><span class="tx-den">' + seg(n2) + '</span></span>';
          i += m[0].length + g1[1] + g2[1]; continue;
        }

        if (cmd === 'sqrt') {

          if (s[k] === '[') { const e = s.indexOf(']', k); idx = s.slice(k + 1, e); k = e + 1; }
          const g = readGroup(s, k);
          out += '<span class="tx-sqrt">' + (idx ? '<sup class="tx-idx">' + seg(idx) + '</sup>' : '') + '√<span class="tx-radic">' + seg(normalizeShorthand(g[0])) + '</span></span>';
          i = k + g[1]; continue;
        }
        // 希腊字母 / 符号
        if (GREEK[cmd]) { out += '<i>' + GREEK[cmd] + '</i>'; i += m[0].length; continue; }
        if (SYMBOL[cmd]) { out += SYMBOL[cmd]; i += m[0].length; continue; }
        if (FUNC.indexOf(cmd) >= 0) { out += '<span class="tx-fn">' + cmd + '</span>'; i += m[0].length; continue; }
        if (cmd === ' ' || cmd === ',' || cmd === ';' || cmd === '!') { out += ' '; i += m[0].length; continue; }
        // \left / \right / \big 系列定界符命令：吃掉命令+后一个字符作为定界符
        if (cmd === 'left' || cmd === 'right') {

          const delim = s[delimIdx] || '';
          if (delim === '.' || delim === '') { i += m[0].length + (delim ? 1 : 0); continue; } // 空定界符
          out += '<span class="tx-delim' + (cmd === 'left' ? ' tx-left' : ' tx-right') + '">' + esc(delim) + '</span>';
          i += m[0].length + 1; continue;
        }
        if (cmd === 'big' || cmd === 'Big' || cmd === 'bigg' || cmd === 'Bigg'
          || cmd === 'bigl' || cmd === 'Bigl' || cmd === 'biggl' || cmd === 'Biggl'
          || cmd === 'bigr' || cmd === 'Bigr' || cmd === 'biggr' || cmd === 'Biggr') {
          const delimIdx = i + m[0].length;
          const delim = s[delimIdx] || '';
          if (delim === '.' || delim === '') { i += m[0].length + (delim ? 1 : 0); continue; }
          out += '<span class="tx-big-delim">' + esc(delim) + '</span>';
          i += m[0].length + 1; continue;
        }
        // \begin{cases} ... \end{cases} —— 分段函数（花括号左对齐多行）
        if (cmd === 'begin') {
          const g = readGroup(s, i + m[0].length);
          if (g[0] === 'cases') {
            // 向前扫描匹配的 \end{cases}
            let depth = 1, j = i + m[0].length + g[1];

            while (j < s.length && depth > 0) {
              const rest = s.slice(j);
              if (rest.match(/^\\begin\s*\{/)) { depth++; const rg = readGroup(s, j + 6); j += 6 + rg[1]; continue; }
              if (rest.match(/^\\end\s*\{/)) { depth--; if (depth === 0) break; const rg2 = readGroup(s, j + 4); j += 4 + rg2[1]; continue; }
              j++;
            }
            const body = s.slice(bodyStart, j);
            // 按 \\ 分割行，每行按 & 分割为 条件=值
            const rows = body.split('\\\\').map(function (row) { return row.trim(); }).filter(Boolean);
            let casesHtml = '<span class="tx-cases">';
            rows.forEach(function (row) {
              const parts = row.split('&');
              const cond = (parts[0] || '').trim();
              const val = (parts[1] || '').trim();
              casesHtml += '<span class="tx-case-row"><span class="tx-case-cond">' + seg(normalizeShorthand(cond)) + '</span><span class="tx-case-val">' + seg(normalizeShorthand(val)) + '</span></span>';
            });

            out += casesHtml;

          }

        }
        if (cmd === 'end') { const eg = readGroup(s, i + m[0].length); i += m[0].length + eg[1]; continue; } // 跳过 \end{...}
        if (cmd === 'text' || cmd === 'mathrm' || cmd === 'mathbf') { const g = readGroup(s, i + m[0].length); out += '<span>' + esc(g[0]) + '</span>'; i += m[0].length + g[1]; continue; }
        if (cmd === 'overline' || cmd === 'bar' || cmd === 'vec' || cmd === 'hat' || cmd === 'dot') { const g = readGroup(s, i + m[0].length); out += '<span class="tx-over">' + seg(normalizeShorthand(g[0])) + '</span>'; i += m[0].length + g[1]; continue; }
        // 未知命令：原样输出名字
        out += esc(cmd); i += m[0].length; continue;
      }
      // 上标 ^ 或 ^{..}
      if (c === '^') {
        const g = readGroup(s, i + 1);
        out += '<sup>' + seg(normalizeShorthand(g[0])) + '</sup>';
        i += 1 + g[1]; continue;
      }
      // 下标 _ 或 _{..}
      if (c === '_') {

        i += 1 + g[1]; continue;

      // 分组 {...}（去掉花括号，保留内容）
      if (c === '{') {

        out += seg(normalizeShorthand(g[0])); i += g[1]; continue;
      }
      // 普通字符
      out += esc(c); i++;

    return out;
  }

  // 简写智能识别：把 AI 常用的简写记法转成标准LaTeX，再渲染
  //  [A] / B      → \frac{A}{B}
  //  (A) / (B)    → \frac{(A)}{(B)}
  //  lim(x->0)    → \lim_{x \to 0}
  //  ln(1+x)      → \ln(1+x)  (函数名正体化)

  function matchClose(s, openIdx, openCh, closeCh) {
    let d = 0;
    for (let i = openIdx; i < s.length; i++) {

        const m = s.slice(i).match(/^-?[a-zA-Z0-9]+(?:\.[0-9]+)?/);

          if (s[j] === '/') {

            let den = '', denEnd = k;
            if (s[k] === '(' || s[k] === '[') {

              else { den = s.slice(k); denEnd = s.length; }

            }

            // 保留例外：纯系数 x/2、x/n 保持斜线（但若分子带^上标如 x^3/3 则转分式）；日期 2024/1/6 不转
            if (den) {

                const rest = s.slice(denEnd);

  // 括号内分式扫描（宽松模式）：用于 (1/6)、(-1/2) 等括号包裹的分数
  // 与 fracScan 的区别：不要求分母"复杂"，只要不是函数调用误伤就转
  function fracScanInner(s) {
    let r = '', i = 0;
    while (i < s.length) {

      if (/[a-zA-Z0-9\-]/.test(c) && !/[a-zA-Z0-9]/.test(r.slice(-1))) {
        const m = s.slice(i).match(/^-?[a-zA-Z0-9]+(?:\.[0-9]+)?/);
        if (m && m[0].length <= 10) {
          const numTok = m[0];
          let j = i + numTok.length;
          if (s[j] === '^') {
            const pg = readGroup(s, j + 1);
            if (pg) { j += 1 + pg[1]; }
            else { j++; while (j < s.length && /\w/.test(s[j])) j++; }
          }
          while (j < s.length && s[j] === ' ') j++;
          if (s[j] === '/') {
            let k = j + 1;
            while (k < s.length && s[k] === ' ') k++;
            let den = '', denEnd = k;
            if (s[k] === '(' || s[k] === '[') {
              const dc = matchClose(s, k, s[k], s[k] === '(' ? ')' : ']');
              if (dc > 0) { den = s.slice(k + 1, dc); denEnd = dc + 1; }
              else { den = s.slice(k); denEnd = s.length; }
            } else {
              const dm = s.slice(k).match(/^[a-zA-Z0-9\^\{\}\_\+\-\*\.]+/);

            }
            if (den) {
              const fullNum = s.slice(i, j);
              r += '\\frac{' + fullNum + '}{' + den + '}';
              i = denEnd; continue;
            }
          }
        }
      }
      r += c; i++;
    }

  }

  function normalizeShorthand(s) {

    // 覆盖：x³→x^{3}, ²→^{2}, x¹²³→x^{123} 等

    // 分母支持：括号组 / 方括号组 / 裸token / 【带函数名前缀的括号组】(如 arcsin(x))
    r = r.replace(/\b(sin|cos|tan|cot|sec|csc|arcsin|arccos|arctan|sinh|cosh|tanh|ln|log|lg|exp)\s*\(([^)]+)\)\s*\/\s*(?:(\([^)]+\))|(\[[^\]]+\])|(sin|cos|tan|cot|sec|csc|arcsin|arccos|arctan|sinh|cosh|tanh|ln|log|lg|exp)?\s*(\([^)]+\))|([a-zA-Z0-9][a-zA-Z0-9^{}_\+\-\.*]*))/g,
      function(m, fn, body, pDen, bDen, fn2Den, pFnDen, sDen) {

      });
    // 裸写希腊字母 → \命令（仅数学语境）：alpha beta gamma ... → \alpha \beta ...
    // 前面不能是字母或反斜杠（避免误伤已带\的或单词如 "alphabet"）
    Object.keys(GREEK).forEach(name => {
      r = r.replace(new RegExp('(^|[^\\\\a-zA-Z])' + name + '(?![a-zA-Z])', 'g'), '$1\\' + name);

    // 裸写 sqrt(...) → \sqrt{...}
    r = r.replace(/(^|[^\\a-zA-Z])sqrt\s*\(/g, '$1\\sqrt(');
    // 裸写 ln/sin/cos/tan 等函数 → 命令
    r = r.replace(/(^|[^\\a-zA-Z])(ln|sin|cos|tan|cot|sec|csc|lim|log|lg|exp|max|min)\s*\(/g, '$1\\$2(');

    r = r.replace(/\\?lim\s*\(\s*([a-zA-Z])\s*(?:->|→)\s*([^\)]+)\)/g, '\\lim_{$1 \\to $2}');

    r = r.replace(/∫\s*[\(\[]?\s*(?:从)?([^\),\]，\s]+)\s*(?:到|,)\s*([^\),\]，\s]+)\s*[\)\]]?/g, '∫_{$1}^{$2}');

    for (let k = 0; k < 5; k++) {

    return r;

  const Tex = {
    // 整段都是公式（可能带 $ 包裹）
    render(str) {
      if (str == null) return '';

      const m = s.match(/^\$+([\s\S]+?)\$+$/);
      if (m) s = m[1];
      s = normalizeShorthand(s);
      return '<span class="tx">' + seg(s) + '</span>';
    },
    // 文本里混着 $..$ 公式：文本转义 + 公式渲染
    renderInline(str) {
      if (str == null) return '';
      const D = String.fromCharCode(36); // 美元符号：用charCode避免源码字面量被shell展开
      const s = String(str);
      // 无 $ 包裹但含公式特征 → 整段按公式渲染（AI常返回裸公式题干）
      const greekNames = 'alpha|beta|gamma|delta|theta|lambda|mu|pi|sigma|omega|phi|rho|tau|xi|zeta|eta|kappa|nu|chi|psi';
      const looksMath = /(\\[a-zA-Z]+|->|→|\^|_|∫|\[[^\]]+\]\s*\/|\)\s*\/\s*[\(a-zA-Z]|\d\s*\/\s*[\(\[]|[a-zA-Z]\s*\/\s*[\(\[]|-?\d+\s*\/\s*\d+|lim\s*[\(]|ln\s*\(|sin\s*\(|cos\s*\(|tan\s*\(|sqrt\s*\()/i.test(s)
        || new RegExp('\\b(' + greekNames + ')\\b').test(s)
        || /[⁰¹²³⁴⁵⁶⁷⁸⁹]/.test(s); // Unicode 上标数字（单独检测，避免正则解析问题）
      if (s.indexOf(D) < 0 && looksMath) {
        return '<span class="tx">' + seg(normalizeShorthand(s)) + '</span>';
      }
      const parts = s.split(/(\$[^$]+\$)/g);
      return parts.map(p => {
        if (p.length > 1 && p[0] === D && p[p.length - 1] === D) return Tex.render(p);
        // 非公式段也可能夹带简写公式，做一次轻量识别
        if (looksMath && (/->|→|\^|\[\S+\]\s*\/|\d\s*\/\s*\(|[a-zA-Z]\s*\/\s*\(|-?\d+\s*\/\s*\d+/.test(p) || /[⁰¹²³⁴⁵⁶⁷⁸⁹]/.test(p))) return '<span class="tx">' + seg(normalizeShorthand(p)) + '</span>';
        return esc(p).replace(/\n/g, '<br>');
      }).join('');
    }
  };

  window.Tex = Tex;
})();


/* ===== js/core/store.js ===== */
/* ============================================================
 * store.js — 数据层：localStorage 持久化（key: kaoyan2026_data）
 * 所有模块通过 Store.get()/Store.update() 读写，禁止直接操作 localStorage
 * ============================================================ */
(function () {
  'use strict';
  const KEY = 'kaoyan2026_data';

  // ---------- 默认任务模板（PRD 4.2） ----------
  function defaultTasks() {
    const now = new Date().toISOString();
    let _order = 0;
    const t = (subject, text) => ({ id: U.uid() + Math.random().toString(36).slice(2, 4), subject, text, done: false, createdAt: now, updatedAt: now, order: _order++ });
    return [
      t('math', '高数强化第X章（按当前进度替换章节号）'),
      t('math', '线代：二次型标准化 + 正定判定'),
      t('math', '概率论：参数估计（矩估计/极大似然）'),
      t('ctrl', '专业课第X节 + 课后题（按当前进度替换）'),
      t('eng', '阅读真题2篇 + 定位法复盘'),
      t('pol', '马原视频1节 + 肖1000对应章节')
    ];
  }

  // ---------- 初始数据结构（PRD 4.7） ----------
  function initialState() {
    return {
      meta: { createdAt: new Date().toISOString(), version: '2.0.0', lastBackupReminder: '' },
      tasks: defaultTasks(),
      taskTomb: {},              // 已删除任务的墓碑 {id: 时间戳}，用于跨设备"删除"同步（仅标记，防止被另一台设备的旧副本"复活"）
      tomb: { quizBank: {}, mistakePhotos: {} }, // 其它可删除集合（题库/拍题）的墓碑，机制同 taskTomb：删除=标记而非真删，合并时按墓碑过滤，避免被云端旧副本"复活"
      completions: {},            // 'YYYY-MM-DD' -> [taskId...] 每日打卡记录
      taskArchive: {},            // 'YYYY-MM-DD' -> [{subject,text,done}] 前日任务归档（供复盘统计）
      mistakes: [],               // {id, subject, type, desc, date:'M.D', createdAt}
      studyHours: {},             // 'YYYY-MM-DD' -> hours（当天累计）
      focus: { sessions: [], todayCount: 0, todayDate: '' },  // {id,date:'YYYY-MM-DD',mins,subject,endedAt,aborted}
      weeklyStats: {},            // 'YYYY-Www' -> {totalHours,targetHours,mathAccuracy,prevAccuracy,mainErrorTypes:[],mentalState,specialEvent}
      milestones: { augProf: false, octMath: false, novProf: false, decPol: false },
      progress: {
        math: { percent: 0, stage: '强化阶段', modules: { '高数': 0, '线代': 0, '概率': 0 } },
        ctrl: { percent: 0, stage: '强化阶段', modules: { '经典控制': 0, '现代控制': 0 } },
        eng: { percent: 0, stage: '真题阶段', modules: { '阅读': 0, '作文': 0 } },
        pol: { percent: 0, stage: '基础阶段', modules: { '马原': 0, '思修': 0, '史纲': 0, '毛中特': 0 } }
      },
      heat: {},                   // topicId -> {level:0|1|2, score:0-100|null, updatedAt}
      mistakeDrills: [],          // 错题重练队列 {id, source:'mistake'|'topic', refId, title, subject, status:'pending'|'done', createdAt, penaltyOf}
      mental: [],                 // {id, date, mood:1-10, fatigue:'fresh'|'tired'|'exhausted'|'giveup', jumpy:bool, hwUrge:bool, stuck}
      reading: { results: [], cards: {}, customVocab: [] }, // results:{id,date,source,answer,choice,correct,secs}; cards: wordKey -> {box:1-5, due:'YYYY-MM-DD'}; customVocab: 用户自定义词
      decision: { inputs: { mathSims: [], profScore: '', engAccuracy: '', polProgress: 0, xiankongScore: 5 }, result: null, updatedAt: '' },
      inspector: { runs: [] },    // {id,date,type,risk,flags:[]}
      quizBank: [],               // 收藏的题目 {id, topicId, topicName, stem, type, options, answer, solution, trap, diff, savedAt, note}
      mistakePhotos: [],          // 拍题错题本 {id, subject, imageBase64(压缩), note, painPoint, extractedQuestion, aiAnalysis:{keySteps,errorCause}, similarProblem, createdAt, analyzedAt}
      weaknessProfile: null,      // 弱点画像 {generatedAt, basedOn:[painPoint...], summary, weakAreas:[...], advice} —— 由拍题疑难点汇聚分析得出
      dailyQuiz: null,            // 每日一题 {date:'YYYY-MM-DD', question, solution, trap, subject, generatedAt}
      dailyQuizHistory: [],       // 历史每日一题 [{date,question,solution,trap,subject,generatedAt}]（"再来一题"时归档）
      ai: { endpoint: '', key: '', model: '', preset: '', stream: false, thinkingMode: undefined },
      deepReview: null,            // 深度复盘持久化 {week, snap, reasoning, output, status, running, generatedAt} —— 切页面/刷新后保留，避免阻塞式重生成
      majorData: {},               // AI生成的专业数据缓存 { profName: { modules, topics, conceptGraph, ... } }
      settings: { targetSchool: 'undecided', examDate: '2026-12-26', weeklyTargetHours: 50, onboarded: false,
        examConfig: { mathType: 'shuyi', engType: 'yingyi', profName: '自控原理' },
        // ---- 以下字段均可被 AI/用户改写，原为代码内硬编码规则 ----
        coachProfile: { mathWeak: '符号错误、分式漏分母、积分因子符号反', distractions: '硬件项目、B站、游戏', redlineNote: '“二战”是违禁词，禁止说“大不了二战”' },
        redline: { items: null, checklist: null, keywords: '' },   // 为 null 时回退 data.js 默认；keywords 为额外分心源
        scheduler: { useAI: true, mathAccThreshold: 70, idleDays: 3, signWeekThreshold: 3, signForceCount: 5, polCap: 2 }, // 当日 AI 编排缓存已改为独立本地 key（见 data.js SCHED_PLAN_KEY），不进入云同步
        targetScores: { math: 130, prof: 135, eng: 70, pol: 65 } }, // 决策参谋目标分，按专业可调
      alerts: { lastProfWarn: '', lastNovPush: '' }
    };
  }

  let cache = null;

  const Store = {
    KEY,
    // 读取整个状态（带缓存）。首次或损坏时回退到初始结构
    get() {
      if (cache) return cache;
      try {
        const raw = localStorage.getItem(KEY);
        if (!raw) { cache = initialState(); Store.save(); return cache; }
        const data = JSON.parse(raw);
        cache = Store.migrate(data);
        Store.normalize(cache);
        return cache;
      } catch (e) {
        console.error('[Store] 数据损坏，已重置', e);
        cache = initialState(); Store.save();
        return cache;
      }
    },
    // 结构补齐：老数据缺字段时合并默认值（非破坏性）
    migrate(data) {
      const base = initialState();
      function merge(def, cur) {
        if (cur == null) return def;
        if (Array.isArray(def)) return Array.isArray(cur) ? cur : def;
        if (typeof def === 'object' && def !== null) {
          const out = {};
          Object.keys(def).forEach(k => { out[k] = merge(def[k], cur[k]); });
          // 保留 cur 中多出来的键（前向兼容）
          Object.keys(cur).forEach(k => { if (!(k in out)) out[k] = cur[k]; });
          return out;
        }
        return cur;
      }
      return merge(base, data);
    },
    // 归一化旧数据：给任务补 updatedAt、确保 taskTomb 存在（云端合并依赖这两个字段）
    normalize(s) {
      if (!s || !s.tasks) return s;
      if (!s.taskTomb) s.taskTomb = {};
      s.tasks.forEach(t => { if (t && !t.updatedAt) t.updatedAt = t.createdAt || new Date().toISOString(); });
      return s;
    },
    save() { try { localStorage.setItem(KEY, JSON.stringify(cache)); } catch (e) { console.error('[Store] 保存失败', e); if (window.Toast) Toast.show('存储失败：空间不足，请导出备份后清理', 'danger'); } if (window.Cloud) Cloud.schedulePush(); },
    // 函数式更新：Store.update(s => { s.xxx = ... })
    update(fn) { const s = Store.get(); fn(s); Store.save(); U.emit('store:change'); return s; },
    replace(data) { cache = Store.migrate(data); Store.save(); U.emit('store:change'); },
    // 带墓碑的删除：从集合数组移除，同时在 tomb[name][id] 打标记。
    // 合并（云端拉取）时按墓碑过滤被删项，使"本地删除"可跨设备传播，且不会被云端旧副本复活。
    // 对应集合：quizBank、mistakePhotos（与 initialState().tomb 的键一致）。
    removeFromColl(name, id) {
      Store.update(s => {
        if (!s[name]) return;
        s[name] = s[name].filter(x => x.id !== id);
        if (!s.tomb) s.tomb = {};
        if (!s.tomb[name]) s.tomb[name] = {};
        s.tomb[name][id] = Date.now();
      });
    },
    // 深合并：以 local 为基准，并入 remote 中 local 缺失的项（不丢弃任一侧数据）。
    // 数组按 id 去重并集（无 id 则按内容）；对象递归合并（远端补缺、本地优先）；标量本地优先。
    deepUnion(a, b) {
      if (Array.isArray(a) && Array.isArray(b)) {
        const seen = {}, out = [];
        a.forEach(x => { const k = (x && x.id != null) ? x.id : JSON.stringify(x); seen[k] = true; out.push(x); });
        b.forEach(x => { const k = (x && x.id != null) ? x.id : JSON.stringify(x); if (!seen[k]) { seen[k] = true; out.push(x); } });
        return out;
      }
      if (a && typeof a === 'object' && !Array.isArray(a) && b && typeof b === 'object' && !Array.isArray(b)) {
        const out = {};
        Object.keys(a).forEach(k => { out[k] = a[k]; });
        Object.keys(b).forEach(k => {
          if (!(k in out)) out[k] = b[k];
          else out[k] = Store.deepUnion(out[k], b[k]);
        });
        return out;
      }
      return (a !== undefined && a !== null) ? a : b;
    },

    // 云端拉取时的「合并」而非「整体替换」：任务按 id 合并（含删除墓碑），解决"只增不同步删"。
    // opts.preserveLocal=true（推送前合并远端用）：以本地为基准深合并，绝不丢弃本地非任务数据，
    //   只并入远端独有的任务/墓碑——避免"陈旧云端快照"把本地打卡/错题等整篇覆盖掉、误弹初始化向导。
    // opts 缺省（轮询/手动拉取）：其余字段以远端为准（LWW），保持原来的跨设备同步行为。
    mergeFrom(remoteData, opts) {
      opts = opts || {};
      const r = Store.migrate(remoteData);
      const local = Store.get();
      // 墓碑合并：任一侧标记删除的 id 都视为已删
      const tomb = Object.assign({}, local.taskTomb || {}, r.taskTomb || {});
      // 集合墓碑（题库/拍题等）：任一侧删除都生效
      const TOMB_COLLS = ['quizBank', 'mistakePhotos'];
      const collTomb = {};
      TOMB_COLLS.forEach(name => { collTomb[name] = Object.assign({}, (local.tomb && local.tomb[name]) || {}, (r.tomb && r.tomb[name]) || {}); });
      const localKept = (local.tasks || []).filter(t => !tomb[t.id]);
      const remoteKept = (r.tasks || []).filter(t => !tomb[t.id]);
      const merged = localKept.slice();
      const ids = {};
      localKept.forEach(t => { ids[t.id] = true; });
      remoteKept.forEach(rt => {
        if (ids[rt.id]) {
          // 同 id：取 updatedAt 较新者，避免旧版本覆盖新编辑
          const lt = local.tasks.find(x => x.id === rt.id);
          const lu = lt && lt.updatedAt ? new Date(lt.updatedAt).getTime() : 0;
          const ru = rt.updatedAt ? new Date(rt.updatedAt).getTime() : 0;
          if (ru > lu) {
            const idx = merged.findIndex(x => x.id === rt.id);
            if (idx >= 0) merged[idx] = rt;
          }
        } else {
          merged.push(rt); ids[rt.id] = true;
        }
      });
      merged.sort((a, b) => (a.order != null ? a.order : Number.MAX_SAFE_INTEGER) - (b.order != null ? b.order : Number.MAX_SAFE_INTEGER));
      let out;
      if (opts.preserveLocal) {
        // 推送前合并：本地为基准深合并，仅任务/集合墓碑走 id 级合并（远端独有项并入）
        out = Store.deepUnion(local, r);
        out.tasks = merged;
        out.taskTomb = tomb;
        // 集合墓碑集合：本地保留 + 远端独有并入，墓碑项一律剔除（本地删除不被复活）
        TOMB_COLLS.forEach(name => {
          const lt = (local[name] || []).filter(x => !collTomb[name][x.id]);
          const rt = (r[name] || []).filter(x => !collTomb[name][x.id]);
          const seen = {}; const arr = [];
          lt.forEach(x => { seen[x.id] = true; arr.push(x); });
          rt.forEach(x => { if (!seen[x.id]) { seen[x.id] = true; arr.push(x); } });
          out[name] = arr;
          if (!out.tomb) out.tomb = {};
          out.tomb[name] = collTomb[name];
        });
      } else {
        out = r;            // 其余字段以远端为准（LWW）
        out.tasks = merged;
        out.taskTomb = tomb;
        // LWW 路径同样尊重墓碑（防止删除被远端的旧副本"复活"）
        TOMB_COLLS.forEach(name => {
          out[name] = (out[name] || []).filter(x => !collTomb[name][x.id]);
          if (!out.tomb) out.tomb = {};
          out.tomb[name] = collTomb[name];
        });
      }
      // 安全网（sticky onboarded）：本地已表明完成初始化（标志为真，或有实质数据），
      // 强制保留 onboarded=true，远端旧快照（onboarded 缺失/为false）不能降级它，避免误弹初始化向导。
      const localOnboarded = !!(local.settings && local.settings.onboarded)
        || (local.completions && Object.keys(local.completions).length > 0)
        || (local.studyHours && Object.keys(local.studyHours).length > 0)
        || (local.mistakes && local.mistakes.length > 0)
        || (local.tasks && local.tasks.length > 6);
      if (localOnboarded && out.settings) out.settings.onboarded = true;
      cache = out;
      Store.save();
      U.emit('store:change');
    },
    resetAll() { cache = initialState(); Store.save(); U.emit('store:change'); },
    exportJSON() { return JSON.stringify(Store.get(), null, 2); },
    usageBytes() { const raw = localStorage.getItem(KEY) || ''; return raw.length * 2; }, // UTF-16 粗算

    // ---------- 跨模块查询助手 ----------
    // 今日完成的任务数/总数（按科目）
    todayTaskStats() {
      const s = Store.get();
      const doneIds = s.completions[U.dkey()] || [];
      const stats = { math: [0, 0], ctrl: [0, 0], eng: [0, 0], pol: [0, 0] };
      s.tasks.forEach(t => {
        if (!stats[t.subject]) return;
        stats[t.subject][1]++;
        if (t.done || doneIds.indexOf(t.id) >= 0) stats[t.subject][0]++;
      });
      return stats;
    },
    // 今日是否全部完成
    todayAllDone() {
      const st = Store.todayTaskStats();
      let total = 0, done = 0;
      Object.keys(st).forEach(k => { total += st[k][1]; done += st[k][0]; });
      return total > 0 && done === total;
    },
    // 本周7天学习时长数组（周一至周日）
    weekHours() {
      const s = Store.get();
      return U.weekKeys().map(k => s.studyHours[k] || 0);
    },
    // 今天已累计时长
    todayHours() { return Store.get().studyHours[U.dkey()] || 0; },
    addHours(h) { Store.update(s => { const k = U.dkey(); s.studyHours[k] = U.round1((s.studyHours[k] || 0) + h); }); },
    // 今日某错误类型次数
    mistakeCountToday(type) {
      const today = U.dkey();
      return Store.get().mistakes.filter(m => (m.createdAt || '').slice(0, 10) === today && (!type || m.type === type)).length;
    },
    // 本周某错误类型次数
    mistakeCountWeek(type) {
      return Store.get().mistakes.filter(m => U.inThisWeek((m.createdAt || '').slice(0, 10)) && (!type || m.type === type)).length;
    },
    // 本周错误类型Top2 → [{key,count}]
    weekTopMistakes() {
      const list = Store.get().mistakes.filter(m => U.inThisWeek((m.createdAt || '').slice(0, 10)));
      return U.topN(U.countBy(list, m => m.type), 2);
    },
    // 最近n天数学正确率（从 weeklyStats 取本周；无则null）
    currentMathAccuracy() {
      const s = Store.get();
      const wk = Store.weekKey();
      const w = s.weeklyStats[wk];
      return w && typeof w.mathAccuracy === 'number' ? w.mathAccuracy : null;
    },
    weekKey(d) {
      d = d || new Date();
      const m = U.weekMonday(d);
      const y = m.getFullYear();
      // ISO周数近似
      const jan1 = new Date(y, 0, 1);
      const week = Math.ceil((((m - jan1) / U.DAY_MS) + jan1.getDay() + 1) / 7);
      return y + '-W' + String(week).padStart(2, '0');
    },
    // 专业课难度自评（decision.inputs.xiankongScore 自评 1-10，向后兼容）
    profHardScore() { return Store.get().decision.inputs.xiankongScore || 0; },
    // 专业课"难模块"进度（读取 activeMajor.alertRule.hardModule 对应的模块百分比）
    profAdvancedPercent() {
      try {
        var rule = DB.getActiveMajor().alertRule;
        var hardMod = rule && rule.hardModule ? rule.hardModule : '\u73b0\u4ee3\u63a7\u5236';
        var m = Store.get().progress.ctrl.modules;
        // 遍历查找匹配模块（支持部分匹配）
        var keys = Object.keys(m);
        for (var i = 0; i < keys.length; i++) {
          if (keys[i].indexOf(hardMod) >= 0 || hardMod.indexOf(keys[i]) >= 0) return m[keys[i]] || 0;
        }
        // 没找到则取第一个模块或0
        return keys.length > 0 ? (m[keys[0]] || 0) : 0;
      } catch (e) { return 0; }
    },
    // 向后兼容别名
    xiankongScore() { return Store.profHardScore(); },
    xiankongPercent() { return Store.profAdvancedPercent(); },
    // 近3天是否有某科目打卡
    subjectDoneInDays(subject, days) {
      const s = Store.get();
      const keys = U.lastNDays(days);
      // 已完成任务看 completions + tasks.done；近似：今天看任务，历史看 taskArchive
      for (const k of keys) {
        if (k === U.dkey()) {
          const doneIds = s.completions[k] || [];
          if (s.tasks.some(t => t.subject === subject && (t.done || doneIds.indexOf(t.id) >= 0))) return true;
        } else {
          const arch = s.taskArchive[k] || [];
          if (arch.some(t => t.subject === subject && t.done)) return true;
        }
      }
      return false;
    }
  };

  window.Store = Store;
})();


/* ===== js/core/cloud.js ===== */
/* ============================================================
 * cloud.js — GitHub Gist 云端同步层（个人令牌模式）
 * 设计原则：
 *   1. localStorage 仍作离线缓存，断网也能用，零侵入现有逻辑。
 *   2. 每个用户在前端填入【自己的 GitHub 个人令牌(gist 权限)】，
 *      数据存到该用户【自己 GitHub 账号下的 Gist】，天然按人隔离、完全去中心化。
 *   3. 近实时：保存时防抖上传 + 每 60s 轮询拉取远端变更。
 *   4. 多设备：同一令牌登录不同设备 → 操作的是同一个 Gist → 自动同步。
 *
 * ⚠️ 安全：令牌仅存于本机浏览器 localStorage；请只授予 gist 权限，不要给 repo 权限。
 *    Gist 内容经其 URL 可被匿名访问（"secret" 非"private"），勿在其中存放高敏感密码。
 *
 * v3 优化（解决"老是同步失败 / API 限额打满"）：
 *   - 内容哈希去重：数据未变时不重复上传（节省大量无效 API 调用）
 *   - 推送防抖延长至 2s（用户连续操作只推一次最终态）
 *   - 轮询从 20s 放宽到 60s（跨设备同步延迟可接受，API 开销降 3 倍）
 *   - 推送后不再额外 getGist 确认时间戳（用本地时间代替，省 1 次 API 调用/次）
 *   - 推送前合并远端改为尽力而为（瞬时失败不阻断上传）
 *   - 403 限额自动退避（指数退避，最高 5 分钟一查，避免死循环撞墙）
 *   - 任务级合并（mergeFrom）：增删都跨设备同步（墓碑机制）
 * ============================================================ */
(function () {
  'use strict';

  const API = 'https://api.github.com';
  const GIST_FILENAME = 'kaoyan2026.json';   // Gist 内的文件名
  const GIST_DESC = 'kaoyan2026-sync';       // Gist 描述
  const TOKEN_KEY = 'kaoyan2026_ghtoken';    // 本机保存的用户令牌
  const META_KEY = 'kaoyan2026_cloud';       // 保存 gistId / 时间戳，用于冲突判断
  const SAVE_DEBOUNCE = 2000;                // 保存防抖（毫秒）——比原来 800ms 长，减少频繁保存时的 API 浪费
  const POLL_INTERVAL = 60000;               // 轮询间隔（毫秒）——从 20s 放宽到 60s，API 开销降 3 倍
  const TOKEN_HELP = 'https://github.com/settings/tokens/new?scopes=gist&description=kaoyan2026同步';

  const state = {
    enabled: false, token: null, gistId: null,
    lastPushedAt: 0, lastSyncAt: 0, pollTimer: null, badge: null,
    lastPayloadHash: '',          // 上次推送的内容哈希（去重：相同内容不再重复上传）
    pushing: false,                // 是否正在推送中（防止并发推送）
    rateLimitBackoffUntil: 0      // 403 限额退避截止时间戳
  };
  let suppressPush = false;       // 拉取写回本地时抑制再次上传（防回环）
  let pushTimer = null;
  let meta = loadMeta();

  function loadMeta() {
    let m;
    try { m = JSON.parse(localStorage.getItem(META_KEY)); } catch (e) { m = null; }
    m = m || {};
    // 默认开启「同步 AI Key」：未显式关闭过（undefined）即视为同步，
    // 已显式关闭（=false）的用户仍保留其选择。
    if (m.syncAiKey === undefined) m.syncAiKey = true;
    return m;
  }
  function saveMeta() {
    meta.gistId = state.gistId; meta.lastPushedAt = state.lastPushedAt; meta.lastSyncAt = state.lastSyncAt;
    try { localStorage.setItem(META_KEY, JSON.stringify(meta)); } catch (e) {}
  }
  function loadToken() { try { return localStorage.getItem(TOKEN_KEY) || ''; } catch (e) { return ''; } }
  function saveToken() { try { localStorage.setItem(TOKEN_KEY, state.token); } catch (e) {} }
  function clearToken() { try { localStorage.removeItem(TOKEN_KEY); } catch (e) {} }

  // ---------- 轻量哈希（不用 crypto.subtle 以兼容所有浏览器）----------
  function contentHash(str) {
    let h = 0;
    for (let i = 0; i < str.length; i++) {
      h = ((h << 5) - h + str.charCodeAt(i)) | 0;
    }
    return h.toString(36);
  }

  // ---------- 403 限额退避检查 ----------
  function isRateLimited() {
    return Date.now() < state.rateLimitBackoffUntil;
  }
  function setRateLimitBackoff(attempt) {
    // 指数退避：第1次等30s，第2次60s，第3次120s，第4次240s，第5次300s封顶
    const delay = Math.min(30000 * Math.pow(2, attempt), 300000);
    state.rateLimitBackoffUntil = Date.now() + delay;
    console.warn('[Cloud] 触发 API 限额退避，' + Math.round(delay / 1000) + '秒内跳过请求');
  }

  // ---------- GitHub API 封装 ----------
  async function api(path, opts) {
    if (isRateLimited()) {
      throw new Error('HTTP 403（退避中，' + Math.ceil((state.rateLimitBackoffUntil - Date.now()) / 1000) + 's 后恢复）');
    }
    opts = opts || {};
    const res = await fetch(API + path, {
      method: opts.method || 'GET',
      headers: {
        'Authorization': 'Bearer ' + state.token,
        'Accept': 'application/vnd.github+json',
        'Content-Type': 'application/json'
      },
      body: opts.body ? JSON.stringify(opts.body) : undefined
    });
    if (!res.ok) {
      const e = new Error('HTTP ' + res.status);
      e.status = res.status;
      if (res.status === 403) e.message = '已达 GitHub API 限额，稍后重试';
      else if (res.status === 401) e.message = '令牌无效或无 gist 权限';
      else if (res.status === 404) e.message = '资源不存在（Gist 可能被删除）';
      throw e;
    }
    const txt = await res.text();
    return txt ? JSON.parse(txt) : null;
  }

  async function createGist(json) {
    const data = await api('/gists', {
      method: 'POST',
      body: { description: GIST_DESC, public: false, files: { [GIST_FILENAME]: { content: json } } }
    });
    return data.id;
  }
  async function updateGist(id, json) {
    await api('/gists/' + id, { method: 'PATCH', body: { files: { [GIST_FILENAME]: { content: json } } } });
  }
  async function getGist(id) {
    const data = await api('/gists/' + id);
    if (!data || !data.files) return { content: null, updatedAt: 0 };
    const f = data.files && data.files[GIST_FILENAME];
    return { content: f ? f.content : null, updatedAt: data.updated_at ? new Date(data.updated_at).getTime() : 0 };
  }
  // 同一令牌下，靠文件名找出已存在的 Gist（解决换浏览器/设备无 gistId 的问题）
  async function discoverGist() {
    let page = 1, best = null, bestSize = -1;
    while (page <= 3) {                 // 从 5 页减到 3 页（最多 300 个），绝大多数用户不会超过 3 页
      const list = await api('/gists?per_page=100&page=' + page);
      if (!list || !list.length) break;
      for (const g of list) {
        const f = g.files && g.files[GIST_FILENAME];
        if (!f) continue;
        const size = (f.size != null) ? f.size : 0;
        const updated = g.updated_at ? new Date(g.updated_at).getTime() : 0;
        if (size > bestSize || (size === bestSize && updated > (best ? best.updated : 0))) {
          best = { id: g.id, size, updated }; bestSize = size;
        }
      }
      page++;
    }
    return best ? best.id : null;
  }

  // ---------- 拉取：远端更新时间更新则合并覆盖本地（任务按 id 合并）----------
  // force=true 时忽略时间戳闸门，强制以远端为准合并
  async function pull(force, mergeOpts) {
    if (!state.gistId) { state.lastSyncAt = Date.now(); saveMeta(); return; }
    const { content, updatedAt } = await getGist(state.gistId);
    if (content && (force || updatedAt > (state.lastPushedAt || 0))) {
      let changed = true;
      try {
        // 内容哈希比对：若远端与本端完全一致，说明没有真正的新数据，
        // 跳过合并与刷新——既避免每次操作后的自动同步把页面滚回顶部，
        // 也避免 reconcile 拉取在无变更时销毁用户正在进行的就地编辑。
        const localObj = JSON.parse(window.Store.exportJSON());
        // 与上传负载一致：仅在显式关闭同步时才剥离 AI Key（默认同步）
        if (meta.syncAiKey === false && localObj.ai && typeof localObj.ai.key === 'string') localObj.ai.key = '';
        const localHash = contentHash(JSON.stringify(localObj));
        const remoteHash = contentHash(content);
        if (localHash === remoteHash) {
          changed = false;
        } else {
          const d = JSON.parse(content);
          suppressPush = true;
          try { window.Store.mergeFrom(d, mergeOpts || {}); } finally { suppressPush = false; }
        }
        if (changed) {
          if (window.App) App.refresh();
          if (window.Onboarding && Onboarding.dismissIfNeeded) Onboarding.dismissIfNeeded();
        }
      } catch (e) { console.error('[Cloud] 远端数据解析/合并失败', e); }
    }
    state.lastPushedAt = updatedAt;
    state.lastSyncAt = Date.now();
    saveMeta();
  }

  // ---------- 推送：防抖 + 哈希去重 + 合并远端（尽力而为）----------
  function schedulePush() {
    if (!state.enabled || !state.token || suppressPush || state.pushing) return;
    if (pushTimer) clearTimeout(pushTimer);
    pushTimer = setTimeout(() => {
      push().catch(e => { console.error('[Cloud] 推送失败', e); renderBadge('☁ 同步失败', 'err'); });
    }, SAVE_DEBOUNCE);
  }

  // 构建上传负载：默认携带 ai.key（已默认开启同步；仅显式关闭时不带）
  function buildPayload() {
    const full = JSON.parse(window.Store.exportJSON());
    if (meta.syncAiKey === false && full.ai && typeof full.ai.key === 'string') full.ai.key = '';
    return JSON.stringify(full);
  }

  async function push() {
    if (!state.enabled || !state.token || state.pushing) return;
    state.pushing = true;
    renderBadge('☁ 同步中…', 'busy');
    try {
      // 先尽力与远端合并（避免用本地旧副本覆盖对方新增）。
      // preserveLocal：以本地为基准深合并，绝不丢弃本地打卡/错题等非任务数据，
      // 只并入远端独有的任务——杜绝"陈旧云端快照"把本地数据整篇覆盖、误弹初始化向导。
      if (state.gistId) {
        try {
          suppressPush = true;
          try { await pull(true, { preserveLocal: true }); } finally { suppressPush = false; }
        } catch (e) { console.warn('[Cloud] 合并远端失败，已跳过（稍后自动重试）', e); }
      }

      // 合并完成后再取最新本地负载（已含并入的远端新增），避免上传陈旧快照
      const json = buildPayload();

      // 哈希去重：若内容与上次推送完全一致，跳过上传（节省大量无效 API 调用）
      const hash = contentHash(json);
      if (hash === state.lastPayloadHash && state.gistId) {
        state.lastSyncAt = Date.now();
        saveMeta();
        renderBadge('☁ 已同步', 'on');
        return;
      }

      try {
        if (!state.gistId) state.gistId = await createGist(json);
        else await updateGist(state.gistId, json);
      } catch (e) {
        // Gist 不存在(404)或令牌失效(401)：尝试重新发现已有 Gist，否则新建
        if (e && (e.status === 404 || e.status === 401)) {
          state.gistId = null;
          try { const id = await discoverGist(); if (id) state.gistId = id; } catch (_) {}
          if (!state.gistId) state.gistId = await createGist(json);
          else await updateGist(state.gistId, json);
        } else if (e && e.status === 403) {
          // 403 限额：记录退避，本次放弃推送（下次定时器会重试）
          setRateLimitBackoff(0);
          throw e;
        } else {
          throw e;
        }
      }

      // 推送成功：更新哈希和时间戳（不再额外调 getGist 确认，用本地时间代替，省 1 次 API 调用）
      state.lastPayloadHash = hash;
      state.lastPushedAt = Date.now();
      state.lastSyncAt = Date.now();
      saveMeta();
      renderBadge('☁ 已同步', 'on');
    } catch (e) {
      console.error('[Cloud] 推送失败', e);
      const msg = (e && e.message) ? e.message : ('' + e);
      renderBadge('☁ 同步失败', 'err');
      if (state.badge) state.badge.title = '同步失败：' + msg;
      if (window.Toast) Toast.danger('☁ 同步失败：' + msg);
    } finally {
      state.pushing = false;
    }
  }

  // ---------- 令牌验证 + 启动同步 ----------
  async function startSync() {
    renderBadge('☁ 同步中…', 'busy');
    try {
      if (!state.gistId) {
        try { const id = await discoverGist(); if (id) state.gistId = id; } catch (e) { console.warn('[Cloud] 发现 Gist 失败', e); }
        state.lastPushedAt = 0;
      }
      await pull();
      if (!state.gistId) await push();
      renderBadge('☁ 已同步', 'on');
      startPolling();
    } catch (e) {
      console.error('[Cloud] 同步失败', e);
      const msg = (e && e.message) ? e.message : ('' + e);
      renderBadge('☁ 同步失败', 'err');
      if (state.badge) state.badge.title = '同步失败：' + msg;
      if (window.Toast) Toast.danger('☁ 同步失败：' + msg);
    }
  }
  function startPolling() {
    stopPolling();
    state.pollTimer = setInterval(async () => {
      // 退避期间跳过轮询
      if (isRateLimited()) return;
      try {
        // 周期拉取采用 preserveLocal：以本地为基准深合并，绝不把"远端旧快照"覆盖回
        // 本地刚做的改动（如切换思考模式/流式、删除题库题等），只并入远端独有的新增项。
        // 内容哈希比对相等时 pull 内部会跳过实际合并，不触发无谓刷新。
        await pull(true, { preserveLocal: true });
        renderBadge('☁ 已同步', 'on');
      } catch (e) {
        // 轮询中的 403 触发退避（非致命，静默处理）
        if (e && e.status === 403) setRateLimitBackoff(0);
      }
    }, POLL_INTERVAL);
  }
  function stopPolling() { if (state.pollTimer) { clearInterval(state.pollTimer); state.pollTimer = null; } }

  async function init() {
    const t = loadToken();
    if (!t) { renderBadge('☁ 未同步', 'off'); return; }
    state.token = t; state.enabled = true;
    state.gistId = null;
    state.lastPushedAt = meta.lastPushedAt || 0;
    await startSync();
  }

  async function saveTokenAndStart(tok, mask) {
    state.token = tok.trim();
    try {
      await api('/rate_limit');           // 轻量鉴权校验
      state.enabled = true;
      saveToken();
      state.gistId = null;
      state.lastPushedAt = meta.lastPushedAt || 0;
      closePanel();
      await startSync();
    } catch (e) {
      state.token = null; state.enabled = false;
      setErr(mask, e.status === 401 ? '令牌无效或无 gist 权限，请检查' : (e.message || '验证失败'));
    }
  }

  async function logout() {
    stopPolling();
    clearToken();
    state.token = null; state.enabled = false; state.gistId = null;
    state.lastPayloadHash = '';
    state.rateLimitBackoffUntil = 0;
    meta = {}; saveMeta();
    renderBadge('☁ 未同步', 'off');
  }

  // ---------- UI：状态徽标 + 令牌面板 ----------
  function ensureStyle() {
    if (document.getElementById('cloud-style')) return;
    const s = document.createElement('style');
    s.id = 'cloud-style';
    s.textContent = `
#cloud-badge{position:fixed;right:10px;bottom:72px;z-index:99999;font:13px/1.4 system-ui;padding:6px 10px;border-radius:20px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.18);user-select:none;white-space:nowrap}
#cloud-badge.on{background:#e6f7ec;color:#1a7f37}
#cloud-badge.off{background:#f0f0f0;color:#666}
#cloud-badge.busy{background:#e8f0fe;color:#1a56c4}
#cloud-badge.err{background:#fdeaea;color:#c0392b}
#cloud-mask{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100000;display:flex;align-items:center;justify-content:center;padding:16px}
#cloud-card{background:#fff;color:#222;border-radius:14px;width:100%;max-width:360px;padding:18px;box-shadow:0 10px 40px rgba(0,0,0,.3)}
#cloud-card h3{margin:0 0 12px;font-size:17px}
#cloud-card input{width:100%;box-sizing:border-box;padding:10px;margin:6px 0;border:1px solid #ddd;border-radius:8px;font-size:14px}
#cloud-card .row{display:flex;gap:8px;margin-top:12px}
#cloud-card button{flex:1;padding:10px;border:0;border-radius:8px;font-size:14px;cursor:pointer}
#cloud-card .primary{background:#2f54eb;color:#fff}
#cloud-card .ghost{background:#eee;color:#333}
#cloud-card .err{color:#c0392b;font-size:13px;min-height:18px;margin-top:6px}
#cloud-card .hint{color:#888;font-size:12px;margin-top:10px;line-height:1.6}
#cloud-card a{color:#2f54eb}`;
    document.head.appendChild(s);
  }
  function renderBadge(text, type) {
    ensureStyle();
    if (!state.badge) {
      state.badge = document.createElement('div');
      state.badge.id = 'cloud-badge';
      state.badge.onclick = openPanel;
      document.body.appendChild(state.badge);
    }
    let label = text;
    if (type === 'on' && state.gistId) label = '☁ 已同步 #' + state.gistId.slice(0, 6);
    state.badge.className = type;
    state.badge.textContent = label;
    state.badge.title = state.gistId ? ('Gist: ' + state.gistId + '（两台设备 Gist ID 相同即同一份数据）') : '未连接云端';
  }
  function openPanel() {
    ensureStyle();
    if (document.getElementById('cloud-mask')) return;
    const mask = document.createElement('div');
    mask.id = 'cloud-mask';
    if (state.token) renderLoggedIn(mask); else renderAuth(mask);
    document.body.appendChild(mask);
    mask.onclick = (e) => { if (e.target === mask) closePanel(); };
  }
  function closePanel() { const m = document.getElementById('cloud-mask'); if (m) m.remove(); }

  function renderAuth(mask) {
    mask.innerHTML = '<div id="cloud-card">'
      + '<h3>☁ 同步到你的 GitHub</h3>'
      + '<input id="cv-t" placeholder="粘贴 GitHub 个人令牌" type="password">'
      + '<div class="err" id="cv-err"></div>'
      + '<div class="row"><button class="primary" id="cv-ok">保存并同步</button><button class="ghost" id="cv-cancel">取消</button></div>'
      + '<div class="hint">① 去 <a href="' + TOKEN_HELP + '" target="_blank" rel="noreferrer">生成令牌</a>，只勾 <b>gist</b> 权限；<br>'
      + '② 令牌仅存于本机浏览器，数据存在你自己的 Gist 里，别人看不到；<br>'
      + '③ 不同设备用同一令牌即自动同步同一份数据。</div>'
      + '</div>';
    mask.querySelector('#cv-cancel').onclick = closePanel;
    mask.querySelector('#cv-ok').onclick = () => {
      const t = mask.querySelector('#cv-t').value.trim();
      if (!t) { setErr(mask, '请粘贴令牌'); return; }
      saveTokenAndStart(t, mask);
    };
  }

  function renderLoggedIn(mask) {
    const t = state.lastSyncAt ? new Date(state.lastSyncAt).toLocaleString() : '—';
    const gistUrl = state.gistId ? ('https://gist.github.com/' + state.gistId) : '#';
    const gistId = state.gistId ? state.gistId.slice(0, 8) : '（未绑定）';
    mask.innerHTML = '<div id="cloud-card">'
      + '<h3>☁ 已同步到你的 GitHub</h3>'
      + '<div class="hint" style="margin-top:0">最近同步：' + t + '<br>'
      + '数据 Gist ID：<b style="color:#1a7f37">' + gistId + '</b><br>'
      + 'Gist 地址：<a href="' + gistUrl + '" target="_blank" rel="noreferrer">查看</a><br>'
      + '<span style="color:#c0392b;display:block;margin-top:6px">⚠ 跨设备同步的前提：<b>每台设备都粘贴【同一个】GitHub 令牌</b>。令牌指向同一份 Gist（即上方 ID 一致）→ 自动同步；若某台 ID 不同或显示「未同步」，说明它用的是另一个令牌/账号，数据自然各是各的。</span></div>'
      + '<label style="display:flex;align-items:center;gap:6px;font-size:13px;margin-top:10px;color:#444">'
      + '<input type="checkbox" id="cv-ai"' + (meta.syncAiKey ? ' checked' : '') + '>'
      + ' 同步 AI Key 到云端（默认开，方便换设备免重填；Gist 链接可被匿名访问，介意可取消）</label>'
      + '<div class="row"><button class="primary" id="cv-sync">拉取+推送</button><button class="ghost" id="cv-pull">仅拉取远端</button></div>'
      + '<div class="row"><button class="primary" id="cv-copy">复制同步令牌</button><button class="ghost" id="cv-out">退出</button></div>'
      + '<div class="err" id="cv-err"></div>'
      + '<div class="hint">退出仅清除本机令牌，云端数据不删；换设备用同一令牌仍可取回。</div>'
      + '</div>';
    mask.querySelector('#cv-ai').onchange = (e) => {
      meta.syncAiKey = e.target.checked; saveMeta();
      push().then(() => renderBadge('☁ 已同步', 'on')).catch(() => {});
    };
    mask.querySelector('#cv-sync').onclick = () => {
      pull(true).then(push).then(() => { renderLoggedIn(mask); renderBadge('☁ 已同步', 'on'); if (window.Toast) Toast.success('已与云端同步'); })
        .catch(() => setErr(mask, '同步失败，请重试'));
    };
    mask.querySelector('#cv-pull').onclick = () => {
      pull(true).then(() => { renderLoggedIn(mask); renderBadge('☁ 已同步', 'on'); if (window.Toast) Toast.success('已拉取远端数据'); })
        .catch(() => setErr(mask, '拉取失败，请检查网络或令牌'));
    };
    mask.querySelector('#cv-copy').onclick = () => {
      const tok = state.token || '';
      const done = () => setErr(mask, '已复制令牌，去另一台设备粘贴即可同步同一份数据');
      const fail = () => setErr(mask, '当前环境不支持自动复制，请手动复制令牌');
      if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(tok).then(done).catch(fail);
      else fail();
    };
    mask.querySelector('#cv-out').onclick = () => { logout(); closePanel(); };
  }

  function setErr(mask, msg) { const el = mask.querySelector('#cv-err'); if (el) el.textContent = msg; }

  // ---------- 对外接口 ----------
  window.Cloud = {
    init, pull, push, schedulePush, openPanel,
    logout,
    get isEnabled() { return state.enabled; },
    get isLoggedIn() { return !!state.token; }
  };
})();

  function recommendSchools(profName, maxResults) {
    maxResults = maxResults || 8;
    if (!profName || !profName.trim()) { return []; }
    var raw = profName.trim().toLowerCase();
    var expanded = ABBREVIATIONS[raw] || raw;
    var queries = expanded.split(/\s+/).filter(function (x) { return x.length > 0; });
    if (expanded !== raw) { queries.push(raw); }

    Object.keys(SCHOOLS).forEach(function (key) {
      var s = SCHOOLS[key];
      allSchools.push(s);
      var keywords = s.examKeywords || [];
      var bestScore = 0;
      for (var qi = 0; qi < queries.length; qi++) {
        var q = queries[qi];
        for (var i = 0; i < keywords.length; i++) {
          var kw = keywords[i].toLowerCase();
          var score = 0;
          if (q === kw) { score = 100; }
          else if (q.indexOf(kw) >= 0 || kw.indexOf(q) >= 0) { score = 60; }
          else {

    });
